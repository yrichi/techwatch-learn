nnet-4-5-20250929</code>) plutôt que l&#39;alias evergreen (Models overview ; applied-llms.org).</p>\n<p><strong>Q5. Comment justifier le choix Haiku/Sonnet/Opus côté budget ?</strong>\nPar l&#39;échelle de prix input/output par MTok : Haiku 4.5 $1/$5, Sonnet 4.6 $3/$15, Opus 4.8 $5/$25. Comme le pré-traitement est l&#39;étape la plus gourmande en tokens, le placer en Haiku écrase le coût total ; on ne paie Sonnet et Opus que là où la qualité l&#39;exige (Models overview).</p>\n<p><strong>Q6. Quel est le critère pour autoriser une rétrogradation de gamme ?</strong>\nLe passage d&#39;un jeu d&#39;éval gelé. On fait tourner le modèle plus petit sur des affirmations attendues et leurs sources officielles, et on ne rétrograde que si la fidélité, le sourçage vérifiable et les citations correctes restent au-dessus des seuils. Sans harnais d&#39;éval, on ne peut pas rétrograder avec confiance (applied-llms.org).</p>\n<p><strong>Q7. Comment gérer concrètement le cycle de dépréciation ?</strong>\nComme une routine : surveiller la page <code>model-deprecations</code> (états Active / Legacy / Deprecated / Retired), auditer l&#39;usage via l&#39;export CSV de la Console (par clé API et par modèle) pour repérer tout appel à un modèle déprécié, et assigner une date de retrait dès la dépréciation. Compter sur ≥ 60 jours de préavis avant retrait, mais comme plancher, pas comme garantie (Model deprecations).</p>\n<p><strong>Q8. Si une version est épinglée, suis-je à l&#39;abri pour toujours ?</strong>\nNon. Anthropic préserve les <em>poids</em> mais ne garantit pas la re-disponibilité : un modèle retiré renvoie une erreur. L&#39;épinglage protège du <em>drift silencieux</em> (le comportement ne change pas sous vos pieds), pas du retrait. Un plan de migration documenté reste obligatoire (Commitments on Model Deprecation and Preservation).</p>\n<p><strong>Q9. Faut-il monter en gamme ou monter l&#39;effort quand la qualité manque ?</strong>\nSouvent monter l&#39;effort suffit. Sur Opus/Sonnet, <code>output_config.effort</code> (<code>low</code>→<code>max</code>, plus <code>xhigh</code> sur Opus 4.7+) ajuste la profondeur de raisonnement, et activer le thinking adaptatif peut donner ce qu&#39;on cherchait sans changer de modèle. À tester avant de rétrograder/upgrader — sachant que Haiku n&#39;a ni effort ni thinking adaptatif (Models overview ; Migration guide).</p>\n<p><strong>Q10. Quels changements cassants anticiper lors d&#39;une migration cross-génération ?</strong>\nLe thinking adaptatif (<code>type: &quot;adaptive&quot;</code>) remplace <code>budget_tokens</code> (qui renvoie 400 sur Opus 4.7+) ; <code>temperature</code>/<code>top_p</code>/<code>top_k</code> renvoient 400 sur Opus 4.7+ ; le prefill assistant est retiré (utiliser <code>output_config.format</code>). De plus, le tokenizer a changé avec Opus 4.7 (~1×–1,35× de tokens), donc re-baseliner <code>max_tokens</code> et les budgets via <code>count_tokens</code>. Tester d&#39;abord sur une requête unique, inspecter <code>stop_reason</code>/<code>usage</code>, puis dérouler (Migration guide).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://platform.claude.com/docs/en/about-claude/models/overview\">Models overview — Claude API Docs (Anthropic)</a> — <em>official-docs</em> — familles Claude (Haiku 4.5, Sonnet 4.6, Opus 4.8), tarifs ($1/$5, $3/$15, $5/$25 par MTok), fenêtres de contexte (200K vs 1M), mécanique des IDs figés depuis la 4.6, et recommandation de démarrer sur le modèle le plus capable.</li>\n<li><a href=\"https://platform.claude.com/docs/en/about-claude/model-deprecations\">Model deprecations — Claude API Docs (Anthropic)</a> — <em>official-docs</em> — politique du cycle de vie (Active / Legacy / Deprecated / Retired), préavis d&#39;au moins 60 jours, audit d&#39;usage via export CSV de la Console, dépréciation des paramètres d&#39;échantillonnage.</li>\n<li><a href=\"https://applied-llms.org/\">What We Learned from a Year of Building with LLMs (applied-llms.org)</a> — <em>practitioner</em> — prototyper sur le modèle le plus capable puis viser le plus petit qui suffit, piloter les choix de modèle par les évals, et épingler des versions précises pour la reproductibilité en prod.</li>\n<li><a href=\"https://www.anthropic.com/engineering/building-effective-agents\">Building Effective Agents (Anthropic Engineering)</a> — <em>official-engineering</em> — pattern « routing » : classifier l&#39;entrée et router vers une tâche spécialisée (questions faciles → Haiku, difficiles → modèle plus capable).</li>\n<li><a href=\"https://www.anthropic.com/research/deprecation-commitments\">Commitments on Model Deprecation and Preservation (Anthropic)</a> — <em>official-policy</em> — pourquoi les modèles sont retirés (coût d&#39;inférence), engagements de préservation des poids, et l&#39;implication : aucune disponibilité garantie à long terme — il faut planifier la migration.</li>\n<li><a href=\"https://platform.claude.com/docs/en/about-claude/models/migration-guide\">Model migration guide — Claude API Docs (Anthropic)</a> — <em>official-docs</em> — changements cassants par modèle (thinking adaptatif vs <code>budget_tokens</code>, suppression des paramètres d&#39;échantillonnage, prefill retiré) et méthode « tester sur une seule requête d&#39;abord ».</li>\n</ol>\n"},{"num":19,"slug":"provenance-versionnement-contenu","title":"Provenance & versionnement du contenu","tagline":"Capturer le contenu brut tel quel et l'immuabiliser par un hash (SHA-256), versionner les synthèses Markdown dans Git pour un audit trail gratuit, et attacher à chaque synthèse une attestation de provenance (sources hashées + modèle + prompt) — parce que la confiance de TechWatch IA ne tient que si chaque affirmation reste vérifiable même quand la source disparaît.","quiz":[{"q":"Pourquoi conserver le contenu brut au lieu de ne garder que l'URL de la source ?","options":["Parce que les pages officielles changent, se déplacent ou disparaissent, rendant une citation par URL seule invérifiable","Parce que Git refuse de commiter des liens hypertextes externes","Parce que les URL ne respectent pas le format UTF-8 attendu par le pipeline","Parce qu'une URL prend plus de place de stockage qu'une copie du contenu brut"],"answer":0,"explain":"Les pages officielles éditent ou suppriment leur contenu ; sans le brut capturé et son hash, la citation devient invérifiable, ce qui ruine le différenciateur « confiance »."},{"q":"Quelles propriétés le hash SHA-256 du contenu brut apporte-t-il ?","options":["Compression du contenu et chiffrement automatique des données sensibles","Déduplication (stockage content-addressable), immuabilité et détection de tampering","Traduction du contenu et indexation full-text pour la recherche","Génération automatique de la synthèse et du diff Git"],"answer":1,"explain":"Un même contenu donne toujours le même hash et la moindre modification le change : d'où déduplication, immuabilité et détection de toute altération."},{"q":"Pourquoi normaliser le contenu (UTF-8, fins de ligne LF, sans BOM) AVANT de le hasher ?","options":["Pour réduire la taille du fichier avant stockage dans l'object store","Pour que le hash soit compatible avec l'algorithme SHA-256","Pour éviter que du bruit (encodage, BOM, CRLF) crée de faux changements, des retraitements inutiles et casse la déduplication","Pour respecter une obligation explicite de l'EU AI Act sur les encodages"],"answer":2,"explain":"Sans canon documenté, des différences cosmétiques (BOM, CRLF vs LF, ordre des clés) changent le hash et déclenchent de faux retraitements tout en cassant la déduplication."},{"q":"Comment gérer le gros contenu brut par rapport à Git ?","options":["Le stocker hors-Git (S3, DVC, Git-LFS) et ne commiter que des pointeurs/manifestes légers {url, hash, date, taille}","Le commiter directement dans Git pour garantir son immuabilité","Le compresser puis le commiter en pièce jointe du commit de synthèse","Le supprimer après la génération de la synthèse pour économiser l'espace"],"answer":0,"explain":"Git n'est pas conçu pour les gros blobs (dépôt qui explose, clones lents) : le brut vit dans un object store et Git ne porte que des pointeurs, redevenant la source de vérité du lineage."},{"q":"Pourquoi pinner le model id exact et la version du prompt-template dans la provenance ?","options":["Pour réduire le coût des appels au modèle","Parce que les fournisseurs changent leurs modèles silencieusement, faisant dériver les sorties et rendant la reproductibilité illusoire","Parce que SHA-256 exige un identifiant de modèle pour calculer le hash","Pour que Git puisse afficher un diff coloré entre deux synthèses"],"answer":1,"explain":"Les modèles évoluent en arrière-plan ; sans pin du model id et de la version du prompt, on ne peut plus expliquer ni rejouer une ancienne synthèse."},{"q":"Selon l'esprit SLSA/in-toto, que doit contenir le sidecar d'attestation d'une synthèse ?","options":["Uniquement l'URL des sources et la date de génération","Le code source complet du worker et la clé d'API du fournisseur","Le subject (artefact + digest), les resolvedDependencies (hash des sources), les externalParameters (hash du prompt, température) et runDetails (builder.id, invocationId, timestamps)","La transcription intégrale de la conversation avec le LLM, sans hash"],"answer":2,"explain":"L'attestation suit la spec SLSA v1.0 : subject + digest, dépendances résolues hashées, paramètres externes et détails d'exécution — ce qui rend la synthèse vérifiable et rejouable."},{"q":"Quelle distinction la fiche fait-elle entre provenance « preserving » et « inferring » ?","options":["Preserving conserve le brut chiffré, inferring le conserve en clair","Citer exactement le passage récupéré (preserving) est plus fort que déduire a posteriori l'origine d'une affirmation (inferring), qui est faillible","Preserving s'applique aux images, inferring au texte","Inferring est la méthode recommandée car elle évite de stocker le brut"],"answer":1,"explain":"La provenance preserving — pointer vers {url + hash + section} du brut capturé — prouve ce que disait la source ce jour-là, contrairement à l'inference a posteriori qui reste faillible."}],"flashcards":[{"front":"Stockage content-addressable","back":"Système où le contenu est adressé par son hash : un même contenu donne toujours le même identifiant, et la moindre modification change l'adresse. Base de la déduplication, de l'immuabilité et de la détection de tampering."},{"front":"Pointeur / manifeste léger dans Git","back":"Au lieu du brut, on commite un petit objet {url, hash, date, taille}. Le brut vit hors-Git (S3/DVC/LFS) et Git reste léger tout en restant la source de vérité du lineage."},{"front":"Audit trail « gratuit » via Git","back":"Chaque synthèse est un fichier Markdown commité ; Git enregistre auteur, date, diff et commit hash sans infra supplémentaire. Gratuit seulement si l'historique reste immuable (pas de force-push/rebase)."},{"front":"Modèle W3C PROV","back":"Vocabulaire interopérable Entity / Activity / Agent, reliés par wasDerivedFrom, wasGeneratedBy, wasAttributedTo, sérialisable en JSON-LD. Modélise « source brute → retraitement → synthèse » de façon standard plutôt qu'ad hoc."},{"front":"Lockfile de pipeline (type dvc.lock)","back":"On déclare les étapes (sources → nettoyage → chunking → synthèse) avec leurs inputs/outputs et on fige les hash. Seules les étapes dont les inputs ont changé sont rejouées : pipeline reproductible et incrémental."},{"front":"Granularité de la citation (claim/passage)","back":"Une provenance au niveau document est trop grossière. Il faut descendre au niveau de l'affirmation/passage en citant {url + hash + section/offset} pour que « chaque affirmation cite sa source » soit réellement vérifiable."},{"front":"Les dates déclarées par la source mentent","back":"ETag et Last-Modified sont souvent faux ou absents. La date de capture côté système (quand vous avez récupéré le contenu) est plus fiable que toute date annoncée par la page."},{"front":"Durcir l'immuabilité pour l'audit critique","back":"Combiner plusieurs couches : S3 Object Lock en mode compliance sur le brut, journal append-only (CloudTrail-like), commits Git signés (GPG/sigstore), et un manifeste interrogeable plutôt que scanner les artefacts. Atout conformité EU AI Act."}],"sources":[{"title":"DVC — Get Started: Data Pipelines (dvc.yaml / dvc.lock)","url":"https://doc.dvc.org/start/data-pipelines/data-pipelines","type":"Documentation officielle"},{"title":"End-to-end lineage with DVC and Amazon SageMaker AI MLflow apps","url":"https://aws.amazon.com/blogs/machine-learning/end-to-end-lineage-with-dvc-and-amazon-sagemaker-ai-mlflow-apps/","type":"Documentation cloud / Well-Architected"},{"title":"W3C PROV — Overview / Data Model (PROV-DM)","url":"https://www.w3.org/TR/prov-overview/","type":"Standard W3C"},{"title":"What is C2PA? Content Provenance Explained","url":"https://c2paviewer.com/articles/what-is-c2pa","type":"Standard industriel (vulgarisation)"},{"title":"SLSA v1.0 — Provenance specification","url":"https://slsa.dev/spec/v1.0/provenance","type":"Standard supply-chain (in-toto / DSSE)"},{"title":"What We Learned from a Year of Building with LLMs","url":"https://applied-llms.org/","type":"Praticiens reconnus"},{"title":"LLM Training Data Lineage: Provenance, Tracking & Compliance","url":"https://atlan.com/know/training-data-lineage-for-llms/","type":"Pratique outillée + cadrage réglementaire"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Capturer le contenu brut tel quel et l&#39;immuabiliser par un hash (SHA-256), versionner les synthèses Markdown dans Git pour un audit trail gratuit, et attacher à chaque synthèse une attestation de provenance (sources hashées + modèle + prompt) — parce que la <em>confiance</em> de TechWatch IA ne tient que si chaque affirmation reste vérifiable même quand la source disparaît.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA vend de la <strong>confiance</strong> : chaque affirmation d&#39;une synthèse de migration doit citer une source vérifiable. Or les pages officielles changent, déplacent ou suppriment leur contenu : une citation qui ne pointe que vers une URL devient invérifiable dès que <code>react.dev</code> réédite sa page. Conserver le brut + son hash, tracer l&#39;origine, et versionner les synthèses dans Git transforme « je l&#39;ai lu quelque part » en « voici exactement ce que disait la source ce jour-là, prouvable par hash ». C&#39;est aussi une assurance conformité : l&#39;EU AI Act impose de documenter origine, transformations et qualité des données pour les systèmes à risque (<a href=\"https://atlan.com/know/training-data-lineage-for-llms/\">Atlan</a>).</p>\n<h2>Le principe</h2>\n<p><strong>Capturer le brut, ne jamais le muter.</strong> À l&#39;ingestion, on stocke le contenu <em>tel quel</em> avec ses métadonnées : URL source, date/heure de capture (UTC + timezone), en-têtes HTTP utiles (<code>ETag</code>, <code>Last-Modified</code>) et le tag de version de la techno (ex. <code>v19.0.0</code>). On <strong>hashe</strong> ce brut en SHA-256 et on l&#39;enregistre dans un stockage <em>content-addressable</em> : un même contenu donne toujours le même hash, et la moindre modification change le hash. C&#39;est la base de la déduplication, de l&#39;immuabilité et de la détection de tampering (<a href=\"https://c2paviewer.com/articles/what-is-c2pa\">C2PA</a>).</p>\n<p><strong>Séparer le brut de Git.</strong> Le gros contenu brut vit hors-Git (object store type S3, DVC, Git-LFS) ; dans Git on ne commite que des <strong>pointeurs/manifestes</strong> légers <code>{url, hash, date, taille}</code>. Git reste léger et redevient la <em>source de vérité du lineage</em> (<a href=\"https://doc.dvc.org/start/data-pipelines/data-pipelines\">DVC</a>).</p>\n<p><strong>Versionner les synthèses dans Git.</strong> Chaque synthèse est un fichier Markdown commité (ex. <code>migrations/react-18-to-19/v1.md</code>). L&#39;historique Git — auteur, date, diff, commit hash — fournit un audit trail <em>gratuit</em> et un versionnement sémantique des migrations.</p>\n<p><strong>Matérialiser le lineage explicitement.</strong> On modélise la chaîne « source brute → retraitement → synthèse » avec le vocabulaire W3C PROV : <strong>Entity</strong> (brut, synthèse), <strong>Activity</strong> (fetch, nettoyage, génération LLM), <strong>Agent</strong> (worker, modèle, humain), reliés par <code>wasDerivedFrom</code>, <code>wasGeneratedBy</code>, <code>wasAttributedTo</code>, sérialisés en JSON-LD à côté de l&#39;artefact (<a href=\"https://www.w3.org/TR/prov-overview/\">W3C PROV</a>).</p>\n<p><strong>Rendre le pipeline reproductible et incrémental.</strong> On déclare les étapes (sources → nettoyage → chunking → synthèse) avec leurs inputs/outputs et on <strong>fige les hash dans un lockfile</strong> (modèle <code>dvc.lock</code>) : seules les étapes dont les inputs ont changé sont rejouées, et chaque étape est rejouable à l&#39;identique (<a href=\"https://doc.dvc.org/start/data-pipelines/data-pipelines\">DVC</a>). Enfin, on <strong>pinne le modèle et le prompt</strong> (model id exact + version du prompt-template) car les fournisseurs changent leurs modèles silencieusement (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Capture brute datée et hashée (React 18→19).</strong> À la détection de React 19, on capture le <code>CHANGELOG.md</code>, le guide « React 19 Upgrade Guide » et le blog <code>react.dev</code>, chacun stocké avec sa preuve d&#39;origine.</p>\n<pre><code class=\"language-python\">import hashlib, datetime\n\ndef capture(url: str, raw: bytes, headers: dict, tech_tag: str) -&gt; dict:\n    # Normaliser AVANT de hasher : UTF-8, fins de ligne LF, pas de BOM\n    canon = raw.decode(&quot;utf-8-sig&quot;).replace(&quot;\\r\\n&quot;, &quot;\\n&quot;).encode(&quot;utf-8&quot;)\n    digest = hashlib.sha256(canon).hexdigest()\n    blob_store.put(digest, canon)          # content-addressable, hors Git\n    return {                                # ce dict est commité dans Git\n        &quot;url&quot;: url,\n        &quot;sha256&quot;: digest,\n        &quot;captured_at&quot;: datetime.datetime.now(datetime.UTC).isoformat(),\n        &quot;etag&quot;: headers.get(&quot;ETag&quot;),\n        &quot;last_modified&quot;: headers.get(&quot;Last-Modified&quot;),\n        &quot;tech_tag&quot;: tech_tag,              # ex. &quot;v19.0.0&quot;\n        &quot;bytes&quot;: len(canon),\n    }\n</code></pre>\n<p><strong>2. Sidecar de provenance (esprit SLSA/in-toto).</strong> Pour chaque synthèse Git, on commite <code>v1.md</code> <strong>et</strong> <code>v1.prov.json</code>. L&#39;attestation rend la synthèse rejouable et vérifiable.</p>\n<pre><code class=\"language-json\">{\n  &quot;_type&quot;: &quot;https://in-toto.io/Statement/v1&quot;,\n  &quot;subject&quot;: [{ &quot;name&quot;: &quot;react-18-to-19/v1.md&quot;,\n                &quot;digest&quot;: { &quot;sha256&quot;: &quot;ab12…&quot; } }],\n  &quot;predicate&quot;: {\n    &quot;buildDefinition&quot;: {\n      &quot;externalParameters&quot;: {\n        &quot;prompt_template&quot;: { &quot;id&quot;: &quot;migration-synth&quot;, &quot;version&quot;: &quot;3&quot;,\n                             &quot;sha256&quot;: &quot;9f01…&quot; },\n        &quot;temperature&quot;: 0\n      },\n      &quot;resolvedDependencies&quot;: [\n        { &quot;uri&quot;: &quot;https://github.com/facebook/react/blob/main/CHANGELOG.md&quot;,\n          &quot;digest&quot;: { &quot;sha256&quot;: &quot;c3d4…&quot; } },\n        { &quot;uri&quot;: &quot;https://react.dev/blog/2024/12/05/react-19&quot;,\n          &quot;digest&quot;: { &quot;sha256&quot;: &quot;e5f6…&quot; } }\n      ]\n    },\n    &quot;runDetails&quot;: {\n      &quot;builder&quot;: { &quot;id&quot;: &quot;techwatch-worker&quot;, &quot;version&quot;: &quot;1.4.2&quot; },\n      &quot;metadata&quot;: { &quot;invocationId&quot;: &quot;run-2026-06-23-001&quot;,\n                    &quot;startedOn&quot;: &quot;2026-06-23T10:00:00Z&quot; }\n    }\n  }\n}\n</code></pre>\n<p>Les noms de champs <code>subject</code>/<code>digest</code>, <code>buildDefinition.externalParameters</code>/<code>resolvedDependencies</code> et <code>runDetails.builder.id</code>/<code>metadata.invocationId</code> suivent la spec SLSA v1.0 (<a href=\"https://slsa.dev/spec/v1.0/provenance\">SLSA</a>).</p>\n<p><strong>3. Citation au hash, pas seulement à l&#39;URL.</strong> Une affirmation de la synthèse (« React 19 retire <code>propTypes</code> ») pointe vers <code>{url, sha256, section}</code> du brut capturé : on peut prouver que la source disait bien cela ce jour-là, même si la page change ensuite. Quand React publie 19.1, on rejoue le pipeline ; grâce aux hash, seules les sources réellement modifiées déclenchent un retraitement, et le diff Git entre <code>v1.md</code> et <code>v2.md</code> montre quelles affirmations ont changé et pourquoi (<a href=\"https://aws.amazon.com/blogs/machine-learning/end-to-end-lineage-with-dvc-and-amazon-sagemaker-ai-mlflow-apps/\">AWS</a>).</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Normaliser avant de hasher.</strong> Encodage, BOM, CRLF vs LF, ordre des clés JSON, espaces : du bruit crée de faux « changements » de source, déclenche des retraitements inutiles et casse la déduplication. Décider d&#39;un <em>canon</em> et le documenter.</li>\n<li><strong>Les dates déclarées par la source mentent.</strong> <code>Last-Modified</code>/<code>ETag</code> sont souvent faux ou absents ; la date de capture côté système (quand <em>vous</em> avez récupéré) est plus fiable que toute date annoncée par la page.</li>\n<li><strong>Provenance-preserving &gt; provenance-inferring.</strong> Citer exactement le passage récupéré (preserving — ce que vise le projet) est plus fort que déduire a posteriori d&#39;où vient une affirmation (inferring), qui est faillible.</li>\n<li><strong>Logger les I/O LLM est nécessaire mais insuffisant.</strong> Un log dit <em>ce qui s&#39;est passé et quand</em>, pas <em>qu&#39;un passage supportait réellement une affirmation</em>. Le lineage doit relier <code>affirmation → evidence</code>, pas seulement horodater.</li>\n<li><strong>Granularité de la citation.</strong> Une provenance au niveau document est trop grossière : il faut descendre au niveau <em>claim/passage</em> pour que « chaque affirmation cite sa source » soit réellement vérifiable.</li>\n<li><strong>Deux niveaux de reproductibilité.</strong> Reproduire le <em>pipeline</em> (mêmes étapes, mêmes inputs hashés) est déterministe ; reproduire la <em>sortie</em> d&#39;un LLM ne l&#39;est pas toujours — d&#39;où l&#39;intérêt de figer aussi la sortie générée comme artefact versionné.</li>\n<li><strong>PIÈGE — ne stocker que l&#39;URL.</strong> La page change ou disparaît (lien mort, paywall, édition silencieuse) et la synthèse devient invérifiable : l&#39;exact contraire du différenciateur « confiance ».</li>\n<li><strong>PIÈGE — mettre le brut dans Git.</strong> Dépôts qui explosent, clones lents. Pointeurs + object store, jamais des blobs.</li>\n<li><strong>PIÈGE — réécrire l&#39;historique Git</strong> (<code>force-push</code>, rebase, squash agressif) sur les synthèses : détruit l&#39;audit trail « gratuit ». L&#39;immuabilité de l&#39;historique est une exigence — protéger la branche et/ou signer les commits.</li>\n<li><strong>PIÈGE — oublier model id / version du prompt.</strong> Le fournisseur met à jour le modèle, les sorties dérivent, on ne peut plus reproduire (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</li>\n<li><strong>PIÈGE — auditer en scannant les artefacts.</strong> Ça ne passe pas à l&#39;échelle (anti-pattern AWS) ; au-delà de quelques runs, il faut un index/manifeste interrogeable.</li>\n<li><strong>PIÈGE — retraitement boîte noire non versionné.</strong> Si le code de nettoyage/chunking n&#39;est pas versionné et lié à la sortie, deux exécutions divergent sans trace.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> À l&#39;ingestion, je capture le brut <strong>tel quel</strong> + <code>{url, captured_at (UTC), ETag, Last-Modified, tech_tag}</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Je <strong>normalise</strong> (UTF-8, LF, sans BOM) selon un canon documenté <strong>avant</strong> de hasher en SHA-256.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le brut est stocké hors-Git (S3/DVC/LFS) ; seuls les <strong>pointeurs/manifestes</strong> sont commités.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque synthèse est un fichier Markdown versionné dans Git (<code>migrations/&lt;from&gt;-to-&lt;to&gt;/vN.md</code>).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque synthèse a son <strong>sidecar</strong> <code>vN.prov.json</code> (sources hashées + model id + hash du prompt + paramètres + run id).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le <strong>modèle</strong> et le <strong>prompt-template</strong> sont pinnés (id + version).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque affirmation cite <code>{url + hash + section/offset}</code>, pas seulement l&#39;URL.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le pipeline est déclaré avec un <strong>lockfile</strong> (hash des inputs) pour rejouer/diffuser de façon incrémentale.</li>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;historique est protégé : branche protégée, <strong>commits signés</strong> (GPG/sigstore), pas de force-push.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Un <strong>manifeste interrogeable</strong> (CSV/JSON versionné) relie chaque brut aux synthèses qui l&#39;ont consommé.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Pour l&#39;audit critique : <strong>S3 Object Lock</strong> (mode compliance) sur le brut + journal append-only (CloudTrail-like).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Une <strong>politique de rétention</strong> ne casse jamais les hash référencés par d&#39;anciennes synthèses encore vivantes.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1 — Pourquoi conserver le contenu brut au lieu de ne garder que l&#39;URL ?</strong>\nParce que les pages officielles changent, déplacent ou suppriment leur contenu. Sans le brut capturé et son hash, une citation devient invérifiable, ce qui ruine le différenciateur « confiance » du projet. Stocker <code>{url, hash, date}</code> permet de prouver ce que disait la source ce jour-là.</p>\n<p><strong>Q2 — À quoi sert le hash SHA-256 exactement ?</strong>\nUn même contenu produit toujours le même hash, et la moindre modification le change. Cela donne trois propriétés : déduplication (stockage content-addressable), immuabilité, et détection de tampering. Le hash devient l&#39;identifiant stable cité par la synthèse (<a href=\"https://c2paviewer.com/articles/what-is-c2pa\">C2PA</a>).</p>\n<p><strong>Q3 — Pourquoi ne pas mettre le gros contenu brut directement dans Git ?</strong>\nGit n&#39;est pas conçu pour les gros blobs : le dépôt explose, les clones deviennent lents et l&#39;historique impossible à manipuler. On stocke le brut hors-Git (S3, DVC, Git-LFS) et on ne commite que des pointeurs <code>{url, hash, date, taille}</code> (<a href=\"https://doc.dvc.org/start/data-pipelines/data-pipelines\">DVC</a>).</p>\n<p><strong>Q4 — En quoi versionner les synthèses dans Git donne un « audit trail gratuit » ?</strong>\nChaque synthèse est un fichier commité ; Git enregistre auteur, date, diff et commit hash sans infra supplémentaire. On obtient un versionnement sémantique (<code>v1.md</code>, <code>v2.md</code>) et la traçabilité de qui a validé quoi. Attention : c&#39;est « gratuit » seulement si l&#39;historique reste immuable (pas de force-push/rebase).</p>\n<p><strong>Q5 — Qu&#39;apporte le modèle W3C PROV par rapport à un format ad hoc ?</strong>\nUn vocabulaire interopérable et sérialisable (JSON-LD) : Entity / Activity / Agent et des relations standard (<code>wasDerivedFrom</code>, <code>wasGeneratedBy</code>, <code>wasAttributedTo</code>). On exprime le lineage « brut → retraitement → synthèse » de manière auditable plutôt qu&#39;inventée maison (<a href=\"https://www.w3.org/TR/prov-overview/\">W3C PROV</a>).</p>\n<p><strong>Q6 — Pourquoi pinner le model id et la version du prompt dans la provenance ?</strong>\nParce que les fournisseurs changent leurs modèles silencieusement : sans pin, les sorties dérivent et la reproductibilité est illusoire. Enregistrer model id exact + version du prompt-template versionné permet d&#39;expliquer et rejouer une ancienne synthèse (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</p>\n<p><strong>Q7 — Que doit contenir l&#39;attestation attachée à chaque synthèse ?</strong>\nDans l&#39;esprit SLSA/in-toto : le <code>subject</code> (artefact + digest), les <code>resolvedDependencies</code> (hash des sources brutes), les <code>externalParameters</code> (hash du prompt, température) et <code>runDetails</code> (builder.id, invocationId, timestamps). C&#39;est ce qui rend la synthèse vérifiable et rejouable (<a href=\"https://slsa.dev/spec/v1.0/provenance\">SLSA</a>).</p>\n<p><strong>Q8 — Pourquoi citer un hash et une section, pas juste une URL ?</strong>\nUne URL seule ne prouve rien si la page change. Pointer vers <code>{url + hash + offset/section}</code> du brut capturé permet de retrouver le passage exact tel qu&#39;il était à la capture, même si la page est éditée ou supprimée ensuite. C&#39;est de la provenance <em>preserving</em>, plus forte que l&#39;<em>inferring</em>.</p>\n<p><strong>Q9 — Comment rendre le retraitement reproductible et incrémental ?</strong>\nOn déclare les étapes (sources → nettoyage → chunking → synthèse) avec leurs inputs/outputs et on fige les hash dans un lockfile (modèle <code>dvc.lock</code>). Seules les étapes dont les inputs ont changé sont rejouées, et le code de retraitement doit lui-même être versionné et lié à la sortie (<a href=\"https://doc.dvc.org/start/data-pipelines/data-pipelines\">DVC</a>).</p>\n<p><strong>Q10 — Comment durcir l&#39;immuabilité quand l&#39;audit est critique (conformité) ?</strong>\nCombiner plusieurs couches : S3 Object Lock en mode compliance pour le brut, journal append-only type CloudTrail, et commits Git signés (GPG/sigstore) pour empêcher la réécriture d&#39;historique. Pour passer à l&#39;échelle, maintenir un manifeste interrogeable plutôt que scanner les artefacts. C&#39;est aussi un atout conformité EU AI Act (<a href=\"https://atlan.com/know/training-data-lineage-for-llms/\">Atlan</a>, <a href=\"https://aws.amazon.com/blogs/machine-learning/end-to-end-lineage-with-dvc-and-amazon-sagemaker-ai-mlflow-apps/\">AWS</a>).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://doc.dvc.org/start/data-pipelines/data-pipelines\">DVC — Get Started: Data Pipelines (dvc.yaml / dvc.lock)</a> — <em>Documentation officielle</em> — versionner le brut hors-Git via content-addressable storage + pointeurs <code>.dvc</code>, lockfile figeant les hash, et <code>dvc repro</code> qui ne rejoue que les étapes dont les inputs ont changé.</li>\n<li><a href=\"https://aws.amazon.com/blogs/machine-learning/end-to-end-lineage-with-dvc-and-amazon-sagemaker-ai-mlflow-apps/\">End-to-end lineage with DVC and Amazon SageMaker AI MLflow apps</a> — <em>Documentation cloud / Well-Architected</em> — patron de lineage de bout en bout : tag Git = version de dataset, commit loggé comme paramètre de run, S3 Object Lock + CloudTrail pour l&#39;immuabilité, et anti-patterns (oublier le commit hash, scanner les artefacts).</li>\n<li><a href=\"https://www.w3.org/TR/prov-overview/\">W3C PROV — Overview / Data Model (PROV-DM)</a> — <em>Standard W3C</em> — modèle de référence Entity / Activity / Agent et relations (<code>wasGeneratedBy</code>, <code>used</code>, <code>wasDerivedFrom</code>, <code>wasAttributedTo</code>) pour modéliser la provenance de façon interopérable et sérialisable (JSON-LD).</li>\n<li><a href=\"https://c2paviewer.com/articles/what-is-c2pa\">What is C2PA? Content Provenance Explained</a> — <em>Standard industriel (vulgarisation)</em> — provenance tamper-evident : manifeste signé, hard binding par hash cryptographique liant le manifeste au contenu, et historique des éditions (qui, quand, quels outils, IA ou non).</li>\n<li><a href=\"https://slsa.dev/spec/v1.0/provenance\">SLSA v1.0 — Provenance specification</a> — <em>Standard supply-chain (in-toto / DSSE)</em> — attestation vérifiable : <code>subject</code> (+ digest), <code>buildDefinition</code> (<code>externalParameters</code>, <code>resolvedDependencies</code>) et <code>runDetails</code> (<code>builder.id</code>, <code>metadata.invocationId</code>, timestamps).</li>\n<li><a href=\"https://applied-llms.org/\">What We Learned from a Year of Building with LLMs</a> — <em>Praticiens reconnus</em> — logger inputs ET outputs, examiner des échantillons, et « version and pin your models » car les fournisseurs changent les modèles silencieusement.</li>\n<li><a href=\"https://atlan.com/know/training-data-lineage-for-llms/\">LLM Training Data Lineage: Provenance, Tracking &amp; Compliance</a> — <em>Pratique outillée + cadrage réglementaire</em> — lineage = provenance + transformations + ownership, snapshots immuables à chaque étape, attribution (qui a approuvé), et contexte EU AI Act rendant la provenance non optionnelle.</li>\n</ol>\n"},{"num":20,"slug":"right-sizing-yagni","title":"Adéquation échelle/complexité (YAGNI, anti-over-engineering)","tagline":"On n'ajoute une techno que lorsqu'une douleur réelle et mesurée la rend incontournable ; le reste du temps, on choisit l'ennuyeux et bien compris, on reporte l'abstraction, et on assume que le risque dominant du projet est l'over-engineering — pas le sous-dimensionnement.","quiz":[{"q":"Que signifie l'acronyme YAGNI selon Martin Fowler ?","options":["You Aren't Gonna Need It : ne pas construire une capacité pour une feature future présumée","Yet Another Generic Network Interface : un patron d'abstraction réseau","You Always Get New Issues : la complexité génère toujours de nouveaux bugs","Your Architecture Generates New Iterations : itérer en continu sur l'archi"],"answer":0,"explain":"YAGNI = « You Aren't Gonna Need It » : tant que le besoin n'est pas réel, on paie du code, de la complexité et du risque pour rien (Fowler)."},{"q":"Qu'est-ce qu'un « innovation token » selon Dan McKinley ?","options":["Un crédit budgétaire alloué par sprint pour la dette technique","Une métaphore : une équipe dispose d'« environ trois » choix technos non conventionnels qu'elle peut se permettre","Un jeton de sécurité authentifiant les déploiements de nouvelles technos","Le nombre de microservices qu'un monolithe peut absorber sans casser"],"answer":1,"explain":"L'innovation token est un budget métaphorique d'« environ trois » choix technos non éprouvés, à réserver au différenciateur et à dépenser sciemment (McKinley)."},{"q":"Dans la philosophie « Choose Boring Technology », que signifie « boring » ?","options":["Une techno obsolète qu'il faut remplacer dès que possible","Une techno lente mais peu coûteuse en licence","Une techno dont les capacités ET surtout les modes de défaillance sont bien compris","Une techno imposée par l'entreprise sans choix possible"],"answer":2,"explain":"« Boring » ne veut pas dire obsolète : c'est une techno « contrainte mais bien comprise », dont on connaît capacités et modes de défaillance (Postgres, Python) (McKinley)."},{"q":"Quelle est la règle d'or de McKinley à appliquer avant tout ajout de techno ?","options":["« Quelle est la techno la plus moderne disponible ? »","« Comment résoudrais-je ce problème sans rien ajouter de nouveau ? »","« Quel concurrent utilise déjà cette techno ? »","« Combien de temps faudra-t-il pour la construire ? »"],"answer":1,"explain":"La question « comment résoudre le problème sans rien ajouter ? » force à mesurer le seuil de pénibilité réel ; la réponse est rarement « impossible » mais « faisable mais pénible » (McKinley)."},{"q":"Quels sont les quatre coûts d'une feature construite « au cas où » selon Fowler ?","options":["Build, delay, carry, repair","Build, test, deploy, monitor","Design, code, review, ship","Cost, time, scope, quality"],"answer":0,"explain":"Fowler identifie quatre coûts : build (effort gaspillé), delay (valeur/feedback retardés), carry (complexité qui ralentit le reste) et repair (rework quand l'hypothèse était fausse)."},{"q":"Selon la fiche, pourquoi le refactoring, les tests et les évals ne sont-ils PAS du YAGNI à fuir ?","options":["Parce qu'ils sont obligatoires dans toute méthodologie agile","Parce qu'ils ne coûtent rien à mettre en place","Parce que YAGNI vise les capacités, pas l'effort de rendre le logiciel facile à modifier — ce sont eux qui rendent YAGNI sûr","Parce qu'ils remplacent la nécessité de penser au futur"],"answer":2,"explain":"Fowler distingue capacités présumées (visées par YAGNI) et effort de malléabilité : refactoring, tests, CI/CD et évals maintiennent bas le coût de changement et rendent YAGNI sûr."},{"q":"Pour les choix LLM, quel ordre de progression la fiche recommande-t-elle (« right-sizing ») ?","options":["Fine-tuning d'abord, puis prompt engineering si insuffisant","Vector DB par défaut dès le MVP pour anticiper la montée en charge","Multi-agents en premier pour paralléliser le traitement","Prompt engineering + long-context AVANT vector DB ou fine-tuning, chaque palier coûtant un ordre de grandeur de plus"],"answer":3,"explain":"On épuise prompt + long-context avant RAG/fine-tuning ; chaque palier coûte « un ordre de grandeur » d'effort de plus, d'où le principe « no GPUs before PMF » (applied-llms)."}],"flashcards":[{"front":"Le risque dominant : over-engineering vs sous-dimensionnement","back":"On préfère une asymétrie en faveur du simple : il est rapide d'ajouter de la complexité quand la douleur apparaît, mais lent et risqué de retirer une mauvaise abstraction déjà incrustée."},{"front":"Où dépenser les innovation tokens dans TechWatch IA ?","back":"Sur le différenciateur — la confiance/sourcing vérifiable, les évals, les guardrails — et nulle part ailleurs. La plomberie (vector DB, microservices, cluster) reste « boring »."},{"front":"Le coût réel d'une techno se paie où ?","back":"En exploitation long terme (monitoring, mises à jour, on-call), pas en construction. On décide sur la TCO, pas la vitesse de démarrage. Le nouveau traîne des unknown unknowns visibles en production (McKinley)."},{"front":"« Do things that don't scale » (Graham)","back":"Au début on fait du manuel : curation des sources, relecture/scoring humain des synthèses. C'est une dette volontaire et temporaire, à rembourser au signal de PMF, avec un déclencheur d'automatisation prévu."},{"front":"Rule of three (DRY vs YAGNI)","back":"Dupliquer temporairement est souvent moins risqué qu'une abstraction prématurée mal devinée ; on reporte l'extraction jusqu'au 3e cas d'usage réel (Shpilt, Fowler)."},{"front":"Condition de sortie vers une vector DB / RAG","back":"Tant que le corpus tient en long-context, on n'ajoute rien. Déclencheur explicite : corpus dépassant la fenêtre (~200K tokens), dynamisme fort ou multi-tenant. Avant ça : ingestion/embeddings/sync pour un besoin non prouvé."},{"front":"Serverless event-driven : intérêt et revers","back":"Pay-per-use donne un coût quasi nul à l'idle, idéal pour un trafic sporadique et évite l'over-provisioning. Revers : à fort volume soutenu il peut devenir cher — le « least worst » dépend du profil de charge réel (AWS)."},{"front":"Piège — interfaces sans seconde implémentation","back":"Un point d'extension jamais utilisé n'est pas neutre : il gêne l'évolution. Idem microservices/Kubernetes prématurés et fine-tuning avant prompt engineering (Shpilt, applied-llms)."}],"sources":[{"title":"Choose Boring Technology — Dan McKinley","url":"https://mcfunley.com/choose-boring-technology","type":"praticien reconnu (essai de référence)"},{"title":"Yagni (bliki) — Martin Fowler","url":"https://martinfowler.com/bliki/Yagni.html","type":"praticien reconnu (référence canonique)"},{"title":"Do Things that Don't Scale — Paul Graham","url":"https://www.paulgraham.com/ds.html","type":"praticien reconnu (essai de référence)"},{"title":"What We Learned from a Year of Building with LLMs (Part III: Strategy) — Yan, Bischof, Frye, Husain, Liu, Shankar","url":"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-iii-strategy/","type":"praticiens reconnus (applied-llms.org / O'Reilly)"},{"title":"Premature Infrastructure is the Root of All Evil — Michael Shpilt","url":"https://michaelscodingspot.com/premature-infrastructure-is-evil/","type":"praticien"},{"title":"Cost Optimization Pillar — AWS Well-Architected, Serverless Applications Lens","url":"https://docs.aws.amazon.com/wellarchitected/latest/serverless-applications-lens/cost-optimization.html","type":"doc officielle (AWS)"},{"title":"Choose Boring Technology, Revisited (2025) — Aaron Brethorst","url":"https://www.brethorsting.com/blog/2025/07/choose-boring-technology,-revisited/","type":"praticien (relecture récente 2025)"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> On n&#39;ajoute une techno que lorsqu&#39;une douleur réelle et mesurée la rend incontournable ; le reste du temps, on choisit l&#39;ennuyeux et bien compris, on reporte l&#39;abstraction, et on assume que le risque dominant du projet est l&#39;over-engineering — pas le sous-dimensionnement.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA est une plateforme de veille au trafic <strong>sporadique</strong>, dont la valeur tient à un seul différenciateur : la <strong>confiance</strong> (chaque affirmation cite sa source vérifiable). Tout l&#39;effort doit donc se concentrer là — évals, guardrails, sourcing — et nulle part ailleurs. Empiler vector DB, fine-tuning, microservices ou cluster permanent « parce que c&#39;est l&#39;archi standard » consommerait notre budget d&#39;attention et d&#39;exploitation sur de la plomberie, au détriment du cœur de valeur. Ce document pose la règle de gouvernance : <strong>prouver la douleur avant d&#39;ajouter la complexité.</strong></p>\n<h2>Le principe</h2>\n<p>L&#39;idée centrale : <strong>chaque techno non conventionnelle a un coût caché qui se paie en exploitation, pas en construction.</strong> Dan McKinley formalise cela avec les <em>innovation tokens</em> — une entreprise dispose d&#39;« environ trois » jetons à dépenser sur des choix technos non éprouvés, et ce stock ne grandit qu&#39;avec la maturité (McKinley). On réserve ces jetons au différenciateur (ici la confiance/sourcing) et on prend du <strong>« boring »</strong> partout ailleurs. « Boring » ne veut pas dire obsolète : c&#39;est une techno dont « les capacités <em>et surtout</em> les modes de défaillance sont bien compris » (McKinley) — Postgres, Python, un monolithe modulaire. Le nouveau, lui, traîne des <em>unknown unknowns</em> dont le coût réel apparaît en production : « les coûts long terme pour garder un système fiable dépassent de loin les inconvénients rencontrés pendant le build » (McKinley).</p>\n<p>La règle d&#39;or avant tout ajout : <strong>« comment résoudrais-je ce problème sans rien ajouter de nouveau ? »</strong> (McKinley). La réponse est rarement « impossible » ; elle est le plus souvent « faisable mais pénible » — et ce seuil de pénibilité doit être <em>mesuré</em>, pas imaginé.</p>\n<p>Martin Fowler complète avec <strong>YAGNI</strong> (<em>You Aren&#39;t Gonna Need It</em>) : ne pas construire de capacité pour une feature future <em>présumée</em>. Une telle feature porte quatre coûts : <strong>build</strong> (effort pour une feature inutile), <strong>delay</strong> (valeur/feedback perdus en la priorisant), <strong>carry</strong> (la complexité ralentit tout le reste) et <strong>repair</strong> (on l&#39;avait mal devinée six mois plus tôt) (Fowler). Distinction cruciale : « YAGNI s&#39;applique aux capacités, pas à l&#39;effort pour rendre le logiciel facile à modifier » (Fowler) — refactoring, tests, CI/CD et évals <strong>ne sont pas</strong> du YAGNI à fuir ; ce sont eux qui rendent YAGNI <em>sûr</em>, car ils maintiennent bas le coût de changer plus tard.</p>\n<p>Côté produit, on <strong>fait des choses qui ne scalent pas</strong> au début (Graham) : curation manuelle des sources, validation humaine des synthèses. Côté LLM, on monte les paliers un par un — prompt engineering + long-context <strong>avant</strong> vector DB ou fine-tuning, chaque palier coûtant « un ordre de grandeur » d&#39;effort de plus (applied-llms). Et on retire toujours plus vite une complexité qu&#39;on a refusée d&#39;ajouter qu&#39;une mauvaise abstraction déjà incrustée.</p>\n<h2>Exemples concrets</h2>\n<p><strong>Exemple 1 — Le corpus React 18→19 tient dans le contexte : on n&#39;ajoute rien.</strong>\nLa douleur qui justifierait une vector DB (corpus dépassant la fenêtre) n&#39;existe pas encore : notes de version + guide d&#39;upgrade + changelog tiennent en long-context.</p>\n<pre><code class=\"language-text\"># Décision MVP\nQuestion : &quot;Comment résoudre la synthèse de migration SANS vector DB ?&quot;\nRéponse  : charger les 3 docs officiels dans le prompt (long-context).\n           taille corpus ~ 40K tokens &lt;&lt; fenêtre du modèle.\nConclusion : douleur absente =&gt; on n&#39;ajoute RIEN.\nCondition de sortie : corpus &gt; ~200K tokens OU multi-tenant\n                      =&gt; alors (et seulement alors) RAG.\n</code></pre>\n<p><strong>Exemple 2 — Détection de version « qui ne scale pas ».</strong>\nOn démarre par un simple cron qui <em>poll</em> les changelogs/registries officiels (npm, blog React), pas un système d&#39;événements/webhooks généralisé. On n&#39;automatisera/étendra que quand le nombre de technos suivies rendra le polling pénible — signal mesuré, pas crainte de scale.</p>\n<p><strong>Exemple 3 — Tableau des <em>innovation tokens</em> du projet (gouvernance légère).</strong></p>\n<table>\n<thead>\n<tr>\n<th>Choix</th>\n<th>Statut</th>\n<th>Coût en tokens</th>\n<th>Condition de sortie / déclencheur</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Monolithe modulaire + workers</td>\n<td>boring</td>\n<td>0</td>\n<td>Goulot de scale mesuré sur un module isolé</td>\n</tr>\n<tr>\n<td>Serverless event-driven (pay-per-use)</td>\n<td>boring</td>\n<td>0</td>\n<td>Volume soutenu rendant l&#39;idle non pertinent</td>\n</tr>\n<tr>\n<td>Long-context</td>\n<td>boring</td>\n<td>0</td>\n<td>Corpus &gt; fenêtre / multi-tenant</td>\n</tr>\n<tr>\n<td>Vector DB / RAG</td>\n<td><strong>token</strong></td>\n<td>1</td>\n<td>Corpus dépasse le long-context</td>\n</tr>\n<tr>\n<td>Fine-tuning</td>\n<td><strong>token</strong></td>\n<td>1</td>\n<td>Prompt prouvé insuffisant + évals en place</td>\n</tr>\n<tr>\n<td>Multi-agents</td>\n<td><strong>token</strong></td>\n<td>1</td>\n<td>Workflow déterministe prouvé insuffisant</td>\n</tr>\n</tbody></table>\n<p><strong>Exemple 4 — Validation humaine en boucle.</strong> Pour les premières synthèses React 19, un ingénieur relit et score <em>manuellement</em> chaque affirmation sourcée (Graham). Cette dette assumée alimente les évals — qui automatiseront plus tard le contrôle de fiabilité.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>YAGNI n&#39;est pas « ne jamais penser au futur ».</strong> Il s&#39;oppose à <em>construire</em> pour un futur présumé, tout en exigeant un code malléable. C&#39;est un arbitrage de design, pas un refus de design (Fowler).</li>\n<li><strong>YAGNI suppose un code malléable.</strong> Dans un code rigide/non testé, reporter une décision devient coûteux : il faut investir dans tests/évals <strong>avant</strong> de pouvoir « se permettre » YAGNI (Fowler).</li>\n<li><strong>« Boring » ≠ obsolète.</strong> C&#39;est « contraint mais bien compris ». Choisir une techno récente est correct <em>si</em> on dépense sciemment un token là où c&#39;est le différenciateur (McKinley).</li>\n<li><strong>Le coût réel = l&#39;exploitation long terme</strong> (monitoring, mises à jour, on-call), pas l&#39;effort de build initial. Décider sur la TCO, pas la vitesse de démarrage (McKinley).</li>\n<li><strong>« Do things that don&#39;t scale » est temporaire.</strong> Le manuel est une dette à rembourser au signal de PMF ; prévoir le <strong>déclencheur d&#39;automatisation</strong>, sinon on reste bloqué (Graham).</li>\n<li><strong>Le serverless a un revers.</strong> Pay-per-use est idéal pour un trafic sporadique mais peut devenir cher à fort volume soutenu, et le long-context coûte par token — le « least worst » dépend du profil de charge réel (AWS, applied-llms).</li>\n<li><strong>La sous-ingénierie volontaire ≠ négligence.</strong> Sécurité, sourcing vérifiable et évals sont le cœur de valeur : ils ne se « YAGNI-isent » jamais. Distinguer plomberie reportable et différenciateur non négociable.</li>\n<li><strong>DRY vs YAGNI.</strong> Dupliquer temporairement est souvent moins risqué qu&#39;une abstraction prématurée mal devinée ; reporter l&#39;extraction jusqu&#39;au <em>rule of three</em> (Shpilt, Fowler).</li>\n<li><strong>Piège — vector DB / RAG par défaut</strong> : ajouter l&#39;ingestion, les embeddings et la sync pour un besoin non prouvé alors que le long-context suffit.</li>\n<li><strong>Piège — microservices / Kubernetes prématurés</strong> : éclater un monolithe qui marche, multipliant coûts d&#39;exploitation et modes de défaillance.</li>\n<li><strong>Piège — interfaces sans seconde implémentation</strong> : un point d&#39;extension jamais utilisé n&#39;est pas neutre, il <em>gêne</em> l&#39;évolution (Shpilt).</li>\n<li><strong>Piège — fine-tuning avant prompt engineering</strong> ou <strong>course au dernier modèle/GPU avant PMF</strong> : « no GPUs before PMF » (applied-llms).</li>\n<li><strong>Piège — confondre YAGNI et abandon de qualité</strong> : invoquer YAGNI pour zapper tests/évals/sourcing — exactement le différenciateur à ne pas couper.</li>\n<li><strong>Piège — over-provisioning « au cas où »</strong> : quotas larges et instances permanentes jamais révisés, à contre-emploi du serverless (AWS).</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Avant d&#39;ajouter une techno : ai-je écrit <strong>comment résoudre le problème sans rien ajouter</strong> ? (McKinley)</li>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;ajout dépense-t-il un <em>innovation token</em> — et est-ce sur le différenciateur (la confiance), pas sur la plomberie ?</li>\n<li><input disabled=\"\" type=\"checkbox\"> Ai-je une <strong>douleur mesurée</strong> (latence, coût/req, taux d&#39;erreur instrumentés), pas une crainte de scale future ?</li>\n<li><input disabled=\"\" type=\"checkbox\"> Pour toute feature « au cas où » : ai-je pesé les <strong>4 coûts</strong> build/delay/carry/repair ? (Fowler)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Ai-je vérifié que je ne sacrifie pas refactoring/tests/évals (qui rendent YAGNI sûr) ? (Fowler)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Côté LLM : ai-je épuisé <strong>prompt + long-context</strong> avant d&#39;envisager RAG/fine-tuning ? (applied-llms)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Toute abstraction attend-elle le <strong>3e cas d&#39;usage réel</strong> (rule of three) ?</li>\n<li><input disabled=\"\" type=\"checkbox\"> Build-vs-buy : est-ce une <strong>commodité</strong> (orchestration, file, stockage, parsing) que je devrais acheter plutôt que réimplémenter ?</li>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;ajout est-il <strong>documenté</strong> : pourquoi le stack actuel est insuffisant + la condition de sortie/migration ?</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le manuel/non-scalable a-t-il un <strong>déclencheur d&#39;automatisation</strong> explicite ? (Graham)</li>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;infra évite-t-elle l&#39;<strong>over-provisioning</strong> (zéro coût à l&#39;idle, pas de cluster permanent au MVP) ? (AWS)</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1 — C&#39;est quoi YAGNI, en une phrase ?</strong>\n« You Aren&#39;t Gonna Need It » : ne construis pas une capacité pour une feature future que tu <em>présumes</em> nécessaire. Tant que le besoin n&#39;est pas réel, tu paies du code, de la complexité et du risque pour rien (Fowler).</p>\n<p><strong>Q2 — Qu&#39;est-ce qu&#39;un <em>innovation token</em> ?</strong>\nUne métaphore de budget : une équipe dispose d&#39;« environ trois » choix technos non conventionnels qu&#39;elle peut se permettre, ce stock grandissant avec la maturité. On les réserve au cœur métier et on prend de l&#39;« ennuyeux » partout ailleurs (McKinley).</p>\n<p><strong>Q3 — « Boring », ça veut dire mauvais ou dépassé ?</strong>\nNon : « boring » signifie que les capacités <strong>et surtout les modes de défaillance</strong> sont bien compris (Postgres, Python). Une techno récente peut être le bon choix si on dépense sciemment un token là où c&#39;est le différenciateur (McKinley).</p>\n<p><strong>Q4 — Pourquoi le risque dominant ici est l&#39;over-engineering et pas le sous-dimensionnement ?</strong>\nParce qu&#39;il est rapide d&#39;ajouter de la complexité quand la douleur apparaît, mais lent et risqué de retirer une mauvaise abstraction déjà incrustée. On préfère donc une asymétrie en faveur du simple, quitte à ajouter plus tard.</p>\n<p><strong>Q5 — Mais alors, le refactoring et les tests, ce n&#39;est pas du YAGNI à éviter ?</strong>\nAu contraire. Fowler est explicite : « YAGNI s&#39;applique aux capacités, pas à l&#39;effort pour rendre le logiciel facile à modifier ». Refactoring, tests et CI/CD sont les <em>conditions</em> qui rendent YAGNI sûr, en maintenant bas le coût de changement (Fowler).</p>\n<p><strong>Q6 — Comment décider d&#39;ajouter une vector DB au projet ?</strong>\nOn ne l&#39;ajoute pas tant que le corpus tient en long-context. La condition de sortie est explicite : corpus dépassant la fenêtre, dynamisme fort ou multi-tenant. Avant ça, ce serait de l&#39;ingestion/embeddings/sync pour un besoin non prouvé (applied-llms).</p>\n<p><strong>Q7 — Pourquoi commencer par des choses qui ne scalent pas ?</strong>\nParce que le manuel (curation des sources, relecture humaine des synthèses) est la boucle de feedback qui rend le produit <em>fiable</em>. C&#39;est une dette volontaire et temporaire, à rembourser quand le signal de PMF arrive, avec un déclencheur d&#39;automatisation prévu (Graham).</p>\n<p><strong>Q8 — Quels sont les coûts d&#39;une feature présumée qu&#39;on construit « au cas où » ?</strong>\nQuatre, selon Fowler : <strong>build</strong> (effort gaspillé), <strong>delay</strong> (valeur/feedback retardés), <strong>carry</strong> (complexité qui ralentit toutes les features suivantes) et <strong>repair</strong> (rework quand l&#39;hypothèse initiale était fausse) (Fowler).</p>\n<p><strong>Q9 — En quoi le serverless event-driven sert le right-sizing ?</strong>\nLa facturation à la requête (Lambda/Step Functions) donne un coût quasi nul à l&#39;idle, ce qui colle à un trafic de veille sporadique et évite l&#39;over-provisioning. Revers : à fort volume soutenu, le pay-per-use peut devenir cher — le bon choix dépend du profil de charge réel (AWS).</p>\n<p><strong>Q10 — L&#39;IA change-t-elle ces principes en 2025 ?</strong>\nLe principe tient et se renforce : l&#39;IA est une techno particulièrement gourmande en <em>innovation tokens</em> à cause de ses <em>unknown unknowns</em> (Brethorst). Empiler vector DB + fine-tuning + multi-agents multiplie les inconnues ; long-context + workflow déterministe est le choix « boring » du moment — « focus on the system, not the model » (applied-llms).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://mcfunley.com/choose-boring-technology\">Choose Boring Technology — Dan McKinley</a> — <em>praticien reconnu (essai de référence)</em> — concept des <em>innovation tokens</em> (~3 par équipe), définition de « boring » (capacités <strong>et</strong> modes de défaillance bien compris), règle « résoudre le problème sans rien ajouter », et primauté du coût d&#39;exploitation long terme sur le coût de build.</li>\n<li><a href=\"https://martinfowler.com/bliki/Yagni.html\">Yagni (bliki) — Martin Fowler</a> — <em>praticien reconnu (référence canonique)</em> — définition autoritative de YAGNI, les 4 coûts (build, delay, carry, repair), et la distinction « YAGNI vise les capacités présumées, pas l&#39;effort de rendre le code modifiable ».</li>\n<li><a href=\"https://www.paulgraham.com/ds.html\">Do Things that Don&#39;t Scale — Paul Graham</a> — <em>praticien reconnu (essai de référence)</em> — justification du manuel/non-scalable au début (recrutement et sur-engagement avec les premiers users) comme boucle de feedback qui rend le produit bon.</li>\n<li><a href=\"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-iii-strategy/\">What We Learned from a Year of Building with LLMs (Part III: Strategy) — Yan, Bischof, Frye, Husain, Liu, Shankar</a> — <em>praticiens reconnus (applied-llms.org / O&#39;Reilly)</em> — right-sizing des applis LLM : « no GPUs before PMF », « focus on the system, not the model », prompt engineering d&#39;abord, chaque palier ≈ un ordre de grandeur de plus, build-vs-buy.</li>\n<li><a href=\"https://michaelscodingspot.com/premature-infrastructure-is-evil/\">Premature Infrastructure is the Root of All Evil — Michael Shpilt</a> — <em>praticien</em> — extension de la « premature optimization » à l&#39;infra : interfaces sans seconde implémentation, patterns/hiérarchies prématurés, architectures pour features prédites jamais livrées ; renvoie à YAGNI + KISS et au refactoring continu.</li>\n<li><a href=\"https://docs.aws.amazon.com/wellarchitected/latest/serverless-applications-lens/cost-optimization.html\">Cost Optimization Pillar — AWS Well-Architected, Serverless Applications Lens</a> — <em>doc officielle (AWS)</em> — cadre de right-sizing de l&#39;infra : facturation à la requête (zéro coût à l&#39;idle), éviter l&#39;over-provisioning, ajuster offre et demande sur du serverless event-driven.</li>\n<li><a href=\"https://www.brethorsting.com/blog/2025/07/choose-boring-technology,-revisited/\">Choose Boring Technology, Revisited (2025) — Aaron Brethorst</a> — <em>praticien (relecture récente 2025)</em> — réactualisation des <em>innovation tokens</em> à l&#39;ère IA/LLM : le principe tient, et les nouvelles technos (dont l&#39;IA) consomment encore plus de tokens à cause de leurs <em>unknown unknowns</em>.</li>\n</ol>\n"}];
const LS = 'tw_quiz_';
const grp = t => t.num <= 11 ? 'Principes d’ingénierie IA' : 'Pratiques techniques';
const isPra = t => t.num > 11;
const pad = n => String(n).padStart(2,'0');
const fileOf = t => pad(t.num)+'-'+t.slug+'.md';
const bestScore = slug => { try { return JSON.parse(localStorage.getItem(LS+slug)||'null'); } catch(e){ return null; } };
const setBest = (slug,v) => { const b=bestScore(slug); if(b==null||v.pct>b.pct) localStorage.setItem(LS+slug, JSON.stringify(v)); };

let state = { topic:null, tab:'doc', answers:{}, card:0, flip:false };

const main = document.getElementById('main');
const side = document.getElementById('side');
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderSide(){
  let html='';
  let lastGrp=null;
  DATA.forEach(t=>{
    const g=grp(t);
    if(g!==lastGrp){ html+='<div class="grp">'+g+'</div>'; lastGrp=g; }
    const b=bestScore(t.slug);
    const active = state.topic===t.num ? ' active':'';
    const pra = isPra(t)?' pra':'';
    html+='<div class="item'+pra+active+'" data-n="'+t.num+'"><span class="nch">'+pad(t.num)+'</span><span>'+esc(t.title)+'</span>'+(b?'<span class="sc">'+b.pct+'%</span>':'')+'</div>';
  });
  side.innerHTML=html;
  side.querySelectorAll('.item').forEach(el=>el.onclick=()=>openTopic(+el.dataset.n));
}

function renderHome(){
  state.topic=null;
  let cards='';
  DATA.forEach(t=>{
    const b=bestScore(t.slug);
    cards+='<div class="tcard'+(isPra(t)?' pra':'')+'" data-n="'+t.num+'">'
      +'<div class="top"><span class="nch">'+pad(t.num)+'</span><h3>'+esc(t.title)+'</h3></div>'
      +'<div class="tag">'+esc(t.tagline)+'</div>'
      +'<div class="meta"><span class="pill">'+t.quiz.length+' QCM</span><span class="pill">'+t.flashcards.length+' fiches</span><span class="pill">'+t.sources.length+' sources</span>'
      +(b?'<span class="pill ok">★ '+b.pct+'%</span>':'')+'</div></div>';
  });
  main.innerHTML='<div class="home-hero"><h1>Réviser TechWatch IA</h1>'
    +'<p>20 sujets — principes d’ingénierie IA et pratiques techniques. Pour chacun&nbsp;: un <b>quiz</b> à choix multiple, des <b>fiches de révision</b> retournables, et les <b>liens</b> vers la fiche complète et ses sources.</p></div>'
    +'<div class="grid">'+cards+'</div>';
  main.querySelectorAll('.tcard').forEach(el=>el.onclick=()=>openTopic(+el.dataset.n));
  renderSide();
}

function openTopic(n){ state.topic=n; state.tab='quiz'; state.answers={}; state.card=0; state.flip=false; renderTopic(); renderSide(); window.scrollTo(0,0); }

function topic(){ return DATA.find(t=>t.num===state.topic); }

function renderTopic(){
  const t=topic();
  const pra=isPra(t)?' pra':'';
  let body='';
  if(state.tab==='doc') body=renderDoc(t);
  else if(state.tab==='quiz') body=renderQuiz(t);
  else if(state.tab==='cards') body=renderCards(t);
  else body=renderSources(t);
  main.innerHTML='<div class="crumb"><a id="bk">Tous les sujets</a> › '+grp(t)+'</div>'
    +'<div class="thead'+pra+'"><span class="nch">'+pad(t.num)+'</span><div><h2>'+esc(t.title)+'</h2><div class="tag">'+esc(t.tagline)+'</div></div></div>'
    +'<div class="tabs">'
      +'<button data-tab="doc" class="'+(state.tab==='doc'?'active':'')+'">📖 Cours</button>'
      +'<button data-tab="quiz" class="'+(state.tab==='quiz'?'active':'')+'">📝 Quiz ('+t.quiz.length+')</button>'
      +'<button data-tab="cards" class="'+(state.tab==='cards'?'active':'')+'">🃏 Flashcards ('+t.flashcards.length+')</button>'
      +'<button data-tab="src" class="'+(state.tab==='src'?'active':'')+'">🔗 Sources</button>'
    +'</div><div id="tabbody">'+body+'</div>';
  document.getElementById('bk').onclick=renderHome;
  main.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; state.card=0; state.flip=false; renderTopic(); });
  wireTab(t);
}

/* ---- QUIZ ---- */
function renderQuiz(t){
  let h='<div class="scorebar"><span class="lab">Score</span><div class="track"><div class="fill" id="fill"></div></div><span class="pct" id="pct">0 / '+t.quiz.length+'</span><button id="restart">↺ Recommencer</button></div>';
  h+='<div id="result"></div>';
  t.quiz.forEach((q,qi)=>{
    h+='<div class="q" data-qi="'+qi+'"><div class="qn">Question '+(qi+1)+'</div><div class="qt">'+esc(q.q)+'</div>';
    q.options.forEach((o,oi)=>{
      h+='<button class="opt" data-qi="'+qi+'" data-oi="'+oi+'"><span class="mk">'+String.fromCharCode(65+oi)+'</span><span>'+esc(o)+'</span></button>';
    });
    h+='<div class="explain" style="display:none"></div></div>';
  });
  return h;
}
function wireQuiz(t){
  const upd=()=>{
    const done=Object.keys(state.answers).length, good=Object.values(state.answers).filter(Boolean).length;
    document.getElementById('pct').textContent=good+' / '+t.quiz.length;
    document.getElementById('fill').style.width=Math.round(done/t.quiz.length*100)+'%';
    if(done===t.quiz.length){
      const pct=Math.round(good/t.quiz.length*100);
      setBest(t.slug,{good,total:t.quiz.length,pct});
      const msg = pct>=80?'Excellent 🎉':pct>=50?'Bien — relis les ratées 👍':'À retravailler 📖';
      document.getElementById('result').innerHTML='<div class="result">Terminé&nbsp;: '+good+' / '+t.quiz.length+' ('+pct+'%) — '+msg+'</div>';
      renderSide();
    }
  };
  main.querySelectorAll('.opt').forEach(btn=>btn.onclick=()=>{
    const qi=+btn.dataset.qi, oi=+btn.dataset.oi;
    if(qi in state.answers) return;
    const q=t.quiz[qi], correct=oi===q.answer;
    state.answers[qi]=correct;
    const qEl=main.querySelector('.q[data-qi="'+qi+'"]');
    qEl.querySelectorAll('.opt').forEach(o=>{
      const ooi=+o.dataset.oi; o.disabled=true;
      if(ooi===q.answer) o.classList.add(ooi===oi?'correct':'reveal');
      else if(ooi===oi) o.classList.add('wrong');
    });
    const ex=qEl.querySelector('.explain');
    ex.style.display='block'; ex.classList.toggle('bad',!correct);
    ex.innerHTML='<b>'+(correct?'✓ Correct.':'✗ Raté.')+'</b> '+esc(q.explain);
    upd();
  });
  document.getElementById('restart').onclick=()=>{ state.answers={}; renderTopic(); };
}

/* ---- FLASHCARDS ---- */
function renderCards(t){
  const c=t.flashcards[state.card];
  return '<div class="fc-wrap"><div class="fc'+(state.flip?' flip':'')+'" id="fc">'
    +'<div class="fc-in"><div class="fc-face fc-front"><div class="ft">'+esc(c.front)+'</div><div class="hint">cliquer pour retourner</div></div>'
    +'<div class="fc-face fc-back"><div class="bk">'+esc(c.back)+'</div></div></div></div>'
    +'<div class="fc-nav"><button id="prev">◀ Précédent</button><span class="ct">'+(state.card+1)+' / '+t.flashcards.length+'</span><button id="next">Suivant ▶</button><button id="shuf">🔀 Mélanger</button></div></div>';
}
function wireCards(t){
  document.getElementById('fc').onclick=()=>{ state.flip=!state.flip; renderTopic(); };
  document.getElementById('prev').onclick=(e)=>{ e.stopPropagation(); state.card=(state.card-1+t.flashcards.length)%t.flashcards.length; state.flip=false; renderTopic(); };
  document.getElementById('next').onclick=(e)=>{ e.stopPropagation(); state.card=(state.card+1)%t.flashcards.length; state.flip=false; renderTopic(); };
  document.getElementById('shuf').onclick=(e)=>{ e.stopPropagation(); for(let i=t.flashcards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[t.flashcards[i],t.flashcards[j]]=[t.flashcards[j],t.flashcards[i]];} state.card=0; state.flip=false; renderTopic(); };
}

/* ---- COURS (.md rendu) ---- */
function renderDoc(t){
  return '<a class="doclink" href="'+fileOf(t)+'" target="_blank">📄 Ouvrir le Markdown brut — '+fileOf(t)+'</a>'
    +'<div class="doc"><div class="prose">'+(t.html||'<p>(contenu indisponible)</p>')+'</div></div>';
}

/* ---- SOURCES ---- */
function renderSources(t){
  let h='<a class="doclink" href="'+fileOf(t)+'" target="_blank">📄 Lire la fiche complète — '+esc(fileOf(t))+'</a>';
  h+='<div>';
  t.sources.forEach(s=>{
    h+='<div class="src"><span class="ty">'+esc(s.type||'source')+'</span><div><a href="'+esc(s.url)+'" target="_blank" rel="noopener">'+esc(s.title)+' ↗</a>'+(s.why?'<div class="d">'+esc(s.why)+'</div>':'')+'</div></div>';
  });
  h+='</div>';
  return h;
}

function wireTab(t){ if(state.tab==='quiz') wireQuiz(t); else if(state.tab==='cards') wireCards(t); }

document.getElementById('homeBtn').onclick=renderHome;
document.getElementById('resetBtn').onclick=()=>{ if(confirm('Réinitialiser tous les scores de quiz ?')){ DATA.forEach(t=>localStorage.removeItem(LS+t.slug)); state.topic?renderTopic():renderHome(); renderSide(); } };
renderHome();
</script>
</body>
