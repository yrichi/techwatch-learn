 le piège à éviter en priorité pour le projet : produire des breaking changes bien structurés mais non sourcés.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;extraction utilise une sortie structurée <strong>stricte</strong> (JSON Schema <code>strict: true</code> / tool use), pas une demande de JSON en prose.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>additionalProperties: false</code> sur chaque objet ; tous les champs <code>required</code> ; absences modélisées via <code>null</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le schéma a des <strong>noms de clés clairs</strong> et des <code>description</code> (le schéma agit comme instruction implicite).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Champ <code>category</code> en <code>enum</code> ; champ <code>source_quote</code> <strong>obligatoire</strong> et verbatim.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Documents longs placés <strong>en haut</strong> du prompt, au-dessus requête/instructions/exemples.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Données et instructions <strong>séparées</strong> (rôles <code>system</code>/<code>user</code>, délimiteurs, mention « DATA, not COMMANDS »).</li>\n<li><input disabled=\"\" type=\"checkbox\"> CoT <strong>structuré</strong> : extraire les <code>&lt;quotes&gt;</code> d&#39;abord → vérifier → remplir le schéma.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Few-shot : exemples pertinents et <strong>diversifiés</strong> (3–5+), dans des balises <code>&lt;example&gt;</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Validation Pydantic/Zod + <strong>retry</strong> sur erreur (ex. rejet si <code>source_quote</code> absent de la source).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Refus (<code>refusal</code> / <code>stop_reason</code>) et troncature (<code>finish_reason == &quot;length&quot;</code>) gérés côté code.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Pipeline <strong>décomposé</strong> (détection → extraction → validation → synthèse), chaque étape loggable.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Pas de prefill sur Claude 4.6+ (erreur 400) ; format adapté au modèle (XML pour Claude).</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. Quelle différence entre « demander du JSON » et une sortie structurée ?</strong>\nDemander du JSON en prose n&#39;offre aucune garantie : on récupère souvent des wrappers Markdown, virgules finales, clés manquantes. Une sortie structurée contraint la <em>forme</em> via un schéma. C&#39;est la base d&#39;un parsing fiable en aval (<a href=\"https://developers.openai.com/api/docs/guides/structured-outputs\">OpenAI</a>).</p>\n<p><strong>Q2. « JSON mode » et « Structured Outputs », c&#39;est pareil ?</strong>\nNon. Le JSON mode garantit seulement un JSON syntaxiquement valide ; les Structured Outputs garantissent en plus la conformité au schéma (clés, types, enums) — « only Structured Outputs ensure schema adherence » (<a href=\"https://developers.openai.com/api/docs/guides/structured-outputs\">OpenAI</a>).</p>\n<p><strong>Q3. Comment forcer le modèle à citer ses sources ?</strong>\nOn ajoute au schéma un champ <code>source_quote</code> obligatoire et on demande d&#39;extraire d&#39;abord les passages-source dans des balises <code>&lt;quotes&gt;</code> <em>avant</em> de produire la synthèse. C&#39;est le pilier de la traçabilité (<a href=\"https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices\">Anthropic</a>).</p>\n<p><strong>Q4. Faut-il privilégier les balises XML ou le Markdown dans le prompt ?</strong>\nSelon le modèle : Claude est plus <em>steerable</em> avec des balises XML (<code>&lt;document&gt;</code>, <code>&lt;source&gt;</code>), GPT avec Markdown/JSON. Faire correspondre le style du prompt au style de sortie améliore les résultats (<a href=\"https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices\">Anthropic</a>).</p>\n<p><strong>Q5. Combien d&#39;exemples few-shot, et comment les rédiger ?</strong>\nAnthropic recommande 3–5 exemples ; la pratique pousse jusqu&#39;à n≥5 et plus. L&#39;essentiel : qu&#39;ils soient pertinents <em>et diversifiés</em> (cas limites couverts) et enveloppés dans des balises <code>&lt;example&gt;</code>, sinon le modèle apprend un motif involontaire (<a href=\"https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices\">Anthropic</a> ; <a href=\"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/\">applied-llms.org</a>).</p>\n<p><strong>Q6. Où placer un long changelog dans le prompt ?</strong>\nEn haut, au-dessus de la requête, des instructions et des exemples. Les requêtes placées à la fin améliorent la qualité « by up to 30% » sur les entrées multi-documents complexes (<a href=\"https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices\">Anthropic</a>).</p>\n<p><strong>Q7. Comment se protéger d&#39;un changelog ou blog malveillant ?</strong>\nSéparer données et instructions : rôles <code>system</code> (règles) vs <code>user</code> (données), délimiteurs explicites, déclarer le contenu « DATA, not COMMANDS ». Pour une robustesse maximale face à des sources web, le pattern dual-LLM (<a href=\"https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html\">OWASP</a>).</p>\n<p><strong>Q8. Que fait Instructor de plus qu&#39;un simple appel structuré ?</strong>\nIl valide la sortie contre un modèle Pydantic et, sur échec de validation, déclenche un <strong>retry</strong> automatique incluant le message d&#39;erreur (<code>max_retries</code>). On peut rejeter tout item dont <code>source_quote</code> est absent de la source — l&#39;invalidité devient une boucle d&#39;auto-correction (<a href=\"https://github.com/567-labs/instructor\">Instructor</a>).</p>\n<p><strong>Q9. Structured Outputs ou function calling pour l&#39;extraction ?</strong>\nLes deux marchent pour l&#39;extraction pure. <code>response_format</code> quand on structure la réponse au consommateur en aval ; function calling quand le modèle « appelle » une action/outil de votre système. Le tool use a l&#39;avantage de l&#39;<code>enum</code> de labels (<a href=\"https://developers.openai.com/api/docs/guides/structured-outputs\">OpenAI</a> ; <a href=\"https://github.com/aws-samples/prompt-engineering-with-anthropic-claude-v-3/blob/main/10_2_2_Tool_Use_for_Structured_Outputs.ipynb\">aws-samples</a>).</p>\n<p><strong>Q10. Un schéma respecté garantit-il des breaking changes corrects ?</strong>\nNon — la contrainte de grammaire garantit la FORME, jamais la VÉRITÉ. Un item peut être parfaitement structuré et halluciné. D&#39;où la double protection : grounding par citations + vérification séparée que chaque <code>source_quote</code> existe vraiment dans la source. C&#39;est exactement le différenciateur « confiance » de TechWatch IA.</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices\">Prompting best practices — Claude API Docs (Anthropic)</a> — <em>official-docs</em> — balises XML, few-shot 3–5, CoT/thinking, placement long-context (+30 %), grounding par <code>&lt;quotes&gt;</code>, migration du prefill vers Structured Outputs.</li>\n<li><a href=\"https://developers.openai.com/api/docs/guides/structured-outputs\">Structured model outputs — OpenAI API guide</a> — <em>official-docs</em> — contrat strict (<code>strict: true</code>, <code>additionalProperties: false</code>, tous champs <code>required</code>, optionnels via union null), détection des refus (<code>refusal</code>) et troncatures (<code>finish_reason == &quot;length&quot;</code>), JSON mode vs Structured Outputs, vs function calling.</li>\n<li><a href=\"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/\">What We Learned from a Year of Building with LLMs (Part I)</a> — <em>practitioner</em> — n≥5 exemples, décomposition de tâches (éviter le prompt « couteau suisse »), CoT structuré, formats par modèle, Instructor/Outlines, RAG explicite.</li>\n<li><a href=\"https://github.com/567-labs/instructor\">Instructor — structured outputs for LLMs (567-labs)</a> — <em>library</em> — modèles Pydantic, validation + retries automatiques, streaming partiel, objets imbriqués, API multi-providers.</li>\n<li><a href=\"https://cheatsheetseries.owasp.org/cheatsheets/LLM_Prompt_Injection_Prevention_Cheat_Sheet.html\">LLM Prompt Injection Prevention Cheat Sheet — OWASP</a> — <em>security-standard</em> — séparation données/instructions, délimiteurs, spotlighting/datamarking, rôles system/user, pattern dual-LLM.</li>\n<li><a href=\"https://github.com/aws-samples/prompt-engineering-with-anthropic-claude-v-3/blob/main/10_2_2_Tool_Use_for_Structured_Outputs.ipynb\">Tool Use for Structured Outputs — aws-samples (Anthropic Claude v3)</a> — <em>official-docs</em> — pattern « tool use comme schéma de sortie » pour l&#39;extraction d&#39;entités/résumés, concret et reproductible.</li>\n</ol>\n"},{"num":4,"slug":"grounding-anti-hallucination","title":"Grounding, citations & anti-hallucination","tagline":"Pour qu'une veille techno soit digne de confiance, chaque affirmation de migration doit pointer vers un passage réel d'une source officielle — sinon elle est traitée comme « non vérifiable » et renvoyée à null, jamais inventée.","quiz":[{"q":"Que mesure le « grounding » (ou faithfulness) d'une réponse ?","options":["Le degré auquel une réponse est réellement supportée par les documents fournis","L'exactitude factuelle d'une affirmation dans l'absolu","La rapidité avec laquelle le modèle génère sa réponse","Le nombre de tokens consommés par requête"],"answer":0,"explain":"Le grounding mesure dans quelle mesure une réponse s'appuie effectivement sur les documents fournis — c'est l'opposé de l'hallucination, et une notion distincte de l'exactitude factuelle (correctness)."},{"q":"Selon la fiche, comment faut-il traiter une affirmation que le modèle « sait » vraie mais qui n'est supportée par aucune source fournie ?","options":["Comme non vérifiable : on ne la publie pas sans citation","On la publie car la correctness suffit pour la veille","On la publie en la marquant comme « connaissance interne fiable »","On la reformule pour qu'elle paraisse sourcée"],"answer":0,"explain":"Correctness ≠ faithfulness : une vérité non groundée dans les sources fournies est traitée comme non vérifiable. Pour un produit dont le différenciateur est la confiance, seule la faithfulness compte."},{"q":"Pourquoi préférer l'API Citations d'Anthropic à un simple « cite tes sources » dans le prompt ?","options":["L'API découpe les documents côté serveur et garantit que chaque cited_text pointe vers un passage réel","Elle empêche totalement le modèle de se tromper sur le fond","Elle est plus rapide et moins chère que toute autre approche","Elle rend inutile toute vérification en aval"],"answer":0,"explain":"La citation par prompt n'est pas vérifiée et le modèle peut fabriquer des références plausibles. L'API Citations chunke les documents côté serveur et garantit par construction que cited_text existe réellement dans le document."},{"q":"Comment l'API Citations repère-t-elle un passage selon le type de document ?","options":["Index de caractères pour le texte brut, numéros de page pour le PDF, index de bloc pour le custom content","Toujours par numéro de page, quel que soit le format","Toujours par hash du passage cité","Index de caractères pour tous les formats sans distinction"],"answer":0,"explain":"Le repérage dépend du type : index de caractères (0-indexés, fin exclusive) pour le texte brut, numéros de page (1-indexés) pour le PDF, et index de bloc pour le custom content."},{"q":"Que garantit exactement le pointeur natif de l'API Citations à propos du cited_text ?","options":["Qu'il existe réellement dans le document, mais pas qu'il supporte sémantiquement le claim","Qu'il existe et qu'il supporte toujours sémantiquement le claim","Qu'il provient d'une source officielle et fiable","Qu'il est la meilleure preuve disponible pour le claim"],"answer":0,"explain":"Anthropic garantit que cited_text existe dans le document, pas qu'il supporte sémantiquement le claim. La vérification du support reste donc nécessaire (LLM-judge + revue)."},{"q":"Quel piège d'architecture guette le pipeline Anthropic combinant citation et extraction ?","options":["Activer Citations et Structured Outputs dans la même requête renvoie une erreur 400","Activer Citations désactive automatiquement le prompt caching","Le custom content est incompatible avec le PDF dans la même requête","Le cache_control efface les citations des documents longs"],"answer":0,"explain":"Citations est incompatible avec les Structured Outputs chez Anthropic : les activer ensemble renvoie une erreur 400. Il faut séparer l'étape citation/grounding de l'étape d'extraction JSON."},{"q":"Pourquoi un score unique de LLM-as-judge ne suffit-il pas à prouver le grounding ?","options":["Le juge sature vers 1.0 et est trop indulgent ; RAGAS et DeepEval divergent fortement sur les mêmes données","Le juge est toujours trop sévère et rejette les bons claims","Le juge ne peut pas lire les documents en custom content","Le juge ne fonctionne que sur des échelles de Likert"],"answer":0,"explain":"Le LLM-as-judge sature vers 1.0 et tend à être trop indulgent, et les outils divergent sur les mêmes données. Il faut croiser le juge avec la vérification programmatique du span et une revue humaine sur échantillon."}],"flashcards":[{"front":"Correctness vs Faithfulness","back":"La correctness est l'exactitude factuelle dans l'absolu ; la faithfulness (grounding) est le degré de support par les sources fournies. Pour TechWatch IA, seule la faithfulness compte : une vérité non sourcée est non vérifiable."},{"front":"Clause « no evidence, no answer »","back":"Instruire explicitement le modèle de renvoyer null / « non documenté » quand aucune source ne supporte une affirmation. C'est la traduction de la règle 2 et la défense n°1 contre un faux breaking change."},{"front":"Vérification en deux temps","back":"En amont, prévention (chain-of-thought, I/O structurées, contexte dense et pertinent) ; en aval, détection via un guardrail d'incohérence factuelle qui filtre ou régénère les sorties non supportées."},{"front":"Claims atomiques (style RAGAS)","back":"Décomposer chaque réponse en affirmations atomiques, vérifier chaque claim contre le contexte, puis re-valider déterministiquement que le cited_text apparaît aux index annoncés — et rejeter sinon."},{"front":"Le « partial support » comme angle mort","back":"Les métriques automatiques distinguent mal un support partiel d'un support total ou nul — exactement le cas d'un breaking change nuancé. La bonne réaction est de flaguer « à vérifier » plutôt que d'affirmer."},{"front":"Custom content documents","back":"Les Citations natives chunkent en phrases par défaut, ce qui peut mal découper un tableau ou un changement décrit sur plusieurs phrases. Le custom content (un bloc = une section) permet de contrôler le grain de citation."},{"front":"Le grounding ne sauve pas une mauvaise source","back":"Citer parfaitement une RC présentée comme finale ou un blog tiers erroné produit une affirmation fausse impeccablement citée. La fiabilité de la source prime sur la mécanique de citation."},{"front":"Taux d'hallucination résiduel (~2 %)","back":"Même avec un grounding fort, le taux d'hallucination tombe rarement sous ~2 %. Il faut concevoir le système en supposant qu'il reste des erreurs, d'où l'importance du filtre aval et de la traçabilité."}],"sources":[{"title":"Citations - Claude API Docs (Anthropic)","url":"https://platform.claude.com/docs/en/build-with-claude/citations","type":"official-docs"},{"title":"Introducing Citations on the Anthropic API","url":"https://claude.com/blog/introducing-citations-api","type":"official-blog"},{"title":"What We Learned from a Year of Building with LLMs (Part I)","url":"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/","type":"practitioner"},{"title":"LLM09:2025 Misinformation - OWASP Top 10 for LLM Applications","url":"https://genai.owasp.org/llmrisk/llm092025-misinformation/","type":"standard"},{"title":"Measuring LLM Groundedness in RAG Systems with Evaluation Metrics (deepset)","url":"https://www.deepset.ai/blog/rag-llm-evaluation-groundedness","type":"practitioner"},{"title":"A Comparative Analysis of Faithfulness Metrics and Humans in Citation Evaluation","url":"https://arxiv.org/abs/2408.12398","type":"academic"},{"title":"Awesome Hallucination Detection (EdinburghNLP)","url":"https://github.com/EdinburghNLP/awesome-hallucination-detection","type":"reference-list"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Pour qu&#39;une veille techno soit digne de confiance, chaque affirmation de migration doit pointer vers un passage réel d&#39;une source officielle — sinon elle est traitée comme « non vérifiable » et renvoyée à <code>null</code>, jamais inventée.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>Le différenciateur de TechWatch IA, c&#39;est la <strong>confiance</strong> : un seul faux breaking change (ex. annoncer à tort que <code>ReactDOM.render</code> est supprimé dans une version où il ne l&#39;est pas) détruit la crédibilité du produit. C&#39;est exactement ce que codifient les règles 1 (citations obligatoires) et 2 (« null si absent ») du projet. Le grounding et la citation vérifiable sont les mécanismes techniques qui transforment ces deux règles en garanties opérationnelles : aucune affirmation sans source pointable, aucune extrapolation à partir des connaissances internes du modèle. Dans un workflow déterministe à 9 étapes, ces garanties deviennent des étapes de validation testables, pas des vœux pieux.</p>\n<h2>Le principe</h2>\n<p>Le <strong>grounding</strong> (ou <em>faithfulness</em>) mesure le degré auquel une réponse est effectivement supportée par les documents fournis — c&#39;est l&#39;opposé de l&#39;hallucination (deepset). Attention : c&#39;est une notion distincte de la <em>correctness</em>. Une affirmation peut être <strong>vraie</strong> (le modèle le « sait » par son pré-entraînement) tout en étant <strong>non groundée</strong> dans les sources fournies. Pour une veille de confiance, seule la faithfulness compte : une vérité non sourcée doit être traitée comme non vérifiable.</p>\n<p>Trois leviers se combinent.</p>\n<p><strong>1. La citation native plutôt que la citation par prompt.</strong> L&#39;API Citations d&#39;Anthropic découpe les documents en phrases côté serveur et garantit que chaque <code>cited_text</code> pointe vers un passage réellement présent dans le document — le pointeur est <em>valide par construction</em>, le modèle ne peut pas fabriquer une référence (Anthropic, Citations docs). Le repérage dépend du type de document : index de caractères (0-indexés, fin exclusive) pour le texte brut, numéros de page (1-indexés) pour le PDF, index de bloc pour le <em>custom content</em>. Mesurée, cette approche native augmente la <em>recall accuracy</em> jusqu&#39;à +15 % par rapport aux implémentations par prompt ; le client Endex rapporte une chute des hallucinations de source de 10 % à 0 % avec +20 % de références par réponse (Anthropic, blog Citations).</p>\n<p><strong>2. La clause « no evidence, no answer ».</strong> Instruire explicitement le modèle de renvoyer <code>null</code> / « non documenté » quand aucune source ne supporte une affirmation, et de signaler quand le contexte est insuffisant. C&#39;est la traduction directe de la règle 2 et la défense n°1 contre un faux breaking change : sans instruction d&#39;abstention testée, les LLM ont tendance à combler les trous avec leurs connaissances internes (potentiellement périmées sur une version récente comme React 19) plutôt qu&#39;à s&#39;abstenir (O&#39;Reilly, <em>A Year of Building with LLMs</em>).</p>\n<p><strong>3. La vérification en deux temps.</strong> En amont, la <em>prévention</em> (chain-of-thought, entrées/sorties structurées, contexte dense et pertinent) ; en aval, la <em>détection</em> via un « factual inconsistency guardrail » qui filtre ou régénère les sorties non supportées (O&#39;Reilly). Concrètement : décomposer chaque réponse en <em>claims</em> atomiques (style RAGAS), vérifier chaque claim contre le contexte, puis re-valider déterministiquement que le <code>cited_text</code> apparaît bien aux index annoncés — et rejeter sinon.</p>\n<h2>Exemples concrets</h2>\n<p><strong>Exemple 1 — Pipeline React 18→19 sourcé (custom content).</strong> On ingère le <em>React 19 Upgrade Guide</em> via l&#39;API Citations en utilisant des <code>custom content documents</code> : un bloc = une section de breaking change, sans re-chunking automatique. Chaque entrée de la synthèse porte alors une citation pointant vers un bloc précis.</p>\n<pre><code class=\"language-python\"># Étape « grounding » du workflow déterministe : un bloc citable par breaking change\nresp = client.messages.create(\n    model=&quot;claude-opus-4-8&quot;,\n    max_tokens=4096,\n    messages=[{\n        &quot;role&quot;: &quot;user&quot;,\n        &quot;content&quot;: [\n            {\n                &quot;type&quot;: &quot;document&quot;,\n                &quot;source&quot;: {\n                    &quot;type&quot;: &quot;content&quot;,\n                    &quot;content&quot;: [\n                        {&quot;type&quot;: &quot;text&quot;, &quot;text&quot;: &quot;ReactDOM.render n&#39;est plus supporté. Utilisez createRoot.&quot;},\n                        {&quot;type&quot;: &quot;text&quot;, &quot;text&quot;: &quot;Les string refs sont supprimées au profit des callback refs.&quot;},\n                    ],\n                },\n                &quot;title&quot;: &quot;React 19 Upgrade Guide&quot;,\n                &quot;context&quot;: &quot;Source officielle react.dev&quot;,\n                &quot;citations&quot;: {&quot;enabled&quot;: True},\n                &quot;cache_control&quot;: {&quot;type&quot;: &quot;ephemeral&quot;},  # changelog long -&gt; prompt caching\n            },\n            {&quot;type&quot;: &quot;text&quot;, &quot;text&quot;: &quot;Liste les breaking changes, un par affirmation, sourcés.&quot;},\n        ],\n    }],\n)\n</code></pre>\n<p><strong>Exemple 2 — Vérification déterministe du span (étape aval).</strong> Après génération, on re-valide que chaque <code>cited_text</code> est bien un sous-texte du bloc annoncé. C&#39;est une étape parfaite pour un workflow déterministe : pas de LLM, juste une comparaison.</p>\n<pre><code class=\"language-python\">def verifier_citation(bloc_source: str, cite: dict) -&gt; bool:\n    # Le pointeur natif est VALIDE (existe), mais on revérifie le span et le SUPPORT en aval\n    return cite[&quot;cited_text&quot;].strip() in bloc_source\n\n# Si un claim n&#39;a aucune citation valide -&gt; on le marque &quot;non vérifiable&quot;, on ne publie pas.\n</code></pre>\n<p><strong>Exemple 3 — Test d&#39;abstention « no evidence, no answer ».</strong> On injecte le changelog React 19, puis on demande une affirmation absente (ex. « React 19 supprime-t-il les class components ? »). Le système <strong>doit</strong> répondre <code>null</code> / « non documenté dans les sources » au lieu d&#39;inventer. C&#39;est un cas d&#39;éval binaire : <code>correct = (réponse == abstention)</code>.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Correctness ≠ Faithfulness.</strong> Une affirmation vraie mais non sourcée reste non vérifiable pour TechWatch IA. Ne jamais publier ce que le modèle « sait » sans citation.</li>\n<li><strong>Le pointeur est valide, pas forcément pertinent.</strong> Anthropic garantit que <code>cited_text</code> <em>existe</em> dans le document, <strong>pas</strong> qu&#39;il <em>supporte sémantiquement</em> le claim. La vérification du support reste nécessaire (LLM-judge + revue).</li>\n<li><strong>Le « partial support » est l&#39;angle mort.</strong> Les métriques automatiques distinguent mal une source qui supporte <em>partiellement</em> d&#39;une qui supporte <em>totalement</em> ou <em>pas du tout</em> — exactement le cas d&#39;un breaking change nuancé (arXiv 2408.12398). Flaguer « à vérifier » plutôt qu&#39;affirmer.</li>\n<li><strong>Le LLM-as-judge sature vers 1.0</strong> et tend à être trop indulgent ; RAGAS et DeepEval donnent des taux d&#39;hallucination très différents sur les mêmes données. Ne pas prendre un score de juge unique pour argent comptant — croiser avec la vérification programmatique du span.</li>\n<li><strong>Le grounding ne sauve pas une mauvaise source.</strong> Citer parfaitement une RC présentée comme finale, ou un blog tiers erroné, produit une affirmation fausse avec une mécanique de citation impeccable. La <strong>fiabilité de la source prime</strong> sur la mécanique de citation.</li>\n<li><strong>Citations natives chunke en PHRASES par défaut</strong> : un breaking change décrit en tableau ou sur plusieurs phrases peut être mal découpé. Utiliser le <code>custom content</code> pour contrôler le grain. Les PDF scannés sans texte extractible ne sont <strong>pas</strong> citables.</li>\n<li><strong>Piège d&#39;architecture : Citations est INCOMPATIBLE avec les Structured Outputs</strong> chez Anthropic — activer <code>citations</code> + <code>output_config.format</code> ensemble renvoie une <strong>erreur 400</strong> (Anthropic, Citations docs). Séparer l&#39;étape « citation/grounding » de l&#39;étape « extraction structurée en JSON ».</li>\n<li><strong>Le taux d&#39;hallucination résiduel tombe rarement sous ~2 %</strong> même avec un grounding fort (O&#39;Reilly). Concevoir le système en supposant qu&#39;il reste des erreurs : d&#39;où l&#39;importance du filtre aval et de la traçabilité.</li>\n<li><strong>Ne pas injecter en vrac d&#39;énormes documents</strong> en pensant que « plus de contexte = moins d&#39;hallucination ». La densité et la pertinence priment ; le bruit dilue l&#39;attention et peut dégrader la faithfulness.</li>\n<li><strong>Anti-pattern classique :</strong> « cite tes sources » dans le system prompt sans validation aval. Le modèle peut fabriquer des numéros de section/URL plausibles — c&#39;est le mécanisme des fausses jurisprudences ChatGPT (OWASP LLM09).</li>\n<li><strong>Coût caché de la verifiability :</strong> re-matching des spans, NLI, juge ajoutent latence et coût. À budgéter dans l&#39;architecture serverless event-driven.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Toutes les sources ont <code>citations: {enabled: true}</code> (tout ou rien dans une requête).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque affirmation de migration porte au moins une citation valide ; sinon → <code>null</code> / « non documenté ».</li>\n<li><input disabled=\"\" type=\"checkbox\"> Une étape déterministe re-vérifie que chaque <code>cited_text</code> existe littéralement dans le document source aux index annoncés ; rejet sinon.</li>\n<li><input disabled=\"\" type=\"checkbox\"> La clause d&#39;abstention est <strong>explicite dans le prompt ET testée</strong> par une éval binaire dédiée.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les réponses sont décomposées en claims atomiques, vérifiés claim-par-claim (pas réponse-par-réponse).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Un score de groundedness/faithfulness (0-1) est calculé et suivi comme métrique de production de premier ordre (au même titre que coût et latence).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les évals sont <strong>binaires</strong> (« ce claim est-il supporté par cette source ? oui/non ») plutôt que des échelles de Likert.</li>\n<li><input disabled=\"\" type=\"checkbox\"> La vérification combine LLM-as-judge + vérification programmatique du span + revue humaine sur échantillon.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le pipeline <strong>ne mélange jamais</strong> Citations et Structured Outputs dans une même requête (sinon 400).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le <code>cache_control</code> est posé sur les documents source longs (changelogs, release notes) pour réduire les coûts en long-context.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les sources sont <strong>officielles</strong> (release notes, migration guides, RFC), versionnées correctement (pas de RC présentée comme finale).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le livrable affiche la source de chaque breaking change, marque visuellement les affirmations non sourcées, et rend chaque citation cliquable vers le passage exact.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi le « grounding » en une phrase ?</strong>\nC&#39;est le degré auquel une réponse est réellement supportée par les documents fournis — synonyme de <em>faithfulness</em>, opposé de l&#39;hallucination (deepset). Pour la veille, c&#39;est la garantie que chaque affirmation s&#39;appuie sur une source citable et non sur les connaissances internes du modèle.</p>\n<p><strong>Q2. Pourquoi préférer la citation native d&#39;Anthropic à un « cite tes sources » dans le prompt ?</strong>\nParce que la citation par prompt n&#39;est pas vérifiée : le modèle peut fabriquer des numéros de section ou des URL plausibles (OWASP LLM09). L&#39;API Citations chunke les documents côté serveur et garantit que chaque <code>cited_text</code> pointe vers un passage réel ; elle augmente la <em>recall accuracy</em> jusqu&#39;à +15 % et fait chuter les hallucinations de source de 10 % à 0 % chez Endex (Anthropic, blog Citations).</p>\n<p><strong>Q3. Comment l&#39;API repère-t-elle un passage cité ?</strong>\nSelon le type de document : index de caractères (0-indexés, fin exclusive) pour le texte brut, numéros de page (1-indexés) pour le PDF, index de bloc pour le <em>custom content</em> (Anthropic, Citations docs). Chaque citation porte aussi un <code>document_index</code> 0-indexé.</p>\n<p><strong>Q4. Concrètement, que veut dire la règle 2 « null si absent » ?</strong>\nQue le système doit renvoyer <code>null</code> ou « non documenté » dès qu&#39;aucune source ne supporte une affirmation, et signaler un contexte insuffisant. Sans cette clause d&#39;abstention testée, le modèle comble les trous avec ses connaissances internes — potentiellement périmées sur une version récente (O&#39;Reilly).</p>\n<p><strong>Q5. Une affirmation vraie mais non sourcée, je la garde ?</strong>\nNon. <em>Correctness</em> ≠ <em>faithfulness</em> : une vérité non groundée dans les sources fournies est traitée comme non vérifiable. Pour un produit dont le différenciateur est la confiance, seule la faithfulness compte.</p>\n<p><strong>Q6. Comment mesure-t-on la faithfulness en pratique ?</strong>\nOn décompose la réponse en claims atomiques (style RAGAS), on vérifie chaque claim contre le contexte, et on calcule un score de groundedness (0-1) par sortie qu&#39;on suit comme métrique de production (deepset). Les évals doivent être <strong>binaires</strong> (supporté oui/non), plus reproductibles que des échelles de Likert (O&#39;Reilly).</p>\n<p><strong>Q7. Un score de LLM-judge suffit-il à prouver le grounding ?</strong>\nNon. Le juge sature vers 1.0 et est trop indulgent ; RAGAS et DeepEval divergent fortement sur les mêmes données. Et aucune métrique automatique unique n&#39;excelle partout — la vérification entièrement automatisée des citations reste non résolue et nécessite une validation humaine (arXiv 2408.12398). Il faut croiser juge + vérification programmatique du span + revue sur échantillon.</p>\n<p><strong>Q8. Quel est le cas le plus dangereux pour un breaking change ?</strong>\nLe « partial support » : les évaluateurs distinguent mal une source qui supporte <em>partiellement</em> d&#39;une qui supporte <em>totalement</em> ou <em>pas du tout</em> (arXiv 2408.12398) — exactement le cas d&#39;un breaking change nuancé. La bonne réponse est de flaguer « à vérifier » plutôt que d&#39;affirmer.</p>\n<p><strong>Q9. Quel piège d&#39;architecture guette le pipeline Anthropic ?</strong>\nActiver Citations <strong>et</strong> Structured Outputs dans la même requête : ça renvoie une <strong>erreur 400</strong> (Anthropic, Citations docs). Il faut séparer l&#39;étape « citation/grounding » de l&#39;étape « extraction structurée en JSON », ou citer d&#39;abord puis post-parser.</p>\n<p><strong>Q10. Si la mécanique de citation est parfaite, le résultat est-il forcément fiable ?</strong>\nNon, à deux titres. D&#39;abord, le pointeur natif est <em>valide</em> (il existe) mais pas forcément <em>pertinent</em> sémantiquement — le support reste à vérifier. Ensuite, le grounding ne sauve pas une mauvaise source : citer une RC présentée comme finale ou un blog tiers erroné produit une affirmation fausse impeccablement citée. La fiabilité de la source prime, et le risque légal d&#39;une fausse autorité est réel (OWASP LLM09 : Air Canada, fausses jurisprudences).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://platform.claude.com/docs/en/build-with-claude/citations\">Citations - Claude API Docs (Anthropic)</a> — <em>official-docs</em> — mécanisme exact des Citations : chunking en phrases côté serveur, formats de repérage (char index / page / bloc), garantie que <code>cited_text</code> pointe vers un passage réel, incompatibilité avec les Structured Outputs (400), compatibilité prompt caching / batch, et contrôle du grain via <em>custom content</em>.</li>\n<li><a href=\"https://claude.com/blog/introducing-citations-api\">Introducing Citations on the Anthropic API</a> — <em>official-blog</em> — métriques chiffrées : +15 % de recall accuracy vs prompt-based, et chez Endex hallucinations de source 10 % → 0 % avec +20 % de références par réponse.</li>\n<li><a href=\"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/\">What We Learned from a Year of Building with LLMs (Part I)</a> — <em>practitioner</em> — taux d&#39;hallucination résiduel (~2-10 %), approche en deux temps (prévention amont + guardrail de détection aval), évals binaires plutôt que Likert, et instruction d&#39;abstention quand aucune source ne suffit.</li>\n<li><a href=\"https://genai.owasp.org/llmrisk/llm092025-misinformation/\">LLM09:2025 Misinformation - OWASP Top 10 for LLM Applications</a> — <em>standard</em> — cadre sécurité : hallucination / fausse autorité comme vulnérabilité avec conséquences légales (Air Canada, fausses jurisprudences), mitigations (RAG sur sources vérifiées, cross-verification, supervision humaine, design d&#39;UI contre l&#39;overreliance).</li>\n<li><a href=\"https://www.deepset.ai/blog/rag-llm-evaluation-groundedness\">Measuring LLM Groundedness in RAG Systems with Evaluation Metrics (deepset)</a> — <em>practitioner</em> — définition opérationnelle de la groundedness (= faithfulness, opposé de l&#39;hallucination), Groundedness Score 0-1 par réponse, et son usage pour optimiser le pipeline.</li>\n<li><a href=\"https://arxiv.org/abs/2408.12398\">A Comparative Analysis of Faithfulness Metrics and Humans in Citation Evaluation</a> — <em>academic</em> — aucune métrique automatique unique n&#39;excelle partout, le « partial support » est l&#39;angle mort, schéma à trois niveaux (full / partial / no support), et la vérification entièrement automatisée reste non résolue (validation humaine nécessaire).</li>\n<li><a href=\"https://github.com/EdinburghNLP/awesome-hallucination-detection\">Awesome Hallucination Detection (EdinburghNLP)</a> — <em>reference-list</em> — liste curatée des techniques de détection d&#39;hallucination (NLI post-hoc, self-consistency, abstention…), point d&#39;entrée pour concevoir la couche de vérification automatique du workflow.</li>\n</ol>\n"},{"num":5,"slug":"eval-driven-development","title":"Eval-driven development & golden sets","tagline":"On écrit les évaluations avant le prompt et le code, on les exprime autant que possible comme des assertions déterministes, et on les fait tourner dans la CI à chaque changement — exactement comme lint, type-check et build — de sorte qu'aucune régression de qualité ne puisse atteindre la production sans bloquer le merge.","quiz":[{"q":"Quel est le principe central de l'eval-driven development ?","options":["Écrire les évaluations avant le prompt et le code, puis les faire tourner dans la CI à chaque changement","Écrire d'abord le prompt, puis ajouter des évaluations une fois la qualité jugée satisfaisante","Confier l'évaluation entièrement à un LLM-as-judge dès le départ","N'évaluer qu'en production via l'A/B testing et le monitoring utilisateur"],"answer":0,"explain":"L'eval-driven development inverse l'ordre habituel : « Build evals first. Code is generated. Evals are engineered », et les évals tournent dans la CI à chaque changement, comme lint/type-check/build."},{"q":"Au niveau le plus simple, qu'est-ce qu'une « éval » pour un LLM ?","options":["Une assertion déterministe (« unit tests for LLMs are assertions »)","Un jugement subjectif rendu obligatoirement par un humain","Un score agrégé unique produit par un LLM-as-judge","Un test A/B mesurant le comportement réel des utilisateurs"],"answer":0,"explain":"À son niveau le plus simple, une éval est une assertion : on vérifie programmatiquement qu'une sortie contient (ou non) certaines phrases, respecte un format, ou qu'une URL est correcte."},{"q":"Combien de cas la fiche recommande-t-elle pour démarrer un golden set ?","options":["20 à 50 cas issus de vrais échecs observés","Au moins plusieurs centaines de cas avant de commencer","Exactement 3 cas, un par niveau de la hiérarchie","Un seul cas de référence (reference solution) suffit"],"answer":0,"explain":"« 20-50 simple tasks drawn from real failures is a great start » : 25 à 50 goldens issus de vrais échecs suffisent ; attendre des centaines de cas est un anti-pattern bloquant."},{"q":"Quelle différence la fiche fait-elle entre regression evals et capability evals ?","options":["Les regression evals visent un taux de réussite proche de 100 %, les capability evals partent d'un taux bas (100 % non attendu)","Les capability evals doivent toujours passer à 100 %, les regression evals tolèrent l'échec","Les deux visent obligatoirement 100 % de réussite dès le départ","Les regression evals sont subjectives, les capability evals sont déterministes"],"answer":0,"explain":"Les capability evals mesurent ce que l'agent sait faire (taux initialement bas, 100 % non attendu) ; les regression evals vérifient qu'il gère toujours ce qu'il gérait et « should have a nearly 100% pass rate »."},{"q":"Dans la gate du bloc 2, que vérifie l'assertion « affirmation orpheline » ?","options":["Que chaque phrase de la synthèse possède au moins une citation","Que chaque URL citée appartient au domaine officiel de l'allowlist","Que chaque API dépréciée mentionnée existe bien dans le changelog réel","Que la synthèse ne dépasse pas un nombre maximal de phrases"],"answer":0,"explain":"L'assertion (c) vérifie que phrase.citations n'est pas vide pour chaque phrase ; une phrase sans citation est une « affirmation orpheline » et fait échouer le test."},{"q":"Pourquoi la fiche insiste-t-elle pour tester aussi ce qui ne doit PAS apparaître (cas adverse) ?","options":["Parce que « one-sided evals create one-sided optimization » : sans ce garde-fou, le système peut halluciner des features non présentes","Parce que les cas négatifs sont moins coûteux à exécuter dans la CI","Parce que cela permet de remplacer entièrement les assertions positives","Parce que les regression evals interdisent toute affirmation positive"],"answer":0,"explain":"« One-sided evals create one-sided optimization » : injecter un changelog qui ne mentionne pas une feature et vérifier que la synthèse ne l'invente pas est le garde-fou central contre les hallucinations de migration."},{"q":"Quelle subtilité distingue l'eval-driven development du TDD pur sur un système stochastique ?","options":["Un seul test vert ne prouve rien : il faut taille d'échantillon, intervalles de confiance et baselines de régression","Un seul test vert suffit à garantir l'absence de régression, comme en TDD classique","Le TDD pur est toujours supérieur car il évite tout LLM-as-judge","Les tests stochastiques rendent inutile toute baseline de comparaison"],"answer":0,"explain":"Eval-driven ≠ TDD pur : comme la sortie varie entre runs, modèles et prompts, un test vert isolé ne prouve rien ; il faut taille d'échantillon, intervalles de confiance et baselines de régression."}],"flashcards":[{"front":"Manifeste eval-first (evaldriven.org)","back":"« Build evals first. Code is generated. Evals are engineered. » Si tu ne sais pas exprimer ce que veut dire « correct » pour une tâche, tu n'es pas prêt à la construire."},{"front":"Hiérarchie des évals de Hamel Husain (3 niveaux)","back":"Niveau 1 : assertions déterministes (à chaque commit). Niveau 2 : éval humaine + LLM-as-judge (sur calendrier, pour le subjectif). Niveau 3 : A/B test online (après changement significatif)."},{"front":"Golden set","back":"Ensemble de transitions connues (input, claim attendu, source officielle attendue) servant de regression eval et de gate dure. Il est vivant : on y réinjecte en continu les nouveaux échecs observés en production."},{"front":"« Every task needs an eval. Every eval needs a threshold. Every threshold needs a justification »","back":"Chaque tâche exige une éval, chaque éval un seuil chiffré, et chaque seuil doit être justifié AVANT d'écrire le test (ex. ROUGE-L ≥ 0,40, cohérence ≥ 80 %)."},{"front":"Graders déterministes vs LLM-judge","back":"« Deterministic graders where possible, LLM graders where necessary. » Les déterministes sont rapides, gratuits, objectifs, reproductibles, débuggables ; le juge LLM ajoute coût, latence, non-déterminisme et dette de calibration."},{"front":"Loi de Goodhart","back":"« Quand une mesure devient une cible, elle cesse d'être une bonne mesure. » Sur-optimiser une métrique unique dégrade des tâches réelles non mesurées ; garder un panier de métriques + revue humaine."},{"front":"Critère « deux experts »","back":"« A good task is one where two domain experts would independently reach the same pass/fail verdict. » Si deux experts divergent, la tâche est ambiguë et l'éval inutilisable."},{"front":"Calibrer un LLM-as-judge","back":"Mesurer l'accord juge↔humain par précision/recall (pas l'accord brut, trompeur sur données déséquilibrées), préférer le pairwise, neutraliser les biais de position (swap) et de longueur, autoriser les ex-aequo, exiger du chain-of-thought."}],"sources":[{"title":"Your AI Product Needs Evals — Hamel Husain","url":"https://hamel.dev/blog/posts/evals/","type":"practitioner"},{"title":"Demystifying evals for AI agents — Anthropic","url":"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents","type":"official"},{"title":"What We've Learned From A Year of Building with LLMs — applied-llms.org","url":"https://applied-llms.org/","type":"practitioner"},{"title":"Evaluation best practices — OpenAI API docs","url":"https://developers.openai.com/api/docs/guides/evaluation-best-practices","type":"official"},{"title":"LLM Evals: Everything You Need to Know (FAQ) — Hamel Husain & Shreya Shankar","url":"https://hamel.dev/blog/posts/evals-faq/","type":"practitioner"},{"title":"Eval-Driven Development (manifeste)","url":"https://evaldriven.org/","type":"practitioner"},{"title":"What We Learned from a Year of Building with LLMs (Part I) — O'Reilly Radar","url":"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/","type":"article"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> On écrit les évaluations <em>avant</em> le prompt et le code, on les exprime autant que possible comme des assertions déterministes, et on les fait tourner dans la CI à chaque changement — exactement comme <code>lint</code>, <code>type-check</code> et <code>build</code> — de sorte qu&#39;aucune régression de qualité ne puisse atteindre la production sans bloquer le merge.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>Le différenciateur de TechWatch IA, c&#39;est la <strong>confiance</strong> : chaque affirmation d&#39;une synthèse de migration (React 18→19, etc.) doit citer une source officielle vérifiable. Un système LLM est stochastique : sa sortie varie d&#39;un run à l&#39;autre, d&#39;un prompt à l&#39;autre, d&#39;un modèle à l&#39;autre. Sans garde-fou automatique, une amélioration de prompt peut silencieusement réintroduire des hallucinations ou des affirmations orphelines. C&#39;est pourquoi le <strong>bloc 2</strong> du pipeline est une <em>gate</em> : un <strong>golden set</strong> de transitions connues + des <strong>assertions déterministes</strong> (citation présente, URL dans l&#39;allowlist officielle, zéro affirmation sans source). Une synthèse qui passe sous le seuil ne sort pas, et un PR qui régresse ne merge pas.</p>\n<h2>Le principe</h2>\n<p>L&#39;eval-driven development inverse l&#39;ordre habituel, à la manière du TDD/BDD : <strong>« Build evals first. Code is generated. Evals are engineered »</strong> (<a href=\"https://evaldriven.org/\">evaldriven.org</a>). Si tu ne sais pas exprimer ce que veut dire « correct » pour une tâche, tu n&#39;es pas prêt à la construire. Le corollaire opérationnel : <strong>« Every task needs an eval. Every eval needs a threshold. Every threshold needs a justification »</strong> — chaque seuil chiffré doit être justifié <em>avant</em> d&#39;écrire le test.</p>\n<p>Hamel Husain formule une <strong>hiérarchie à trois niveaux</strong> par coût croissant (<a href=\"https://hamel.dev/blog/posts/evals/\">hamel.dev</a>) :</p>\n<ul>\n<li><strong>Niveau 1 — assertions (unit tests for LLMs are assertions)</strong> : du code déterministe, lancé à chaque commit. Rapide, gratuit, objectif, reproductible, facile à débugger.</li>\n<li><strong>Niveau 2 — éval humaine + model-based (LLM-as-judge)</strong> : sur un calendrier, réservé aux jugements subjectifs que le code ne capture pas.</li>\n<li><strong>Niveau 3 — A/B test online</strong> : seulement après un changement significatif.</li>\n</ul>\n<p>Anthropic distingue deux familles complémentaires (<a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Anthropic</a>) : les <strong>capability evals</strong> (« que sait faire l&#39;agent ? », taux de réussite initialement bas, 100 % non attendu) et les <strong>regression evals</strong> (« gère-t-il toujours ce qu&#39;il gérait ? », <strong>« should have a nearly 100% pass rate »</strong>). Le golden set joue le rôle de regression eval et sert de gate dure.</p>\n<p>Deux principes d&#39;ingénierie tiennent l&#39;ensemble. D&#39;abord, <strong>commencer petit</strong> : <strong>« 20-50 simple tasks drawn from real failures is a great start »</strong> — 25 à 50 goldens issus de <em>vrais</em> échecs suffisent ; attendre des centaines de cas est un anti-pattern bloquant. Ensuite, <strong>privilégier les graders déterministes</strong> : « deterministic graders where possible, LLM graders where necessary ». Le golden set est <strong>vivant</strong> : on y réinjecte en continu les nouveaux échecs observés en production, et il croît des dizaines vers les centaines de cas.</p>\n<p>Enfin, le critère qualité d&#39;une tâche : <strong>« A good task is one where two domain experts would independently reach the same pass/fail verdict. »</strong> Si deux experts divergent, la tâche est ambiguë et l&#39;éval inutilisable.</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Golden set de transitions React 18→19 (YAML, niveau 1).</strong> Chaque cas associe un input (release notes / diff), l&#39;affirmation attendue et l&#39;URL source officielle attendue.</p>\n<pre><code class=\"language-yaml\">- id: react19-createroot\n  input: notes/react-19-release.md\n  claim_attendu: &quot;ReactDOM.render est déprécié au profit de createRoot&quot;\n  source_attendue: &quot;https://react.dev/blog/2024/04/25/react-19-upgrade-guide&quot;\n  doit_apparaitre: true\n\n- id: react19-useactionstate\n  input: notes/react-19-release.md\n  claim_attendu: &quot;Nouveau hook useActionState&quot;\n  source_attendue: &quot;https://react.dev/reference/react/useActionState&quot;\n  doit_apparaitre: true\n</code></pre>\n<p><strong>2. Assertions déterministes en gate (bloc 2).</strong> Lancées sur chaque PR touchant prompt / modèle / retrieval :</p>\n<pre><code class=\"language-python\">def test_synthese(synthese, allowlist={&quot;react.dev&quot;, &quot;github.com/facebook/react&quot;}):\n    for phrase in synthese.phrases:\n        assert phrase.citations, f&quot;affirmation orpheline: {phrase.text!r}&quot;   # (c)\n        for url in phrase.citations:                                          # (a)\n            assert domain(url) in allowlist, f&quot;domaine non officiel: {url}&quot;   # (b)\n    for api in synthese.apis_depreciees:\n        assert api in changelog_reel, f&quot;API inventée: {api}&quot;                  # (d)\n</code></pre>\n<p>Seuils chiffrés et justifiés <em>avant</em> d&#39;écrire les tests, façon OpenAI (<a href=\"https://developers.openai.com/api/docs/guides/evaluation-best-practices\">OpenAI</a>) : par ex. ROUGE-L ≥ 0,40 et cohérence ≥ 80 % sur un held-out set de N exemples. PR sous le seuil = merge bloqué.</p>\n<p><strong>3. Cas adverse « hallucination de migration » (test du côté <em>ne doit PAS apparaître</em>).</strong> On injecte un changelog qui ne mentionne <em>pas</em> une feature et on vérifie que la synthèse ne l&#39;invente pas — « one-sided evals create one-sided optimization » (<a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Anthropic</a>).</p>\n<p><strong>4. Calibration du juge LLM « fidélité à la source » (niveau 2).</strong> 30 paires (synthèse, sources) annotées par un humain en <em>fidèle / non-fidèle</em> ; on mesure <strong>précision/recall</strong> du juge avant de l&#39;utiliser pour scorer la couverture des breaking changes (<a href=\"https://hamel.dev/blog/posts/evals-faq/\">hamel.dev FAQ</a>).</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Eval-driven ≠ TDD pur.</strong> Un seul test vert ne prouve rien sur un système stochastique : il faut taille d&#39;échantillon, intervalles de confiance et baselines de régression, car la sortie varie entre runs, modèles et prompts.</li>\n<li><strong>Loi de Goodhart.</strong> « Quand une mesure devient une cible, elle cesse d&#39;être une bonne mesure. » Sur-optimiser une métrique unique (ex. Needle-in-a-Haystack) dégrade des tâches réelles non mesurées. Garder un <em>panier</em> de métriques + revue humaine (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</li>\n<li><strong>Offline et online sont complémentaires, pas substituables.</strong> Le golden set (offline) attrape les régressions avant prod ; l&#39;A/B et le monitoring (online) vérifient que les améliorations changent vraiment le comportement utilisateur. L&#39;online peut être différé au début.</li>\n<li><strong>Le LLM-as-judge n&#39;est pas une silver bullet.</strong> Des assertions code-based ou des évals par exécution surpassent souvent le juge, avec moins de latence/coût. Le juge se <em>maintient</em> (100+ exemples labellisés, maintenance régulière) (<a href=\"https://hamel.dev/blog/posts/evals-faq/\">hamel.dev FAQ</a>).</li>\n<li><strong>Mesurer l&#39;accord juge↔humain par précision/recall, pas par accord brut.</strong> Sur un dataset déséquilibré, un accord brut élevé peut masquer un juge inutile.</li>\n<li><strong>Sur-spécifier les graders les rend fragiles.</strong> Vérifier l&#39;état final / les invariants plutôt que la trajectoire exacte : « avoid checking that agents followed very specific steps… results in overly brittle tests » (<a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Anthropic</a>).</li>\n<li><strong>Piège : écrire le prompt d&#39;abord et bricoler les évals après coup</strong> — cela transforme l&#39;éval en justification a posteriori plutôt qu&#39;en spécification.</li>\n<li><strong>Piège : golden set figé.</strong> Ne pas réinjecter les échecs de production rend les évals « vertes » alors que la qualité réelle dérive.</li>\n<li><strong>Piège : pas de gate dans la CI.</strong> Sans seuil bloquant sur chaque PR touchant prompt/modèle/retrieval, les régressions passent silencieusement en prod.</li>\n<li><strong>Signal d&#39;un bon test : le modèle peine à le passer.</strong> Des goldens trop faciles donnent une fausse confiance.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Écrire l&#39;éval <strong>avant</strong> le prompt/le code pour chaque tâche du pipeline.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Démarrer avec <strong>20–50 cas issus de vrais échecs</strong> observés (pas attendre la perfection).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Exprimer un maximum de critères comme <strong>assertions déterministes</strong> ; réserver le LLM-judge au subjectif.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Définir un <strong>seuil chiffré et justifié</strong> par tâche, avant d&#39;écrire les tests.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Couvrir les <strong>deux côtés</strong> : ce qui <em>doit</em> apparaître <strong>et</strong> ce qui ne doit <em>pas</em> (cas typiques, edge, adverses).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Fournir une <strong>reference solution</strong> par tâche (sortie connue qui passe tous les graders).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Valider l&#39;ambiguïté : <strong>deux experts</strong> atteignent-ils le même verdict pass/fail ?</li>\n<li><input disabled=\"\" type=\"checkbox\"> Brancher les évals dans la <strong>CI</strong>, à côté de lint/type-check/build, déclenchées sur tout changement de prompt/modèle/retrieval.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Faire du golden set une gate : <strong>regression evals ~100 %</strong>, PR régressant sous le seuil = merge bloqué.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Mettre en place un <strong>visualiseur de transcripts/traces</strong> (les bugs de graders s&#39;y cachent).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Si LLM-judge : le <strong>calibrer</strong> contre l&#39;humain (précision/recall, pairwise, swap anti-biais de position, ex-aequo autorisés, chain-of-thought).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Réinjecter</strong> en continu les nouveaux échecs de prod dans le golden set.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi une « éval » pour un LLM, concrètement ?</strong>\nÀ son niveau le plus simple, c&#39;est une assertion : « unit tests for LLMs are assertions » (<a href=\"https://hamel.dev/blog/posts/evals/\">hamel.dev</a>). On vérifie programmatiquement qu&#39;une sortie contient (ou non) certaines phrases, qu&#39;elle respecte un format, qu&#39;un compte ou une URL est correct. Les jugements plus subjectifs montent ensuite vers un LLM-as-judge ou une revue humaine.</p>\n<p><strong>Q2. Pourquoi écrire l&#39;éval <em>avant</em> le code ?</strong>\nParce que si tu ne sais pas exprimer « correct » comme une fonction (au moins partiellement), tu ne sais pas vraiment ce que tu construis. Le manifeste le résume : « Build evals first. Code is generated. Evals are engineered » (<a href=\"https://evaldriven.org/\">evaldriven.org</a>). Cela évite que les évals deviennent une justification a posteriori.</p>\n<p><strong>Q3. Combien de cas faut-il pour démarrer ?</strong>\nPeu : « 20-50 simple tasks drawn from real failures is a great start » (<a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Anthropic</a>) ; Husain et OpenAI parlent de 25–50 goldens. Attendre des centaines de cas est l&#39;anti-pattern qui bloque le démarrage (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</p>\n<p><strong>Q4. Assertions déterministes ou LLM-as-judge ?</strong>\nPar défaut, déterministes : rapides, pas chères, objectives, reproductibles, débuggables. On ne sort le LLM-judge que pour ce que le code ne peut pas capturer, car il ajoute coût, latence, non-déterminisme et une dette de calibration (<a href=\"https://hamel.dev/blog/posts/evals-faq/\">hamel.dev FAQ</a>). Anthropic : « deterministic graders where possible, LLM graders where necessary ».</p>\n<p><strong>Q5. Quelle différence entre regression evals et capability evals ?</strong>\nLes <em>capability evals</em> mesurent ce que l&#39;agent sait faire (taux de réussite initialement bas, 100 % non attendu) ; les <em>regression evals</em> vérifient qu&#39;il gère toujours ce qu&#39;il gérait et « should have a nearly 100% pass rate » (<a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Anthropic</a>). Le golden set de TechWatch IA est une regression eval servant de gate.</p>\n<p><strong>Q6. Où les évals doivent-elles tourner ?</strong>\nDans la CI, à chaque changement : « If your evals do not run on every change, they do not exist. Evaluation belongs in the pipeline next to lint, type-check, and build » (<a href=\"https://evaldriven.org/\">evaldriven.org</a>). Tout changement de prompt, de modèle ou de retrieval doit les déclencher.</p>\n<p><strong>Q7. Comment fixer un seuil de réussite ?</strong>\nOn le chiffre et on le justifie <em>avant</em> d&#39;écrire les tests : « Every threshold needs a justification » (<a href=\"https://evaldriven.org/\">evaldriven.org</a>). Exemple OpenAI : ROUGE-L ≥ 0,40 et cohérence ≥ 80 % sur un held-out set (<a href=\"https://developers.openai.com/api/docs/guides/evaluation-best-practices\">OpenAI</a>). Le seuil cible diffère selon le type : ~100 % pour les regressions, &lt; 100 % accepté (décision produit) pour les capabilities.</p>\n<p><strong>Q8. Pourquoi tester aussi ce qui ne doit <em>pas</em> apparaître ?</strong>\nParce que « one-sided evals create one-sided optimization » (<a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Anthropic</a>). Pour TechWatch IA, injecter un changelog qui ne mentionne pas une feature et vérifier que la synthèse ne l&#39;invente pas est le garde-fou central contre les hallucinations de migration.</p>\n<p><strong>Q9. Comment éviter de tomber dans la loi de Goodhart ?</strong>\nNe pas optimiser une métrique agrégée unique : « quand une mesure devient une cible, elle cesse d&#39;être une bonne mesure ». Garder un panier de métriques, regarder les transcripts, et compléter par de la revue humaine (<a href=\"https://applied-llms.org/\">applied-llms.org</a>). Un visualiseur de traces est un investissement précoce rentable (<a href=\"https://hamel.dev/blog/posts/evals/\">hamel.dev</a>).</p>\n<p><strong>Q10. Comment savoir si mon LLM-as-judge est fiable, et que faire d&#39;autre des assertions ?</strong>\nOn le calibre contre l&#39;humain en mesurant <strong>précision/recall</strong> (pas l&#39;accord brut, trompeur sur données déséquilibrées), en préférant le pairwise au Likert, en neutralisant les biais de position (swap) et de longueur, en autorisant les ex-aequo et en exigeant du chain-of-thought (<a href=\"https://applied-llms.org/\">applied-llms.org</a>, <a href=\"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/\">O&#39;Reilly</a>). Bonus : une fois bâtie, l&#39;infra d&#39;assertions se réutilise pour le data cleaning, les retries automatiques à l&#39;inférence et la curation de données de fine-tuning (<a href=\"https://hamel.dev/blog/posts/evals/\">hamel.dev</a>).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://hamel.dev/blog/posts/evals/\">Your AI Product Needs Evals — Hamel Husain</a> — <em>practitioner</em> — référence canonique : hiérarchie à 3 niveaux, « assertions = unit tests », réutilisation des assertions, génération synthétique de cas.</li>\n<li><a href=\"https://www.anthropic.com/engineering/demystifying-evals-for-ai-agents\">Demystifying evals for AI agents — Anthropic</a> — <em>official</em> — capability vs regression evals (~100 % pass rate), graders déterministes par défaut, reference solution, critère « deux experts, même verdict », démarrer avec 20–50 tâches.</li>\n<li><a href=\"https://applied-llms.org/\">What We&#39;ve Learned From A Year of Building with LLMs — applied-llms.org</a> — <em>practitioner</em> — unit tests par assertions tirés d&#39;échantillons réels, déclenchement à chaque changement, règles LLM-as-judge (pairwise, biais position/longueur), loi de Goodhart.</li>\n<li><a href=\"https://developers.openai.com/api/docs/guides/evaluation-best-practices\">Evaluation best practices — OpenAI API docs</a> — <em>official</em> — mix production data + experts, génération de cas (typiques/edge/adverses), graders metric-based vs LLM-judge, seuils chiffrés sur held-out set, continuous evaluation.</li>\n<li><a href=\"https://hamel.dev/blog/posts/evals-faq/\">LLM Evals: Everything You Need to Know (FAQ) — Hamel Husain &amp; Shreya Shankar</a> — <em>practitioner</em> — analyse coût-bénéfice des évaluateurs, calibration juge vs humain (précision/recall), maintenance du LLM-judge.</li>\n<li><a href=\"https://evaldriven.org/\">Eval-Driven Development (manifeste)</a> — <em>practitioner</em> — inversion eval-first, « code is generated, evals are engineered », chaque seuil justifié, « si tes évals ne tournent pas à chaque changement, elles n&#39;existent pas ».</li>\n<li><a href=\"https://www.oreilly.com/radar/what-we-learned-from-a-year-of-building-with-llms-part-i/\">What We Learned from a Year of Building with LLMs (Part I) — O&#39;Reilly Radar</a> — <em>article</em> — framing « evals = unit tests », assertions sur phrases incluses/exclues, comptages, exécution de code, pairwise LLM-judge, garde-fous anti-biais.</li>\n</ol>\n"},{"num":6,"slug":"llm-as-a-judge","title":"LLM-as-a-judge : usages et pièges","tagline":"Un LLM peut servir de juge offline pour évaluer des qualités subjectives (ton, clarté, complétude d'une synthèse) à condition d'être aligné sur un expert et mesuré rigoureusement — mais il ne doit jamais arbitrer la factualité, qui se vérifie de façon déterministe.","quiz":[{"q":"Qu'est-ce qu'un « LLM-as-a-judge » ?","options":["Un LLM à qui l'on demande d'évaluer la qualité d'une sortie selon des critères décrits dans un prompt","Un modèle spécialisé entraîné uniquement pour détecter des erreurs de code","Un système de règles déterministes qui valide les citations et les versions","Un classifieur de modération qui bloque les contenus dangereux en production"],"answer":0,"explain":"C'est un grand modèle de langage à qui l'on demande d'évaluer une sortie (la sienne ou celle d'un autre système) selon des critères donnés dans un prompt, pour automatiser une partie de l'annotation humaine sur des dimensions subjectives."},{"q":"Pourquoi ne faut-il jamais confier la vérification de la factualité (citations, versions) au juge LLM ?","options":["Parce que les LLM sont trop lents pour vérifier des URL en temps réel","Parce que leur recall sur les défauts factuels est faible (≈30–60 %) et qu'ils sont attaquables par biais d'autorité","Parce qu'ils refusent systématiquement de juger des faits chiffrés","Parce que la factualité est une dimension subjective mal définie"],"answer":1,"explain":"Les LLM ratent les défauts factuels subtils (≈30–60 % des incohérences détectées) et une fausse citation bien formulée peut retourner leur verdict (biais d'autorité, CALM) ; la factualité doit être vérifiée de façon déterministe."},{"q":"Parmi ces formats de verdict, lequel est le plus piégeux et déconseillé pour aligner un juge sur un expert ?","options":["Le verdict binaire pass/fail","Le pairwise (A vs B) avec option d'égalité","Le scoring direct sur une échelle de 1 à 5 ou 1 à 10","Le verdict pass/fail accompagné d'un raisonnement"],"answer":2,"explain":"Le scoring direct est piégeux : les annotateurs ne distinguent pas un « 3 » d'un « 4 », les scores intermédiaires masquent l'incertitude et la magnitude n'est ni calibrée ni comparable dans le temps. On préfère pass/fail ou pairwise."},{"q":"En quoi consiste le « critique shadowing » dans le processus d'alignement d'un juge ?","options":["Faire juger chaque sortie par deux modèles différents puis moyenner les verdicts","Cacher l'identité des modèles comparés pour éviter le self-preference","Réinjecter en few-shot dans le prompt du juge les critiques détaillées rédigées par l'expert principal","Demander au juge de produire un raisonnement avant chaque verdict"],"answer":2,"explain":"Un expert principal unique pose les pass/fail de référence et rédige des critiques détaillées de chaque cas ; ces critiques sont réinjectées en few-shot dans le prompt du juge, ce qu'on appelle le « critique shadowing »."},{"q":"Pourquoi un « % d'accord » brut élevé peut-il être trompeur lorsqu'on valide un juge ?","options":["Parce qu'il dépend du nombre de tokens du prompt du juge","Parce qu'avec des classes déséquilibrées il peut masquer un recall médiocre sur la classe rare (les « fail »)","Parce qu'il ne peut pas se calculer sur un jeu held-out","Parce qu'il favorise toujours la réponse la plus longue"],"answer":1,"explain":"Avec peu de cas « fail », 80 % d'accord peut cacher un κ=0,62 et un recall faible sur les défauts. Il faut reporter TPR et TNR séparément ainsi que le Cohen's κ."},{"q":"Comment neutraliser le biais de position dans une évaluation pairwise A vs B ?","options":["Juger chaque paire deux fois en inversant l'ordre et n'attribuer le gagnant qu'après le swap","Toujours présenter la réponse la plus courte en premier","Demander au juge de noter chaque réponse de 1 à 10 séparément","Faire juger la paire par le modèle qui a généré l'une des deux réponses"],"answer":0,"explain":"Le biais de position est réel (GPT-3.5 ~50 %, Claude-v1 ~70 % de préférence positionnelle) et le swap peut renverser plus de 10 % des verdicts ; on joue donc chaque paire dans les deux ordres, avec option d'égalité."},{"q":"Dans quel cas le pairwise perd-il son avantage et devient-il déconseillé ?","options":["Quand on compare seulement deux variantes de prompt","Quand on autorise l'option d'égalité entre A et B","Sur les tâches objectives comme la cohérence factuelle, et quand le coût quadratique (n²) rend le ranking de nombreux candidats impraticable","Quand l'expert principal a déjà rédigé des critiques détaillées"],"answer":2,"explain":"Sur les tâches objectives son avantage s'évapore (cohérence factuelle : 0,47 pairwise vs 0,46 direct) et son coût quadratique le rend impraticable pour ranker beaucoup de candidats sans échantillonnage ou agrégation (PairS)."}],"flashcards":[{"front":"Éval offline vs chemin critique","back":"Le juge LLM s'utilise en éval offline, asynchrone, post-génération et hors gating bloquant. La factualité, elle, est vérifiée de façon déterministe dans le chemin critique."},{"front":"Ordinal/relatif vs magnitude","back":"Un juge est fiable sur l'ordinal/relatif (A>B) mais peu fiable sur la magnitude : un 7,8/10 n'est pas une distance interprétable. On ne suit jamais un delta de score absolu comme métrique produit."},{"front":"Biais de verbosité","back":"Le juge préfère la réponse la plus longue plus de 90 % du temps, même sans information additionnelle. Il faut égaliser les longueurs et préciser dans le prompt que la longueur n'est pas un critère."},{"front":"Biais de self-preference","back":"Un modèle qui juge ses propres sorties gonfle le win-rate (+10 % GPT-4, +25 % Claude-v1). Lié à la perplexité (favorise le familier). On anonymise les modèles et on évite producteur=juge sur la même sortie."},{"front":"TPR, TNR et Cohen's κ","back":"On mesure le juge sur un held-out (~100 exemples) avec le True Positive Rate et le True Negative Rate séparés, et on reporte le Cohen's κ — pas seulement le % d'accord brut, trompeur avec des classes déséquilibrées."},{"front":"CoT à double tranchant","back":"Demander un raisonnement avant le verdict améliore la fiabilité et permet d'auditer, mais peut aussi rationaliser un verdict biaisé (biais CoT). D'où la nécessité d'un audit humain des critiques."},{"front":"Objectif d'alignement réaliste","back":"Viser plus de 90 % d'accord juge↔expert en quelques itérations (Honeycomb : 3 itérations ; cas applied-llms : 68 %→94 %), via critique shadowing, error analysis et ré-alignement."},{"front":"Pass-rate à 100 %","back":"Un pass-rate de 100 % signale un jeu de test trop facile, pas un système parfait. Il faut durcir le test plutôt qu'optimiser le score, et garder un humain dans la boucle pour ré-aligner."}],"sources":[{"title":"Hamel Husain — Creating a LLM-as-a-Judge That Drives Business Results","url":"https://hamel.dev/blog/posts/llm-judge/","type":"praticien"},{"title":"Hamel Husain & Shreya Shankar — LLM Evals: Everything You Need to Know (2026)","url":"https://hamel.dev/blog/posts/evals-faq/","type":"praticien"},{"title":"Eugene Yan — Evaluating the Effectiveness of LLM-Evaluators (aka LLM-as-Judge)","url":"https://eugeneyan.com/writing/llm-evaluators/","type":"praticien"},{"title":"What We've Learned From A Year of Building with LLMs (Applied LLMs)","url":"https://applied-llms.org/","type":"praticien"},{"title":"Liu et al. — Aligning with Human Judgement: The Role of Pairwise Preference in LLM Evaluators (COLM 2024)","url":"https://arxiv.org/abs/2403.16950","type":"académique"},{"title":"Ye et al. — Justice or Prejudice? Quantifying Biases in LLM-as-a-Judge (CALM)","url":"https://llm-judge-bias.github.io/","type":"académique"},{"title":"Self-Preference Bias in LLM-as-a-Judge","url":"https://arxiv.org/pdf/2410.21819","type":"académique"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Un LLM peut servir de juge <em>offline</em> pour évaluer des qualités subjectives (ton, clarté, complétude d&#39;une synthèse) à condition d&#39;être aligné sur un expert et mesuré rigoureusement — mais il ne doit jamais arbitrer la factualité, qui se vérifie de façon déterministe.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA produit des synthèses de migration (ex. React 18→19) dont une partie de la qualité — clarté, structure, caractère actionnable pour un dev senior — est <em>subjective</em> et ne se teste pas avec une simple assertion. Pour itérer sur les prompts de génération sans relire manuellement chaque sortie, on utilise un juge LLM en <strong>éval offline, hors chemin critique</strong>. En revanche, le cœur du différenciateur du projet — chaque affirmation cite et prouve sa source — repose sur une vérification <strong>déterministe</strong> (présence d&#39;URL, exactitude de version, validité du lien), jamais déléguée au juge.</p>\n<h2>Le principe</h2>\n<p>Un « LLM-as-a-judge » est un grand modèle de langage à qui l&#39;on demande d&#39;évaluer une sortie produite par un autre système (ou par lui-même), selon des critères décrits dans un prompt. Il remplace ou réduit le travail d&#39;annotation humaine pour des dimensions difficiles à mesurer par du code : pertinence, ton, cohérence, qualité rédactionnelle.</p>\n<p>Trois formats de verdict existent. Le <strong>scoring direct</strong> (note de 1 à 5 ou 1 à 10) est tentant mais piégeux : les annotateurs ne savent pas distinguer un « 3 » d&#39;un « 4 », les scores intermédiaires masquent l&#39;incertitude, et la magnitude n&#39;est ni calibrée ni comparable dans le temps (Hamel Husain ; Liu et al., COLM 2024). Le <strong>verdict binaire pass/fail</strong> force une décision nette, plus facile à aligner sur un expert et à auditer. Le <strong>pairwise</strong> (« A est-il meilleur que B ? », avec option d&#39;égalité) est le plus stable et le mieux aligné sur l&#39;humain pour les tâches subjectives, car comparer est plus facile que noter dans l&#39;absolu (Liu et al. ; Eugene Yan).</p>\n<p>Un juge n&#39;est utile que s&#39;il est <strong>aligné</strong> sur le jugement humain. Le processus de référence (Hamel Husain) : (1) un <em>expert principal unique</em> de domaine pose les pass/fail de référence et rédige des <strong>critiques</strong> détaillées de chaque cas ; (2) ces critiques sont réinjectées en few-shot dans le prompt du juge (« critique shadowing ») ; (3) on mesure l&#39;accord juge↔expert sur un jeu <em>held-out</em>, puis on fait de l&#39;error analysis et on recommence. L&#39;objectif réaliste est d&#39;atteindre <strong>&gt;90 % d&#39;accord</strong> en quelques itérations (exemple Honeycomb : trois itérations ; cas applied-llms : 68 %→94 %).</p>\n<p>Point crucial : le juge est fiable sur l&#39;<strong>ordinal/relatif</strong> (A&gt;B), peu fiable sur la <strong>magnitude</strong> (un 7,8/10 n&#39;est pas une distance interprétable). On ne suit donc jamais un delta de score absolu comme métrique produit (Eugene Yan).</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Éval offline « qualité de synthèse de migration React 18→19 » (juge binaire).</strong>\nOn sépare clairement les deux natures de vérification :</p>\n<pre><code class=\"language-python\"># (A) Factualité = DÉTERMINISTE, dans le chemin critique\ndef verifier_synthese(synthese):\n    assert toutes_les_citations_resolvent(synthese.citations)      # HTTP 200 + domaine officiel\n    assert re.search(r&quot;\\b18\\.\\d+\\b.*\\b19\\.\\d+\\b&quot;, synthese.texte)   # versions présentes\n    assert chaque_affirmation_a_une_source(synthese)               # schéma respecté\n    # -&gt; si KO : on rejette, on ne génère pas\n\n# (B) Qualité subjective = JUGE LLM, offline, asynchrone, hors gating\nPROMPT_JUGE = &quot;&quot;&quot;Tu évalues une synthèse de migration pour un dev senior.\nRaisonne d&#39;abord (clarté ? structure ? actionnable ?), PUIS conclus par PASS ou FAIL.\nLa longueur n&#39;est PAS un critère de qualité.&quot;&quot;&quot;\nverdict = juge_llm(PROMPT_JUGE, synthese, few_shot=critiques_expert_react)\n</code></pre>\n<p>On mesure le juge sur ~100 synthèses <em>held-out</em> avec <strong>TPR et TNR séparés</strong> (pas seulement le % d&#39;accord brut), et on reporte le <strong>Cohen&#39;s κ</strong> (Eugene Yan).</p>\n<p><strong>2. Régression de prompt en pairwise A/B.</strong>\nÀ chaque évolution du pipeline, on rejoue N changelogs réels (React 18.0→18.2, 18→19) et on demande au juge « ancien prompt vs nouveau ». Pour neutraliser le biais de position, <strong>chaque paire est jugée deux fois en inversant l&#39;ordre</strong> ; le gagnant n&#39;est attribué qu&#39;après swap, avec option « égalité » autorisée (Applied LLMs). Le swap peut renverser plus de 10 % des verdicts.</p>\n<p><strong>3. Test anti-biais d&#39;autorité (lié au différenciateur « confiance »).</strong>\nOn injecte dans une synthèse une fausse citation d&#39;apparence autoritaire (faux lien <code>react.dev</code>). On vérifie que le <strong>check déterministe la rejette</strong> — démontrant que la factualité ne dépend pas du juge (qui, lui, serait <em>hackable</em> par cette même fausse citation ; cf. CALM, GPT-4-Turbo retourné par biais d&#39;autorité).</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Ne jamais confier la factualité au juge.</strong> Les LLM ont un <strong>recall faible</strong> sur la détection d&#39;incohérences factuelles (≈30–60 % des résumés incohérents détectés, malgré &gt;95 % de précision sur les corrects) : ils ratent les défauts subtils (Eugene Yan). De plus, le biais d&#39;autorité les rend attaquables par de fausses citations (CALM).</li>\n<li><strong>L&#39;échelle de Likert traitée comme métrique continue</strong> : scores non calibrés, distribution décalée vs annotations humaines, inter-annotateurs incohérents. Préférer pass/fail ou pairwise (Hamel/Shankar).</li>\n<li><strong>Biais de position</strong> : juger A vs B une seule fois dans un ordre fixe est une erreur ; GPT-3.5 montre ~50 %, Claude-v1 ~70 % de préférence positionnelle (Eugene Yan). Toujours faire le swap.</li>\n<li><strong>Biais de verbosité</strong> : le juge préfère la réponse la plus longue <strong>&gt;90 % du temps</strong>, même sans info additionnelle (Eugene Yan). Égaliser les longueurs et l&#39;expliciter dans le prompt.</li>\n<li><strong>Biais de self-preference</strong> : faire générer <em>et</em> juger par le même modèle sur la même sortie gonfle le win-rate (<strong>+10 % GPT-4, +25 % Claude-v1</strong>, Eugene Yan). Lié à la perplexité : le juge favorise le « familier », à faible perplexité (Self-Preference Bias paper). Anonymiser les modèles ; éviter producteur=juge sur la même sortie. <em>Acceptable</em> si la tâche du juge diffère (évaluer ≠ générer).</li>\n<li><strong>% d&#39;accord trompeur</strong> : avec classes déséquilibrées (peu de « fail »), 80 % d&#39;accord peut cacher un κ=0,62 et un recall faible sur la classe rare (Eugene Yan). Toujours regarder le recall sur les défauts.</li>\n<li><strong>Pairwise ≠ panacée</strong> : coût quadratique (n² comparaisons), impraticable pour ranker beaucoup de candidats sans échantillonnage/aggregation (PairS ; Liu et al.). Et sur les tâches <em>objectives</em>, son avantage s&#39;évapore (cohérence factuelle : 0,47 pairwise vs 0,46 direct) — donc inutile pour la factualité du projet.</li>\n<li><strong>CoT à double tranchant</strong> : demander un raisonnement avant le verdict améliore la fiabilité et permet d&#39;auditer (Eugene Yan), mais peut aussi <em>rationaliser</em> un verdict biaisé (biais CoT, CALM) — d&#39;où l&#39;audit humain des critiques.</li>\n<li><strong>Évaluateurs fine-tunés</strong> : ce sont des classifieurs spécialisés ; forte corrélation entre eux mais chute catastrophique sur un autre schéma de notation. Ne pas les réutiliser hors cadre (Eugene Yan).</li>\n<li><strong>Pass-rate à 100 %</strong> : signe d&#39;un jeu de test trop facile, pas d&#39;un système parfait. Durcir le test plutôt qu&#39;optimiser le score (Hamel/Shankar).</li>\n<li><strong>Complexité prématurée</strong> : empiler des juges spécialisés avant d&#39;avoir fait le critique shadowing et l&#39;alignement de base avec l&#39;expert.</li>\n<li><strong>Prompt de juge pauvre</strong> : sans critiques, critiques trop laconiques, sans contexte externe, ou sans exemples diversifiés — les erreurs de prompt les plus fréquentes (Hamel).</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Le juge LLM est <strong>hors chemin critique</strong> (async, post-génération), pas en gating bloquant.</li>\n<li><input disabled=\"\" type=\"checkbox\"> La factualité (citations, versions, présence/validité des sources, code de migration) est vérifiée par <strong>assertions déterministes</strong>, pas par le juge.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le verdict est <strong>binaire pass/fail</strong> (ou <strong>pairwise</strong> si une notation relative est requise), jamais une échelle Likert traitée comme continue.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Un <strong>expert de domaine principal unique</strong> a posé les pass/fail de référence et rédigé des critiques.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les critiques expert sont réutilisées en <strong>few-shot</strong> dans le prompt du juge, avec exemples diversifiés.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le prompt demande le <strong>raisonnement (CoT) avant</strong> le verdict.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le prompt précise que <strong>la longueur n&#39;est pas un critère</strong> ; les réponses comparées sont de longueur égalisée.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les comparaisons pairwise sont <strong>jouées deux fois avec s
