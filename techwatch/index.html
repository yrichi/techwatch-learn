fait que des tags.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>per_page=100</code> et arrêt dès qu&#39;on retombe sur une version déjà vue.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Curseur persistant</strong> par techno : <code>{ lastTag, etag, releaseId }</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Comparaison via une <strong>bibliothèque SemVer 2.0.0</strong> (build metadata ignoré, pré-release &lt; release) ; parsing tolérant + log des tags non conformes.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Idempotence</strong> : dédup sur <code>release_id</code>/tag pour ne pas re-générer une synthèse.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Backpressure : respecter <code>x-ratelimit-reset</code> et <code>retry-after</code>, <strong>backoff exponentiel</strong> sur 5xx et rate limit secondaire.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>File séquentielle</strong> (1 worker), pas de fan-out parallèle massif.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Si webhooks ajoutés : garder le <strong>poll de réconciliation</strong> comme filet de sécurité.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. Pourquoi commencer par du polling et pas directement par des webhooks ?</strong>\nParce que le polling cron est l&#39;approche pragmatique et prouvablement fiable : c&#39;est le modèle de Dependabot/Renovate, qui interrogent les registres sur planning sans temps réel par défaut (<a href=\"https://docs.renovatebot.com/bot-comparison/\">Renovate Docs</a>). Les webhooks sont une optimisation : ils peuvent être manqués, donc ils ne suffisent pas seuls pour une promesse de fiabilité.</p>\n<p><strong>Q2. Qu&#39;est-ce qu&#39;une requête conditionnelle et pourquoi est-ce gratuit ?</strong>\nOn renvoie l&#39;ETag (ou la date) de la réponse précédente via <code>If-None-Match</code> (ou <code>If-Modified-Since</code>). Si rien n&#39;a changé, GitHub répond <code>304 Not Modified</code> sans corps, et ce <code>304</code> <strong>ne décompte pas</strong> du rate limit primaire quand on est authentifié (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/best-practices-for-using-the-rest-api\">GitHub best practices</a>). On ne paie donc que les vrais changements.</p>\n<p><strong>Q3. Quels sont les quotas exacts à connaître pour dimensionner le cron ?</strong>\n60 req/h en anonyme, 5 000 req/h avec un token, et une GitHub App va de 5 000 à 12 500 req/h par installation. Côté limites secondaires : 100 requêtes concurrentes max, 900 points/min en REST, 90 s de CPU par 60 s réelles (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api\">Rate limits</a>).</p>\n<p><strong>Q4. <code>/releases/latest</code> ou <code>List releases</code> : lequel poller ?</strong>\n<code>GET /releases/latest</code> renvoie la dernière release <strong>stable</strong> (non-prerelease, non-draft) — idéal pour le canal stable. Pour capter les RC/beta (ex. React 19 avant la GA), utiliser <code>List releases</code> puis filtrer <code>prerelease === true</code> côté client (<a href=\"https://docs.github.com/en/rest/releases/releases\">Releases API</a>).</p>\n<p><strong>Q5. Pourquoi ne pas comparer les versions comme des chaînes ?</strong>\nParce que l&#39;ordre lexicographique se trompe : <code>&#39;9.0.0&#39;</code> passe après <code>&#39;10.0.0&#39;</code> et <code>&#39;alpha10&#39;</code> avant <code>&#39;alpha2&#39;</code>. SemVer 2.0.0 compare les identifiants numériques numériquement, ignore le build metadata, et place la pré-release avant la release (<code>1.0.0-rc.1 &lt; 1.0.0</code>) (<a href=\"https://semver.org/\">SemVer 2.0.0</a>).</p>\n<p><strong>Q6. À quoi sert le curseur exactement ?</strong>\nC&#39;est l&#39;état persistant par techno qui matérialise « ce que j&#39;ai déjà vu » : typiquement <code>{ lastTag, etag, releaseId }</code>. On compare chaque réponse au curseur pour ne déclencher la synthèse que sur un <strong>vrai delta</strong>, puis on l&#39;avance — c&#39;est aussi ce qui garantit qu&#39;on ne re-traite pas une version connue.</p>\n<p><strong>Q7. Comment rendre la détection idempotente ?</strong>\nEn dédupliquant sur l&#39;identifiant de release (ou le tag) : un re-poll ou une livraison webhook dupliquée ne doit pas relancer une synthèse déjà produite. Sans cela, on paie deux fois le coût LLM et on génère du bruit utilisateur.</p>\n<p><strong>Q8. Que faire quand on touche le rate limit ?</strong>\nSi <code>x-ratelimit-remaining</code> vaut 0, attendre <code>x-ratelimit-reset</code> (epoch UTC) ; si l&#39;en-tête <code>retry-after</code> est présent (limite secondaire), respecter exactement ce délai et appliquer un backoff exponentiel. Ne jamais retenter en boucle serrée, ce qui est vu comme un abus (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/best-practices-for-using-the-rest-api\">GitHub best practices</a>).</p>\n<p><strong>Q9. ETag ou Last-Modified — y a-t-il un piège ?</strong>\nOui : un praticien Renovate/Dependabot a observé que l&#39;ETag GitHub peut changer alors que la ressource est identique (faux <code>200</code>), alors que <code>Last-Modified</code> reste stable. Dans ce cas <code>If-Modified-Since</code> économise mieux le quota (<a href=\"https://jamiemagee.co.uk/blog/making-the-most-of-github-rate-limits/\">Jamie Magee</a>). Attention aussi : l&#39;ETag est mis en cache par token, donc un renouvellement de token GitHub App provoque un cold start.</p>\n<p><strong>Q10. Comment intégrer proprement les webhooks plus tard ?</strong>\nAvec le pattern « webhook + poll de réconciliation » : le webhook <code>release.published</code> donne le temps réel et ne coûte pas de quota (<a href=\"https://docs.github.com/en/webhooks/webhook-events-and-payloads\">Webhook events</a>), mais un cron de réconciliation rejoue <code>List releases</code> depuis le curseur pour rattraper toute livraison manquée. Comme les webhooks ne garantissent pas la livraison, le polling reste le filet de sécurité.</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://docs.github.com/en/rest/using-the-rest-api/best-practices-for-using-the-rest-api\">Best practices for using the REST API — GitHub Docs</a> — <em>officielle</em> — recommande les requêtes conditionnelles (<code>If-None-Match</code>/<code>If-Modified-Since</code>), les requêtes sérielles, la gestion de <code>retry-after</code> / <code>x-ratelimit-remaining</code> / <code>x-ratelimit-reset</code>, et confirme que <code>304</code> ne décompte pas du rate limit primaire.</li>\n<li><a href=\"https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api\">Rate limits for the REST API — GitHub Docs</a> — <em>officielle</em> — chiffres exacts : 60 req/h anonyme, 5 000 req/h authentifié, GitHub App 5 000 → 12 500 req/h, limites secondaires (100 concurrentes, 900 points/min REST, 90 s CPU / 60 s réel).</li>\n<li><a href=\"https://semver.org/\">Semantic Versioning 2.0.0 — semver.org</a> — <em>officielle</em> — spécification SemVer : <code>MAJOR.MINOR.PATCH</code>, pré-releases, build metadata ignoré pour la précédence, règles de comparaison (numérique vs ASCII, pré-release &lt; release).</li>\n<li><a href=\"https://docs.github.com/en/rest/releases/releases\">Releases REST API — GitHub Docs</a> — <em>officielle</em> — endpoints <code>List releases</code> et <code>Get latest release</code> ; <code>/releases/latest</code> renvoie la release non-prerelease/non-draft triée par <code>created_at</code> ; les releases diffèrent des tags Git.</li>\n<li><a href=\"https://docs.github.com/en/webhooks/webhook-events-and-payloads\">Webhook events and payloads (release event) — GitHub Docs</a> — <em>officielle</em> — référence des événements webhook dont l&#39;événement <code>release</code> (actions <code>published</code>/<code>created</code>/<code>edited</code>), base de l&#39;optimisation temps réel ultérieure.</li>\n<li><a href=\"https://docs.renovatebot.com/bot-comparison/\">Bot comparison — Renovate Docs / Dependabot</a> — <em>officielle</em> — modèle de scheduling : un job planifié exécute Renovate régulièrement (polling des registres), sans détection temps réel par webhook par défaut.</li>\n<li><a href=\"https://jamiemagee.co.uk/blog/making-the-most-of-github-rate-limits/\">Making the most of GitHub rate limits — Jamie Magee</a> — <em>praticien</em> — retour terrain Dependabot/Renovate : <code>304</code> gratuit, budgets REST/GraphQL séparés, <code>per_page=100</code>, et caveat ETag instable → préférer <code>If-Modified-Since</code>.</li>\n</ol>\n"},{"num":13,"slug":"collecte-api-first-extraction","title":"Collecte API-first & extraction de contenu","tagline":"Toujours demander la version et ses notes à l'API officielle du registre (~80 % des cas), ne scraper qu'en dernier recours via Firecrawl, et convertir/nettoyer en Markdown sourcé avant le LLM — car « garbage in, garbage out » : la qualité de l'extraction borne la qualité de la synthèse.","quiz":[{"q":"Quelle est la stratégie de collecte recommandée par défaut pour détecter une nouvelle version ?","options":["Scraper directement la page de release du projet","Interroger l'API officielle du registre (GitHub, npm, PyPI, Maven) avant tout scraping","Demander à un LLM de parser le HTML de la page d'accueil","Surveiller manuellement les blogs d'annonce"],"answer":1,"explain":"L'approche API-first interroge l'API canonique du registre en premier : environ 80 % des versions y sont exposées sous forme de données structurées, datées et stables, sans la fragilité du scraping."},{"q":"Pour récupérer les release notes d'une release GitHub sans aller-retour vers le HTML, quel champ utilise-t-on ?","options":["Le champ `published_at`","Le champ `html_url` de la page","Le champ `body`, qui contient déjà les notes en Markdown","Le fichier `robots.txt` du dépôt"],"answer":2,"explain":"Le champ `body` d'une GitHub Release contient déjà les release notes en Markdown : on récupère ainsi la version et son contenu au même endroit, sans scraper la page correspondante."},{"q":"Quel est l'effet d'authentifier les appels à l'API GitHub avec un token ?","options":["Le quota passe d'environ 60 à 5 000 requêtes par heure","Le quota devient illimité","Cela supprime totalement le secondary rate limiting","Le quota passe d'environ 500 à 50 000 requêtes par heure"],"answer":0,"explain":"Un appel non authentifié plafonne vers ~60 req/h ; avec un token on monte à 5 000 req/h. Il faut tout de même gérer le secondary rate limiting avec un backoff et respecter `Retry-After` / `X-RateLimit-Reset`."},{"q":"Comment décider de façon déterministe qu'une version est « GA » et doit déclencher le workflow ?","options":["En vérifiant que `tag_name` commence par la lettre v","En comptant le nombre de commits depuis la release précédente","En lisant `tag_name` + `published_at` et en excluant `prerelease` et `draft`","En se fiant uniquement à `dist-tags.latest` de npm"],"answer":2,"explain":"Les identifiants structurés `tag_name`, `published_at`, `prerelease` et `draft` permettent de décider de façon déterministe si une version est GA ; on ignore drafts et pre-releases sauf demande explicite."},{"q":"Pourquoi le piège du champ `latest` impose-t-il de la prudence ?","options":["Parce que `latest` n'existe que sur npm et jamais sur GitHub","Parce que `latest` n'est pas toujours la plus haute version semver : npm peut pointer un patch d'une ancienne majeure, GitHub se base sur la date","Parce que `latest` inclut toujours les drafts et pre-releases","Parce que `latest` change de nom à chaque release"],"answer":1,"explain":"Sur npm, `dist-tags.latest` peut désigner un patch d'une ancienne majeure ; sur GitHub, `/releases/latest` se base sur la date et exclut drafts/prereleases, pas sur le semver. Il faut valider le semver soi-même quand l'ordre compte."},{"q":"Selon la RFC 9309, comment traiter une réponse 4xx et une réponse 5xx lors de la lecture de `robots.txt` ?","options":["4xx = tout interdit / 5xx = autorisé","4xx et 5xx = tout interdit dans les deux cas","4xx = autorisé / 5xx = tout interdit","4xx et 5xx = autorisé dans les deux cas"],"answer":2,"explain":"La RFC 9309 prévoit qu'un 4xx vaut « autorisé » (pas de restrictions trouvées) et un 5xx vaut « tout interdit », avec aussi cache ≤ 24 h, précédence most-octets et parsing d'au moins 500 KiB."},{"q":"Que montre l'étude SIGIR 2023 (Bevendorff et al.) à propos de l'extraction de contenu ?","options":["Un LLM qui parse le HTML est systématiquement plus précis que les heuristiques","Les extracteurs heuristiques (Readability médiane 0.970) sont plus robustes que les modèles neuronaux sur les pages complexes","Trafilatura et Readability donnent toujours des résultats identiques","La conversion en Markdown dégrade la qualité d'extraction"],"answer":1,"explain":"L'étude mesure une médiane de 0.970 pour Readability et montre que les heuristiques battent les modèles neuronaux en robustesse sur les pages les plus complexes, tout en étant déterministes et moins chères."}],"flashcards":[{"front":"API-first par défaut","back":"Interroger l'API canonique du registre (GitHub Releases, npm `dist-tags.latest`, PyPI `/pypi/<pkg>/json`, Maven `maven-metadata.xml`) avant tout scraping. Environ 80 % des versions y sont exposées en données structurées, datées et stables."},{"front":"Pourquoi convertir le HTML en Markdown avant le LLM ?","back":"Le Markdown réduit le coût en tokens d'environ 80 % (analyse Cloudflare : 16 180 tokens HTML vs 3 150 en Markdown) et améliore la « Markdown Awareness » des modèles : moins de bruit, moins de coût, moins d'hallucination."},{"front":"Extraction JSON schema-locked (Pydantic)","back":"Un schéma fixe (ex. `{breaking_change, avant, après, codemod}`) garantit des noms de champs stables et reproductibles d'un run à l'autre, contrairement au prompt libre — indispensable pour un workflow déterministe et évaluable."},{"front":"Readability et les SPA","back":"Sur une Single Page Application, Readability ne voit qu'un shell HTML vide (contenu injecté par JS) et « résume du vide ». Il faut détecter le contenu manquant et basculer vers un rendu navigateur réel (Firecrawl `wait_for`) qui hydrate le DOM."},{"front":"Vélocité ≠ volume","back":"La cause n°1 de ban IP est la vitesse des requêtes, pas leur volume total. Il faut sérialiser par domaine, espacer les requêtes (crawl-delay) et identifier clairement son product token / User-Agent."},{"front":"Provenance bout-en-bout","back":"Conserver `{url, fetched_at, cache_state}` pour chaque fragment. Extraire sans provenance casse le différenciateur « fiable et vérifiable » : impossible de faire citer ses sources à la synthèse."},{"front":"`body` vs `CHANGELOG.md`","back":"Le `body` d'une release est rédigé par un humain (qualité variable) ; certains projets mettent les vraies notes dans un `CHANGELOG.md` du dépôt. Il faut parfois croiser les deux sources."},{"front":"Détection d'extraction douteuse","back":"Faire tourner Readability.js ET Trafilatura sur la même page, comparer longueur et densité de liens du Markdown produit, puis flagguer tout désaccord > 20 % comme « extraction douteuse » à re-vérifier — une garde concrète contre le garbage in."}],"sources":[{"title":"GitHub REST API — Releases","url":"https://docs.github.com/en/rest/releases/releases","type":"doc-officielle"},{"title":"npm Registry API — REGISTRY-API.md","url":"https://github.com/npm/registry/blob/main/docs/REGISTRY-API.md","type":"doc-officielle"},{"title":"RFC 9309 — Robots Exclusion Protocol","url":"https://datatracker.ietf.org/doc/html/rfc9309","type":"rfc"},{"title":"An Empirical Comparison of Web Content Extraction Algorithms (Bevendorff et al., SIGIR 2023)","url":"https://chuniversiteit.nl/papers/comparison-of-web-content-extraction-algorithms","type":"académique"},{"title":"Mozilla Readability Algorithm (Readability.js) expliqué","url":"https://webcrawlerapi.com/blog/mozilla-readability-algorithm-readabilityjs","type":"praticien"},{"title":"Mastering Firecrawl's Scrape Endpoint","url":"https://www.firecrawl.dev/blog/mastering-firecrawl-scrape-endpoint","type":"doc-officielle"},{"title":"What We Learned from a Year of Building with LLMs","url":"https://applied-llms.org/","type":"praticien"},{"title":"How To Scrape A Website To Markdown For LLMs And AI Agents","url":"https://www.firecrawl.dev/blog/scrape-a-website-to-markdown","type":"praticien"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Toujours demander la version et ses notes à l&#39;API officielle du registre (~80 % des cas), ne scraper qu&#39;en dernier recours via Firecrawl, et convertir/nettoyer en Markdown sourcé avant le LLM — car « garbage in, garbage out » : la qualité de l&#39;extraction borne la qualité de la synthèse.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA vend de la <strong>confiance</strong> : chaque affirmation de la synthèse de migration doit citer une source vérifiable. Or une synthèse n&#39;est jamais meilleure que ses entrées. Comme environ 80 % des versions sont exposées par une API officielle (GitHub Releases, npm, PyPI, Maven Central), interroger ces API en premier donne des données structurées, datées et stables, sans la fragilité du scraping. Pour les 20 % restants (guides de migration en page HTML, blogs d&#39;annonce), un fallback scraping respectueux puis une extraction propre conditionnent directement la fiabilité du livrable.</p>\n<h2>Le principe</h2>\n<p><strong>API-first par défaut.</strong> Pour détecter une nouvelle version, on interroge l&#39;API canonique du registre avant tout scraping : <code>GET /repos/{owner}/{repo}/releases/latest</code> et <code>/tags/{tag}</code> sur GitHub, <code>GET /{package}</code> (champ <code>dist-tags.latest</code>) sur le registre npm, <code>pypi.org/pypi/&lt;pkg&gt;/json</code> sur PyPI, ou <code>maven-metadata.xml</code> sur Maven Central. Ces réponses sont des données structurées : on y lit des identifiants stables (<code>tag_name</code>, <code>published_at</code>, <code>prerelease</code>, <code>draft</code>) qui permettent de décider de façon déterministe si une version est « GA » et doit déclencher le workflow — en ignorant drafts et pre-releases sauf demande explicite.</p>\n<p><strong>Récupérer la version ET son contenu au même endroit.</strong> Quand l&#39;API le permet, on évite un aller-retour vers le HTML : le champ <code>body</code> d&#39;une GitHub Release contient déjà les release notes en Markdown. Pas besoin de scraper la page correspondante.</p>\n<p><strong>Authentifier pour ne pas se faire limiter.</strong> Un appel GitHub non authentifié plafonne vers ~60 requêtes/heure ; avec un token, on monte à 5 000 req/h. Il faut en plus gérer le <em>secondary rate limiting</em> avec un backoff exponentiel et respecter les en-têtes <code>Retry-After</code> / <code>X-RateLimit-Reset</code> (<a href=\"https://docs.github.com/en/rest/releases/releases\">GitHub REST API — Releases</a>).</p>\n<p><strong>Le scraping est un plan B.</strong> On ne scrape (via Firecrawl) que lorsqu&#39;aucune API n&#39;expose le contenu. Le fallback doit respecter la RFC 9309 : lire et mettre en cache <code>robots.txt</code> (24 h max), appliquer la précédence allow/disallow « most-octets », limiter le débit, et identifier clairement son User-Agent.</p>\n<p><strong>Nettoyer et convertir en Markdown.</strong> Pour le contenu d&#39;article, un extracteur heuristique déterministe (Readability.js, Trafilatura) isole le texte principal ; la conversion HTML→Markdown réduit le bruit et le coût en tokens d&#39;environ 80 % (<a href=\"https://www.firecrawl.dev/blog/scrape-a-website-to-markdown\">Firecrawl</a>). On conserve la provenance (URL, date de fetch, état du cache) pour que chaque fragment reste citable.</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Détection React 18→19, 100 % API-first.</strong></p>\n<pre><code class=\"language-python\">import httpx\n\n# Étape A — détecter la dernière version GA via npm (pas de scraping)\npkg = httpx.get(&quot;https://registry.npmjs.org/react&quot;).json()\nlatest = pkg[&quot;dist-tags&quot;][&quot;latest&quot;]          # ex. &quot;19.0.0&quot;\n\n# Étape B — récupérer les release notes (markdown) via GitHub Releases\nrel = httpx.get(\n    f&quot;https://api.github.com/repos/facebook/react/releases/tags/v{latest}&quot;,\n    headers={&quot;Authorization&quot;: f&quot;Bearer {GITHUB_TOKEN}&quot;},  # 60 -&gt; 5000 req/h\n).json()\n\nsource = {\n    &quot;version&quot;: rel[&quot;tag_name&quot;],\n    &quot;published_at&quot;: rel[&quot;published_at&quot;],\n    &quot;is_ga&quot;: not rel[&quot;prerelease&quot;] and not rel[&quot;draft&quot;],\n    &quot;body_markdown&quot;: rel[&quot;body&quot;],            # notes déjà en markdown\n    &quot;fetched_at&quot;: &quot;2026-06-23T10:00:00Z&quot;,\n    &quot;source_url&quot;: rel[&quot;html_url&quot;],\n}\n</code></pre>\n<p>Zéro scraping, provenance datée et citable.</p>\n<p><strong>2. Fallback Firecrawl sur le guide de migration.</strong> Le guide « Upgrading to React 19 » (react.dev) est une page rendue côté navigateur. On le scrape avec <code>only_main_content: true</code> (supprime nav, sidebars, bannières cookies, footers) et <code>wait_for</code> pour laisser le JS s&#39;hydrater, on obtient du Markdown LLM-ready, puis on <strong>extrait en JSON schema-locked</strong> (schéma Pydantic) les champs stables <code>{breaking_change, avant, après, codemod}</code> — reproductibles d&#39;un run à l&#39;autre (<a href=\"https://www.firecrawl.dev/blog/mastering-firecrawl-scrape-endpoint\">Firecrawl Scrape</a>).</p>\n<p><strong>3. Détection d&#39;extraction douteuse.</strong> Sur la même page de blog d&#39;annonce, faire tourner Readability.js <em>et</em> Trafilatura, comparer la longueur et la densité de liens du Markdown produit, et flagguer tout désaccord &gt; 20 % comme « extraction douteuse » à re-vérifier — une garde concrète contre le <em>garbage in</em>.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong><code>latest</code> n&#39;est pas universel.</strong> Sur npm, <code>dist-tags.latest</code> peut pointer un patch d&#39;une ancienne majeure, pas la plus haute version semver ; sur GitHub, <code>/releases/latest</code> se base sur la date (et exclut drafts/prereleases), pas sur le semver. Ne pas confondre « latest » et « plus récent en semver ».</li>\n<li><strong><code>body</code> vs <code>CHANGELOG.md</code>.</strong> Le <code>body</code> d&#39;une release est rédigé par un humain (qualité variable) ; certains projets mettent les vraies notes dans un <code>CHANGELOG.md</code> du repo. Il faut parfois croiser les deux.</li>\n<li><strong>Ne pas scraper ce qu&#39;une API expose</strong> : DOM fragile, plus lent, soumis inutilement à <code>robots.txt</code> et aux anti-bots.</li>\n<li><strong>Ne pas envoyer de HTML brut au LLM</strong> : coût en tokens ~5x, signal dilué par la navigation/pubs, hallucination accrue. Nettoyer puis convertir en Markdown d&#39;abord.</li>\n<li><strong>Vélocité ≠ volume.</strong> La cause n°1 de ban IP est la vitesse, pas le volume : sérialiser par domaine, espacer les requêtes (crawl-delay), identifier son product token.</li>\n<li><strong>Readability échoue sur les SPA</strong> : on récupère un shell HTML vide et on « résume du vide ». Détecter le contenu manquant et basculer en rendu navigateur réel (<code>wait_for</code>). La garde <code>isProbablyReaderable()</code> évite aussi de tourner sur pages d&#39;accueil/listes/login (<a href=\"https://webcrawlerapi.com/blog/mozilla-readability-algorithm-readabilityjs\">Readability.js</a>).</li>\n<li><strong>Ne pas remplacer l&#39;heuristique par « un LLM qui parse le HTML »</strong> : l&#39;étude SIGIR 2023 montre que sur les pages les plus complexes, les heuristiques (Readability médiane 0.970) sont <em>plus</em> robustes — en plus d&#39;être déterministes et moins chères (<a href=\"https://chuniversiteit.nl/papers/comparison-of-web-content-extraction-algorithms\">Bevendorff et al.</a>).</li>\n<li><strong><code>robots.txt</code> n&#39;est pas un mur d&#39;accès</strong> : il régule les crawlers, pas l&#39;accès humain ni les API publiques documentées (qui restent soumises aux Terms of Service et au rate limiting).</li>\n<li><strong>Le Markdown pivot perd parfois de l&#39;information</strong> : tableaux complexes, code multi-langage, callouts et notes de bas de page se dégradent. Vérifier que les <em>breaking changes</em> en tableau survivent à la conversion.</li>\n<li><strong>Le prompt libre produit des noms de champs instables</strong> entre runs : pour un workflow déterministe et évaluable, le schéma fixe est quasi obligatoire.</li>\n<li><strong>Caching à double tranchant</strong> : un <code>max_age</code> trop long peut masquer une version fraîchement publiée. TTL court sur la détection, long sur l&#39;extraction de contenu historique.</li>\n<li><strong>Extraire sans provenance</strong> (URL + date + ancre) casse le différenciateur « fiable et vérifiable » : impossible de faire citer ses sources à la synthèse.</li>\n<li><strong>Traiter une extraction bruitée comme valide</strong> : si footers/related-articles ont fui dans le texte, la synthèse sera plausible mais fausse, sans signal d&#39;alerte. La baseline d&#39;hallucination reste de 5–10 % même en simple résumé (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Interroger l&#39;API officielle du registre <strong>avant</strong> tout scraping (GitHub / npm / PyPI / Maven).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Lire le contenu source au même endroit que la version (<code>body</code> de la release) quand c&#39;est possible.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Décider GA via <code>tag_name</code> + <code>published_at</code> + <code>prerelease</code>/<code>draft</code> ; ignorer drafts et pre-releases par défaut.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Authentifier les appels GitHub (token) et gérer backoff + <code>Retry-After</code> / <code>X-RateLimit-Reset</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> N&#39;activer le scraping qu&#39;en fallback documenté, quand aucune API n&#39;expose le contenu.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Côté fallback : lire/cacher <code>robots.txt</code> (≤ 24 h), respecter allow/disallow (most-octets), 4xx = autorisé / 5xx = tout interdit, parsing ≥ 500 KiB.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Limiter le débit : sérialiser par domaine, crawl-delay, User-Agent/product token explicite.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Extraire le contenu d&#39;article avec un extracteur heuristique (Readability.js / Trafilatura).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Convertir systématiquement en Markdown (format pivot) avec <code>only_main_content</code> / reader-mode.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Utiliser une extraction JSON schema-locked (Pydantic) pour les champs stables.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Détecter les SPA non hydratées et basculer en rendu navigateur (<code>wait_for</code>).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Stocker la provenance bout-en-bout : <code>{url, fetched_at, cache_state}</code> par fragment.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Flagguer ou rejeter une source mal extraite plutôt que de la résumer.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Mettre en cache (ETag/<code>If-None-Match</code> côté API, <code>max_age</code> côté Firecrawl) avec un TTL adapté à l&#39;étape.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. Pourquoi privilégier l&#39;API plutôt que de scraper la page de release ?</strong>\nParce que l&#39;API renvoie des données structurées, stables et datées (<code>tag_name</code>, <code>published_at</code>, <code>body</code>), alors que le HTML peut changer à tout moment et tombe sous <code>robots.txt</code> et les anti-bots. Scraper ce qu&#39;une API expose est plus fragile, plus lent et inutilement risqué (<a href=\"https://docs.github.com/en/rest/releases/releases\">GitHub REST API</a>).</p>\n<p><strong>Q2. Comment détecter qu&#39;une nouvelle version est sortie sans scraper ?</strong>\nOn interroge l&#39;API du registre : <code>dist-tags.latest</code> sur npm, <code>pypi.org/pypi/&lt;pkg&gt;/json</code> sur PyPI, <code>/releases/latest</code> ou <code>/tags/{tag}</code> sur GitHub. On compare au dernier état connu et on déclenche le workflow si la version a changé (<a href=\"https://github.com/npm/registry/blob/main/docs/REGISTRY-API.md\">npm Registry API</a>).</p>\n<p><strong>Q3. Faut-il scraper la page de release pour avoir les notes ?</strong>\nNon, dans la plupart des cas : le champ <code>body</code> d&#39;une GitHub Release contient déjà les release notes en Markdown. On récupère version et contenu au même endroit, sans aller-retour HTML (<a href=\"https://docs.github.com/en/rest/releases/releases\">GitHub REST API</a>).</p>\n<p><strong>Q4. Pourquoi authentifier les appels GitHub ?</strong>\nSans token, on plafonne à ~60 requêtes/heure ; avec un token, on passe à 5 000 req/h. Cela évite de se faire limiter en pleine exécution du workflow. Il faut aussi gérer le <em>secondary rate limiting</em> avec un backoff et respecter <code>Retry-After</code> (<a href=\"https://docs.github.com/en/rest/releases/releases\">GitHub REST API</a>).</p>\n<p><strong>Q5. Attention au piège de <code>latest</code> : que faut-il savoir ?</strong>\n<code>latest</code> n&#39;est pas toujours la plus haute version semver. Sur npm, <code>dist-tags.latest</code> peut désigner un patch d&#39;une ancienne majeure ; sur GitHub, <code>/releases/latest</code> se base sur la date, pas le semver. Il faut valider le semver soi-même quand l&#39;ordre compte (<a href=\"https://github.com/npm/registry/blob/main/docs/REGISTRY-API.md\">npm Registry API</a>).</p>\n<p><strong>Q6. Quelles règles respecter quand on tombe en fallback scraping ?</strong>\nLa RFC 9309 : mettre <code>robots.txt</code> en cache (≤ 24 h), appliquer la précédence allow/disallow par le match « le plus d&#39;octets », traiter un 4xx comme « autorisé » et un 5xx comme « tout interdit », et parser au moins 500 KiB. Le matching du product token est insensible à la casse (<a href=\"https://datatracker.ietf.org/doc/html/rfc9309\">RFC 9309</a>).</p>\n<p><strong>Q7. Pourquoi convertir le HTML en Markdown avant le LLM ?</strong>\nParce que le Markdown réduit le coût en tokens d&#39;environ 80 % (analyse Cloudflare : 16 180 tokens HTML vs 3 150 en Markdown) et que les modèles ont une meilleure « Markdown Awareness ». Moins de bruit, moins de coût, moins d&#39;hallucination (<a href=\"https://www.firecrawl.dev/blog/scrape-a-website-to-markdown\">Firecrawl</a>).</p>\n<p><strong>Q8. Quel extracteur choisir pour le texte d&#39;un article ?</strong>\nUn extracteur heuristique déterministe (Readability.js, Trafilatura) plutôt qu&#39;un gros modèle neuronal : l&#39;étude SIGIR 2023 mesure une médiane de 0.970 pour Readability et montre que les heuristiques sont plus robustes sur les pages complexes (<a href=\"https://chuniversiteit.nl/papers/comparison-of-web-content-extraction-algorithms\">Bevendorff et al.</a>).</p>\n<p><strong>Q9. Que faire quand Readability renvoie une page presque vide ?</strong>\nC&#39;est typiquement une SPA dont le contenu est injecté par JavaScript : Readability ne voit qu&#39;un shell vide. Il faut détecter ce contenu manquant et basculer vers un rendu navigateur réel (Firecrawl <code>wait_for</code>) qui hydrate le DOM avant extraction (<a href=\"https://webcrawlerapi.com/blog/mozilla-readability-algorithm-readabilityjs\">Readability.js</a>).</p>\n<p><strong>Q10. Pourquoi préférer une extraction schema-locked et conserver la provenance ?</strong>\nLe prompt libre produit des noms de champs instables d&#39;un run à l&#39;autre, ce qui casse un workflow déterministe et évaluable ; un schéma Pydantic fixe les champs (version, date, breaking changes). Conserver <code>{url, fetched_at, cache_state}</code> permet à chaque affirmation de citer sa source — c&#39;est ce qui rend la synthèse vérifiable, puisque la baseline d&#39;hallucination reste de 5–10 % (<a href=\"https://applied-llms.org/\">applied-llms.org</a> ; <a href=\"https://www.firecrawl.dev/blog/mastering-firecrawl-scrape-endpoint\">Firecrawl Scrape</a>).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://docs.github.com/en/rest/releases/releases\">GitHub REST API — Releases</a> — <em>doc-officielle</em> — endpoints list/latest/by-tag, champs structurés (<code>tag_name</code>, <code>body</code>, <code>published_at</code>, <code>prerelease</code>, <code>draft</code>), rate limiting et secondary rate limiting.</li>\n<li><a href=\"https://github.com/npm/registry/blob/main/docs/REGISTRY-API.md\">npm Registry API — REGISTRY-API.md</a> — <em>doc-officielle</em> — packument (<code>GET /{package}</code>), métadonnée par version, <code>dist-tags</code> ; modèle de référence pour la dernière version d&#39;un paquet.</li>\n<li><a href=\"https://datatracker.ietf.org/doc/html/rfc9309\">RFC 9309 — Robots Exclusion Protocol</a> — <em>rfc</em> — règles formelles du crawler : cache 24 h, précédence most-octets, 4xx autorisé / 5xx interdit, parsing ≥ 500 KiB, matching case-insensitive du product token.</li>\n<li><a href=\"https://chuniversiteit.nl/papers/comparison-of-web-content-extraction-algorithms\">An Empirical Comparison of Web Content Extraction Algorithms (Bevendorff et al., SIGIR 2023)</a> — <em>académique</em> — les extracteurs heuristiques (Readability médiane 0.970, Trafilatura, Goose3) battent les modèles neuronaux en robustesse sur les pages complexes.</li>\n<li><a href=\"https://webcrawlerapi.com/blog/mozilla-readability-algorithm-readabilityjs\">Mozilla Readability Algorithm (Readability.js) expliqué</a> — <em>praticien</em> — heuristiques de Readability.js, garde <code>isProbablyReaderable()</code>, et cas d&#39;échec (JS non rendu, listes, DOM cassé).</li>\n<li><a href=\"https://www.firecrawl.dev/blog/mastering-firecrawl-scrape-endpoint\">Mastering Firecrawl&#39;s Scrape Endpoint</a> — <em>doc-officielle</em> — fallback à rendu navigateur, <code>only_main_content</code>, sortie Markdown LLM-ready, extraction JSON schema-locked (Pydantic), <code>wait_for</code>, caching <code>max_age</code>.</li>\n<li><a href=\"https://applied-llms.org/\">What We Learned from a Year of Building with LLMs</a> — <em>praticien</em> — principe « garbage in, garbage out » et nécessité d&#39;identifier les sources en sortie pour permettre la vérification.</li>\n<li><a href=\"https://www.firecrawl.dev/blog/scrape-a-website-to-markdown\">How To Scrape A Website To Markdown For LLMs And AI Agents</a> — <em>praticien</em> — gain de la conversion HTML→Markdown : 16 180 tokens HTML vs 3 150 en Markdown (−80 %, analyse Cloudflare), benchmark MDEval / « Markdown Awareness ».</li>\n</ol>\n"},{"num":14,"slug":"ssrf-allowlist-crawler","title":"Sécurité du crawler : SSRF & allowlist","tagline":"Pour que TechWatch IA reste fiable et vérifiable, son crawler ne doit jamais aller chercher une URL arbitraire : on n'autorise qu'une liste finie de domaines officiels (allowlist), on épingle l'IP résolue à la connexion (DNS pinning) et on coupe les redirections — sinon une attaque SSRF peut transformer le crawler en relais vers le réseau interne ou l'endpoint de métadonnées cloud 169.254.169.254.","quiz":[{"q":"Que signifie SSRF et en quoi consiste cette attaque ?","options":["Server-Side Request Forgery : on manipule une application pour qu'elle émette une requête réseau vers une destination non prévue, souvent interne","Secure Source Resolution Framework : un protocole de chiffrement des requêtes sortantes du serveur","Server-Side Rendering Failure : un crash du serveur lors du rendu d'une page web","Static Source Reference Format : un format de catalogue de sources versionné"],"answer":0,"explain":"Le SSRF (Server-Side Request Forgery) consiste à manipuler le serveur pour qu'il émette une requête vers une destination non prévue, souvent interne ; c'est la catégorie A10 du OWASP Top 10 2021."},{"q":"Pourquoi TechWatch IA privilégie-t-il une allowlist plutôt qu'une blocklist ?","options":["Parce qu'une allowlist est plus rapide à exécuter qu'une blocklist au runtime","Parce qu'une blocklist est contournable (encodage, IPv6, rebinding DNS) et que le projet ne consomme que des sources officielles connues d'avance","Parce qu'OWASP interdit formellement l'usage de toute blocklist dans une application web","Parce qu'une blocklist ne peut pas être versionnée en git contrairement à une allowlist"],"answer":1,"explain":"OWASP écrit « Deny-lists are bypass-prone. Prefer allow-lists. » : une blocklist se contourne par encodage, IPv6 ou rebinding, alors que des sources officielles connues d'avance sont le cas idéal pour une allowlist statique versionnée."},{"q":"Comment le crawler doit-il recevoir sa cible depuis le pipeline piloté par LLM ?","options":["Sous forme d'URL complète, que le crawler valide ensuite avec une regex stricte","Sous forme d'URL relative, complétée côté serveur par le domaine de base","Sous forme de clé de source (ex. « react »), l'URL étant reconstruite côté serveur depuis un catalogue autorisé","Sous forme d'URL signée cryptographiquement par le LLM pour en garantir l'origine"],"answer":2,"explain":"Le crawler ne doit jamais accepter d'URL brute issue du LLM : il reçoit une clé de source (ex. « react ») et reconstruit l'URL côté serveur depuis un catalogue, ce qui rend impossible l'injection d'un host arbitraire."},{"q":"Pourquoi la vérification host.endsWith(\".github.com\") est-elle dangereuse ?","options":["Parce qu'elle est trop lente sur de longues listes de domaines","Parce qu'elle laisse passer un host comme github.com.attacker.com","Parce qu'elle rejette à tort les sous-domaines légitimes de github.com","Parce qu'elle ne gère pas les domaines en HTTPS"],"answer":1,"explain":"endsWith(\".github.com\") laisse passer github.com.attacker.com et des sous-domaines non maîtrisés ; il faut une égalité stricte sur un ensemble fini de hosts canoniques."},{"q":"Qu'est-ce que le DNS rebinding et pourquoi la seule validation d'URL ne l'arrête pas ?","options":["Un attaquant change le nom de domaine après la requête, ce qui fausse le certificat TLS","On valide l'IP d'un hostname, puis la lib HTTP re-résout le hostname et obtient cette fois une IP interne comme 169.254.169.254 (TOCTOU)","Le DNS renvoie volontairement une erreur pour forcer le crawler à réessayer sans validation","Le résolveur DNS interne expose par erreur les noms d'infrastructure au crawler"],"answer":1,"explain":"C'est un TOCTOU : on valide l'IP, puis la lib HTTP re-résout le hostname et obtient 169.254.169.254. Toute défense qui résout, vérifie, puis redonne le hostname à la lib HTTP pour qu'elle re-résolve est vulnérable au rebinding."},{"q":"En quoi consiste le DNS pinning qui corrige ce TOCTOU ?","options":["Mettre en cache l'IP pendant 24h pour éviter de re-résoudre le hostname trop souvent","Forcer un TTL long sur le résolveur DNS afin que l'IP ne change pas pendant la requête","Résoudre une fois, valider toutes les IP renvoyées, puis se connecter directement à l'IP validée en conservant le hostname dans l'en-tête Host et le SNI","Interdire toute résolution DNS et n'accepter que des adresses IP en entrée"],"answer":2,"explain":"Le DNS pinning corrige à la couche connexion : on résout une fois, on valide toutes les IP, puis on se connecte directement à l'IP validée tout en gardant le hostname dans l'en-tête Host et le SNI (certificat OK)."},{"q":"Pourquoi un seul module secureFetch obligatoire (point de contrôle unique) est-il nécessaire ?","options":["Pour mutualiser le cache des requêtes HTTP et réduire la latence du crawler","Parce qu'un module qui importe directement node-fetch/axios/undici contourne le wrapper sécurisé (anti-pattern de l'advisory Flowise)","Parce qu'OWASP impose un fichier unique pour toute la logique réseau d'une application","Pour permettre de désactiver toute la sécurité d'un seul endroit en cas d'incident"],"answer":1,"explain":"Si un module importe directement node-fetch/axios/undici, il contourne le wrapper sécurisé (anti-pattern de l'advisory Flowise) ; un point de contrôle unique et auditable s'impose par règle de lint et revue."}],"flashcards":[{"front":"Classement OWASP du SSRF","back":"Le SSRF est la catégorie A10 du OWASP Top 10 (2021) : l'application est manipulée pour émettre une requête vers une ressource non prévue, en contournant les contrôles réseau."},{"front":"Endpoint de métadonnées cloud à bloquer","back":"169.254.169.254 (IMDS), mais aussi metadata.google.internal et l'IPv6 fd00:ec2::254. Un SSRF qui l'atteint peut voler des credentials cloud."},{"front":"Validation du schéma d'URL","back":"Autoriser uniquement https sur ports 80/443. Rejeter file://, gopher://, ftp://, data:// qui peuvent servir à exfiltrer ou atteindre des services internes."},{"front":"Plages d'IP à refuser après résolution","back":"Loopback 127.0.0.0/8 et ::1, RFC1918 (10/8, 172.16/12, 192.168/16), link-local 169.254.0.0/16 et fe80::/10, CGNAT 100.64.0.0/10, multicast 224.0.0.0/4, ULA fc00::/7, et les IPv4-mapped en IPv6."},{"front":"Pourquoi désactiver les redirections (3xx) ?","back":"Une réponse 3xx vers 169.254.169.254 ou un host interne contourne toute la validation initiale, même si l'URL de départ était saine. On coupe les redirections, ou on re-valide host ET IP à chaque saut."},{"front":"Composants d'URL piégés à rejeter","back":"Le userinfo (user@host), les fragments, les doubles encodages ; et normaliser l'URL avant toute comparaison de host ou de plage d'IP."},{"front":"Formats d'IP alternatifs à normaliser","back":"Décimal (2130706433), octal, hex (0x7f.1), IPv4-mapped (::ffff:169.254.169.254). Il faut normaliser AVANT toute comparaison de plages, sinon le filtre est contourné."},{"front":"Défense en profondeur réseau (egress)","back":"La validation applicative ne suffit pas : il faut un egress deny-by-default sur les workers (Security Group / NetworkPolicy / proxy) couvrant IPv4 ET IPv6, plus IMDSv2 forcé et hop limit 1 sur AWS."}],"sources":[{"title":"OWASP — Server Side Request Forgery Prevention Cheat Sheet","url":"https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html","type":"doc-officielle"},{"title":"OWASP Top 10 (2021) — A10 Server-Side Request Forgery (SSRF)","url":"https://owasp.org/Top10/2021/A10_2021-Server-Side_Request_Forgery_(SSRF)/","type":"doc-officielle"},{"title":"DNS Rebinding Attacks Against SSRF Protections — Behrad Taher","url":"https://behradtaher.dev/DNS-Rebinding-Attacks-Against-SSRF-Protections/","type":"praticien"},{"title":"Securing Identity APIs Against SSRF — Stytch","url":"https://stytch.com/blog/securing-identity-apis-against-ssrf/","type":"praticien"},{"title":"Craft CMS — Cloud Metadata SSRF Protection Bypass via DNS Rebinding (GHSA)","url":"https://github.com/craftcms/cms/security/advisories/GHSA-gp2f-7wcm-5fhx","type":"advisory"},{"title":"Flowise — SSRF Protection Bypass via Direct node-fetch/axios Usage (GHSA)","url":"https://github.com/FlowiseAI/Flowise/security/advisories/GHSA-qqvm-66q4-vf5c","type":"advisory"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Pour que TechWatch IA reste <em>fiable et vérifiable</em>, son crawler ne doit jamais aller chercher une URL arbitraire : on n&#39;autorise qu&#39;une liste finie de domaines officiels (allowlist), on épingle l&#39;IP résolue à la connexion (DNS pinning) et on coupe les redirections — sinon une attaque SSRF peut transformer le crawler en relais vers le réseau interne ou l&#39;endpoint de métadonnées cloud <code>169.254.169.254</code>.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>Le différenciateur du projet, c&#39;est la <strong>confiance</strong> : chaque affirmation d&#39;une synthèse de migration (React 18→19, etc.) cite sa source. Or le crawler reçoit ses cibles d&#39;un pipeline piloté par LLM, et un LLM peut produire une URL inattendue, empoisonnée ou injectée. Si le crawler suit aveuglément cette URL, il devient un vecteur de <strong>SSRF (Server-Side Request Forgery)</strong> : le serveur émet une requête vers une destination contrôlée par l&#39;attaquant, potentiellement interne. Comme TechWatch IA ne consomme que des <strong>sources officielles connues d&#39;avance</strong>, il est le cas idéal pour une <strong>allowlist statique versionnée</strong> — un contrôle central qui borne le risque tout en garantissant que les sources citées sont bien celles qu&#39;on prétend.</p>\n<h2>Le principe</h2>\n<p>Le SSRF est classé <strong>A10 du OWASP Top 10 (2021)</strong> : l&#39;application est manipulée pour émettre une requête vers une ressource non prévue, en contournant les contrôles réseau. La parade la plus robuste pour un consommateur de sources connues est l&#39;<strong>allowlist</strong>, pas la <strong>blocklist</strong>. OWASP est explicite : <em>« Deny-lists are bypass-prone. Prefer allow-lists. »</em> Une blocklist (« interdire telle IP, tel domaine ») se contourne par encodage, IPv6-mapped ou rebinding DNS ; elle n&#39;est réservée qu&#39;aux cas où la destination est dynamique et inconnue (webhooks utilisateur), ce qui n&#39;est pas notre cas.</p>\n<p>Concrètement, le crawler ne doit <strong>jamais accepter d&#39;URL brute</strong> issue du LLM ou de l&#39;utilisateur. Il reçoit une <strong>clé de source</strong> (ex. <code>&quot;react&quot;</code>) et <strong>reconstruit</strong> l&#39;URL côté serveur depuis un catalogue de sources autorisées. La validation s&#39;enchaîne ensuite : (1) <strong>schéma</strong> — <code>https</code> uniquement, ports 80/443, on rejette <code>file://</code>, <code>gopher://</code>, <code>ftp://</code>, <code>data://</code> ; (2) <strong>host</strong> — comparaison d&#39;<strong>égalité stricte</strong> contre un ensemble fini de domaines canoniques, jamais un <code>endsWith(&quot;.github.com&quot;)</code> naïf qui laisserait passer <code>react.dev.evil.com</code> ; (3) <strong>composants piégés</strong> — rejet du <code>userinfo</code> (<code>user@host</code>), des fragments, des doubles encodages, normalisation avant comparaison.</p>\n<p>Mais valider l&#39;URL ne suffit <strong>jamais seul</strong>. Le piège classique est le <strong>TOCTOU</strong> (time-of-check / time-of-use) : on valide l&#39;IP du host, puis on redonne le <em>hostname</em> à la lib HTTP, qui le <strong>re-résout</strong> — et un serveur DNS malveillant (TTL=0) renvoie alors <code>169.254.169.254</code>. La correction se situe à la <strong>couche connexion</strong> : <strong>DNS pinning</strong>. On résout une fois, on valide <strong>toutes</strong> les IP renvoyées contre les plages interdites (loopback <code>127.0.0.0/8</code>, <code>::1</code> ; RFC1918 <code>10/8</code>, <code>172.16/12</code>, <code>192.168/16</code> ; link-local <code>169.254.0.0/16</code> et <code>fe80::/10</code> ; métadonnées cloud <code>169.254.169.254</code>, <code>metadata.google.internal</code>), puis on <strong>se connecte directement à l&#39;IP validée</strong> (en gardant le hostname dans l&#39;en-tête <code>Host</code> et le SNI). On <strong>désactive les redirections</strong> : un <code>3xx</code> vers <code>169.254.169.254</code> casserait sinon toute la validation amont. Enfin, tout passe par <strong>un seul module <code>secureFetch</code></strong> obligatoire — un point de contrôle unique et auditable.</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Catalogue d&#39;allowlist versionné (le crawler ne voit jamais d&#39;URL libre)</strong></p>\n<pre><code class=\"language-ts\">// sources.config.ts — versionné en git, revu en PR\nexport const SOURCES = {\n  react: {\n    hosts: [&quot;react.dev&quot;, &quot;raw.githubusercontent.com&quot;],\n    // chemins précis : pas tout github.com, pas les gists arbitraires\n    pathPrefixes: [&quot;/blog/&quot;, &quot;/facebook/react/&quot;],\n  },\n} as const;\n\n// Le pipeline LLM fournit la CLÉ &quot;react&quot;, jamais une URL.\nfunction buildReleaseUrl(key: &quot;react&quot;): string {\n  // URL reconstruite côté serveur → impossible d&#39;injecter un host arbitraire\n  return &quot;https://react.dev/blog/2024/04/25/react-19&quot;;\n}\n</code></pre>\n<p><strong>2. <code>secureFetch</code> avec DNS pinning (Node / undici)</strong></p>\n<pre><code class=\"language-ts\">import { lookup } from &quot;node:dns/promises&quot;;\nimport { request } from &quot;undici&quot;;\n\nasync function secureFetch(url: string) {\n  const u = new URL(url);\n  if (u.protocol !== &quot;https:&quot;) throw new Error(&quot;schéma interdit&quot;);\n  if (u.username || u.password) throw new Error(&quot;userinfo interdit&quot;);\n  if (!ALLOWED_HOSTS.has(u.hostname)) throw new Error(&quot;host hors allowlist&quot;); // égalité stricte\n\n  // Résoudre UNE fois, valider TOUTES les IP, puis épingler.\n  const records = await lookup(u.hostname, { all: true });\n  for (const { address } of records) {\n    if (isBlockedIp(address)) throw new Error(`IP interne refusée: ${address}`); // 127/8, RFC1918, 169.254/16, ::1, fc00::/7, IPv4-mapped...\n  }\n  const pinnedIp = records[0].address;\n\n  return request(`https://${pinnedIp}${u.pathname}`, {\n    headers: { host: u.hostname }, // Host conservé → SNI/cert OK\n    maxRedirections: 0,            // redirections coupées\n    bodyTimeout: 5_000, headersTimeout: 5_000,\n    // + borner taille de réponse et content-type attendu (text/html, application/json)\n  });\n}\n// Règle ESLint : interdire l&#39;import direct de fetch/axios/undici ailleurs.\n</code></pre>\n<p><strong>3. Test d&#39;éval de sécurité dédié</strong> — un faux serveur de rebinding renvoie d&#39;abord une IP publique (validation OK) puis <code>169.254.169.254</code>. Le test prouve qu&#39;<strong>aucune note de migration React n&#39;est jamais générée</strong> à partir d&#39;une réponse provenant de l&#39;IMDS : le fetch doit échouer <strong>au pinning</strong>, pas après avoir lu le corps.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Valider l&#39;URL/IP ne suffit jamais seul.</strong> Sans DNS pinning ni egress restreint, le rebinding DNS contourne tout : <em>« any defense that resolves a hostname, checks the result, and then hands the hostname back to an HTTP library to resolve again is vulnerable to rebinding »</em> (Behrad Taher). Le fix est à la <strong>connexion</strong>, pas au parsing.</li>\n<li><strong><code>endsWith(&quot;.github.com&quot;)</code> est insuffisant</strong> : <code>github.com.attacker.com</code> passe. Préférer l&#39;<strong>égalité stricte</strong> sur un ensemble fini de hosts canoniques.</li>\n<li><strong>Allowlist trop large = retour au risque.</strong> Autoriser <code>github.com</code> entier ouvre gists et contenus arbitraires. Cibler des sous-domaines/chemins précis (<code>raw.githubusercontent.com/facebook/react</code>, <code>react.dev/blog/</code>).</li>\n<li><strong>TOCTOU (advisory Craft CMS)</strong> : valider puis laisser la lib re-résoudre le hostname est exactement le pattern exploité par le rebinding.</li>\n<li><strong>Suivre les redirections automatiquement</strong> sans re-validation : un <code>3xx</code> vers un host interne ou <code>169.254.169.254</code> casse toute la validation. Couper, ou re-valider host + IP à <strong>chaque</strong> saut. Attention aux redirections inter-protocoles (<code>https→http</code>).</li>\n<li><strong>Sécurité non centralisée (advisory Flowise)</strong> : un module qui importe directement <code>node-fetch</code>/<code>axios</code>/<code>undici</code> contourne le wrapper. L&#39;enforcement doit être <strong>unique et obligatoire</strong> (lint + revue).</li>\n<li><strong>Métadonnées cloud incomplètes</strong> : ne bloquer que <code>169.254.169.254</code> mais oublier <code>metadata.google.internal</code>, l&#39;IPv6 <code>fd00:ec2::254</code>, le CGNAT <code>100.64.0.0/10</code> et l&#39;ULA <code>fc00::/7</code>.</li>\n<li><strong>Une seule IP validée</strong> : le DNS peut renvoyer plusieurs A/AAAA — valider <strong>tous</strong> les enregistrements. Et ne pas valider l&#39;IP puis se connecter par hostname.</li>\n<li><strong>Formats d&#39;IP alternatifs</strong> : décimal <code>2130706433</code>, octal, hex <code>0x7f.1</code>, IPv4-mapped <code>::ffff:169.254.169.254</code> — <strong>normaliser avant</strong> toute comparaison de plages.</li>\n<li><strong>IMDSv2 réduit mais ne supprime pas le risque</strong> : token + PUT requis, mais un proxy ouvert peut encore atteindre l&#39;IMDS — d&#39;où <code>HttpPutResponseHopLimit=1</code> (2 en conteneur) et le blocage réseau de <code>169.254.169.254</code>.</li>\n<li><strong>Egress IPv6 oublié</strong> : beaucoup de configs ne filtrent que l&#39;IPv4 et laissent <code>fd00:ec2::254</code> joignable.</li>\n<li><strong>Compter sur la seule validation applicative</strong> : sans contrôle réseau d&#39;egress, aucune défense en profondeur si l&#39;app a un bug.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Le crawler reçoit une <strong>clé de source</strong>, jamais une URL brute ; l&#39;URL est <strong>reconstruite</strong> depuis un catalogue versionné.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Schéma restreint à <strong><code>https</code></strong>, ports <strong>443/80</strong> ; <code>file/gopher/ftp/data</code> rejetés.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Host validé par <strong>égalité stricte</strong> contre un ensemble fini de domaines canoniques (pas d&#39;<code>endsWith</code>/regex permissive).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>userinfo</code>, fragments, doubles encodages rejetés ; <strong>normalisation</strong> avant comparaison.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Toutes</strong> les IP résolues validées contre : loopback, RFC1918, link-local v4/v6, CGNAT, multicast, ULA <code>fc00::/7</code>, IPv4-mapped.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Métadonnées cloud bloquées : <code>169.254.169.254</code>, <code>metadata.google.internal</code>, <code>fd00:ec2::254</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>DNS pinning</strong> : résolution unique, connexion à l&#39;IP validée, <code>Host</code>/SNI conservés.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Redirections désactivées</strong> (ou re-validation host+IP à chaque saut).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Un seul <code>secureFetch</code></strong> ; import direct de <code>fetch</code>/<code>axios</code>/<code>undici</code> interdit (règle ESLint + revue).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Timeouts, <strong>taille de réponse max</strong>, content-type borné (<code>text/html</code>, <code>application/json</code>).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Log</strong> de chaque fetch : URL demandée, IP résolue, verdict allowlist, code HTTP.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Egress <strong>deny-by-default</strong> sur les workers (Security Group / NetworkPolicy / proxy), IPv4 <strong>et</strong> IPv6.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Sur AWS : <strong>IMDSv2</strong> (<code>HttpTokens=required</code>), hop limit 1 (2 en conteneur).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Résolveurs DNS publics</strong> côté crawler (ils ignorent les noms d&#39;infra interne).</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi le SSRF, en deux phrases ?</strong>\nLe Server-Side Request Forgery, c&#39;est quand on manipule une application pour qu&#39;elle émette une requête réseau vers une destination non prévue — souvent interne. C&#39;est la catégorie A10 du Top 10 OWASP 2021, qui recommande un egress <em>deny-by-default</em> en plus des contrôles applicatifs (OWASP Top 10 A10).</p>\n<p><strong>Q2. Pourquoi une allowlist plutôt qu&#39;une blocklist ?</strong>\nParce qu&#39;une blocklist est contournable par encodage, IPv6 ou rebinding DNS : OWASP écrit explicitement <em>« Deny-lists are bypass-prone. Prefer allow-lists. »</em> TechWatch IA ne consomme que des sources officielles connues d&#39;avance, c&#39;est donc le cas idéal pour une allowlist statique versionnée (OWASP SSRF Cheat Sheet).</p>\n<p><strong>Q3. Pourquoi ne pas accepter directement l&#39;URL produite par le LLM ?</strong>\nParce que cette URL peut être empoisonnée ou injectée, et les parseurs d&#39;URL divergent et sont contournables. On accepte une clé de source (<code>&quot;react&quot;</code>) et on reconstruit l&#39;URL côté serveur depuis un catalogue, ce qui rend impossible l&#39;injection d&#39;un host arbitraire (OWASP SSRF Cheat Sheet).</p>\n<p><strong>Q4. Pourquoi <code>host.endsWith(&quot;.github.com&quot;)</code> est-il dangereux ?</strong>\nParce qu&#39;il laisse passer <code>github.com.attacker.com</code> et des sous-domaines non maîtrisés. Il faut une <strong>égalité stricte</strong> sur un ensemble fini de hosts canoniques, pas une comparaison par sous-chaîne (Stytch).</p>\n<p><strong>Q5. Quelles plages d&#39;IP faut-il bloquer après résolution ?</strong>\nLoopback <code>127.0.0.0/8</code> et <code>::1</code>, RFC1918 (<code>10/8</code>, <code>172.16/12</code>, <code>192.168/16</code>), link-local <code>169.254.0.0/16</code> et <code>fe80::/10</code>, CGNAT <code>100.64.0.0/10</code>, multicast <code>224.0.0.0/4</code>, ULA <code>fc00::/7</code>, et les IPv4-mapped en IPv6. OWASP liste ces plages comme minimum à refuser (OWASP SSRF Cheat Sheet).</p>\n<p><strong>Q6. C&#39;est quoi le DNS rebinding et pourquoi la validation d&#39;URL ne l&#39;arrête pas ?</strong>\nOn valide l&#39;IP d&#39;un hostname, puis la lib HTTP <strong>re-résout</strong> ce hostname et obtient cette fois <code>169.254.169.254</code> : c&#39;est le TOCTOU. Comme le dit Behrad Taher, <em>« any defense that resolves a hostname, checks the result, and then hands the hostname back to an HTTP library to resolve again is vulnerable to rebinding »</em> (Behrad Taher).</p>\n<p><strong>Q7. Comment corrige-t-on ce TOCTOU ?</strong>\nPar le <strong>DNS pinning</strong> : résoudre une fois, valider l&#39;IP, puis se connecter <strong>directement à l&#39;IP</strong> en gardant le hostname dans l&#39;en-tête <code>Host</code>. La correction est à la couche connexion, pas au parsing ; un proxy d&#39;egress (type Smokescreen) ou des règles réseau renforcent la défense (Behrad Taher, Stytch).</p>\n<p><strong>Q8. Pourquoi désactiver les redirections ?</strong>\nParce qu&#39;une réponse <code>3xx</code> vers <code>169.254.169.254</code> ou un host interne contourne toute la validation initiale, même si l&#39;URL de départ était saine. OWASP demande de <em>« disable the support for the following of the redirection »</em> dans le client HTTP ; sinon, re-valider host <strong>et</strong> IP à chaque saut (OWASP SSRF Cheat Sheet).</p>\n<p><strong>Q9. Pourquoi un seul <code>secureFetch</code> obligatoire ?</strong>\nParce que si un module importe directement <code>node-fetch</code>/<code>axios</code>/<code>undici</code>, il contourne le wrapper sécurisé — c&#39;est exactement l&#39;anti-pattern de l&#39;advisory Flowise. Un point de contrôle unique est un invariant de sécurité auditable, à imposer par règle de lint et revue (advisory Flowise).</p>\n<p><strong>Q10. La validation applicative suffit-elle, ou faut-il du réseau ?</strong>\nElle ne suffit pas : un bug applicatif laisserait passer. Il faut une défense en profondeur — egress <em>deny-by-default</em> sur les workers (NetworkPolicy / Security Group / proxy), couvrant IPv4 <strong>et</strong> IPv6, plus IMDSv2 forcé et hop limit 1 sur AWS. L&#39;advisory Craft CMS prouve qu&#39;une protection métadonnées seule peut être contournée par rebinding (advisory Craft CMS, OWASP Top 10 A10).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html\">OWASP — Server Side Request Forgery Prevention Cheat Sheet</a> — <em>doc-officielle</em> — référence canonique : allowlist vs blocklist (<em>« Deny-lists are bypass-prone. Prefer allow-lists »</em>), plages IP/métadonnées à bloquer, désactivation des redirections, validation du schéma.</li>\n<li><a href=\"https://owasp.org/Top10/2021/A10_2021-Server-Side_Request_Forgery_(SSRF)/\">OWASP Top 10 (2021) — A10 Server-Side Request Forgery (SSRF)</a> — <em>doc-officielle</em> — catégorisation officielle du risque, contrôles réseau (egress deny-by-default) et applicatifs ; ancrage de menace et vocabulaire partagé.</li>\n<li><a href=\"https://behradtaher.dev/DNS-Rebinding-Attacks-Against-SSRF-Protections/\">DNS Rebinding Attacks Against SSRF Protections — Behrad Taher</a> — <em>praticien</em> — explique le TOCTOU et les fixes corrects : DNS pinning (connexion directe à l&#39;IP validée), proxy d&#39;egress, contrôles réseau.</li>\n<li><a href=\"https://stytch.com/blog/securing-identity-apis-against-ssrf/\">Securing Identity APIs Against SSRF — Stytch</a> — <em>praticien</em> — retour d&#39;expérience : allowlist domaines+protocoles+ports, blocage RFC1918/link-local/ULA, résolveurs DNS publics, client HTTP custom validant à la connexion, defense-in-depth.</li>\n<li><a href=\"https://github.com/craftcms/cms/security/advisories/GHSA-gp2f-7wcm-5fhx\">Craft CMS — Cloud Metadata SSRF Protection Bypass via DNS Rebinding (GHSA)</a> — <em>advisory</em> — cas réel : une protection métadonnées contournée par rebinding ; preuve que la validation d&#39;URL seule ne suffit pas.</li>\n<li><a href=\"https://github.com/FlowiseAI/Flowise/security/advisories/GHSA-qqvm-66q4-vf5c\">Flowise — SSRF Protection Bypass via Direct node-fetch/axios Usage (GHSA)</a> — <em>advisory</em> — anti-pattern : sécurité SSRF centralisée mais contournée par import direct de <code>node-fetch</code>/<code>axios</code> ; justifie le point de contrôle central unique.</li>\n</ol>\n"},{"num":15,"slug":"monolithe-modulaire-ddd","title":"Monolithe modulaire & bounded contexts (DDD)","tagline":"Construis d'abord un monolithe modulaire organisé par domaine métier (bounded contexts), avec des frontières logiques gratuites et enforced par outillage — puis n'extrais un service physique que contre un gain mesurable (latence, coût, scaling, sécurité), jamais par esthétique.","quiz":[{"q":"Qu'est-ce qu'un monolithe modulaire ?","options":["Un seul déployable (un process, un datastore) découpé en interne en modules à frontières strictes, organisés par domaine métier","Un ensemble de microservices déployés ensemble dans un même conteneur","Une application monolithique sans aucune séparation interne, organisée par couche technique","Plusieurs bases de données partagées par un unique service applicatif"],"answer":0,"explain":"Le monolithe modulaire est un unique déployable découpé à l'intérieur en modules à frontières strictes, organisés par domaine ; il offre l'essentiel du découplage des microservices sans la complexité réseau."},{"q":"Selon la fiche, quelle est la relation entre « modulaire » et « distribué » ?","options":["Ce sont deux axes orthogonaux : on peut avoir une forte modularité sans aucune distribution","Ce sont des synonymes : un système modulaire est forcément distribué","La modularité n'est atteignable qu'en distribuant le système sur plusieurs services","La distribution est un prérequis technique à toute frontière logique"],"answer":0,"explain":"« Modulaire » et « distribué » sont orthogonaux : les frontières logiques ne requièrent pas d'appels réseau, on peut donc être fortement modulaire sans distribution (thèse de Shopify et McKinley)."},{"q":"Que recommande le principe « MonolithFirst » de Fowler ?","options":["Commencer par un monolithe soigneusement modulaire pour découvrir les frontières, puis décomposer graduellement","Démarrer en microservices pour figer immédiatement des frontières propres","Ne jamais décomposer un monolithe, quel que soit le contexte","Découper le système par couche technique avant de penser au domaine"],"answer":0,"explain":"On ne peut pas découper proprement un système qu'on ne comprend pas encore ; mieux vaut un monolithe modulaire pour découvrir les frontières puis décomposer, le coût d'un mauvais module restant celui d'une PR."},{"q":"Qu'est-ce qu'un bounded context au sens DDD ?","options":["Une zone où un terme a un sens unique et cohérent ; une frontière apparaît là où le vocabulaire change","Un module technique partagé qui unifie le modèle de domaine pour toute l'application","Une table de base de données accessible par tous les modules via jointures","Un service réseau exposant l'intégralité du modèle métier unifié"],"answer":0,"explain":"Un bounded context est une zone où un terme garde un sens cohérent ; la polysémie (ex. « source ») fait apparaître une frontière, et l'unification totale du modèle « n'est ni faisable ni rentable »."},{"q":"Pourquoi la fiche interdit-elle les jointures et FK cross-module ?","options":["Parce que partager les tables est le couplage le plus dur à défaire et rend toute extraction future quasi impossible","Parce que les jointures ralentissent systématiquement les requêtes SQL","Parce que les microservices interdisent par nature toute base de données relationnelle","Parce que les FK empêchent d'écrire des règles de lint en CI"],"answer":0,"explain":"Chaque module doit posséder exclusivement ses données et exposer une API ; partager les tables crée le couplage le plus dur à défaire, rendant l'extraction future quasi impossible."},{"q":"Comment empêcher l'érosion des frontières entre modules ?","options":["Par l'outillage : une règle de lint/CI (façon Packwerk/Wedge) qui échoue dès qu'un module importe l'interne d'un autre","Par la discipline de l'équipe et des revues de code attentives","En documentant les frontières dans un wiki partagé","En déployant chaque module comme un microservice distinct"],"answer":0,"explain":"Sans enforcement automatique, la frontière n'existe pas : sous la pression des deadlines un import « urgent » dissout la modularité. Il faut une règle de lint/CI qui échoue à chaque violation."},{"q":"Dans le projet, pourquoi extraire la Génération IA en worker mais garder la Vérification in-process ?","options":["La Génération IA a latence/coût propres et besoin de rate-limiting (scaling indépendant), tandis que la Vérification est légère et évolue avec la Synthèse (couplage de domaine)","La Génération IA est plus simple à isoler car elle ne fait pas d'appels externes","La Vérification consomme beaucoup d'I/O et doit donc rester centralisée","Les deux devraient être extraites, mais l'équipe manque de temps pour la Vérification"],"answer":0,"explain":"La Génération IA justifie un scaling indépendant (p95 > 8 s, coût, rate-limit) ; extraire la Vérification, légère et couplée à la Synthèse, ne ferait qu'ajouter du réseau à un couplage de domaine existant."}],"flashcards":[{"front":"Frontière logique vs frontière physique : le coût","back":"Une frontière logique (dossier, interface, règle de lint) coûte presque rien ; une frontière physique coûte cher (sérialisation, cohérence éventuelle, déploiements multiples, debug distribué, sécurité inter-services). On ne paie le coût physique que contre un bénéfice concret."},{"front":"Organiser par domaine, pas par couche","back":"Le geste clé de la componentization Shopify : réassigner les classes par domaine métier (orders, billing, shipping…) plutôt que par couche technique (controllers/models). Chaque composant a une API publique explicite et la propriété exclusive de ses données."},{"front":"Couche anti-corruption (ACL)","back":"Plutôt qu'un modèle de domaine unifié partagé (qui recrée du couplage), on garde des modèles par contexte et on traduit l'un en l'autre à la frontière. Ex. « source » côté Crawling ≠ « source » côté Synthesis."},{"front":"Couture prête-à-extraire (seam, Newman)","back":"Dès le jour 1, on appelle les modules extractibles via une interface (port) avec des DTO sérialisables, même in-process. Le jour de la bascule en worker/queue, on change l'implémentation derrière le port, pas les appelants."},{"front":"Innovation tokens (McKinley)","back":"Chaque entreprise dispose d'environ trois « innovation tokens » à dépenser sur le cœur métier, pas sur l'infra. Choisir un monolithe modulaire les économise pour le vrai différenciateur : la traçabilité/vérifiabilité des affirmations."},{"front":"Distributed monolith : le piège","back":"Démarrer en microservices fige des frontières inconnues et rend tout refactoring transverse. Découper par couche technique ou partager les tables aggrave le couplage. Sur-extraire crée une complexité distribuée inutile pour une charge MVP."},{"front":"Le bon signal d'extraction d'un service","back":"Pas la propreté du diagramme, mais l'indépendance d'évolution/scaling : latence, coût, scaling indépendant, isolation de sécurité. Extraire un service ne supprime pas le couplage de domaine ; si deux modules changent ensemble, les séparer ajoute juste de la latence réseau."},{"front":"Modularité chiffrée (Fowler/Govind)","back":"L'étude de cas rapporte un cycle time passé de 17 à 10,3 jours (~-40 %) et un temps d'intégration de 90 à 5 jours (×18). Mais la modularité demande un effort soutenu et ne doit cibler que de vrais problèmes métier."}],"sources":[{"title":"MonolithFirst — Martin Fowler","url":"https://martinfowler.com/bliki/MonolithFirst.html","type":"praticien reconnu"},{"title":"BoundedContext — Martin Fowler","url":"https://martinfowler.com/bliki/BoundedContext.html","type":"praticien reconnu (DDD)"},{"title":"Linking Modular Architecture to Development Teams — Martin Fowler (Govind et al.)","url":"https://martinfowler.com/articles/linking-modular-arch.html","type":"praticien reconnu (étude de cas)"},{"title":"Deconstructing the Monolith — Shopify Engineering","url":"https://shopify.engineering/deconstructing-monolith-designing-software-maximizes-developer-productivity","type":"doc d'ingénierie (étude de cas)"},{"title":"Inside Shopify's Modular Monolith — Milan Milanović","url":"https://newsletter.techworld-with-milan.com/p/inside-shopifys-modular-monolith","type":"praticien (synthèse technique)"},{"title":"Choose Boring Technology — Dan McKinley","url":"https://mcfunley.com/choose-boring-technology","type":"praticien reconnu"},{"title":"Monolith to Microservices — Sam Newman","url":"https://samnewman.io/books/monolith-to-microservices/","type":"praticien reconnu (livre de référence)"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Construis d&#39;abord un <strong>monolithe modulaire</strong> organisé par domaine métier (bounded contexts), avec des frontières logiques gratuites et <em>enforced</em> par outillage — puis n&#39;extrais un service physique que contre un gain <strong>mesurable</strong> (latence, coût, scaling, sécurité), jamais par esthétique.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA est un MVP exploratoire : on ne connaît pas encore les vraies frontières entre Détection, Crawling, Synthèse, Vérification et Publication. Figer ces frontières derrière un réseau dès le jour 1 (microservices) reviendrait à parier sur un découpage qu&#39;on n&#39;a pas encore validé, tout en payant le coût de la distribution sans le bénéfice. La stratégie retenue — <strong>un monolithe modulaire + 2-3 workers</strong> — permet de découvrir les frontières en codant, d&#39;isoler <em>seulement</em> les deux coutures qui le justifient vraiment (le <strong>Crawling</strong>, I/O bloquant + surface SSRF à sandboxer ; la <strong>Génération IA</strong>, latence/coût + rate-limiting propre), et de garder tout le reste in-process. Nos « innovation tokens » vont au vrai différenciateur — la synthèse sourcée et vérifiable — pas à l&#39;orchestration distribuée.</p>\n<h2>Le principe</h2>\n<p><strong>« Modulaire » et « distribué » sont deux axes orthogonaux.</strong> On peut — et on doit souvent — avoir une forte modularité <em>sans</em> distribution. C&#39;est la thèse centrale de Shopify et de Dan McKinley : les frontières d&#39;un système ne requièrent pas d&#39;appels réseau. Une frontière logique coûte presque rien (un dossier, une interface, une règle de lint) ; une frontière physique coûte cher (sérialisation, cohérence éventuelle, déploiements multiples, debugging distribué, sécurité inter-services).</p>\n<p><strong>MonolithFirst (Fowler).</strong> On ne peut pas découper proprement un système qu&#39;on ne comprend pas encore. Mieux vaut commencer par un monolithe — soigneusement modulaire — pour <em>découvrir</em> les frontières, puis décomposer graduellement. Le refactoring d&#39;une fonctionnalité entre deux modules est trivial dans un monolithe (une PR) ; entre deux services, c&#39;est un projet. Un mauvais module se redécoupe ; un mauvais microservice se renégocie.</p>\n<p><strong>Organiser par domaine, pas par couche.</strong> Le geste clé de la <em>componentization</em> Shopify a été de réassigner ~6000 classes par domaine métier (orders, billing, shipping…) plutôt que par couche technique (controllers/models). Chaque composant expose une <strong>API publique explicite</strong> et garde la <strong>propriété exclusive de ses données</strong> : pas de jointure cross-module, pas d&#39;association traversante vers les tables internes d&#39;un autre module.</p>\n<p><strong>Bounded Context (DDD, Fowler).</strong> Là où le <strong>vocabulaire change</strong>, une frontière apparaît. Le même mot recouvre des modèles différents selon le contexte (la <em>polysémie</em>). « La total unification du modèle de domaine n&#39;est ni faisable ni rentable » : on préfère des modèles par contexte + une <strong>couche anti-corruption</strong> (traduction) plutôt qu&#39;un modèle unique partagé qui recréerait du couplage.</p>\n<p><strong>Couture prête-à-extraire (seams, Newman).</strong> Dès le jour 1, on appelle les modules extractibles via une <strong>interface (port)</strong> avec des <strong>DTO sérialisables</strong> — même quand l&#39;appel est in-process. Le jour où on passe en worker/queue, on change l&#39;implémentation <em>derrière</em> le port, pas les appelants.</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Carte des modules de TechWatch IA</strong></p>\n<pre><code>            in-process (frontières LOGIQUES)\n   ┌──────────────┐   ┌──────────────┐   ┌──────────────┐\n   │  Detection   │──▶│  Synthesis   │──▶│ Verification │──▶ Publishing\n   │ (releases)   │   │ (migration)  │   │ (citations)  │\n   └──────┬───────┘   └──────┬───────┘   └──────────────┘\n          │ port             │ port\n          ▼                  ▼\n   ╔══════════════╗   ╔══════════════╗\n   ║   Crawling   ║   ║ Génération IA║   coutures PRÊTES-À-EXTRAIRE\n   ║ (I/O, SSRF)  ║   ║ (latence/coût)║  → appel via interface + DTO,\n   ╚══════════════╝   ╚══════════════╝     bascule queue sans toucher l&#39;appelant\n</code></pre>\n<p>Chaque module possède ses données ; les flèches <code>──▶</code> pleines sont des appels in-process directs, les <code>║</code> doubles signalent une couture sérialisable extractible en worker.</p>\n<p><strong>2. Polysémie de « source » (React 18 → 19)</strong></p>\n<p>Le même mot, deux modèles selon le contexte — d&#39;où l&#39;anti-corruption layer :</p>\n<pre><code># Bounded context CRAWLING\nSource = { url: &quot;https://react.dev/blog/...react-19&quot;,\n           http_status: 200,\n           robots_hash: &quot;a1b2…&quot;,\n           fetched_at: &quot;2026-06-23T…&quot; }\n\n# Bounded context SYNTHESIS  (après traduction)\nSource = { claim: &quot;useEffect double-invoke en StrictMode&quot;,\n           anchor: &quot;#strict-mode-double-rendering&quot;,\n           confidence: 0.92 }\n</code></pre>\n<p>Forcer un <code>Source</code> unifié partagé recréerait du couplage sémantique entre Crawling et Synthesis. On traduit l&#39;un en l&#39;autre à la frontière.</p>\n<p><strong>3. ADR — pourquoi extraire la Génération IA mais PAS la Vérification</strong></p>\n<pre><code>Décision : Génération IA = worker (queue) ; Vérification = in-process.\nCritère IA     : p95 latence &gt; 8 s ET besoin de rate-limit/coût propre\n                 → scaling indépendant justifié (cf. storefront Shopify).\nCritère Vérif. : CPU léger, pas d&#39;I/O externe, change avec Synthesis\n                 → couplage de domaine ⇒ l&#39;extraire ajouterait du réseau\n                   au couplage sans bénéfice. Reste in-process.\nSeuil de revue : ré-évaluer si file d&#39;attente IA &gt; 50 jobs en p95.\n</code></pre>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Les frontières logiques sont quasi gratuites ; les physiques coûtent cher.</strong> Ne payer le coût de la distribution (réseau, sérialisation, cohérence éventuelle, debug distribué) que contre un bénéfice concret.</li>\n<li><strong>Sans enforcement automatique, la frontière n&#39;existe pas.</strong> Convention seule = <code>big ball of mud</code> à terme : sous la pression d&#39;une deadline, un import vers l&#39;interne d&#39;un autre module passe et la modularité se dissout silencieusement (constat explicite Fowler/Govind).</li>\n<li><strong>Découvrir les bons bounded contexts est difficile, même pour des experts</strong> (Fowler). D&#39;où l&#39;intérêt de commencer monolithe : le coût d&#39;un mauvais découpage reste celui d&#39;une PR.</li>\n<li><strong>Extraire un service ne supprime pas le couplage de domaine.</strong> Si deux modules changent toujours ensemble, les séparer physiquement ne fait qu&#39;ajouter de la latence réseau au couplage. Le bon signal d&#39;extraction est l&#39;<strong>indépendance d&#39;évolution/scaling</strong>, pas la propreté du diagramme.</li>\n<li><strong>L&#39;isolation runtime ne nécessite pas forcément un service.</strong> Shopify isole les tenants par <em>database pods</em>, pas par découpage de service. Pour nous, sandboxer le Crawling peut passer par un process/worker isolé plutôt qu&#39;un microservice complet.</li>\n<li><strong>Une couture « prête-à-extraire » impose dès le jour 1 des DTO sérialisables et zéro état partagé caché.</strong> Sinon l&#39;extraction « facile » se révèle un gros refactoring le moment venu.</li>\n<li><strong>Piège — démarrer en microservices (<code>distributed monolith</code>)</strong> : on fige des frontières inconnues et tout refactoring devient transverse (dénoncé par Fowler et Newman).</li>\n<li><strong>Piège — découper par couche technique</strong> (un service « API », un « DB-access », un worker « utils ») : chaque feature traverse tous les services → couplage maximal.</li>\n<li><strong>Piège — partager les tables entre modules</strong> (jointures cross-module, FKs partout) : c&#39;est le couplage le plus dur à défaire et rend toute extraction future quasi impossible.</li>\n<li><strong>Piège — sur-extraire</strong> : transformer chaque module logique en service. Complexité distribuée maximale pour une charge MVP qui tiendrait sur un seul process (gaspillage d&#39;innovation tokens).</li>\n<li><strong>Exception au MonolithFirst</strong> : si l&#39;équipe a <em>déjà</em> une expérience forte du domaine et des frontières évidentes, démarrer multi-services peut se justifier. Pour un MVP exploratoire comme TechWatch IA, le monolithe modulaire reste le pari sûr.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Modules nommés par <strong>domaine métier</strong> (Detection, Crawling, Synthesis, Verification, Publishing), pas par couche technique.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque module expose une <strong>API publique</strong> explicite ; l&#39;interne n&#39;est jamais importé directement par un autre.</li>\n<li><input disabled=\"\
