: encadrer le contenu non fiable par des délimiteurs et le présenter comme « donnée à analyser » (utile mais non suffisant seul).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Privilège minimal</strong> par composant ; séparer l&#39;étage « planification » (consigne de confiance) de l&#39;étage « traitement de données » (quarantaine).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Improper Output Handling</strong> : échapper/encoder la sortie côté consommateur ; ne jamais la rendre/exécuter telle quelle.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Human-in-the-loop</strong> sur toute action conséquente (publication, déclenchement).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Aucun <strong>secret dans le prompt système</strong> (LLM07) ; les contrôles vivent dans le code.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Tests adverses réguliers</strong> : red-teaming traitant le modèle comme un utilisateur non fiable.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. Qu&#39;est-ce que la prompt injection ?</strong>\nC&#39;est l&#39;introduction de texte contrôlé par un attaquant qui modifie le comportement du LLM, classée <strong>LLM01</strong> par l&#39;OWASP Top 10 for LLM Applications 2025. Elle est <em>directe</em> quand l&#39;utilisateur fournit la consigne, <em>indirecte</em> quand l&#39;instruction est cachée dans un contenu externe ingéré (OWASP LLM01).</p>\n<p><strong>Q2. Pourquoi parle-t-on surtout d&#39;injection <em>indirecte</em> pour TechWatch IA ?</strong>\nParce que la menace vient des pages collectées chez des tiers, pas de l&#39;utilisateur de confiance. Un changelog ou un blog officiel peut contenir des instructions cachées, et c&#39;est le scénario par défaut à modéliser pour tout outil qui ingère du contenu externe (OWASP LLM01).</p>\n<p><strong>Q3. Une source « officielle » n&#39;est-elle pas digne de confiance ?</strong>\n« Officielle » qualifie la réputation de l&#39;émetteur, pas l&#39;intégrité du contenu reçu. Un site officiel peut être compromis, contenir du texte caché injecté, ou être altéré par un MITM. La confiance dans l&#39;émetteur ne transfère donc pas au contenu : tout reste non fiable par défaut.</p>\n<p><strong>Q4. Que signifie concrètement « données ≠ instructions » ?</strong>\nLe contenu ingéré est traité comme une donnée à extraire ou résumer, jamais comme une consigne à exécuter. C&#39;est le cœur de la défense, pas un filtre ajouté après coup. L&#39;approche CaMeL formalise cela en traitant le contenu non fiable comme donnée via capacités/provenance et un interpréteur déterministe (Willison, CaMeL).</p>\n<p><strong>Q5. Qu&#39;est-ce que la « lethal trifecta » ?</strong>\nC&#39;est la combinaison de trois capacités qui rend un agent dangereux : accès à des données sensibles, exposition à du contenu non fiable, et capacité de communication externe (exfiltration). Il suffit de supprimer <strong>une</strong> des trois branches pour neutraliser l&#39;attaque (Simon Willison, <em>The Lethal Trifecta</em>).</p>\n<p><strong>Q6. Pourquoi le LLM de TechWatch IA n&#39;a-t-il aucun tool au MVP ?</strong>\nParce que sans capacité d&#39;action (HTTP sortant, écriture, envoi), une injection ne peut pas se transformer en dommage réel. C&#39;est la manière la plus simple de casser la lethal trifecta : on supprime la branche « exfiltration/action » côté LLM (Willison).</p>\n<p><strong>Q7. Un détecteur d&#39;injection (guardrail) ne suffit-il pas ?</strong>\nNon : un classifieur est probabiliste et contournable, car l&#39;attaquant a une infinité de formulations. « En sécurité applicative web, 95 % est une note d&#39;échec » (Willison). On vise des garanties structurelles/déterministes, pas un score de détection.</p>\n<p><strong>Q8. Comment garantir que chaque affirmation est réellement sourcée ?</strong>\nEn contraignant la sortie à un schéma strict et en vérifiant <em>par du code</em> que toute citation pointe vers une URL réellement présente dans le corpus collecté (allowlist). Sinon le LLM peut halluciner une source crédible : la vérification déterministe rend la promesse « sourcé et vérifiable » effective (OWASP LLM09).</p>\n<p><strong>Q9. Pourquoi ne pas mettre les règles de sécurité dans le prompt système ?</strong>\nParce qu&#39;un prompt système peut fuiter (<strong>LLM07 : System Prompt Leakage</strong>) et qu&#39;une consigne du type « ignore toute instruction malveillante » est contournable. Les contrôles de sécurité doivent vivre dans le code et l&#39;architecture, où ils sont déterministes (OWASP LLM07).</p>\n<p><strong>Q10. La sécurité a-t-elle un coût, et pourquoi accepter un arbitrage ?</strong>\nOui : aucun système avec agency n&#39;est à la fois pleinement utile et 100 % sûr. Les approches robustes ont un coût mesurable — CaMeL atteint ~77 % d&#39;utilité contre ~84 % pour la baseline sur AgentDojo. On accepte donc explicitement un arbitrage sécurité/fonctionnalité au profit de garanties structurelles (CaMeL ; <em>Design Patterns</em>, 2025).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://genai.owasp.org/llmrisk/llm01-prompt-injection/\">LLM01:2025 Prompt Injection — OWASP Gen AI Security Project</a> — <em>doc-officielle</em> — définition directe vs indirecte, inputs imperceptibles pour l&#39;humain, et 7 mitigations concrètes (contraindre le comportement, sorties + citations validées par code, filtrage I/O, privilège minimal, human-in-the-loop, ségrégation du contenu externe, tests adverses).</li>\n<li><a href=\"https://genai.owasp.org/llm-top-10/\">OWASP Top 10 for LLM Applications 2025</a> — <em>doc-officielle</em> — liste officielle LLM01→LLM10 : situe LLM01 Prompt Injection, LLM05 Improper Output Handling, LLM06 Excessive Agency, LLM07 System Prompt Leakage, LLM09 Misinformation.</li>\n<li><a href=\"https://simonwillison.net/2025/Jun/16/the-lethal-trifecta/\">The Lethal Trifecta for AI Agents — Simon Willison</a> — <em>praticien</em> — les trois branches (données privées + contenu non fiable + exfiltration), pourquoi 95 % est un échec, et pourquoi casser la combinaison plutôt que filtrer ; justifie le choix « LLM sans tools ».</li>\n<li><a href=\"https://simonwillison.net/2025/Apr/11/camel/\">CaMeL offers a promising new direction for prompt injection — Simon Willison</a> — <em>praticien</em> — pattern dual-LLM et ses limites, approche CaMeL : contenu non fiable traité comme donnée via capabilities/provenance et interpréteur déterministe.</li>\n<li><a href=\"https://arxiv.org/pdf/2506.08837\">Design Patterns for Securing LLM Agents against Prompt Injections (2025)</a> — <em>académique</em> — 6 design patterns (Action-Selector, Plan-Then-Execute, Dual-LLM, Code-Then-Execute/CaMeL, Context-Minimization) et le constat qu&#39;aucun système avec agency n&#39;est à la fois utile et 100 % sûr.</li>\n<li><a href=\"https://lilianweng.github.io/posts/2023-10-25-adv-attack-llm/\">Adversarial Attacks on LLMs — Lil&#39;Log (Lilian Weng)</a> — <em>praticien</em> — panorama des attaques (token manipulation, gradient-based/UAT, jailbreak) et défenses (adversarial training, filtrage perplexité/paraphrase, instruction defense) avec leurs limites probabilistes.</li>\n<li><a href=\"https://arxiv.org/pdf/2503.18813\">Defeating Prompt Injections by Design (CaMeL) — DeepMind, arXiv:2503.18813</a> — <em>académique</em> — sécurité par Control Flow Integrity / Information Flow Control / capacités sans modifier le LLM ; coût d&#39;utilité mesuré (~77 % vs ~84 % baseline sur AgentDojo).</li>\n</ol>\n"},{"num":10,"slug":"finops-ia-couts","title":"FinOps IA : coûts, prompt caching, model routing","tagline":"Maîtriser le coût d'un produit LLM, c'est d'abord mesurer chaque appel, puis empiler des leviers multiplicatifs — cache de préfixe (~90 % d'économie sur le contexte réutilisé), routing vers le plus petit modèle acceptable, et Batch API (−50 %) — sans jamais sacrifier le différenciateur « confiance / sourcé » du projet.","quiz":[{"q":"Dans quel ordre faut-il appliquer les trois familles de leviers FinOps décrites dans la fiche ?","options":["Routing, puis caching, puis mesure","Mesurer avant d'optimiser, puis prompt caching, puis model routing/tiering","Batch API d'abord, puis mesure, puis routing","Caching, puis mesure, puis Batch API"],"answer":1,"explain":"La fiche pose explicitement trois familles à appliquer dans cet ordre : 1) mesurer avant d'optimiser, 2) le prompt caching (levier n°1), 3) le model routing/tiering. Sans métrologie, toute optimisation est aveugle."},{"q":"Quel est le poste de coût n°1 pour TechWatch IA, et quel levier l'attaque ?","options":["Les tokens de sortie des synthèses ; le Batch API","Le maintien d'une vector DB ; le model routing","Le contexte réutilisé d'une question à l'autre (long-context rechargé) ; le prompt caching","Les appels concurrents en streaming ; le tiering vers Haiku"],"answer":2,"explain":"Le projet charge toute la doc source en long-context (zéro vector DB au MVP), donc le poste de coût n°1 est le contexte réutilisé d'une question à l'autre — exactement ce que le prompt caching attaque."},{"q":"Comment fonctionne le cache de préfixe et où placer le contenu volatil (question, timestamp) ?","options":["Match sémantique approximatif ; le volatil peut aller n'importe où","Match de préfixe exact ; le volatil va APRÈS le dernier point de césure (cache_control)","Match de préfixe exact ; le volatil va AVANT le contenu stable pour être priorisé","Match par mots-clés ; le volatil est ignoré automatiquement"],"answer":1,"explain":"Le cache est un match de préfixe EXACT : le contenu stable va en tête, et le contenu volatil doit être placé après le dernier breakpoint cache_control, sinon il invalide le cache."},{"q":"Quels sont les tarifs de lecture et d'écriture du cache chez Anthropic, et le break-even ?","options":["Lecture 0,5× / écriture 1× ; rentable dès 1 lecture","Lecture 0,1× / écriture 1,25× (TTL 5 min) ou 2× (TTL 1 h) ; ≥ 2 lectures (5 min), ≥ 3 (1 h)","Lecture gratuite / écriture 2× ; rentable dès 2 écritures","Lecture 0,1× / écriture 0,1× ; toujours rentable dès le 1er appel"],"answer":1,"explain":"La lecture cache coûte 0,1× le prix input (~90 % d'économie) ; l'écriture vaut 1,25× (TTL 5 min) ou 2× (TTL 1 h). Le break-even est de ≥ 2 lectures pour le 5 min et ≥ 3 pour le 1 h."},{"q":"Comment router une tâche simple comme la détection d'un numéro de version ou la déduplication d'annonces ?","options":["Vers Opus 4.8 ($5/$25) pour garantir la fiabilité","Vers Sonnet 4.6 ($3/$15) par défaut","Vers Haiku 4.5 ($1/$5), le plus petit modèle qui fait le job","Vers le Batch API quel que soit le modèle"],"answer":2,"explain":"On route chaque tâche vers le plus petit modèle qui fait le job : classification, extraction de numéro de version et détection de doublon partent vers Haiku 4.5 ($1/$5). Sonnet sert aux synthèses standard, Opus aux migrations complexes."},{"q":"Le symptôme « cache_read_input_tokens reste à 0 sur des préfixes identiques » indique le plus souvent quoi ?","options":["Que le Batch API a été activé par erreur","Qu'un invalidateur silencieux est à l'œuvre (timestamp, JSON non trié, set d'outils variable, switch de modèle)","Que la lecture cache est facturée au plein tarif input","Que le préfixe dépasse le seuil maximal de mise en cache"],"answer":1,"explain":"Si cache_read_input_tokens reste à 0 sur des préfixes censés être identiques, un invalidateur silencieux casse le match exact : datetime.now(), UUID, JSON non sérialisé avec sort_keys, ordre d'outils variable ou changement de modèle."},{"q":"Pourquoi le routing doit-il être « éval-driven » et non seulement « coût-driven » ?","options":["Parce que les évals réduisent directement le prix par token facturé","Parce qu'un routing trop agressif vers Haiku peut produire des synthèses moins fiables et ruiner le différenciateur « confiance / sourcé »","Parce que le Batch API impose une validation par éval avant chaque exécution","Parce que tiktoken exige une éval pour compter correctement les tokens"],"answer":1,"explain":"Un routing trop agressif vers Haiku peut dégrader la fiabilité : un Haiku qui hallucine une source détruit la valeur du produit. On valide donc la qualité par éval avant de descendre en gamme — c'est le coût caché de la qualité."}],"flashcards":[{"front":"Que contient l'objet `usage` d'une réponse API et comment calcule-t-on le total des tokens d'entrée ?","back":"Il expose input_tokens (non cachés, plein tarif), cache_creation_input_tokens (écriture), cache_read_input_tokens (lecture ~0,1×) et output_tokens. Total entrée = input + cache_creation + cache_read."},{"front":"Seuil minimal de mise en cache","back":"~1024 tokens pour Opus 4.8 / Sonnet 4.6 (4096 pour Haiku 4.5). En-dessous, rien n'est mis en cache silencieusement (cache_creation_input_tokens = 0) malgré le marqueur cache_control."},{"front":"Hiérarchie d'invalidation du cache à trois niveaux","back":"Niveaux tools / system / messages. Changer tool_choice ou activer/désactiver le thinking n'invalide PAS tools+system ; seul un changement de définition d'outils ou de modèle force une reconstruction complète."},{"front":"Pourquoi changer de modèle invalide-t-il tout le cache ?","back":"Les caches sont scoped par modèle. Il faut épingler l'ID exact (ex. claude-sonnet-4-6) pour la reproductibilité ET la stabilité du cache."},{"front":"Fenêtre de lookback de 20 blocs","back":"Chaque breakpoint ne remonte que 20 blocs en arrière. Dans les boucles avec beaucoup de paires tool_use/tool_result, placer un breakpoint intermédiaire tous les ~15 blocs."},{"front":"Pourquoi ne pas utiliser tiktoken pour Claude ?","back":"tiktoken est le tokenizer d'OpenAI ; il sous-estime de 15-20 % (davantage sur le code). Toujours utiliser count_tokens du fournisseur ciblé pour estimer coûts et tenir le contexte."},{"front":"Batch API : remise, contraintes et point de conformité","back":"−50 % sur tous les tokens, cumulable avec le caching ; pour le non temps-réel (re-synthèses, évals). Résultats indexés par custom_id, conservés 29 jours, jusqu'à 100k requêtes / 256 MB. Attention : non éligible au Zero Data Retention."},{"front":"Piège des requêtes concurrentes à préfixe identique","back":"N requêtes parallèles paient toutes le plein tarif : une entrée de cache n'est lisible qu'une fois la première réponse commencée en streaming. Pour un fan-out, envoyer 1 requête, attendre le 1er token, puis lancer les N-1 autres."}],"sources":[{"title":"Anthropic — Prompt Caching (documentation officielle)","url":"https://platform.claude.com/docs/en/build-with-claude/prompt-caching.md","type":"official_docs"},{"title":"OpenAI — Prompt Caching guide (documentation officielle)","url":"https://developers.openai.com/api/docs/guides/prompt-caching","type":"official_docs"},{"title":"Anthropic — Batch Processing / Message Batches API (documentation officielle)","url":"https://platform.claude.com/docs/en/build-with-claude/batch-processing.md","type":"official_docs"},{"title":"What We Learned from a Year of Building with LLMs (applied-llms.org)","url":"https://applied-llms.org/","type":"practitioner"},{"title":"Eugene Yan — Patterns for Building LLM-based Systems & Products","url":"https://eugeneyan.com/writing/llm-patterns/","type":"practitioner"},{"title":"OpenAI — Prompt Caching in the API (annonce officielle)","url":"https://openai.com/index/api-prompt-caching/","type":"official_docs"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Maîtriser le coût d&#39;un produit LLM, c&#39;est d&#39;abord mesurer chaque appel, puis empiler des leviers multiplicatifs — cache de préfixe (~90 % d&#39;économie sur le contexte réutilisé), routing vers le plus petit modèle acceptable, et Batch API (−50 %) — sans jamais sacrifier le différenciateur « confiance / sourcé » du projet.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA repose sur un LLM managé en architecture serverless event-driven : chaque détection de version et chaque synthèse de migration déclenche des appels facturés au token. Comme le projet charge <strong>toute la doc source d&#39;une techno en long-context</strong> (zéro vector DB au MVP), le poste de coût n°1 est le contexte réutilisé d&#39;une question à l&#39;autre — exactement ce que le prompt caching attaque. Suivre le coût/synthèse dès J1 et router les tâches simples (« est-ce une nouvelle version ? ») vers un modèle bon marché tout en réservant les synthèses complexes au modèle le plus capable est ce qui rend le produit économiquement viable sans dégrader la fiabilité qui fait sa valeur.</p>\n<h2>Le principe</h2>\n<p>Trois familles de leviers, à appliquer dans cet ordre.</p>\n<p><strong>1. Mesurer avant d&#39;optimiser.</strong> Chaque réponse de l&#39;API expose un objet <code>usage</code> : <code>input_tokens</code> (tokens non cachés, plein tarif), <code>cache_creation_input_tokens</code> (écriture cache), <code>cache_read_input_tokens</code> (lecture cache, ~0,1× le prix input), <code>output_tokens</code>. Le total des tokens d&#39;entrée = <code>input_tokens + cache_creation_input_tokens + cache_read_input_tokens</code>. Sans cette métrologie, toute optimisation est aveugle. On capture <code>usage</code> par appel, on l&#39;agrège par techno surveillée et par étape du workflow, et on expose un <strong>coût/synthèse</strong> dans l&#39;observabilité (OpenTelemetry).</p>\n<p><strong>2. Le prompt caching — levier n°1.</strong> Le cache est un <strong>match de préfixe exact</strong> : le contenu stable (system prompt figé, liste d&#39;outils déterministe, doc source de la techno) va en tête ; le contenu volatil (question, timestamp, ID de session) va <strong>après</strong> le dernier point de césure (<code>cache_control</code>). Économie chez Anthropic : lecture à <strong>0,1×</strong> le prix input (~90 % d&#39;économie sur la partie en cache). Le coût d&#39;écriture est de <strong>1,25×</strong> (TTL 5 min) ou <strong>2×</strong> (TTL 1 h). Le break-even : ≥ 2 lectures pour rentabiliser le TTL 5 min, ≥ 3 pour le TTL 1 h.</p>\n<p><strong>3. Le model routing/tiering.</strong> On route chaque tâche vers le plus petit modèle qui « fait le job » : tâches simples (classification, extraction de numéro de version, détection de doublon) vers <strong>Haiku 4.5</strong> ($1/$5 par MTok), synthèse standard vers <strong>Sonnet 4.6</strong> ($3/$15), synthèses de migration complexes et raisonnement long vers <strong>Opus 4.8</strong> ($5/$25). Le routing préserve mieux la qualité avec du prompting (un Haiku bien promté, n-shot, peut égaler un Opus zero-shot) qu&#39;avec du sous-dimensionnement brutal. Pour le non temps-réel (re-synthèses planifiées, évals), le <strong>Batch API</strong> ajoute −50 % sur tous les tokens, cumulable avec le caching dans chaque requête. Ces leviers s&#39;empilent de façon <strong>multiplicative</strong> car chacun s&#39;applique à un type de trafic différent.</p>\n<h2>Exemples concrets</h2>\n<p><strong>Pipeline de synthèse React 18→19 avec cache de préfixe.</strong> Le préfixe stable (system prompt + changelog officiel React 19 + guide de migration) est mis en cache ; seule la question variable paie le plein tarif.</p>\n<pre><code class=\"language-python\">import anthropic\n\nclient = anthropic.Anthropic()\n\nSYSTEM_FIGE = &quot;Tu es un assistant de veille. Cite la source de chaque affirmation...&quot;\nDOC_SOURCE_REACT19 = open(&quot;sources/react-19-migration.md&quot;).read()  # préfixe stable\n\ndef repondre(question: str):\n    resp = client.messages.create(\n        model=&quot;claude-sonnet-4-6&quot;,\n        max_tokens=16000,\n        system=[\n            {&quot;type&quot;: &quot;text&quot;, &quot;text&quot;: SYSTEM_FIGE},\n            {\n                &quot;type&quot;: &quot;text&quot;,\n                &quot;text&quot;: DOC_SOURCE_REACT19,\n                &quot;cache_control&quot;: {&quot;type&quot;: &quot;ephemeral&quot;},  # césure à la FIN du préfixe partagé\n            },\n        ],\n        messages=[{&quot;role&quot;: &quot;user&quot;, &quot;content&quot;: question}],  # volatil, APRÈS la césure\n    )\n    u = resp.usage\n    # Prouver l&#39;économie : cache_read_input_tokens doit être &gt; 0 dès le 2e appel\n    print(f&quot;read={u.cache_read_input_tokens} write={u.cache_creation_input_tokens} input={u.input_tokens}&quot;)\n    return resp\n\nrepondre(&quot;Quels breaking changes sur les refs ?&quot;)       # 1er appel : écrit le cache (1,25×)\nrepondre(&quot;Comment migrer Suspense ?&quot;)                    # 2e appel : lit le cache (0,1×)\n</code></pre>\n<p><strong>Routing par étape du workflow.</strong> L&#39;étape 1 (« une nouvelle version React est-elle sortie ? », déduplication des annonces) part vers Haiku 4.5 ; la rédaction de la synthèse sourcée part vers Sonnet 4.6 ou Opus 4.8 selon un score de complexité.</p>\n<pre><code class=\"language-python\">def router(tache: str, complexite: float) -&gt; str:\n    if tache in (&quot;detecter_version&quot;, &quot;dedupliquer&quot;):\n        return &quot;claude-haiku-4-5&quot;          # $1/$5 — classification simple\n    if tache == &quot;synthese&quot; and complexite &gt;= 0.7:\n        return &quot;claude-opus-4-8&quot;           # $5/$25 — raisonnement long\n    return &quot;claude-sonnet-4-6&quot;             # $3/$15 — synthèse standard\n</code></pre>\n<p><strong>Re-génération nocturne en Batch API (−50 %).</strong> Re-synthétiser toutes les technos surveillées une fois par nuit, chaque requête réutilisant le cache de préfixe de sa doc source — non temps-réel, la fenêtre 24 h est acceptable. Les résultats arrivent dans un ordre quelconque : on indexe par <code>custom_id</code>, jamais par position.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Match de préfixe EXACT.</strong> Un seul octet modifié dans le préfixe (ordre de rendu <code>tools</code> → <code>system</code> → <code>messages</code>) invalide tout ce qui suit. Sérialiser le JSON avec <code>sort_keys</code>, figer l&#39;ordre des outils.</li>\n<li><strong><code>datetime.now()</code>, UUID ou ID de session dans le system prompt</strong> = cache invalidé à chaque requête. Symptôme : <code>cache_read_input_tokens</code> reste à 0. Injecter le contexte dynamique APRÈS le dernier breakpoint.</li>\n<li><strong>Seuil minimal de mise en cache.</strong> ~1024 tokens pour Opus 4.8 / Sonnet 4.6 (la doc officielle indique 4096 pour Haiku 4.5). En-dessous, rien n&#39;est mis en cache <strong>silencieusement</strong> (<code>cache_creation_input_tokens = 0</code>) malgré le marqueur <code>cache_control</code>.</li>\n<li><strong>Vérifier les hits, ne pas supposer.</strong> Si <code>cache_read_input_tokens</code> reste à 0 sur des préfixes identiques, un invalidateur silencieux est à l&#39;œuvre (timestamp, JSON non trié, set d&#39;outils variable, switch de modèle).</li>\n<li><strong>Hiérarchie d&#39;invalidation à trois niveaux</strong> (<code>tools</code> / <code>system</code> / <code>messages</code>). Changer <code>tool_choice</code> ou activer/désactiver le thinking n&#39;invalide PAS le cache <code>tools</code>+<code>system</code> ; seuls un changement de définition d&#39;outils ou de modèle force une reconstruction complète. Ne pas sur-optimiser les paramètres inoffensifs.</li>\n<li><strong>Fenêtre de lookback de 20 blocs.</strong> Chaque breakpoint ne remonte que 20 blocs en arrière. Dans les boucles avec beaucoup de paires <code>tool_use</code>/<code>tool_result</code>, placer un breakpoint intermédiaire tous les ~15 blocs.</li>\n<li><strong>Changer de modèle invalide tout le cache</strong> (caches scoped par modèle). Épingler l&#39;ID exact (<code>claude-sonnet-4-6</code>) pour la reproductibilité ET la stabilité du cache.</li>\n<li><strong>Breakpoint mal placé.</strong> Le mettre à la fin du prompt complet (incluant la question variable) au lieu de la fin du préfixe partagé : chaque requête écrit une entrée jamais relue — on paie le premium d&#39;écriture sans aucun read.</li>\n<li><strong>Ne pas cacher du contenu lu une seule fois.</strong> Le caching coûte 1,25× sans bénéfice si le préfixe n&#39;est lu qu&#39;une fois ; rentable seulement à partir de ~2 lectures (TTL 5 min).</li>\n<li><strong><code>tiktoken</code> ment pour Claude.</strong> C&#39;est le tokenizer d&#39;OpenAI ; il sous-estime de 15-20 % (davantage sur le code). Toujours utiliser <code>count_tokens</code> du fournisseur ciblé pour estimer coûts et tenir le contexte.</li>\n<li><strong>Batch API ≠ Zero Data Retention</strong> chez Anthropic — point de conformité à vérifier si la veille traite des sources sensibles. Résultats conservés 29 jours, jusqu&#39;à 100 000 requêtes ou 256 MB par batch.</li>\n<li><strong>Le coût caché de la qualité.</strong> Un routing trop agressif vers Haiku peut produire des synthèses moins fiables, ruinant le différenciateur « confiance ». Le routing doit être <strong>éval-driven</strong>, pas seulement coût-driven : un Haiku qui hallucine une source détruit la valeur du produit.</li>\n<li><strong>Requêtes concurrentes.</strong> N requêtes parallèles à préfixe identique paient toutes le plein tarif — une entrée de cache n&#39;est lisible qu&#39;une fois la première réponse commencée en streaming. Pour un fan-out : envoyer 1 requête, attendre le 1er token, puis lancer les N-1 autres.</li>\n<li><strong>Ne pas tronquer silencieusement</strong> les entrées trop longues pour « faire rentrer » dans le contexte : préférer le chunking/résumé explicite et le signaler, sinon on produit des synthèses incomplètes et non fiables.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> <code>usage</code> (input / output / cache_read / cache_creation) capturé et loggé à chaque appel</li>\n<li><input disabled=\"\" type=\"checkbox\"> Coût/synthèse calculé et exposé par techno et par version (OpenTelemetry)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Coût tracé par étape du workflow 9 étapes</li>\n<li><input disabled=\"\" type=\"checkbox\"> System prompt <strong>figé</strong> : aucun <code>datetime.now()</code>, UUID ni ID de session avant le dernier breakpoint</li>\n<li><input disabled=\"\" type=\"checkbox\"> JSON sérialisé avec <code>sort_keys</code>, ordre des outils déterministe</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>cache_control</code> placé à la <strong>fin du préfixe partagé</strong>, pas après la question variable</li>\n<li><input disabled=\"\" type=\"checkbox\"> Préfixe ≥ seuil minimal (~1024 tokens pour Opus 4.8 / Sonnet 4.6)</li>\n<li><input disabled=\"\" type=\"checkbox\"> TTL choisi selon le trafic (5 min par défaut ; 1 h seulement si requêtes espacées de &gt; 5 min)</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>cache_read_input_tokens &gt; 0</code> vérifié sur des préfixes identiques (preuve d&#39;économie)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Routing Haiku / Sonnet / Opus défini par difficulté ET validé par évals</li>\n<li><input disabled=\"\" type=\"checkbox\"> ID de modèle épinglé (<code>claude-sonnet-4-6</code>, etc.) pour reproductibilité et stabilité du cache</li>\n<li><input disabled=\"\" type=\"checkbox\"> Batch API utilisé pour le non temps-réel (re-synthèses nocturnes, évals de régression)</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>max_tokens</code> borné au juste nécessaire ; tokens comptés avec <code>count_tokens</code> (jamais <code>tiktoken</code>)</li>\n<li><input disabled=\"\" type=\"checkbox\"> Conformité ZDR vérifiée si Batch API + sources sensibles</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi le prompt caching, en une phrase ?</strong>\nC&#39;est la mise en cache d&#39;un préfixe stable de prompt (instructions, doc source) de sorte que les requêtes suivantes qui partagent ce préfixe le relisent à ~0,1× du prix input au lieu du plein tarif (Anthropic — Prompt Caching).</p>\n<p><strong>Q2. Pourquoi mesurer avant d&#39;optimiser ?</strong>\nParce que sans métrologie on optimise à l&#39;aveugle. On instrumente le coût/synthèse dès J1 via l&#39;objet <code>usage</code>, puis on cible les postes réels. C&#39;est le « meter before you manage » des praticiens (applied-llms.org).</p>\n<p><strong>Q3. Quel est le levier de coût n°1 pour TechWatch IA ?</strong>\nLe prompt caching du préfixe partagé (system prompt + doc source de la techno), car le projet recharge le même long-context à chaque question. La lecture cache à 0,1× donne ~90 % d&#39;économie sur cette portion (Anthropic — Prompt Caching).</p>\n<p><strong>Q4. Comment je vérifie qu&#39;un cache hit a vraiment eu lieu ?</strong>\nOn lit <code>usage.cache_read_input_tokens</code> dans la réponse : s&#39;il reste à 0 sur des requêtes à préfixe identique, un invalidateur silencieux est en cause (timestamp, JSON non trié, set d&#39;outils variable). Total entrée = <code>input + cache_creation + cache_read</code> (Anthropic — Prompt Caching).</p>\n<p><strong>Q5. 5 minutes ou 1 heure de TTL ?</strong>\nTTL 5 min (écriture 1,25×) pour le trafic continu ; TTL 1 h (écriture 2×) seulement si les requêtes sont espacées de plus de 5 min. Le 5 min est rentable dès 2 lectures, le 1 h dès 3 lectures (Anthropic — Prompt Caching).</p>\n<p><strong>Q6. Comment router entre Haiku, Sonnet et Opus ?</strong>\nPar difficulté : Haiku 4.5 ($1/$5) pour la classification/extraction/détection de doublon, Sonnet 4.6 ($3/$15) pour la synthèse standard, Opus 4.8 ($5/$25) pour les migrations complexes et le raisonnement long. « Choose the smallest model that gets the job done » (applied-llms.org).</p>\n<p><strong>Q7. Sous-dimensionner partout pour économiser, bonne idée ?</strong>\nNon. Un routing trop agressif vers Haiku casse le différenciateur fiabilité/sourcé. Le routing doit être éval-driven : on valide la qualité avant de descendre en gamme. Un petit modèle bien promté (n-shot) peut égaler un gros modèle zero-shot, mais cela se prouve par l&#39;éval (applied-llms.org ; Eugene Yan — LLM patterns).</p>\n<p><strong>Q8. Quand utiliser le Batch API ?</strong>\nPour le non temps-réel : re-synthèses planifiées, évals de régression, traitement de masse. −50 % sur tous les tokens, la plupart des batchs &lt; 1 h (fenêtre max 24 h), jusqu&#39;à 100k requêtes / 256 MB, cumulable avec le caching. Attention : non éligible au Zero Data Retention, résultats dans un ordre quelconque indexés par <code>custom_id</code> (Anthropic — Batch Processing).</p>\n<p><strong>Q9. Peut-on charger toute la doc en contexte sans vector DB ?</strong>\nOui, et c&#39;est précisément ce que le caching rend viable : lire la doc source à 0,1× évite de maintenir une infra RAG/embeddings dès le MVP — cohérent avec « choose boring technology » et « the system around it is the product » (applied-llms.org ; Anthropic — Prompt Caching).</p>\n<p><strong>Q10. Comment empiler tous les leviers ?</strong>\nDe façon multiplicative, chacun sur un trafic différent : cache de préfixe (~90 % sur le contexte réutilisé) + routing vers le modèle le moins cher acceptable + Batch (−50 % sur le non temps-réel) + cache de réponse complet (100 % sur les répétitions exactes). On compte les tokens AVANT envoi avec <code>count_tokens</code> et jamais <code>tiktoken</code>, qui sous-estime de 15-20 % pour Claude (Anthropic — Prompt Caching ; applied-llms.org).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://platform.claude.com/docs/en/build-with-claude/prompt-caching.md\">Anthropic — Prompt Caching (documentation officielle)</a> — <em>official_docs</em> — référence sur le levier de coût n°1 : lecture cache 0,1×, écriture 1,25× (5 min) / 2× (1 h), seuils minimaux par modèle, invalidation par préfixe exact, vérification via <code>usage.cache_read_input_tokens</code>.</li>\n<li><a href=\"https://developers.openai.com/api/docs/guides/prompt-caching\">OpenAI — Prompt Caching guide (documentation officielle)</a> — <em>official_docs</em> — point de comparaison fournisseur : caching automatique sans changement de code (&gt; 1024 tokens, incréments de 128), remise ~50 %, latence −80 %, pas de purge manuelle ; contraste avec le caching explicite d&#39;Anthropic.</li>\n<li><a href=\"https://platform.claude.com/docs/en/build-with-claude/batch-processing.md\">Anthropic — Batch Processing / Message Batches API (documentation officielle)</a> — <em>official_docs</em> — remise 50 % sur tous les tokens, traitement asynchrone (&lt; 1 h en général, fenêtre max 24 h), jusqu&#39;à 100 000 requêtes ou 256 MB par batch, résultats conservés 29 jours, non éligible au Zero Data Retention.</li>\n<li><a href=\"https://applied-llms.org/\">What We Learned from a Year of Building with LLMs (applied-llms.org)</a> — <em>practitioner</em> — « choose the smallest model that gets the job done », exemple Haiku 10-shot battant Opus zero-shot, caching pour éliminer recomputation/latence, normalisation des entrées pour augmenter le taux de hit, « the model isn&#39;t the product, the system around it is ».</li>\n<li><a href=\"https://eugeneyan.com/writing/llm-patterns/\">Eugene Yan — Patterns for Building LLM-based Systems &amp; Products</a> — <em>practitioner</em> — caching comme pattern de production (50 %+ d&#39;économies), RAG, guardrails, et l&#39;évaluation comme fondation — cohérent avec l&#39;approche éval-driven du projet.</li>\n<li><a href=\"https://openai.com/index/api-prompt-caching/\">OpenAI — Prompt Caching in the API (annonce officielle)</a> — <em>official_docs</em> — annonce officielle (1er octobre 2024) datant le caching automatique et la remise 50 % ; utile pour dater le pinning de version et la comparaison fournisseurs.</li>\n</ol>\n"},{"num":11,"slug":"observabilite-llm","title":"Observabilité LLM (OpenTelemetry, tracing, SLO)","tagline":"Instrumenter chaque appel LLM avec OpenTelemetry dès le jour 1 — un span gen_ai.* par appel portant tokens, coût, latence et qualité — pour rendre un pipeline non déterministe traçable, chiffrable et pilotable par des SLO, dont la fraîcheur des synthèses.","quiz":[{"q":"Qu'est-ce qu'un « span » dans le contexte d'un appel LLM ?","options":["Un fichier de log non structuré écrit après chaque génération","Une opération unitaire avec début, fin et attributs (ex. gen_ai.chat)","Le coût total d'une requête exprimé en dollars","Une métrique d'agrégation calculée une fois par jour"],"answer":1,"explain":"Un span représente une opération unitaire avec un début, une fin et des attributs ; pour le LLM c'est typiquement gen_ai.chat, portant modèle, tokens, finish_reason et durée. Les spans s'imbriquent pour former une trace de bout en bout."},{"q":"Pourquoi faut-il garder gen_ai.usage.input_tokens et gen_ai.usage.output_tokens séparés plutôt qu'un total agrégé ?","options":["Pour respecter une limite technique d'OpenTelemetry sur les compteurs","Parce que le coût d'un token d'entrée diffère de celui d'un token de sortie","Parce que les tokens de sortie ne sont jamais facturés","Pour réduire le nombre d'attributs indexés dans le backend"],"answer":1,"explain":"Le coût input et output diffère ; un total agrégé masque la structure de coût et empêche toute optimisation ciblée comme réduire la taille du prompt."},{"q":"Où doit-on stocker le contenu textuel des prompts et réponses ?","options":["Dans des attributs de span, car ils sont automatiquement chiffrés","Dans des span events, en opt-in et plafonnés en longueur","Dans les métriques gen_ai.client.token.usage","Nulle part : OpenTelemetry interdit toute capture de contenu"],"answer":1,"explain":"Le contenu se capture en opt-in (capture_message_content=True) sous forme de span events plafonnés à ~500-1000 caractères, jamais comme attributs qui sont indexés, plafonnés et exposent des PII."},{"q":"Pour le streaming, quel indicateur de latence est jugé le plus pertinent pour l'expérience utilisateur ?","options":["La durée totale de l'opération","Le nombre de tokens de sortie par seconde","Le time-to-first-token (TTFT)","Le p95 du coût par requête"],"answer":2,"explain":"Pour le streaming, le time-to-first-token (TTFT) est un SLI de latence plus pertinent pour l'UX que la durée totale de l'opération."},{"q":"Pourquoi alerter sur des burn-rates de SLO plutôt que sur des seuils bruts fixes ?","options":["Parce que les seuils bruts sont interdits par les conventions GenAI","Parce que les burn-rates sont moins coûteux à calculer côté backend","Parce que les seuils bruts génèrent du bruit et ratent les dégradations lentes","Parce que le burn-rate supprime totalement le besoin d'error budget"],"answer":2,"explain":"Un seuil brut déclenche au moindre pic (fatigue d'alerte) tout en ratant les dégradations lentes ; le burn-rate mesure la vitesse de consommation de l'error budget, avec moins de bruit et une meilleure détection des vraies dérives."},{"q":"Pourquoi appeler flush() est-il critique dans les workers serverless du projet ?","options":["Pour vider le cache de pricing avant chaque génération","Parce qu'une invocation courte se termine avant l'envoi batché, perdant les traces","Pour forcer la redaction PII dans le Collector","Parce que flush() recalcule le coût de la requête en temps réel"],"answer":1,"explain":"Les SDK envoient les traces en asynchrone batché ; une invocation serverless courte se termine avant le flush automatique et les traces sont perdues, d'où l'appel explicite à flush() avant la fin du process."},{"q":"Quelle bonne pratique limite le biais du LLM-as-judge comme SLI de qualité ?","options":["Utiliser une échelle de Likert plutôt que des comparaisons pairwise","Demander le verdict immédiatement, avant tout raisonnement","Interdire les égalités pour forcer une décision tranchée","Faire chaque comparaison pairwise deux fois en swappant l'ordre"],"answer":3,"explain":"On préfère le pairwise au Likert, on contrôle le biais de position en faisant chaque comparaison deux fois avec l'ordre inversé (swap), on exige un raisonnement avant le verdict et on autorise les égalités."}],"flashcards":[{"front":"Conventions sémantiques GenAI d'OpenTelemetry","back":"Vocabulaire standardisé et vendor-neutral pour instrumenter les appels LLM via les trois signaux d'OTel (traces, métriques, events), évitant le lock-in sur un backend. Spec encore Experimental, migrée dans le repo semantic-conventions."},{"front":"Attributs clés d'un span gen_ai.chat","back":"gen_ai.operation.name (chat, text_completion, embeddings), gen_ai.request.model et gen_ai.response.model, gen_ai.response.finish_reasons, et les deux compteurs de tokens distincts input/output."},{"front":"Métriques gen_ai.client.token.usage et gen_ai.client.operation.duration","back":"Le compteur token.usage (par modèle et type de token) sert à l'attribution coût ; l'histogramme operation.duration mesure la latence en secondes."},{"front":"Calcul du coût depuis le span","back":"(input_tokens × prix_input) + (output_tokens × prix_output), en quasi temps réel et sans outil de billing externe. Il faut externaliser la table de prix car le pricing varie par modèle et version."},{"front":"SLI vs SLO vs SLA","back":"Le SLI est la mesure (ex. % de requêtes sous un seuil), le SLO la cible interne (ex. p95 fraîcheur < 24 h), le SLA un engagement contractuel. Pour un MVP interne on définit surtout des SLO et des error budgets."},{"front":"SLO de fraîcheur (SLO clé du projet)","back":"p95 du délai entre la publication officielle d'une version (ex. React 19 GA) et la synthèse vérifiée publiée < 24 h, instrumenté via un span d'horloge, avec alerte sur le burn-rate de l'error budget."},{"front":"Les 4 dimensions du monitoring LLM","back":"Qualité, coût, latence et drift. Le drift se surveille par exemple sur la longueur et la structure des release notes ingérées pour détecter un changement de format de la source."},{"front":"Plancher d'hallucination","back":"On observe un plancher de 5-10 % d'hallucinations, difficile de descendre sous 2 % même sur des tâches simples comme la synthèse ; un SLO « zéro hallucination » est donc irréaliste."}],"sources":[{"title":"OpenTelemetry for Generative AI","url":"https://opentelemetry.io/blog/2024/otel-generative-ai/","type":"doc-officielle"},{"title":"OpenTelemetry GenAI Semantic Conventions","url":"https://opentelemetry.io/docs/specs/semconv/gen-ai/","type":"doc-officielle"},{"title":"OpenTelemetry for AI Systems: LLM and Agent Observability — Uptrace","url":"https://uptrace.dev/blog/opentelemetry-ai-systems","type":"praticien"},{"title":"OpenTelemetry for LLMs: Complete SRE Guide — OpenObserve","url":"https://openobserve.ai/blog/opentelemetry-for-llms/","type":"praticien"},{"title":"Langfuse — Tracing Data Model","url":"https://langfuse.com/docs/observability/data-model","type":"doc-officielle"},{"title":"Langfuse — Observability Overview","url":"https://langfuse.com/docs/observability/overview","type":"doc-officielle"},{"title":"What We Learned from a Year of Building with LLMs — applied-llms.org","url":"https://applied-llms.org/","type":"praticien"},{"title":"What is LLM monitoring? — Braintrust","url":"https://www.braintrust.dev/articles/what-is-llm-monitoring","type":"praticien"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Instrumenter chaque appel LLM avec OpenTelemetry dès le jour 1 — un span <code>gen_ai.*</code> par appel portant tokens, coût, latence et qualité — pour rendre un pipeline non déterministe traçable, chiffrable et pilotable par des SLO, dont la fraîcheur des synthèses.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA vend de la <strong>confiance</strong> : chaque affirmation cite sa source. Sans observabilité, on ne peut ni prouver qu&#39;une synthèse « React 18→19 » est fiable, ni savoir <em>où</em>, dans le workflow déterministe en 9 étapes, une sortie a dérapé. L&#39;OTel dès le jour 1 transforme génération et évaluation en signaux mesurables (coût, qualité, fraîcheur), et permet des SLO explicites — dont le plus stratégique : le délai entre la publication officielle d&#39;une version et la synthèse vérifiée publiée.</p>\n<h2>Le principe</h2>\n<p>L&#39;observabilité LLM repose sur les trois signaux d&#39;OpenTelemetry — <strong>traces, métriques, events</strong> — appliqués aux appels de modèles via les <strong>conventions sémantiques GenAI</strong>, un vocabulaire standardisé et vendor-neutral (pas de lock-in sur un backend). (<a href=\"https://opentelemetry.io/blog/2024/otel-generative-ai/\">OpenTelemetry for Generative AI</a>)</p>\n<p>Concrètement, chaque appel produit un <strong>span</strong> nommé <code>gen_ai.chat</code> (ou <code>gen_ai.embeddings</code>) portant des attributs normalisés :</p>\n<ul>\n<li><code>gen_ai.operation.name</code> (<code>chat</code>, <code>text_completion</code>, <code>embeddings</code>),</li>\n<li><code>gen_ai.request.model</code> et <code>gen_ai.response.model</code>,</li>\n<li><code>gen_ai.response.finish_reasons</code> (<code>[&quot;stop&quot;]</code>, <code>[&quot;length&quot;]</code>…),</li>\n<li><strong>deux compteurs de tokens distincts</strong> : <code>gen_ai.usage.input_tokens</code> et <code>gen_ai.usage.output_tokens</code> — jamais un total agrégé, car le coût input et output diffère. (<a href=\"https://uptrace.dev/blog/opentelemetry-ai-systems\">Uptrace</a>)</li>\n</ul>\n<p>Côté <strong>métriques</strong>, on alimente le compteur <code>gen_ai.client.token.usage</code> (par modèle et type de token, pour l&#39;attribution coût) et l&#39;histogramme <code>gen_ai.client.operation.duration</code> (latence en secondes). Pour le streaming, le <strong>time-to-first-token (TTFT)</strong> est un SLI de latence plus pertinent pour l&#39;UX que la durée totale.</p>\n<p>Le <strong>contenu</strong> des prompts/réponses se capture en <strong>opt-in</strong> (<code>capture_message_content=True</code>) et se stocke comme <strong>span events</strong> (<code>gen_ai.user.message</code>, <code>gen_ai.assistant.message</code>), <strong>jamais comme attributs</strong> : les attributs sont indexés, plafonnés, et exposent des PII. (<a href=\"https://uptrace.dev/blog/opentelemetry-ai-systems\">Uptrace</a>)</p>\n<p>Au-dessus de l&#39;instrumentation, on raisonne en <strong>SRE</strong> : SLI/SLO, coût par 1k requêtes, redaction PII centralisée dans le Collector, corrélation par <code>trace_id</code> (<a href=\"https://openobserve.ai/blog/opentelemetry-for-llms/\">OpenObserve</a>). Le tracing est le pilier central précisément <em>parce que</em> le LLM est non déterministe : dans un pipeline multi-étapes, la cause d&#39;une mauvaise sortie finale est souvent une sortie intermédiaire trompeuse, plusieurs étapes en amont (<a href=\"https://langfuse.com/docs/observability/overview\">Langfuse — Observability</a>). Enfin, le monitoring se décline sur <strong>4 dimensions</strong> : qualité, coût, latence, drift (<a href=\"https://www.braintrust.dev/articles/what-is-llm-monitoring\">Braintrust</a>).</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Trace de bout en bout d&#39;une synthèse « React 18→19 »</strong> (visualisée en waterfall dans Langfuse) :</p>\n<pre><code>span techwatch.synthesis            (racine, attrs: tech=&quot;react&quot;, from=&quot;18&quot;, to=&quot;19&quot;, release_id, env=&quot;prod&quot;)\n├─ span fetch_release_notes         (source officielle React ; attrs: source.url, source.freshness_s, http.status)\n├─ span gen_ai.chat                 (génération synthèse)\n│     gen_ai.operation.name = &quot;chat&quot;\n│     gen_ai.request.model = &quot;claude-...&quot;\n│     gen_ai.usage.input_tokens = 12480\n│     gen_ai.usage.output_tokens = 1830\n│     gen_ai.response.finish_reasons = [&quot;stop&quot;]\n│     event gen_ai.user.message (opt-in, tronqué à ~800 car.)\n└─ span gen_ai.chat                 (éval LLM-as-judge → émet un score)\n      score &quot;taux_affirmations_sourcees&quot; = 0.94  (source: eval)\n</code></pre>\n<p><strong>2. Calcul du coût en quasi temps réel</strong>, directement depuis le span — sans outil de billing externe :</p>\n<pre><code class=\"language-python\">def cost_from_span(span, pricing):  # pricing externalisé (table de prix par modèle/version)\n    p = pricing[span[&quot;gen_ai.response.model&quot;]]\n    inp = span[&quot;gen_ai.usage.input_tokens&quot;]  * p[&quot;input_per_1k&quot;]  / 1000\n    out = span[&quot;gen_ai.usage.output_tokens&quot;] * p[&quot;output_per_1k&quot;] / 1000\n    return inp + out  # attribuable par requête, feature, équipe et techno suivie\n</code></pre>\n<p><strong>3. SLO de fraîcheur (le SLO clé du projet)</strong> : « p95 du délai entre publication officielle d&#39;une version (ex. React 19 GA) et synthèse vérifiée publiée <strong>&lt; 24 h</strong> », instrumenté via un span d&#39;horloge ; alerte sur le <strong>burn-rate</strong> quand l&#39;error budget se consume.</p>\n<p><strong>4. Détection de drift sur les notes de version</strong> : suivre longueur et structure des release notes ingérées et alerter sur un skew structurel/sémantique signalant un changement de format de la source officielle qui casserait l&#39;extraction des breaking changes (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Spec GenAI encore Experimental</strong> : la convention a migré de site (désormais dans le repo <code>semantic-conventions</code>) et de nombreux attributs ne sont pas stables → <strong>verrouiller la version de convention</strong> utilisée et anticiper des renommages. (<a href=\"https://opentelemetry.io/docs/specs/semconv/gen-ai/\">OTel GenAI semconv</a>)</li>\n<li><strong>Extensions par provider</strong> (Anthropic, AWS Bedrock, OpenAI, Azure AI Inference) : les attributs spécifiques <em>complètent</em> sans <em>remplacer</em> les <code>gen_ai.*</code> génériques → rester sur le tronc commun pour la portabilité.</li>\n<li><strong>Contenu en attributs = piège silencieux</strong> : indexation forcée, troncature, fuite de PII, coûts backend qui explosent. Utiliser des <strong>span events</strong> + cap à ~500–1000 caractères.</li>\n<li><strong>Un seul compteur « total » de tokens</strong> masque la structure de coût input/output et empêche toute optimisation ciblée.</li>\n<li><strong>Logs maison non structurés</strong> au lieu d&#39;OTel : on perd la corrélation <code>trace_id</code> et le standard vendor-neutral → dette d&#39;observabilité et re-instrumentation forcée plus tard.</li>\n<li><strong>Alerter sur des seuils bruts fixes</strong> plutôt que sur des <strong>burn-rates de SLO</strong> : bruit, fatigue d&#39;alerte, et on rate les dégradations lentes. Pour le coût, prévoir des <strong>paliers 50/80/100 %</strong> du budget tokens.</li>\n<li><strong>Coût ≠ trivial</strong> : le pricing varie par modèle, par version, distingue input/output (et cache read/write chez certains providers) → <strong>externaliser la table de prix</strong>, sinon un calcul figé devient faux dès qu&#39;une version change.</li>\n<li><strong>LLM-as-judge n&#39;est pas une silver bullet</strong> : préférer le <strong>pairwise</strong> au Likert, contrôler le biais de position (faire chaque comparaison deux fois en <strong>swappant</strong> l&#39;ordre), demander un raisonnement avant le verdict, <strong>autoriser les égalités</strong> (<a href=\"https://applied-llms.org/\">applied-llms.org</a>). Des classifieurs/reward models classiques battent souvent le juge LLM en précision/latence/coût.</li>\n<li><strong>Goodhart&#39;s Law</strong> : « quand une mesure devient une cible, elle cesse d&#39;être une bonne mesure » — sur-optimiser un proxy (needle-in-haystack) dégrade les tâches réalistes de synthèse. Les SLO qualité doivent rester représentatifs de l&#39;usage réel.</li>\n<li><strong>Hallucinations</strong> : plancher observé de <strong>5–10 %</strong>, difficile de descendre sous <strong>2 %</strong> même sur des tâches simples comme la synthèse → un SLO « zéro hallucination » est irréaliste (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</li>\n<li><strong>Overhead &amp; serverless</strong> : les SDK (Langfuse) envoient en asynchrone/batché (overhead quasi nul), mais les workers serverless/event-driven <strong>doivent appeler <code>flush()</code></strong> avant la fin du process, sinon les traces des invocations courtes sont perdues — exactement là où vit ce projet. (<a href=\"https://langfuse.com/docs/observability/overview\">Langfuse — Overview</a>)</li>\n<li><strong>Logger seulement les succès</strong> biaise le dataset : capturer aussi timeouts, refus de modération et sorties vides (<a href=\"https://applied-llms.org/\">applied-llms.org</a>).</li>\n<li><strong>Pas de retrieval vectoriel à tracer</strong> (long-context, zéro vector DB), mais <strong>tracer le fetch des sources officielles et leur fraîcheur</strong> comme spans first-class (latence, échec, version détectée).</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> OTel instrumenté <strong>dès le jour 1</strong> ; chaque appel LLM = un span <code>gen_ai.*</code> vendor-neutral.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <code>gen_ai.usage.input_tokens</code> et <code>gen_ai.usage.output_tokens</code> <strong>séparés</strong> ; métrique <code>gen_ai.client.token.usage</code> par (model, token type).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Latence via <code>gen_ai.client.operation.duration</code> ; <strong>TTFT</strong> suivi pour le streaming.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Coût calculé par requête/feature/équipe/techno depuis les spans ; <strong>table de prix externalisée</strong>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Contenu prompts/completions en <strong>opt-in</strong>, en <strong>span events</strong>, plafonné à ~500–1000 car.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Redaction PII centralisée dans le Collector</strong> avant export.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque étape du workflow 9 étapes = une <strong>observation enfant</strong> (fetch source, génération, éval).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Scores qualité par trace</strong> émis par génération ET évaluation (numérique/catégoriel/booléen).</li>\n<li><input disabled=\"\" type=\"checkbox\"> SLO définis : p95 latence par (provider, model), taux d&#39;erreur par <code>error.type</code>, % réponses sous seuil qualité, <strong>fraîcheur des synthèses</strong>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Alertes burn-rate</strong> (pas seuils bruts) + paliers coût <strong>50/80/100 %</strong>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Alerte <strong>runaway/injection</strong> : <code>gen_ai.client.token.usage</code> &gt; ~2× baseline sur 10 min.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>TOUTES</strong> les I/O loguées, y compris timeouts / blocages modération / sorties vides.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Drift dev/prod surveillé (longueurs I/O, clusters d&#39;embeddings, structure des release notes).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Vibe check quotidien</strong> : revue manuelle d&#39;un échantillon, convertie en assertions/évals.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Attributs propagés (<code>user_id</code>, <code>session_id</code>, <code>release/version</code>, <code>environment</code>) + <strong>trace IDs custom</strong> entre workers.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong><code>flush()</code></strong> appelé dans chaque worker serverless avant fin de process.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi un « span » pour un appel LLM ?</strong>\nUn span représente une opération unitaire avec un début, une fin et des attributs. Pour le LLM, c&#39;est typiquement <code>gen_ai.chat</code>, portant le modèle, les tokens, le <code>finish_reason</code> et la durée. Les spans s&#39;imbriquent pour former une trace de bout en bout du workflow. (<a href=\"https://uptrace.dev/blog/opentelemetry-ai-systems\">Uptrace</a>)</p>\n<p><strong>Q2. Pourquoi OpenTelemetry plutôt que des logs maison ?</strong>\nOTel fournit des conventions sémantiques <strong>standardisées et vendor-neutral</strong> : on évite le lock-in et on peut changer de backend sans réinstrumenter. Des logs maison non structurés perdent la corrélation par <code>trace_id</code> et créent une dette d&#39;observabilité. (<a href=\"https://opentelemetry.io/blog/2024/otel-generative-ai/\">OpenTelemetry for Generative AI</a>)</p>\n<p><strong>Q3. Pourquoi séparer input_tokens et output_tokens ?</strong>\nParce que le coût d&#39;un token d&#39;entrée diffère de celui d&#39;un token de sortie. Un total agrégé masque la structure de coût et empêche d&#39;optimiser (ex. réduire la taille du prompt). On garde <code>gen_ai.usage.input_tokens</code> et <code>gen_ai.usage.output_tokens</code> distincts. (<a href=\"https://uptrace.dev/blog/opentelemetry-ai-systems\">Uptrace</a>)</p>\n<p><strong>Q4. Où mettre le texte des prompts et réponses ?</strong>\nDans des <strong>span events</strong> (<code>gen_ai.user.message</code>, <code>gen_ai.assistant.message</code>), en opt-in via <code>capture_message_content=True</code>, et plafonné en longueur. Jamais dans des attributs : ils sont indexés, plafonnés et exposent des PII, faisant exploser les coûts du backend. (<a href=\"https://uptrace.dev/blog/opentelemetry-ai-systems\">Uptrace</a>)</p>\n<p><strong>Q5. Comment calculer le coût d&#39;une synthèse sans outil de billing ?</strong>\nDirectement depuis le span : <code>(input_tokens × prix_input) + (output_tokens × prix_output)</code>, en quasi temps réel, attribuable par requête, feature, équipe et techno. Il faut <strong>externaliser la table de prix</strong> car le pricing change par modèle et version. (<a href=\"https://openobserve.ai/blog/opentelemetry-for-llms/\">OpenObserve</a>)</p>\n<p><strong>Q6. Quelle différence entre SLI, SLO et SLA ?</strong>\nLe SLI est la mesure (ex. % de requêtes sous un seuil de latence), le SLO la cible interne (ex. p95 &lt; 24 h pour la fraîcheur), le SLA un engagement contractuel. Pour un MVP interne, on définit surtout des SLO et des error budgets. (<a href=\"https://openobserve.ai/blog/opentelemetry-for-llms/\">OpenObserve</a>)</p>\n<p><strong>Q7. Pourquoi alerter sur des burn-rates plutôt que des seuils fixes ?</strong>\nUn seuil brut déclenche au moindre pic et noie sous le bruit (fatigue d&#39;alerte) tout en ratant les dégradations lentes mais soutenues. Le burn-rate mesure la vitesse de consommation de l&#39;error budget : moins de bruit, meilleure détection des vraies dérives. (<a href=\"https://openobserve.ai/blog/opentelemetry-for-llms/\">OpenObserve</a>)</p>\n<p><strong>Q8. Comment émettre la qualité comme signal observable ?</strong>\nVia des <strong>scores par trace</strong> (numérique, catégoriel ou booléen ; source eval/human/api) attachés aux observations. Ainsi l&#39;étape d&#39;évaluation pousse un score (ex. « taux d&#39;affirmations sourcées »), couplable au coût pour alerter si la qualité chute pendant que le coût monte. (<a href=\"https://langfuse.com/docs/observability/data-model\">Langfuse — Data Model</a>)</p>\n<p><strong>Q9. Le LLM-as-judge peut-il être mon seul SLI de qualité ?</strong>\nNon. Sans calibration humaine ni assertions déterministes, biais de position et de longueur dérivent. Préférer le pairwise au Likert, <strong>swapper l&#39;ordre</strong> des comparaisons, exiger un raisonnement avant le verdict et autoriser les égalités ; des classifieurs classiques le battent souvent en précision/latence/coût. (<a href=\"https://applied-llms.org/\">applied-llms.org</a>)</p>\n<p><strong>Q10. Pourquoi <code>flush()</code> est-il critique dans nos workers serverless ?</strong>\nLes SDK envoient les traces en asynchrone batché pour un overhead quasi nul, mais une invocation courte se termine avant le flush automatique : les traces sont perdues. Appeler <code>flush()</code> avant la fin du process garantit qu&#39;on n&#39;a pas de trous d&#39;observabilité dans l&#39;architecture event-driven du projet. (<a href=\"https://langfuse.com/docs/observability/overview\">Langfuse — Overview</a>)</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://opentelemetry.io/blog/2024/otel-generative-ai/\">OpenTelemetry for Generative AI</a> — <em>doc-officielle</em> — annonce du GenAI SIG : les 3 signaux (traces/metrics/events) appliqués au LLM et la justification de conventions sémantiques standardisées.</li>\n<li><a href=\"https://opentelemetry.io/docs/specs/semconv/gen-ai/\">OpenTelemetry GenAI Semantic Conventions</a> — <em>doc-officielle</em> — spécification normative (Experimental, migrée vers le repo <code>semantic-conventions</code>) : spans <code>gen_ai</code>, agent spans, conventions par provider, events, metrics, MCP.</li>\n<li><a href=\"https://uptrace.dev/blog/opentelemetry-ai-systems\">OpenTelemetry for AI Systems: LLM and Agent Observability — Uptrace</a> — <em>praticien</em> — guide d&#39;instrumentation fidèle à la spec : noms de spans (<code>gen_ai.chat</code>, <code>gen_ai.embeddings</code>), <code>gen_ai.operation.name</code>, <code>gen_ai.usage.input/output_tokens</code>, métriques <code>gen_ai.client.token.usage</code> et <code>gen_ai.client.operation.duration</code>, capture opt-in via span events.</li>\n<li><a href=\"https://openobserve.ai/blog/opentelemetry-for-llms/\">OpenTelemetry for LLMs: Complete SRE Guide — OpenObserve</a> — <em>praticien</em> — traduction SRE : SLI/SLO (p95 par modèle, <code>error.type</code>, <code>finish_reason</code>), coût par 1k requêtes, redaction PII dans le Collector, attribution coût, debug par <code>trace_id</code>.</li>\n<li><a href=\"https://langfuse.com/docs/observability/data-model\">Langfuse — Tracing Data Model</a> — <em>doc-officielle</em> — modèle de données : traces, observations (generation/span/event), scores (eval/human/api), sessions, users, tags, environnements, coût/tokens, ingestion OTel, batching async + <code>flush()</code>.</li>\n<li><a href=\"https://langfuse.com/docs/observability/overview\">Langfuse — Observability Overview</a> — <em>doc-officielle</em> — le tracing comme pilier face au non-déterminisme LLM, overhead nul par envoi asynchrone batché, bonnes pratiques (decorator vs manuel, trace IDs custom pour le tracing distribué).</li>\n<li><a href=\"https://applied-llms.org/\">What We Learned from a Year of Building with LLMs — applied-llms.org</a> — <em>praticien</em> — évaluation &amp; monitoring en prod : LLM-as-judge avec garde-fous, logging systématique des I/O (y compris absences de sortie), data flywheel, Goodhart&#39;s Law, plancher d&#39;hallucination 5–10 %.</li>\n<li><a href=\"https://www.braintrust.dev/articles/what-is-llm-monitoring\">What is LLM monitoring? — Braintrust</a> — <em>praticien</em> — cadre des 4 dimensions du monitoring LLM (qualité, coût, latence, drift) et leur traduction en SLI/SLO + alerting.</li>\n</ol>\n"},{"num":12,"slug":"detection-de-version","title":"Détection de version (polling, ETags, webhooks)","tagline":"Pour savoir de façon fiable qu'une techno est passée de la v18 à la v19, on interroge périodiquement l'API des releases GitHub (polling cron), on évite de re-scanner inutilement grâce aux requêtes conditionnelles (ETag / If-None-Match), on compare la version reçue à un curseur persistant avec une vraie logique SemVer, et on garde les webhooks pour plus tard comme optimisation temps réel — jamais comme unique filet.","quiz":[{"q":"Quel est le mécanisme de base recommandé pour détecter une nouvelle version de manière prouvablement fiable ?","options":["Un worker planifié (cron) qui interroge périodiquement l'API des releases","Des webhooks temps réel utilisés comme unique source de détection","Un scan manuel déclenché par l'utilisateur","Un long-polling permanent maintenu ouvert sur l'API GitHub"],"answer":0,"explain":"C'est le modèle de Dependabot/Renovate : un worker cron interroge l'endpoint des releases sur planning, sans dépendre du temps réel. Les webhooks ne sont qu'une optimisation ultérieure car ils peuvent être manqués."},{"q":"Que se passe-t-il quand on renvoie un ETag via If-None-Match et que rien n'a changé sur le dépôt ?","options":["GitHub renvoie un 200 avec le corps complet, comptabilisé dans le quota","GitHub répond 304 Not Modified sans corps, sans consommer le rate limit primaire (si authentifié)","GitHub renvoie une erreur 429 tant que la ressource est inchangée","GitHub renvoie un 204 No Content mais décompte quand même une requête du quota"],"answer":1,"explain":"Un 304 Not Modified est renvoyé sans corps, et ce 304 ne décompte pas du rate limit primaire quand on est authentifié. On ne « paie » donc que les vrais changements."},{"q":"Quels sont les quotas horaires du rate limit primaire de l'API REST GitHub ?","options":["1 000 req/h anonyme, 10 000 req/h authentifié","100 req/h anonyme, 1 000 req/h authentifié","60 req/h anonyme, 5 000 req/h authentifié (GitHub App jusqu'à 12 500 req/h)","60 req/min anonyme, 5 000 req/min authentifié"],"answer":2,"explain":"Sans token : 60 requêtes/heure ; avec un token : 5 000 req/h. Une GitHub App donne un quota par installation allant de 5 000 jusqu'à 12 500 req/h."},{"q":"Pourquoi ne faut-il pas comparer les numéros de version comme de simples chaînes de caractères ?","options":["Parce que les chaînes ne peuvent pas contenir de points ou de tirets","Parce que l'ordre lexicographique se trompe : '9.0.0' passe après '10.0.0' et 'alpha10' avant 'alpha2'","Parce que GitHub renvoie toujours les tags dans le désordre","Parce que la comparaison de chaînes est trop lente pour le volume de releases"],"answer":1,"explain":"La comparaison lexicographique trie mal les versions : '9.0.0' passe après '10.0.0' et '1.0.0-alpha10' avant '1.0.0-alpha2'. Il faut une bibliothèque SemVer 2.0.0 conforme qui compare les identifiants numériques numériquement."},{"q":"Quel endpoint utiliser pour capter une RC comme 19.0.0-rc.1 avant la sortie stable ?","options":["GET /releases/latest, qui inclut les pré-releases par défaut","GET /releases/latest avec le paramètre ?prerelease=true","List releases puis filtrer prerelease === true côté client","L'API Tags, car les RC n'apparaissent jamais dans l'API Releases"],"answer":2,"explain":"/releases/latest ne renvoie que la dernière release stable (non-prerelease, non-draft) et ignore donc les RC. Pour anticiper la migration, on utilise List releases et on filtre prerelease === true."},{"q":"Selon un retour de praticien Renovate/Dependabot, quel piège affecte l'ETag de GitHub ?","options":["L'ETag peut changer alors que la ressource est identique (faux 200), tandis que Last-Modified reste stable","L'ETag n'est jamais renvoyé par l'API Releases de GitHub","L'ETag est toujours plus fiable que Last-Modified et ne change jamais à tort","L'ETag expire automatiquement après exactement 5 minutes"],"answer":0,"explain":"L'ETag GitHub peut changer alors que la ressource est inchangée (faux 200) et gaspiller du quota, alors que Last-Modified reste stable. If-Modified-Since peut donc être plus fiable. De plus l'ETag est mis en cache par token, d'où un cold start au renouvellement de token GitHub App."},{"q":"Quelle est la bonne stratégie de backpressure quand x-ratelimit-remaining vaut 0 ou que retry-after est présent ?","options":["Retenter immédiatement en boucle serrée jusqu'à obtenir une réponse 200","Basculer sur du polling anonyme pour contourner la limite du token","Attendre x-ratelimit-reset (epoch UTC) ou respecter exactement retry-after, avec backoff exponentiel","Surveiller uniquement x-ratelimit-remaining et ignorer retry-after"],"answer":2,"explain":"Si remaining vaut 0, on attend x-ratelimit-reset (epoch UTC) ; si retry-after est présent (limite secondaire), on respecte exactement ce délai avec un backoff exponentiel. Retenter en boucle serrée est vu comme un abus et peut faire bannir le token."}],"flashcards":[{"front":"Polling cron vs webhooks : lequel est le filet de sécurité ?","back":"Le polling cron est l'approche fiable et prouvable (modèle Dependabot/Renovate). Les webhooks sont une optimisation temps réel ultérieure : ils peuvent être manqués, retardés ou dupliqués, donc on les combine toujours à un polling de réconciliation."},{"front":"Requête conditionnelle (If-None-Match / If-Modified-Since)","back":"On renvoie l'ETag (ou la date Last-Modified) de la réponse précédente. Si rien n'a changé, GitHub répond 304 Not Modified sans corps, et ce 304 ne décompte pas du rate limit primaire quand on est authentifié."},{"front":"Curseur de détection","back":"État persistant par techno qui matérialise « ce que j'ai déjà vu », typiquement { lastTag, etag, releaseId }. On compare chaque réponse au curseur pour ne déclencher la synthèse que sur un vrai delta, puis on l'avance."},{"front":"Précédence SemVer 2.0.0","back":"Format MAJOR.MINOR.PATCH. Les identifiants numériques se comparent numériquement, le build metadata (+xxx) est totalement ignoré pour l'ordre, et une pré-release passe avant la release correspondante (1.0.0-rc.1 < 1.0.0)."},{"front":"Idempotence de la détection","back":"On déduplique sur l'identifiant de release (ou le tag) afin qu'un re-poll ou une livraison webhook dupliquée ne relance pas une synthèse déjà produite. Sans cela, on paie deux fois le coût LLM et on génère du bruit."},{"front":"Releases ≠ tags Git","back":"Un tag Git sans release associée n'apparaît PAS dans l'API Releases. Si une techno ne publie que des tags, il faut poller l'API Tags (ou git ls-remote --tags)."},{"front":"Piège de /releases/latest","back":"Il renvoie la dernière release stable (non-prerelease, non-draft) triée par created_at, pas par date de publication. Une release rétro-datée ou re-taguée peut tromper la logique « la plus récente » : croiser avec le tag SemVer plutôt que se fier à l'ordre de l'API."},{"front":"Limites secondaires du rate limit GitHub","back":"Au-delà du quota horaire primaire, des limites secondaires existent : max 100 requêtes concurrentes, 900 points/min en REST, 90 s de CPU par 60 s réelles. Elles peuvent se déclencher en burst : surveiller retry-after, pas seulement x-ratelimit-remaining."}],"sources":[{"title":"Best practices for using the REST API — GitHub Docs","url":"https://docs.github.com/en/rest/using-the-rest-api/best-practices-for-using-the-rest-api","type":"officielle"},{"title":"Rate limits for the REST API — GitHub Docs","url":"https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api","type":"officielle"},{"title":"Semantic Versioning 2.0.0 — semver.org","url":"https://semver.org/","type":"officielle"},{"title":"Releases REST API — GitHub Docs","url":"https://docs.github.com/en/rest/releases/releases","type":"officielle"},{"title":"Webhook events and payloads (release event) — GitHub Docs","url":"https://docs.github.com/en/webhooks/webhook-events-and-payloads","type":"officielle"},{"title":"Bot comparison — Renovate Docs / Dependabot","url":"https://docs.renovatebot.com/bot-comparison/","type":"officielle"},{"title":"Making the most of GitHub rate limits — Jamie Magee","url":"https://jamiemagee.co.uk/blog/making-the-most-of-github-rate-limits/","type":"praticien"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Pour savoir de façon fiable qu&#39;une techno est passée de la v18 à la v19, on interroge périodiquement l&#39;API des releases GitHub (polling cron), on évite de re-scanner inutilement grâce aux requêtes conditionnelles (ETag / <code>If-None-Match</code>), on compare la version reçue à un curseur persistant avec une vraie logique SemVer, et on garde les webhooks pour plus tard comme optimisation temps réel — jamais comme unique filet.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch IA promet une synthèse de migration <strong>fiable et sourcée</strong> déclenchée au bon moment : il faut donc détecter une nouvelle version <strong>sans la rater</strong> et <strong>sans la dupliquer</strong>. La détection de version est l&#39;étape 1 du workflow déterministe : c&#39;est elle qui décide « il y a un vrai delta (React 18 → 19), je lance la génération » plutôt que de brûler du quota et du budget LLM sur du bruit. Comme le différenciateur du produit est la confiance, on privilégie une approche robuste (polling cron + curseur, modèle Dependabot/Renovate) où l&#39;on peut prouver qu&#39;aucune release n&#39;a été manquée, plutôt qu&#39;une approche temps réel fragile.</p>\n<h2>Le principe</h2>\n<p>L&#39;idée de base : un <strong>worker planifié (cron)</strong> interroge à intervalle régulier l&#39;endpoint des releases d&#39;un dépôt GitHub, par exemple <code>GET /repos/{owner}/{repo}/releases</code>. C&#39;est exactement le modèle d&#39;un bot de mise à jour de dépendances comme Renovate, qui s&#39;exécute sur planning et interroge les registres, sans détection temps réel par défaut (<a href=\"https://docs.renovatebot.com/bot-comparison/\">Renovate Docs</a>).</p>\n<p>Trois mécanismes rendent ce polling économe et fiable :</p>\n<ol>\n<li><p><strong>Requêtes conditionnelles (ETag / Last-Modified).</strong> À chaque réponse, GitHub renvoie un en-tête <code>ETag</code> (et <code>Last-Modified</code>). On le stocke, puis on le renvoie au poll suivant via <code>If-None-Match</code> (ou <code>If-Modified-Since</code>). Si rien n&#39;a changé, GitHub répond <code>304 Not Modified</code> <strong>sans corps</strong> — et, point capital, <strong>un 304 ne consomme pas le rate limit primaire</strong> quand on est authentifié (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/best-practices-for-using-the-rest-api\">GitHub best practices</a>). On ne « paie » donc que les vrais changements.</p>\n</li>\n<li><p><strong>Authentification.</strong> Sans token : 60 requêtes/heure. Avec un token : <strong>5 000 requêtes/heure</strong>. Pour surveiller beaucoup de technos, une GitHub App donne un quota par installation (base 5 000, jusqu&#39;à 12 500 req/h) (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api\">Rate limits</a>).</p>\n</li>\n<li><p><strong>Curseur + SemVer.</strong> On persiste par techno un curseur : <code>{ dernier tag SemVer vu, etag, release_id }</code>. Quand la réponse contient un tag <strong>supérieur</strong> au curseur selon la précédence SemVer 2.0.0 (et non une comparaison de chaînes), on déclenche la synthèse, puis on avance le curseur. SemVer définit <code>MAJOR.MINOR.PATCH</code>, ignore le build metadata pour l&#39;ordre, et place une pré-release avant la release correspondante (<code>1.0.0-rc.1 &lt; 1.0.0</code>) (<a href=\"https://semver.org/\">SemVer 2.0.0</a>).</p>\n</li>\n</ol>\n<p>Les <strong>webhooks</strong> (événement <code>release</code>, actions <code>published</code>/<code>created</code>/<code>edited</code>) sont une optimisation ultérieure : temps réel, légers, sans coût de quota — mais ils peuvent être manqués, donc on les combine toujours à un polling de réconciliation (<a href=\"https://docs.github.com/en/webhooks/webhook-events-and-payloads\">Webhook events</a>).</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Détecteur React (polling conditionnel + curseur).</strong></p>\n<pre><code class=\"language-ts\">// Cron horaire. Curseur persistant par techno.\ntype Cursor = { lastTag: string; etag: string | null; releaseId: number | null };\n\nasync function pollReact(cursor: Cursor) {\n  const res = await fetch(\n    &quot;https://api.github.com/repos/facebook/react/releases?per_page=100&quot;,\n    {\n      headers: {\n        Authorization: `Bearer ${TOKEN}`,        // 5 000 req/h au lieu de 60\n        Accept: &quot;application/vnd.github+json&quot;,\n        ...(cursor.etag ? { &quot;If-None-Match&quot;: cursor.etag } : {}),\n      },\n    }\n  );\n\n  if (res.status === 304) return cursor;          // rien de neuf, 0 quota consommé\n\n  const releases = await res.json();              // triées par date, page de 100 max\n  const newer = releases\n    .filter(r =&gt; !r.draft &amp;&amp; semverGt(r.tag_name, cursor.lastTag)) // vraie compa SemVer\n    .sort((a, b) =&gt; semverCmp(a.tag_name, b.tag_name));\n\n  for (const r of newer) {\n    if (r.id === cursor.releaseId) continue;      // idempotence : déjà traité\n    enqueueMigrationSynthesis(r);                 // ex. v18.3.1 -&gt; v19.0.0 =&gt; MAJOR\n  }\n\n  const top = newer.at(-1);\n  return top\n    ? { lastTag: top.tag_name, etag: res.headers.get(&quot;ETag&quot;), releaseId: top.id }\n    : { ...cursor, etag: res.headers.get(&quot;ETag&quot;) };\n}\n</code></pre>\n<p><strong>2. Démonstration du gain ETag.</strong> Surveiller 50 dépôts toutes les 5 min = 600 req/h. Sans cache, les 600 comptent. Avec <code>If-None-Match</code>, seuls les ~10 % réellement modifiés (≈ 60) consomment du quota ; le reste renvoie <code>304</code> gratuit. On le prouve en regardant <code>x-ratelimit-remaining</code> avant/après (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/best-practices-for-using-the-rest-api\">GitHub best practices</a>).</p>\n<p><strong>3. Pré-releases React.</strong> <code>GET /repos/facebook/react/releases/latest</code> renvoie la dernière release <strong>stable</strong> (non-prerelease, non-draft) et ignore donc une RC de React 19. Pour anticiper la migration avant la GA, on utilise <code>List releases</code> et on filtre <code>prerelease === true</code> pour capter <code>19.0.0-rc.1</code> (<a href=\"https://docs.github.com/en/rest/releases/releases\">Releases API</a>).</p>\n<p><strong>4. Webhook + réconciliation.</strong> Un webhook <code>release.published</code> donne la détection temps réel ; un cron quotidien rejoue <code>List releases</code> depuis le curseur pour rattraper toute livraison manquée.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>ETag vs Last-Modified.</strong> Un praticien Renovate/Dependabot a observé que l&#39;ETag GitHub peut changer alors que la ressource est identique (faux <code>200</code>), tandis que <code>Last-Modified</code> reste stable. <code>If-Modified-Since</code> peut être plus fiable pour ne pas gaspiller de quota (<a href=\"https://jamiemagee.co.uk/blog/making-the-most-of-github-rate-limits/\">Jamie Magee</a>).</li>\n<li><strong>Cache ETag par token et par page.</strong> Un nouveau token d&#39;installation de GitHub App (TTL ≤ 1 h) invalide les ETags en cache : prévoir le « cold start » du cache au renouvellement de token.</li>\n<li><strong><code>/releases/latest</code> trie par <code>created_at</code></strong>, pas par date de publication : une release rétro-datée ou re-taguée peut tromper la logique « la plus récente ». Croiser avec le tag SemVer plutôt que se fier à l&#39;ordre de l&#39;API (<a href=\"https://docs.github.com/en/rest/releases/releases\">Releases API</a>).</li>\n<li><strong>Releases ≠ tags Git.</strong> Un tag sans release associée n&#39;apparaît PAS dans l&#39;API Releases. Si une techno ne publie que des tags, poller l&#39;API Tags (ou <code>git ls-remote --tags</code>).</li>\n<li><strong>Comparaison lexicographique = bug.</strong> <code>&#39;1.0.0-alpha10&#39;</code> passe avant <code>&#39;1.0.0-alpha2&#39;</code>, et <code>&#39;9.0.0&#39;</code> après <code>&#39;10.0.0&#39;</code>. Utiliser une bibliothèque SemVer conforme 2.0.0 ; le build metadata (<code>+xxx</code>) doit être totalement ignoré pour l&#39;ordre (<a href=\"https://semver.org/\">SemVer 2.0.0</a>).</li>\n<li><strong>Tags non conformes.</strong> Beaucoup de projets utilisent <code>v18.2.0</code>, du CalVer, ou des suffixes maison : la normalisation doit être tolérante et <strong>journaliser</strong> les versions non parseables au lieu de planter.</li>\n<li><strong>Pré-releases.</strong> Le curseur doit savoir s&#39;il suit le canal stable seulement ou inclut les RC/canary/beta, sinon on rate (ou on spamme avec) les pré-releases.</li>\n<li><strong>Rate limit secondaire avant le primaire.</strong> Les limites « 900 points/min » et « 90 s CPU / 60 s réel » peuvent se déclencher en burst même avec du quota horaire restant. Surveiller <code>retry-after</code>, pas seulement <code>x-ratelimit-remaining</code> (<a href=\"https://docs.github.com/en/rest/using-the-rest-api/rate-limits-for-the-rest-api\">Rate limits</a>).</li>\n<li><strong>Ne pas ignorer <code>retry-after</code> / <code>x-ratelimit-reset</code>.</strong> Retenter en boucle serrée est vu comme un abus et peut faire bannir temporairement le token. Si <code>remaining == 0</code>, attendre <code>x-ratelimit-reset</code> (epoch UTC) ; si <code>retry-after</code> est présent, respecter exactement ce délai.</li>\n<li><strong>Pas de fan-out massif.</strong> Maximum 100 requêtes concurrentes : préférer une file séquentielle à un appel parallèle par dépôt.</li>\n<li><strong>GraphQL n&#39;a ni ETag ni 304</strong> et possède un budget séparé (points/min). On peut répartir les appels REST/GraphQL pour augmenter le quota global, mais on perd le cache conditionnel côté GraphQL.</li>\n<li><strong>Webhooks non garantis.</strong> Une livraison peut être manquée, retardée ou dupliquée : ils ne dispensent jamais d&#39;un polling de réconciliation, qui est le différenciateur de fiabilité du produit.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Polling via <strong>cron</strong> (modèle Dependabot/Renovate), webhooks repoussés comme optimisation.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Requêtes <strong>authentifiées</strong> (PAT ou GitHub App) — jamais de polling anonyme à 60 req/h.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Stocker l&#39;<strong>ETag/Last-Modified</strong> et le renvoyer (<code>If-None-Match</code>/<code>If-Modified-Since</code>) ; traiter <code>304</code> comme « rien de neuf » sans coût de quota.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Choisir l&#39;endpoint : <code>/releases/latest</code> (stable) vs <code>List releases</code> + filtre <code>prerelease</code> (canal RC) ; ou API Tags si la techno ne
