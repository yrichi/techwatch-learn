" type=\"checkbox\"> <strong>Propriété exclusive des données</strong> par module : aucune jointure ni FK cross-module.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Frontières placées <strong>là où le vocabulaire change</strong> (polysémie « source », « version »…) + anti-corruption layer aux jonctions.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Règle de lint/CI</strong> qui échoue si un module importe l&#39;interne d&#39;un autre (équivalent Packwerk/Wedge).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les deux coutures extractibles (<strong>Crawling</strong>, <strong>Génération IA</strong>) appelées via <strong>port + DTO sérialisables</strong>, même in-process.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Un seul</strong> déploiement + datastore au départ ; pas plus de 2-3 workers.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Critère d&#39;extraction <strong>mesurable</strong> documenté en ADR (latence p95, coût, taille de file, scaling, isolation SSRF).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Communication asynchrone</strong> (events/queue) prévue aux coutures extractibles pour absorber les pics de latence IA.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Ownership</strong> documenté : un domaine = un propriétaire clair (même en solo).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Métriques de santé : score d&#39;isolation par module, nombre de violations cross-module en CI, <em>blast radius</em> d&#39;un changement.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1 — C&#39;est quoi un monolithe modulaire ?</strong>\nUn seul déployable (un process, un datastore) découpé <em>à l&#39;intérieur</em> en modules à frontières strictes, organisés par domaine métier. On obtient l&#39;essentiel des bénéfices de découplage des microservices sans la complexité réseau (Shopify Engineering).</p>\n<p><strong>Q2 — Pourquoi ne pas démarrer directement en microservices ?</strong>\nParce qu&#39;on ne connaît pas encore les vraies frontières : on les fige derrière un réseau et tout refactoring devient transverse. Fowler recommande « MonolithFirst » — découvrir les frontières en codant avant de payer le « MicroservicePremium » (martinfowler.com/bliki/MonolithFirst.html).</p>\n<p><strong>Q3 — Modulaire et distribué, c&#39;est la même chose ?</strong>\nNon, ce sont deux axes orthogonaux. On peut avoir une forte modularité <em>sans</em> aucune distribution : les frontières logiques ne requièrent pas d&#39;appels réseau (Shopify ; McKinley).</p>\n<p><strong>Q4 — Qu&#39;est-ce qu&#39;un bounded context concrètement ?</strong>\nUne zone où un terme a un sens unique et cohérent. Là où le vocabulaire change, une frontière apparaît : « source » côté Crawling (URL + statut HTTP) n&#39;est pas le même objet que « source » côté Synthesis (citation vérifiable). Fowler : la total unification du modèle « n&#39;est ni faisable ni rentable » (martinfowler.com/bliki/BoundedContext.html).</p>\n<p><strong>Q5 — Pourquoi interdire les jointures cross-module ?</strong>\nParce que partager les tables est le couplage le plus dur à défaire : il rend toute extraction future quasi impossible et tout changement de schéma transverse. Chaque module doit posséder exclusivement ses données et exposer une API (Shopify Engineering).</p>\n<p><strong>Q6 — Comment empêcher l&#39;érosion des frontières ?</strong>\nPar l&#39;outillage, pas la discipline. Une règle de lint/CI (façon Packwerk/Wedge) doit échouer dès qu&#39;un module importe l&#39;interne d&#39;un autre. Sans cela, sous la pression des deadlines, les raccourcis « urgents » dissolvent la modularité (Fowler/Govind, linking-modular-arch.html).</p>\n<p><strong>Q7 — Quand extraire un module en service physique ?</strong>\nSeulement contre un signal <em>mesurable</em> : latence, coût, scaling indépendant ou isolation de sécurité. Chez Shopify, le <em>storefront rendering</em> est extrait parce qu&#39;il est étroit + très haut trafic (gain de ressources massif), pas par esthétique (Milanović, Inside Shopify&#39;s Modular Monolith).</p>\n<p><strong>Q8 — Pourquoi extraire la Génération IA mais pas la Vérification dans le projet ?</strong>\nLa Génération IA a une latence/coût propres et un besoin de rate-limiting → scaling indépendant justifié. La Vérification est légère et évolue avec la Synthèse : l&#39;extraire ajouterait du réseau à un couplage de domaine existant. Extraire un service ne supprime pas le couplage de domaine (Newman, Monolith to Microservices).</p>\n<p><strong>Q9 — Que sont les « innovation tokens » et en quoi est-ce lié ?</strong>\nMcKinley : « chaque entreprise dispose d&#39;environ <strong>trois</strong> innovation tokens », à dépenser sur le cœur métier, pas sur l&#39;infra. Choisir un monolithe modulaire + long-context (zéro vector DB) économise ces tokens pour le vrai différenciateur — la traçabilité/vérifiabilité des affirmations (mcfunley.com/choose-boring-technology).</p>\n<p><strong>Q10 — La modularité, ça rapporte vraiment, chiffres à l&#39;appui ?</strong>\nOui, sur un effort continu. L&#39;étude de cas de Fowler/Govind rapporte un cycle time passé de 17 à 10,3 jours en moyenne (<strong>~-40 %</strong>) et un temps d&#39;intégration de <strong>90 jours à 5 jours</strong> (×18). Mais l&#39;article avertit : la modularité demande un effort soutenu et ne doit cibler que de vrais problèmes métier (martinfowler.com/articles/linking-modular-arch.html).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://martinfowler.com/bliki/MonolithFirst.html\">MonolithFirst — Martin Fowler</a> — <em>praticien reconnu</em> — principe de construire un monolithe d&#39;abord pour découvrir les frontières avant de payer le « MicroservicePremium » ; refactoring trivial dans un monolithe vs douloureux entre services.</li>\n<li><a href=\"https://martinfowler.com/bliki/BoundedContext.html\">BoundedContext — Martin Fowler</a> — <em>praticien reconnu (DDD)</em> — référence canonique du bounded context, polysémie, et « la total unification du modèle de domaine n&#39;est ni faisable ni rentable ».</li>\n<li><a href=\"https://martinfowler.com/articles/linking-modular-arch.html\">Linking Modular Architecture to Development Teams — Martin Fowler (Govind et al.)</a> — <em>praticien reconnu (étude de cas)</em> — encapsulation/abstraction/optionalité, érosion des frontières, lien Conway, équipe platform ; résultats chiffrés ~-40 % cycle time (17 → 10,3 j), intégration 90j → 5j.</li>\n<li><a href=\"https://shopify.engineering/deconstructing-monolith-designing-software-maximizes-developer-productivity\">Deconstructing the Monolith — Shopify Engineering</a> — <em>doc d&#39;ingénierie (étude de cas)</em> — componentization par domaine (~6000 classes réassignées), API publique par composant, propriété exclusive des données, outillage Wedge en CI.</li>\n<li><a href=\"https://newsletter.techworld-with-milan.com/p/inside-shopifys-modular-monolith\">Inside Shopify&#39;s Modular Monolith — Milan Milanović</a> — <em>praticien (synthèse technique)</em> — signaux d&#39;extraction (storefront rendering : narrow + très haut trafic), isolation par database pods, Packwerk/Tapioca, frontières logiques vs séparation physique.</li>\n<li><a href=\"https://mcfunley.com/choose-boring-technology\">Choose Boring Technology — Dan McKinley</a> — <em>praticien reconnu</em> — « innovation tokens » (~3 par entreprise), et « les coûts long terme de maintenir un système fiable dépassent largement les inconvénients de construction ».</li>\n<li><a href=\"https://samnewman.io/books/monolith-to-microservices/\">Monolith to Microservices — Sam Newman</a> — <em>praticien reconnu (livre de référence)</em> — décomposition incrémentale, recherche des « seams », bounded contexts comme premiers candidats de services, garder le nombre de services minimal.</li>\n</ol>\n"},{"num":16,"slug":"serverless-event-driven","title":"Serverless event-driven & scale-to-zero","tagline":"Pour une charge épisodique et tolérante à la latence comme TechWatch IA, on déclenche des workers serverless par événement (event-based compute) câblés en architecture découplée (event-driven), de sorte qu'on ne paie rien entre deux releases et que le cold start occasionnel reste négligeable face à une synthèse qui dure plusieurs secondes.","quiz":[{"q":"Quel profil de charge rend le serverless scale-to-zero particulièrement avantageux pour TechWatch IA ?","options":["Un trafic constant et soutenu 24/7","Une charge bursty et imprévisible, tolérante à la latence","Une API synchrone qui doit répondre en moins de 200 ms","Un débit régulier et prévisible sans pics"],"answer":1,"explain":"TechWatch dort entre les releases puis produit quelques dizaines de synthèses par mois concentrées autour des sorties : zéro coût à l'idle et scale automatique au pic, avec une latence de plusieurs secondes acceptée."},{"q":"Quelle est la distinction entre event-driven architecture et event-based compute selon Alex DeBrie ?","options":["Ce sont deux noms pour le même concept","Event-driven = comment le compute est provisionné ; event-based = comment les services communiquent","Event-driven = comment les services communiquent ; event-based compute = comment le compute est provisionné","Event-driven concerne uniquement SQS, event-based uniquement EventBridge"],"answer":2,"explain":"Ce sont deux axes orthogonaux : event-driven décrit la communication asynchrone et découplée par événements, tandis que event-based compute décrit qu'une instance n'existe que pour traiter un événement (ex. Lambda)."},{"q":"Quelles sont les 3 parties d'une architecture event-driven selon AWS Well-Architected ?","options":["Event sources, event routers, event destinations","Producteur, base de données, frontend","Cron, Lambda, S3","API Gateway, SQS, DynamoDB"],"answer":0,"explain":"Les event sources déclenchent (un poller détecte une release), les event routers acheminent (EventBridge, SNS, SQS) et les event destinations traitent (les workers). On ne couple jamais directement source et destination."},{"q":"Pourquoi placer une file SQS comme tampon devant les workers de synthèse ?","options":["Pour rendre les appels synchrones et garantir une réponse immédiate","Pour absorber les bursts et respecter le rate limit de l'API LLM","Pour faire du fan-out vers plusieurs abonnés indépendants","Pour supprimer totalement les cold starts"],"answer":1,"explain":"Sous burst, le scale-up déclenche plusieurs cold starts simultanés et risque de saturer l'API LLM ; la file lisse le pic et libère les messages à un rythme contrôlé respectant les quotas."},{"q":"Pourquoi l'idempotence est-elle obligatoire dans ce pipeline event-driven ?","options":["Parce que la livraison est exactly-once et qu'il faut éviter les pertes","Parce que les événements ne sont jamais rejoués","Parce que la livraison est at-least-once : un rejeu sans clé d'idempotence produirait une seconde synthèse facturée","Parce qu'EventBridge exige une clé pour router les messages"],"answer":2,"explain":"La livraison en event-driven est at-least-once, donc tout événement peut être rejoué. Une clé releaseId + version garantit qu'un événement déjà traité est ignoré, évitant une double facturation LLM."},{"q":"Pourquoi le cold start est-il jugé négligeable pour les workers de TechWatch ?","options":["Parce que le cold start n'existe pas en serverless","Parce qu'il dure ~300-800 ms face à une synthèse de plusieurs secondes à minutes","Parce que la provisioned concurrency est toujours activée","Parce que le trafic est constant et garde les instances chaudes"],"answer":1,"explain":"Un worker Node à froid paie ~300-800 ms d'INIT ; rapporté à une synthèse de plusieurs secondes à minutes, c'est négligeable, ce qui justifie le scale-to-zero plutôt que la provisioned concurrency."},{"q":"Pourquoi la provisioned concurrency est-elle un anti-pattern pour ce batch tolérant à la latence ?","options":["Parce qu'elle ralentit les fonctions au lieu de les accélérer","Parce qu'elle est incompatible avec EventBridge","Parce qu'elle pré-chauffe des instances payées même inutilisées, réintroduisant le coût du toujours-allumé","Parce qu'elle empêche l'idempotence des handlers"],"answer":2,"explain":"Elle élimine le cold start mais réintroduit le coût du toujours-allumé : on paierait du compute idle pour éviter une attente qu'on accepte déjà, alors que scale-to-zero coûte zéro au repos."}],"flashcards":[{"front":"Scale-to-zero","back":"Aucune instance ne persiste au repos : le coût d'idle est nul. Cela impose des workers stateless, idempotents et protégés par retries + Dead Letter Queue."},{"front":"Event-driven vs event-based compute","back":"Event-driven = comment les services communiquent (asynchrone, découplé, par événements). Event-based compute = comment le compute est provisionné (une instance par événement, ex. Lambda). Deux axes orthogonaux."},{"front":"Message-driven (SQS) vs event-driven (EventBridge)","back":"SQS est asynchrone mais le producteur cible un consommateur précis (point-à-point) : c'est message-driven, pas le découplage multi-consommateurs d'EventBridge. Utile pour chaîner des workers."},{"front":"Quand choisir EventBridge, SNS ou SQS ?","back":"EventBridge : bus multi-consommateurs routé par règles. SNS : fan-out vers abonnés indépendants. SQS : file point-à-point servant de tampon devant un worker pour lisser les bursts."},{"front":"Cold start (phase INIT)","back":"Temps de provisioning, runtime, chargement du code et des dépendances quand une instance est créée. Moins de 1 % des requêtes en régime établi, mais bien plus en trafic intermittent."},{"front":"Réduire les cold starts par le code","back":"Runtime interprété (Node/Python), tree-shaking, lazy-loading, suppression des libs inutiles. Puis tuning mémoire (plus de mémoire = plus de CPU = init plus rapide), et SnapStart pour Java/Python/.NET."},{"front":"Limite dure de 15 minutes","back":"Une synthèse long-context sur gros corpus peut dépasser la limite d'exécution d'une fonction. Solution : découper en étapes orchestrées (Step Functions) plutôt qu'une fonction monolithique."},{"front":"Piège du pool de connexions DB dans la fonction","back":"Sous burst, des centaines d'instances épuisent les connexions et font tomber la base. Utiliser un proxy (RDS Proxy) ou un store sans connexion persistante (DynamoDB)."}],"sources":[{"title":"Understanding and Remediating Cold Starts: An AWS Lambda Perspective","url":"https://aws.amazon.com/blogs/compute/understanding-and-remediating-cold-starts-an-aws-lambda-perspective/","type":"official-docs"},{"title":"Event-Driven Architectures vs. Event-Based Compute in Serverless Applications","url":"https://www.alexdebrie.com/posts/event-driven-vs-event-based/","type":"practitioner"},{"title":"Event-driven architectures — Serverless Applications Lens (AWS Well-Architected)","url":"https://docs.aws.amazon.com/wellarchitected/latest/serverless-applications-lens/event-driven-architectures.html","type":"official-docs"},{"title":"When to Avoid Using Serverless Functions","url":"https://render.com/articles/when-to-avoid-using-serverless-functions","type":"practitioner"},{"title":"Cold Start Latency in Serverless Computing: A Systematic Review, Taxonomy, and Future Directions","url":"https://arxiv.org/html/2310.08437v2","type":"academic"},{"title":"Transitioning to event-driven architecture — AWS Serverless Developer Guide","url":"https://docs.aws.amazon.com/serverless/latest/devguide/serverless-transition.html","type":"official-docs"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Pour une charge épisodique et tolérante à la latence comme TechWatch IA, on déclenche des workers serverless par événement (event-based compute) câblés en architecture découplée (event-driven), de sorte qu&#39;on ne paie rien entre deux releases et que le cold start occasionnel reste négligeable face à une synthèse qui dure plusieurs secondes.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>TechWatch ne tourne pas en continu : il dort jusqu&#39;à ce qu&#39;une nouvelle version sorte (React 18→19), puis doit produire une synthèse de migration. Cette charge est <strong>bursty et imprévisible</strong> — quelques dizaines de synthèses par mois, concentrées autour des releases — ce qui est exactement le profil où le serverless gagne : zéro coût à l&#39;idle, scale automatique au pic. Et comme personne n&#39;attend une synthèse en 200 ms (on tolère plusieurs secondes, voire minutes), on peut laisser les workers <strong>scale-to-zero</strong> et accepter le cold start occasionnel plutôt que de payer un serveur allumé 24/7. Le découplage event-driven sert aussi la fiabilité du projet : chaque étape du workflow 9 étapes communique par événements versionnés et tracés, condition d&#39;une donnée vérifiable.</p>\n<h2>Le principe</h2>\n<p>Il faut distinguer deux axes <strong>orthogonaux</strong> souvent confondus (Alex DeBrie) :</p>\n<ul>\n<li><strong>Event-driven architecture</strong> = <em>comment les services communiquent</em> : de façon asynchrone et découplée, via des événements. Le producteur (« React 19 est sorti ») ne connaît pas le consommateur et n&#39;attend pas de résultat précis.</li>\n<li><strong>Event-based compute</strong> = <em>comment le compute est provisionné</em> : une instance (ex. AWS Lambda) n&#39;existe que pour traiter un événement, puis disparaît. Tout usage de Lambda est event-based compute, mais ce n&#39;est pas forcément event-driven.</li>\n</ul>\n<p>Une architecture event-driven se structure en <strong>3 parties</strong> (AWS Well-Architected) : <strong>event sources</strong> (le déclencheur : un poller détecte une release), <strong>event routers</strong> (qui acheminent : EventBridge route par règles, SNS fait du fan-out, SQS bufferise), et <strong>event destinations</strong> (les workers de synthèse). On ne couple jamais producteur et consommateur par appel API direct.</p>\n<p>Choisir le bon transport est central :</p>\n<ul>\n<li><strong>EventBridge</strong> : bus event-driven multi-consommateurs, routage par règles. Ajoute un peu de latence (peu importe ici).</li>\n<li><strong>SNS</strong> : fan-out vers plusieurs abonnés indépendants.</li>\n<li><strong>SQS</strong> : file point-à-point, <strong>message-driven</strong> (le producteur cible un consommateur précis). Idéale comme <strong>tampon</strong> devant un worker pour absorber les bursts et respecter le rate limit de l&#39;API LLM.</li>\n<li><strong>API Gateway</strong> : request-response synchrone, à réserver à l&#39;UI temps réel — surtout pas devant une synthèse LLM.</li>\n</ul>\n<p>Le <strong>scale-to-zero</strong> signifie qu&#39;aucune instance ne persiste : les workers doivent être <strong>stateless</strong> (état externalisé dans S3/DynamoDB), <strong>idempotents</strong> (livraison at-least-once → tout événement peut être rejoué), et protégés par <strong>retries + Dead Letter Queue</strong>. Le <strong>cold start</strong> (phase INIT : provisioning, runtime, code, dépendances) affecte moins de 1 % des requêtes en régime établi (AWS), mais beaucoup plus sur un trafic intermittent — sans gravité ici.</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Pipeline TechWatch de bout en bout</strong></p>\n<pre><code>[cron/poller] détecte React 19\n      │  publie un événement\n      ▼\n[EventBridge]  event &quot;release.detected&quot; { releaseId, techno:&quot;react&quot;, version:&quot;19.0.0&quot; }\n      │  règle de routage\n      ▼\n[SQS]  tampon : lisse le burst, respecte le rate limit de l&#39;API LLM\n      │  consommé une à la fois\n      ▼\n[Worker scale-to-zero]  exécute le workflow 9 étapes de synthèse\n      │  écrit le résultat\n      ▼\n[S3 / DynamoDB]  synthèse sourcée + notification\n</code></pre>\n<p>Entre deux releases, <strong>aucune ressource n&#39;est allumée</strong> : coût d&#39;idle nul.</p>\n<p><strong>2. Idempotence au rejeu (pseudocode du handler)</strong></p>\n<pre><code class=\"language-python\">def handle(event):\n    key = f&quot;{event[&#39;releaseId&#39;]}:{event[&#39;version&#39;]}&quot;   # clé d&#39;idempotence\n    if store.exists(key):                              # déjà traité ?\n        return  # doublon → on ignore, pas de second appel LLM facturé\n    store.put(key, status=&quot;processing&quot;)\n    synthese = run_workflow_9_etapes(event)            # appels LLM\n    store.put(key, status=&quot;done&quot;, result=synthese)\n</code></pre>\n<p>Si l&#39;événement <code>release.detected</code> pour React 19 est livré deux fois (at-least-once), une seule synthèse est produite : pas de double facturation LLM.</p>\n<p><strong>3. Cold start vs durée de synthèse</strong></p>\n<p>Un worker Node « à froid » paie ~300–800 ms d&#39;INIT ; « à chaud » l&#39;init disparaît. Rapporté à une synthèse qui prend plusieurs secondes à plusieurs minutes, le cold start est <strong>négligeable</strong> — justification chiffrée du choix scale-to-zero plutôt que provisioned concurrency.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Message-driven ≠ event-driven</strong> : SQS est asynchrone mais le producteur cible un consommateur précis ; ce n&#39;est pas le découplage d&#39;EventBridge (Alex DeBrie). Utile pour chaîner des workers, à ne pas confondre.</li>\n<li><strong>Scale-to-zero n&#39;est gratuit qu&#39;au repos</strong> : sous burst, le scale-up déclenche de <strong>multiples cold starts simultanés</strong> — le pire moment. Le tampon SQS sert justement à lisser ce pic.</li>\n<li><strong>Cold start &lt; 1 % en régime établi, mais bien plus en trafic intermittent</strong> (AWS) : une techno veillée rarement = quasi toujours à froid. Sans gravité ici car personne n&#39;attend 200 ms.</li>\n<li><strong>Provisioned concurrency = anti-pattern pour du batch tolérant</strong> : elle élimine le cold start mais réintroduit le coût du toujours-allumé — on paierait pour ne pas attendre alors qu&#39;on accepte d&#39;attendre.</li>\n<li><strong>EventBridge ajoute de la latence</strong> : Well-Architected recommande SNS/SQS quand la latence est critique. Ici, peu importe.</li>\n<li><strong>At-least-once rend l&#39;idempotence non-optionnelle</strong> : sans clé d&#39;idempotence, un rejeu = double synthèse + double coût LLM.</li>\n<li><strong>Limite dure de 15 min</strong> : une synthèse long-context sur gros corpus peut la dépasser → découper en étapes (Step Functions) plutôt qu&#39;une fonction monolithique.</li>\n<li><strong>Piège — API synchrone &lt; 200 ms devant le worker</strong> : cold start + temps LLM = timeout. La génération doit être asynchrone (déclenchée, résultat poll/notifié).</li>\n<li><strong>Piège — couplage par appels API directs en chaîne</strong> (A attend B attend C) : la disponibilité s&#39;effondre et la latence s&#39;additionne. Découpler par bus/queue.</li>\n<li><strong>Piège — omettre DLQ/retries</strong> : un événement empoisonné (source 404, schéma invalide) bloque la file ou se rejoue à l&#39;infini, et perd silencieusement des releases.</li>\n<li><strong>Piège — pool de connexions DB dans la fonction</strong> : sous burst, des centaines d&#39;instances épuisent les connexions et font tomber la base. Utiliser un proxy (RDS Proxy) ou un store sans connexion persistante (DynamoDB).</li>\n<li><strong>Piège — dépendances lourdes / runtime compilé</strong> pour un worker rarement appelé : cold start aggravé là où il pèse déjà le plus.</li>\n<li><strong>Piège — polling/setTimeout pour « attendre »</strong> une étape : on paie du compute à ne rien faire. Remplacer par un déclencheur d&#39;événement / Step Functions / cron.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Charge confirmée <strong>épisodique/bursty</strong> et <strong>tolérante à la latence</strong> (sinon, réévaluer serverless vs always-on).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Producteurs et consommateurs <strong>découplés</strong> par bus/queue, jamais par appel API direct synchrone.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Tampon SQS</strong> devant les workers pour absorber les bursts et respecter le rate limit LLM.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Chaque handler <strong>idempotent</strong> via clé <code>releaseId + version</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Retries + DLQ</strong> configurés sur chaque consommateur.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Workers <strong>stateless</strong> : état externalisé (S3 / DynamoDB), aucune connexion DB persistante dans la fonction.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Cold start réduit <strong>par le code d&#39;abord</strong> : runtime interprété, tree-shaking, lazy-loading, libs inutiles supprimées.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Mémoire tunée</strong> (AWS Lambda Power Tuning) : arbitrer coût vs latence d&#39;init/exécution.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Pas de provisioned concurrency</strong> sur les workers batch ; SnapStart si runtime Java/Python/.NET.</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Contrats d&#39;événements versionnés</strong> (JSONSchema / OpenAPI 3 via EventBridge Schema Registry).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Tracing distribué</strong> (X-Ray / OpenTelemetry) bout-en-bout.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Étapes longues (&gt; 15 min) <strong>découpées</strong> en orchestration (Step Functions).</li>\n<li><input disabled=\"\" type=\"checkbox\"> <strong>Point de bascule de coût</strong> calculé (pay-per-use vs toujours-allumé) avant de figer l&#39;archi.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi le serverless en une phrase ?</strong>\nUn modèle où l&#39;on exécute du code en réponse à des événements sans gérer de serveur, facturé à l&#39;usage et capable de descendre à zéro instance quand il n&#39;y a rien à faire. On ne provisionne pas de capacité à l&#39;avance : la plateforme crée une instance par événement puis la détruit.</p>\n<p><strong>Q2. Quelle différence entre event-driven et event-based compute ?</strong>\nEvent-driven décrit <em>comment les services communiquent</em> (asynchrone, découplé, par événements) ; event-based compute décrit <em>comment le compute est provisionné</em> (une instance par événement, ex. Lambda). Ce sont deux axes orthogonaux : un worker peut être event-based sans que l&#39;architecture soit pleinement event-driven (Alex DeBrie).</p>\n<p><strong>Q3. Quelles sont les 3 parties d&#39;une architecture event-driven ?</strong>\nLes event sources (déclencheurs, ex. une release détectée), les event routers (EventBridge, SNS, SQS qui acheminent), et les event destinations (les workers). On ne couple jamais directement source et destination (AWS Well-Architected).</p>\n<p><strong>Q4. EventBridge, SNS ou SQS : lequel choisir ?</strong>\nEventBridge pour du routage event-driven multi-consommateurs par règles ; SNS pour du fan-out vers des abonnés indépendants ; SQS pour bufferiser en point-à-point (message-driven). Pour TechWatch, SQS sert de tampon devant les workers afin de lisser les bursts et respecter le rate limit de l&#39;API LLM (Alex DeBrie).</p>\n<p><strong>Q5. Pourquoi mettre une file SQS devant les workers ?</strong>\nParce que sous burst, le scale-up déclenche plusieurs cold starts simultanés et risque de saturer l&#39;API LLM en pic. La file absorbe l&#39;à-coup et libère les messages à un rythme contrôlé, respectant les quotas du fournisseur plutôt que de tout lancer d&#39;un coup.</p>\n<p><strong>Q6. Qu&#39;est-ce qu&#39;un cold start et combien de requêtes affecte-t-il ?</strong>\nC&#39;est le temps de la phase INIT (provisioning, runtime, chargement du code, dépendances) quand une nouvelle instance est créée. En régime établi il affecte moins de 1 % des requêtes, mais ce chiffre s&#39;effondre sur un trafic intermittent — sans gravité ici car la synthèse n&#39;est pas attendue en 200 ms (AWS Compute Blog).</p>\n<p><strong>Q7. Comment réduit-on les cold starts concrètement ?</strong>\nD&#39;abord par le code : runtime interprété (Node/Python s&#39;initialisent vite), tree-shaking, lazy-loading, suppression des libs inutiles. Ensuite par le tuning mémoire — plus de mémoire = plus de CPU = init plus rapide. Enfin SnapStart (Java/Python/.NET) restaure un snapshot de l&#39;environnement initialisé (AWS Compute Blog).</p>\n<p><strong>Q8. Pourquoi ne PAS utiliser provisioned concurrency ici ?</strong>\nParce qu&#39;elle pré-chauffe des instances payées à l&#39;heure même inutilisées : c&#39;est utile pour un chemin à latence garantie, mais un anti-pattern pour du batch tolérant. On paierait du compute idle 24/7 pour éviter une attente qu&#39;on accepte — autant laisser scale-to-zero (AWS Compute Blog).</p>\n<p><strong>Q9. Pourquoi l&#39;idempotence est-elle obligatoire ?</strong>\nParce que la livraison en event-driven est at-least-once : tout événement peut être rejoué. Sans clé d&#39;idempotence (<code>releaseId + version</code>), un rejou produirait une seconde synthèse et un second appel LLM facturé. La clé garantit qu&#39;un événement déjà traité est ignoré.</p>\n<p><strong>Q10. Quand le serverless devient-il un mauvais choix ?</strong>\nPour une API synchrone à budget &lt; 200 ms, des jobs &gt; 15 min, des connexions persistantes, un débit soutenu, un debugging difficile ou des dépendances lourdes (Render). Au-delà d&#39;un seuil de charge constante, le toujours-allumé devient moins cher : il faut calculer ce point de bascule avant de figer l&#39;architecture.</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://aws.amazon.com/blogs/compute/understanding-and-remediating-cold-starts-an-aws-lambda-perspective/\">Understanding and Remediating Cold Starts: An AWS Lambda Perspective</a> — <em>official-docs</em> — décomposition de la phase INIT, chiffre clé « &lt; 1 % des requêtes affectées », comparaison provisioned concurrency vs SnapStart, et effet de la mémoire sur le cold start.</li>\n<li><a href=\"https://www.alexdebrie.com/posts/event-driven-vs-event-based/\">Event-Driven Architectures vs. Event-Based Compute in Serverless Applications</a> — <em>practitioner</em> — distinction event-driven (communication) vs event-based compute (provisionnement) ; classement EventBridge/SNS (event-driven) vs SQS (message-driven) vs API Gateway (request-response).</li>\n<li><a href=\"https://docs.aws.amazon.com/wellarchitected/latest/serverless-applications-lens/event-driven-architectures.html\">Event-driven architectures — Serverless Applications Lens (AWS Well-Architected)</a> — <em>official-docs</em> — les 3 parties (sources / routers / destinations), contrats de schéma (OpenAPI 3, JSONSchema via Schema Registry), tracing X-Ray, et l&#39;avertissement sur la latence d&#39;EventBridge.</li>\n<li><a href=\"https://render.com/articles/when-to-avoid-using-serverless-functions\">When to Avoid Using Serverless Functions</a> — <em>practitioner</em> — les six cas où serverless est un mauvais choix et le point de bascule de coût vers le toujours-allumé.</li>\n<li><a href=\"https://arxiv.org/html/2310.08437v2\">Cold Start Latency in Serverless Computing: A Systematic Review, Taxonomy, and Future Directions</a> — <em>academic</em> — taxonomie des mitigations cold start (cache/préchargement, runtime WASM/microVM/unikernel/conteneur, snapshot/checkpoint-restore, function fusion) et arbitrage startup vs isolation.</li>\n<li><a href=\"https://docs.aws.amazon.com/serverless/latest/devguide/serverless-transition.html\">Transitioning to event-driven architecture — AWS Serverless Developer Guide</a> — <em>official-docs</em> — couplage faible producteur/consommateur, communication asynchrone via bus/queues, déploiement indépendant des services.</li>\n</ol>\n"},{"num":17,"slug":"notifications-fan-out-idempotence","title":"Notifications : fan-out asynchrone & idempotence","tagline":"Quand une synthèse est publiée, TechWatch IA émet un seul événement métier SummaryPublished, puis des workers calculent les N destinataires et envoient les notifications — le tout conçu pour qu'un crash ne re-notifie jamais les abonnés déjà servis, grâce au pattern transactional outbox et à une idempotence portée par la clé (summary_id, subscriber_id).","quiz":[{"q":"Que désigne le « fan-out » dans ce contexte de notifications ?","options":["La diffusion d'un seul événement métier (1 synthèse publiée) vers N destinataires (les abonnés)","La fusion de N événements en un seul message pour réduire la charge du broker","La répartition des écritures d'une synthèse sur plusieurs bases de données","Le découpage d'un email volumineux en plusieurs paquets réseau"],"answer":0,"explain":"Le fan-out est la diffusion d'UN événement (SummaryPublished) vers N destinataires : au lieu d'envoyer les N emails dans le même processus, on publie l'événement et des workers découplés calculent les destinataires et envoient."},{"q":"Quel problème le « dual-write » naïf (commiter la synthèse puis appeler le provider d'email) pose-t-il ?","options":["Il ralentit la base de données car le provider devient un goulet d'étranglement","Un crash entre le commit DB et l'appel provider laisse l'état incohérent (synthèse publiée sans notification, ou l'inverse)","Il empêche d'utiliser une clé d'idempotence côté provider","Il oblige à utiliser une file FIFO pour préserver l'ordre des emails"],"answer":1,"explain":"La base et le provider sont deux systèmes sans transaction commune : un crash entre le commit et l'appel casse la cohérence. Le transactional outbox corrige exactement ce trou."},{"q":"Comment fonctionne concrètement le transactional outbox pattern ?","options":["On envoie l'événement au broker puis on écrit la synthèse en base dans une seconde étape","On utilise une transaction distribuée (2PC) entre la base et le broker","On écrit la synthèse ET une ligne d'événement dans la même transaction DB, puis un relay lit l'outbox et publie","On stocke l'événement uniquement dans le broker, qui le rejoue vers la base si besoin"],"answer":2,"explain":"La synthèse et la ligne d'événement sont écrites dans la même transaction : si elle rollback, aucun événement n'est émis ; après commit, un relay (poller ou CDC) lit l'outbox et publie, donc l'événement n'est jamais perdu."},{"q":"Quelle garantie de livraison l'outbox, SNS standard et SQS standard offrent-ils, et comment neutralise-t-on ses effets ?","options":["Exactly-once, donc aucune idempotence n'est nécessaire côté consommateur","At-most-once, en acceptant la perte occasionnelle de messages","At-least-once, en rendant les consommateurs idempotents","Ordered-once, en imposant systématiquement des files FIFO"],"answer":2,"explain":"La livraison est at-least-once par conception : des doublons sont possibles. On ne les empêche pas, on neutralise leur effet en rendant les consommateurs idempotents — c'est la combinaison at-least-once + idempotence qui simule l'exactly-once."},{"q":"Pourquoi la clé d'idempotence du fan-out doit-elle être (summary_id, subscriber_id) plutôt que juste summary_id ?","options":["Parce qu'une clé par synthèse est trop fine et provoque des courses concurrentes","Parce qu'une clé par synthèse marque la synthèse notifiée globalement : un crash en milieu de fan-out fait recommencer tout le monde et re-spamme les abonnés déjà servis","Parce que subscriber_id est obligatoire pour propager l'event_id jusqu'au broker","Parce que summary_id seul ne peut pas être utilisé dans une contrainte UNIQUE"],"answer":1,"explain":"La granularité est un arbitrage : une clé par synthèse, trop grossière, fait reprendre tout le monde après un crash. La clé par destinataire avec contrainte UNIQUE fait reprendre uniquement les abonnés non encore servis (4..N)."},{"q":"À quoi sert le jitter dans un backoff exponentiel capé, et pourquoi le backoff seul ne suffit-il pas ?","options":["Le jitter raccourcit le délai total des retries pour accélérer la reprise","Le jitter borne le nombre de tentatives avant la bascule en DLQ","Sans jitter, des envois échoués au même moment retentent tous au même instant (thundering herd) et re-saturent le provider ; le jitter ajoute un délai aléatoire qui étale la reprise","Le jitter garantit l'ordre des notifications par abonné lors de la reprise"],"answer":2,"explain":"Le backoff espace les tentatives, mais si 500 envois échouent ensemble ils retentent tous au même instant : c'est le thundering herd. Le jitter ajoute un délai aléatoire qui étale la reprise au lieu de re-saturer le provider."},{"q":"Qu'est-ce que l'« amplification des retries » et comment l'éviter ?","options":["Le grossissement du payload à chaque retry ; on l'évite en compressant les messages","La multiplication des retries quand chaque couche (SDK + worker + queue) retente indépendamment ; on l'évite en ne retentant qu'à une seule couche","L'augmentation du backoff à chaque tentative ; on l'évite en supprimant le cap","La duplication des événements dans l'outbox ; on l'évite avec une contrainte UNIQUE sur event_id"],"answer":1,"explain":"Si chaque couche retente indépendamment, les retries se multiplient (3 retries sur 5 couches = 243× la charge). La règle est de ne retenter qu'à une seule couche de la stack et de désactiver les retries des autres."}],"flashcards":[{"front":"Transactional outbox pattern","back":"On écrit la synthèse ET une ligne d'événement dans la même transaction DB. Si la transaction rollback, aucun événement n'est émis ; après commit, un relay (poller ou CDC) lit l'outbox et publie, donc l'événement n'est jamais perdu."},{"front":"Dual-write : pourquoi est-ce un problème ?","back":"On voudrait commiter la synthèse en base ET publier l'événement vers le broker atomiquement, mais ce sont deux systèmes distincts sans transaction commune. Un crash entre les deux casse la cohérence."},{"front":"Idempotent ≠ exactly-once","back":"On n'élimine pas les doublons en transit : on rend leur effet sans conséquence. La fiabilité repose sur la combinaison at-least-once côté émetteur + consommateurs idempotents, qui simule l'exactly-once."},{"front":"Consommateur idempotent (table processed_events / inbox)","back":"On stocke l'event_id traité et on vérifie son existence avant d'appliquer l'effet (INSERT ... ON CONFLICT DO NOTHING). Si l'ID existe déjà, on no-op et on ne refait pas le fan-out."},{"front":"FOR UPDATE SKIP LOCKED + ORDER BY occurred_on","back":"Dans le relay, SKIP LOCKED permet à plusieurs processeurs de piocher des lots disjoints sans double-traitement ; ORDER BY occurred_on préserve l'ordre de publication des événements."},{"front":"Foreign state mutations : un email parti n'est pas annulable","back":"Un envoi via SES/Postmark n'est pas rollback-able. Il faut persister la preuve d'envoi (message-id provider) atomiquement avec le marquage « envoyé », sinon un retry renvoie l'email."},{"front":"L'échec indéterminé (timeout / reset de connexion)","back":"Un timeout ne dit pas si l'email est parti : retenter risque le doublon, ne pas retenter risque la perte. Une clé d'idempotence côté provider lève cette ambiguïté quand le provider la supporte."},{"front":"Dead-Letter Queue (DLQ) et bornage des retries","back":"Un message empoisonné (adresse invalide, payload corrompu) retenté à l'infini bloque la file et brûle le quota provider. On borne les tentatives (5–8) puis on bascule le message en DLQ pour inspection et replay."}],"sources":[{"title":"Transactional outbox pattern — AWS Prescriptive Guidance","url":"https://docs.aws.amazon.com/prescriptive-guidance/latest/cloud-design-patterns/transactional-outbox.html","type":"official-docs"},{"title":"Designing robust and predictable APIs with idempotency — Stripe","url":"https://stripe.com/blog/idempotency","type":"practitioner"},{"title":"Implementing Stripe-like Idempotency Keys in Postgres — brandur.org","url":"https://brandur.org/idempotency-keys","type":"practitioner"},{"title":"Timeouts, retries, and backoff with jitter — Amazon Builders' Library","url":"https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/","type":"official-docs"},{"title":"Best practices for implementing event-driven architectures — AWS Architecture Blog","url":"https://aws.amazon.com/blogs/architecture/best-practices-for-implementing-event-driven-architectures-in-your-organization/","type":"official-docs"},{"title":"Implementing the Outbox Pattern — Milan Jovanović","url":"https://www.milanjovanovic.tech/blog/implementing-the-outbox-pattern","type":"practitioner"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Quand une synthèse est publiée, TechWatch IA émet <em>un seul</em> événement métier <code>SummaryPublished</code>, puis des workers calculent les N destinataires et envoient les notifications — le tout conçu pour qu&#39;un crash ne re-notifie jamais les abonnés déjà servis, grâce au pattern <em>transactional outbox</em> et à une idempotence portée par la clé <code>(summary_id, subscriber_id)</code>.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>Le différenciateur du projet, c&#39;est la <strong>confiance</strong> : une synthèse de migration (React 18→19, etc.) doit arriver aux bonnes personnes, une fois, sans spam ni perte. Or notifier N abonnés depuis 1 synthèse est une opération longue, faillible et soumise aux pannes du provider d&#39;email. Si on couple naïvement « publier la synthèse » et « envoyer les emails », un crash en plein fan-out laisse l&#39;état incohérent : synthèse publiée mais personne notifié, ou pire, reprise qui re-notifie tout le monde. Découpler l&#39;événement <code>SummaryPublished</code> du calcul des destinataires et de l&#39;envoi, puis rendre chaque envoi <strong>idempotent</strong>, transforme ce processus fragile en pipeline fiable et rejouable.</p>\n<h2>Le principe</h2>\n<p>Le point de départ est le problème du <strong>dual-write</strong> : on voudrait, en une opération atomique, <em>commiter la synthèse en base</em> ET <em>publier l&#39;événement vers le broker</em>. Mais une base de données et un broker de messages sont deux systèmes distincts — il n&#39;existe pas de transaction commune. Un crash entre les deux casse la cohérence. Le <strong>transactional outbox pattern</strong> résout ce dual-write : on écrit la synthèse <strong>et</strong> une ligne d&#39;événement dans la <strong>même transaction DB</strong>. Si la transaction <em>rollback</em>, aucun événement n&#39;est émis ; si le crash survient après le commit, un <em>relay</em> (poller ou CDC) lira l&#39;outbox et publiera l&#39;événement — il n&#39;est jamais perdu (AWS Prescriptive Guidance).</p>\n<p>Conséquence assumée : la livraison est <strong>at-least-once</strong>, pas <strong>exactly-once</strong>. L&#39;outbox, SNS standard et SQS standard garantissent <em>au moins une fois</em>. Les doublons ne sont donc pas un bug à éliminer en transit, mais un tradeoff intégré : toute la fiabilité repose sur des <strong>consommateurs idempotents</strong>. C&#39;est la combinaison « at-least-once côté émetteur + idempotence côté récepteur » qui <em>simule</em> l&#39;exactly-once.</p>\n<p>Côté découplage, le producteur <strong>possède le schéma</strong> de l&#39;événement, le consommateur <strong>possède la sémantique de l&#39;effet</strong> et doit être idempotent (AWS EDA). Concrètement : un worker « calcul destinataires » liste les N abonnés et crée N jobs ; un worker « envoi » appelle le provider. L&#39;idempotence se matérialise par une table <em>inbox</em> / <code>processed_events</code> (insert-if-not-exists sur l&#39;<code>event_id</code>) et par une clé <strong>par destinataire</strong> <code>(summary_id, subscriber_id)</code> avec contrainte <code>UNIQUE</code>. Ainsi, une reprise après crash ne touche <strong>que</strong> les abonnés non encore servis. Enfin, l&#39;envoi réel doit gérer les pannes provider avec un <strong>backoff exponentiel capé + jitter</strong> (AWS Builders&#39; Library, Stripe), des <strong>retries bornés</strong> basculant vers une <strong>Dead-Letter Queue</strong>, et — quand le provider le supporte — une <strong>clé d&#39;idempotence</strong> propagée jusqu&#39;à lui pour ne pas renvoyer un email déjà parti.</p>\n<h2>Exemples concrets</h2>\n<p><strong>1. Outbox transactionnel : persister la synthèse + l&#39;événement dans la même transaction</strong></p>\n<pre><code class=\"language-sql\">BEGIN;\n  INSERT INTO summaries (id, tech, version, body)\n    VALUES (&#39;sum-42&#39;, &#39;react&#39;, &#39;19&#39;, &#39;...&#39;);\n  -- Même transaction : si ça rollback, aucun événement n&#39;est émis.\n  INSERT INTO outbox (id, aggregate_id, type, payload, occurred_on)\n    VALUES (&#39;evt-abc&#39;, &#39;sum-42&#39;, &#39;SummaryPublished&#39;,\n            &#39;{&quot;summary_id&quot;:&quot;sum-42&quot;,&quot;tech&quot;:&quot;react&quot;}&#39;, now());\nCOMMIT;\n</code></pre>\n<pre><code class=\"language-sql\">-- Relay : plusieurs workers en parallèle, sans double-traitement, dans l&#39;ordre.\nSELECT * FROM outbox\n  WHERE published_at IS NULL\n  ORDER BY occurred_on\n  FOR UPDATE SKIP LOCKED\n  LIMIT 100;\n-- publier vers le broker, puis UPDATE outbox SET published_at = now() ...\n</code></pre>\n<p><code>FOR UPDATE SKIP LOCKED</code> permet à plusieurs processeurs de piocher des lots disjoints ; <code>ORDER BY occurred_on</code> préserve l&#39;ordre (Milan Jovanović).</p>\n<p><strong>2. Consommateur idempotent (table <code>processed_events</code>) — le rejeu est un no-op</strong></p>\n<pre><code class=\"language-sql\">-- L&#39;événement SummaryPublished#evt-abc arrive deux fois (rejeu SQS).\nINSERT INTO processed_events (event_id) VALUES (&#39;evt-abc&#39;)\n  ON CONFLICT (event_id) DO NOTHING;\n-- Si 0 ligne insérée → déjà traité → on ne refait PAS le fan-out.\n</code></pre>\n<p><strong>3. Fan-out idempotent par destinataire — un crash reprend où il s&#39;est arrêté</strong></p>\n<p>Scénario React 18→19 : le worker « calcul destinataires » crée N jobs avec clé <code>(summary_id, subscriber_id)</code>. Le worker « envoi » crashe après l&#39;abonné #3.</p>\n<pre><code class=\"language-sql\">-- Clé d&#39;unicité par destinataire : pose la preuve d&#39;envoi atomiquement.\nINSERT INTO notifications (summary_id, subscriber_id, status)\n  VALUES (&#39;sum-42&#39;, &#39;sub-7&#39;, &#39;sending&#39;)\n  ON CONFLICT (summary_id, subscriber_id) DO NOTHING;  -- déjà servi → skip\n</code></pre>\n<p>À la reprise, les abonnés 1..3 ont déjà une ligne → ignorés ; seuls 4..N sont traités. <strong>Aucun re-spam.</strong></p>\n<p><strong>4. Envoi avec backoff + jitter et clé d&#39;idempotence provider</strong></p>\n<pre><code class=\"language-python\"># deduplication-id stable propagé jusqu&#39;au provider quand il le supporte.\ndedup_id = f&quot;summary-{summary_id}:subscriber-{subscriber_id}&quot;  # ex. summary-42:subscriber-7\nfor attempt in range(MAX_RETRIES):            # borné (5–8), sinon -&gt; DLQ\n    try:\n        provider.send(to=email, idempotency_key=dedup_id, body=html)\n        break\n    except TransientError:\n        delay = min(CAP, BASE * 2 ** attempt)  # backoff exponentiel capé\n        sleep(delay + random.uniform(0, delay))  # + jitter (anti thundering herd)\n</code></pre>\n<p>Sur une panne Postmark touchant 500 notifications React 19, le jitter étale la reprise au lieu de re-saturer le provider à l&#39;instant précis où il récupère.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Idempotent ≠ exactly-once.</strong> On n&#39;élimine pas les doublons en transit : on rend leur <em>effet</em> sans conséquence. (AWS Prescriptive Guidance)</li>\n<li><strong>Un email parti n&#39;est pas annulable.</strong> Les <em>foreign state mutations</em> (envoi via SES/Postmark) ne sont pas <em>rollback-ables</em> : il faut persister la preuve d&#39;envoi (message-id provider) atomiquement avec le marquage « envoyé », sinon un retry renvoie l&#39;email. (brandur.org)</li>\n<li><strong>L&#39;échec indéterminé est le piège central.</strong> Un timeout / reset de connexion ne dit pas si l&#39;email est parti. Sans clé d&#39;idempotence côté provider, retenter risque le doublon, ne pas retenter risque la perte ; la clé lève l&#39;ambiguïté. (Stripe)</li>\n<li><strong>Granularité de la clé = arbitrage.</strong> Trop grossière (par synthèse) → un crash re-notifie tout le monde ; trop fine sans verrou → courses concurrentes. <code>(summary_id, subscriber_id)</code> + <code>UNIQUE</code> est le bon niveau.</li>\n<li><strong>Réutiliser une clé pour un contenu différent est une erreur, pas un succès silencieux</strong> : Stripe vérifie que les paramètres rejoués correspondent à l&#39;originale. (Stripe)</li>\n<li><strong>Backoff sans jitter = thundering herd</strong> : tous les envois échoués retentent au même instant et re-tuent le provider. (AWS Builders&#39; Library)</li>\n<li><strong>Amplification des retries</strong> : ne retenter qu&#39;à <strong>une seule couche</strong>. Retenter à chaque niveau (SDK + worker + queue) multiplie la charge (ex. 3 retries sur 5 couches = 243×). (AWS Builders&#39; Library)</li>\n<li><strong>Pas de borne ni de DLQ</strong> : un message empoisonné (adresse invalide, payload corrompu) retenté à l&#39;infini bloque la file et brûle le quota provider — il faut l&#39;isoler en dead-letter.</li>\n<li><strong>Clé purgée trop tôt → doublon possible</strong> sur un retry tardif ; <strong>jamais purgée → table qui enfle</strong> et performances qui se dégradent. Définir une fenêtre de rétention.</li>\n<li><strong>Confier l&#39;idempotence uniquement au provider</strong> : SES n&#39;offre pas de vraie clé d&#39;idempotence d&#39;envoi côté API comme Stripe. La déduplication doit d&#39;abord vivre <strong>côté application</strong> (inbox + clé par destinataire).</li>\n<li><strong>Polling vs CDC</strong> : le polling est simple mais ajoute latence et charge DB ; le CDC (log tailing, DynamoDB Streams) réduit la charge et capte l&#39;ordre nativement, au prix de complexité opérationnelle.</li>\n<li><strong>L&#39;ordre n&#39;est garanti que si on le force</strong> : les standard queues ne le préservent pas ; FIFO / sequence numbers oui, mais au prix du débit. Pour des notifications de veille, l&#39;ordre <em>par abonné</em> suffit généralement.</li>\n<li><strong>Stores non-ACID</strong> (ex. Mongo sans transactions) ne garantissent pas l&#39;atomicité outbox : choisir un store ACID pour les tables outbox/inbox.</li>\n<li><strong>Jobs orphelins</strong> (worker mort à mi-chemin) : prévoir un process <em>completer</em> qui pousse les états « in-progress » à terme, sinon ils y restent éternellement. (brandur.org)</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> La synthèse <strong>et</strong> la ligne <code>outbox</code> (<code>SummaryPublished</code>) sont écrites dans <strong>la même transaction DB</strong>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Un <strong>relay</strong> lit l&#39;outbox avec <code>FOR UPDATE SKIP LOCKED</code> + <code>ORDER BY occurred_on</code> et marque les lignes publiées.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les consommateurs sont <strong>idempotents</strong> via une table <code>processed_events</code> / inbox (insert-if-not-exists sur <code>event_id</code>).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le fan-out utilise une clé <strong>par destinataire</strong> <code>(summary_id, subscriber_id)</code> avec contrainte <code>UNIQUE</code>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;<code>event_id</code> / une clé de déduplication stable <strong>voyage dans le payload</strong> jusqu&#39;au provider quand il le supporte.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Le worker d&#39;envoi applique <strong>backoff exponentiel capé + jitter</strong>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Les retries sont <strong>bornés</strong> (5–8) et <strong>une seule couche</strong> retente ; les échecs définitifs partent en <strong>DLQ</strong>.</li>\n<li><input disabled=\"\" type=\"checkbox\"> La preuve d&#39;envoi (message-id provider) est persistée <strong>atomiquement</strong> avec le statut « envoyé ».</li>\n<li><input disabled=\"\" type=\"checkbox\"> Une <strong>politique de rétention</strong> purge les lignes outbox publiées et les clés d&#39;idempotence après une fenêtre définie.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Un <strong>completer</strong> récupère les jobs orphelins « in-progress ».</li>\n<li><input disabled=\"\" type=\"checkbox\"> L&#39;<code>event_id</code> est <strong>tracé de bout en bout</strong> (producteur → broker → worker → provider) pour diagnostiquer doublons et latences.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. C&#39;est quoi le « fan-out » dans ce contexte ?</strong>\nC&#39;est la diffusion d&#39;<strong>un</strong> événement métier (1 synthèse publiée) vers <strong>N</strong> destinataires (les abonnés). Au lieu d&#39;envoyer les N emails dans le même processus, on publie un événement <code>SummaryPublished</code>, puis des workers découplés calculent les destinataires et envoient. Le producteur possède le schéma de l&#39;événement, le consommateur possède la sémantique de l&#39;effet (AWS EDA).</p>\n<p><strong>Q2. Pourquoi ne pas simplement « commiter la synthèse puis appeler le provider d&#39;email » ?</strong>\nParce que c&#39;est un <strong>dual-write naïf</strong> : un crash entre le commit DB et l&#39;appel provider laisse la synthèse publiée sans notification (ou l&#39;inverse). La base et le provider sont deux systèmes sans transaction commune. Le transactional outbox corrige exactement ce trou (AWS Prescriptive Guidance).</p>\n<p><strong>Q3. Comment fonctionne le transactional outbox concrètement ?</strong>\nOn écrit la synthèse <strong>et</strong> une ligne d&#39;événement dans la <strong>même transaction</strong>. Si elle rollback, aucun événement n&#39;est émis. Après commit, un <em>relay</em> (polling de la table ou CDC sur le log) lit l&#39;outbox et publie vers le broker. L&#39;événement n&#39;est donc jamais perdu et survit aux crashes (AWS Prescriptive Guidance).</p>\n<p><strong>Q4. Pourquoi viser at-least-once plutôt qu&#39;exactly-once ?</strong>\nL&#39;exactly-once distribué est extrêmement coûteux, voire illusoire. L&#39;outbox, SNS standard et SQS standard offrent <strong>at-least-once</strong> : des doublons sont possibles par conception. On les neutralise non pas en les empêchant, mais en rendant les consommateurs <strong>idempotents</strong> (AWS Prescriptive Guidance).</p>\n<p><strong>Q5. Comment rend-on un consommateur idempotent ?</strong>\nOn stocke l&#39;<code>event_id</code> traité dans une table <em>inbox</em> / <code>processed_events</code> et on vérifie son existence <strong>avant</strong> d&#39;appliquer l&#39;effet (<code>INSERT ... ON CONFLICT DO NOTHING</code>). Si l&#39;ID existe déjà, on no-op. On conserve ces IDs pendant une fenêtre de rétention définie (AWS Prescriptive Guidance, Milan Jovanović).</p>\n<p><strong>Q6. Pourquoi la clé d&#39;idempotence doit-elle être <code>(summary_id, subscriber_id)</code> et pas juste <code>summary_id</code> ?</strong>\nParce que la granularité est un arbitrage. Une clé par synthèse marque la synthèse « notifiée » globalement : un crash en milieu de fan-out fait recommencer <strong>tout</strong> le monde au redémarrage et spamme les abonnés déjà servis. La clé <strong>par destinataire</strong> (+ contrainte <code>UNIQUE</code>) fait reprendre uniquement les abonnés 4..N (brandur.org).</p>\n<p><strong>Q7. À quoi sert le jitter dans le backoff, et le backoff seul ne suffit-il pas ?</strong>\nLe backoff exponentiel capé espace les tentatives (<code>min(cap, 2^n)</code>). Mais si 500 envois échouent en même temps (panne provider), ils retentent <strong>tous au même instant</strong> : c&#39;est le <em>thundering herd</em> qui re-sature le provider. Le jitter ajoute un délai aléatoire qui <strong>étale</strong> la reprise (AWS Builders&#39; Library, Stripe).</p>\n<p><strong>Q8. Qu&#39;est-ce que l&#39;« amplification des retries » et comment l&#39;éviter ?</strong>\nSi chaque couche d&#39;un appel (SDK provider + worker + queue) retente indépendamment, les retries se <strong>multiplient</strong> : 3 retries sur 5 couches = 243× la charge. La règle : ne retenter qu&#39;à <strong>une seule couche</strong> de la stack, et désactiver les retries des autres (AWS Builders&#39; Library).</p>\n<p><strong>Q9. Que faire d&#39;un message qui échoue toujours (adresse invalide, payload corrompu) ?</strong>\nLe retenter à l&#39;infini bloque la file et brûle le quota provider. Il faut <strong>borner</strong> le nombre de tentatives (typiquement 5–8) puis basculer le message vers une <strong>Dead-Letter Queue</strong> pour inspection et replay manuel, libérant la file pour le reste.</p>\n<p><strong>Q10. L&#39;idempotence côté provider remplace-t-elle l&#39;idempotence côté application ?</strong>\nNon. Tous les providers n&#39;offrent pas de vraie clé d&#39;idempotence d&#39;envoi (Stripe oui via <code>Idempotency-Key</code> ; SES non au niveau API). De plus, un échec indéterminé (timeout) ne dit pas si l&#39;email est parti — d&#39;où une clé côté provider quand c&#39;est possible. Mais la déduplication doit <strong>d&#39;abord</strong> vivre côté application (inbox + clé par destinataire) ; la clé provider est une protection complémentaire (Stripe, brandur.org).</p>\n<h2>Sources</h2>\n<ol>\n<li><a href=\"https://docs.aws.amazon.com/prescriptive-guidance/latest/cloud-design-patterns/transactional-outbox.html\">Transactional outbox pattern — AWS Prescriptive Guidance</a> — <em>official-docs</em> — résolution du dual-write, consommateurs idempotents, ordre via timestamp/sequence, non-envoi en cas de rollback, et les deux implémentations (table pollée vs CDC/streams).</li>\n<li><a href=\"https://stripe.com/blog/idempotency\">Designing robust and predictable APIs with idempotency — Stripe</a> — <em>practitioner</em> — clés d&#39;idempotence côté client (header <code>Idempotency-Key</code>), mise en cache du résultat (succès comme échec) pour rejouer la même réponse, backoff exponentiel + jitter contre le thundering herd.</li>\n<li><a href=\"https://brandur.org/idempotency-keys\">Implementing Stripe-like Idempotency Keys in Postgres — brandur.org</a> — <em>practitioner</em> — foreign state mutations, phases atomiques, recovery points, staging transactionnel des notifications, verrou (<code>locked_at</code>), <code>SERIALIZABLE</code> et process <em>completer</em> pour les requêtes orphelines.</li>\n<li><a href=\"https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/\">Timeouts, retries, and backoff with jitter — Amazon Builders&#39; Library</a> — <em>official-docs</em> — ne retenter que si l&#39;opération est idempotente, backoff capé, jitter, bornage des tentatives, et éviter l&#39;amplification des retries (retenter à une seule couche).</li>\n<li><a href=\"https://aws.amazon.com/blogs/architecture/best-practices-for-implementing-event-driven-architectures-in-your-organization/\">Best practices for implementing event-driven architectures — AWS Architecture Blog</a> — <em>official-docs</em> — découplage producteur/broker/consommateur, propriété du schéma vs sémantique de l&#39;effet, idempotence des consommateurs, observabilité centralisée.</li>\n<li><a href=\"https://www.milanjovanovic.tech/blog/implementing-the-outbox-pattern\">Implementing the Outbox Pattern — Milan Jovanović</a> — <em>practitioner</em> — polling outbox avec <code>SELECT ... FOR UPDATE SKIP LOCKED</code>, batch sizing, <code>ORDER BY occurred_on</code>, déduplication côté consommateur (at-least-once) et alternative CDC (transaction log tailing).</li>\n</ol>\n"},{"num":18,"slug":"choix-gestion-modeles","title":"Choix & gestion des modèles (Claude)","tagline":"Démarrer fort puis descendre au plus petit modèle qui passe l'éval, router chaque étape vers le bon tier (Haiku pré-traitement, Sonnet synthèse, Opus en secours), épingler des versions figées et traiter les dépréciations comme une routine — pour que TechWatch reste fiable, sourcé et reproductible sans se ruiner.","quiz":[{"q":"Par quel modèle faut-il commencer quand on ne sait pas encore si une tâche est faisable ?","options":["Par Haiku 4.5, pour minimiser le coût dès le départ","Par le modèle le plus capable (Opus 4.8), pour fixer la barre de qualité","Par Sonnet 4.6, le tier intermédiaire par défaut","Par n'importe quel modèle, le choix initial n'a pas d'importance"],"answer":1,"explain":"On prototype la faisabilité sur le modèle le plus capable (Opus 4.8) pour savoir si la tâche est atteignable et fixer la barre de qualité ; ensuite seulement on cherche à descendre vers un modèle plus petit."},{"q":"Dans le routing par tâche de TechWatch, quel modèle est affecté au pré-traitement volumineux (classification, extraction des claims, déduplication) ?","options":["Opus 4.8, car c'est l'étape la plus critique","Sonnet 4.6, pour son contexte de 1M","Haiku 4.5, le moins cher et adapté au gros volume de tokens","Un modèle différent à chaque exécution"],"answer":2,"explain":"Le pré-traitement est le plus gros consommateur de tokens ; le faire en Haiku 4.5 ($1/$5 par MTok) réduit fortement le coût total sans nécessiter l'intelligence d'Opus."},{"q":"Depuis la génération 4.6, que signifie un ID de modèle sans date comme « claude-opus-4-8 » ?","options":["Un alias evergreen qui pointe vers la dernière version disponible","Un snapshot figé immuable, donc déjà une version épinglée","Un identifiant invalide qu'il faut compléter par une date","Un pointeur qui peut changer silencieusement à chaque mise à jour"],"answer":1,"explain":"À partir de la 4.6, l'ID sans date EST le snapshot figé ; pour les modèles antérieurs en revanche, on préfère l'ID daté (ex. claude-sonnet-4-5-20250929) à l'alias qui peut bouger."},{"q":"Quel est le critère pour autoriser une rétrogradation de gamme (passer à un modèle plus petit) ?","options":["Le ressenti de l'équipe après quelques essais en production","Une baisse de coût constatée sur la facture mensuelle","Le passage d'un jeu d'éval gelé au-dessus des seuils de fidélité et de sourçage","L'accord du fournisseur du modèle"],"answer":2,"explain":"On gèle un jeu d'éval (affirmations attendues + sources officielles) et on ne descend en gamme que si fidélité, sourçage vérifiable et citations correctes restent au-dessus des seuils."},{"q":"Quand la qualité d'une sortie manque, quel levier essayer avant de changer de modèle sur Opus/Sonnet ?","options":["Augmenter max_tokens jusqu'à la limite maximale","Monter output_config.effort (ex. de medium à high)","Activer budget_tokens pour forcer plus de raisonnement","Baisser la température pour rendre la sortie plus déterministe"],"answer":1,"explain":"Souvent passer de medium à high sur output_config.effort suffit là où on aurait par réflexe changé de gamme ; à noter que Haiku 4.5 n'a ni effort ni thinking adaptatif."},{"q":"Si une version de modèle est épinglée, contre quoi protège-t-elle réellement ?","options":["Contre le retrait du modèle : il restera disponible indéfiniment","Contre le drift silencieux du comportement, mais pas contre le retrait","Contre toute facturation supplémentaire liée aux migrations","Contre les changements de tokenizer entre générations"],"answer":1,"explain":"Anthropic préserve les poids mais ne garantit pas la re-disponibilité : un modèle retiré renvoie une erreur. L'épinglage protège du drift, pas du retrait — un plan de migration reste obligatoire."},{"q":"Pourquoi faut-il router les modèles à la frontière des étapes plutôt qu'en alternant les modèles au milieu d'un turn ?","options":["Parce que l'API interdit de changer de modèle pendant un turn","Parce que les caches de prompt sont scopés par modèle : alterner paie des écritures de cache à froid","Parce que cela augmente le nombre de tokens facturés de 1,35×","Parce que le thinking adaptatif ne fonctionne qu'en début de turn"],"answer":1,"explain":"Les caches sont scopés par modèle ; un routing qui alterne les modèles au milieu d'un turn invalide le prompt cache et paie des écritures à froid. Il faut router à la frontière des étapes."}],"flashcards":[{"front":"« Démarrer fort, puis descendre »","back":"On prototype la faisabilité sur le modèle le plus capable (Opus 4.8) pour fixer la barre de qualité, puis on vise « le plus petit modèle qui fait le travail » — c'est là que se gagnent latence et coût."},{"front":"Pattern « routing » par tâche","back":"Plutôt qu'un gros modèle partout, on décompose le workflow et on affecte un modèle par étape selon la complexité : Haiku pré-traitement, Sonnet synthèse sourcée, Opus en fallback."},{"front":"Tarifs et contexte des trois tiers","back":"Haiku 4.5 : $1/$5 par MTok, contexte 200K. Sonnet 4.6 : $3/$15, contexte 1M. Opus 4.8 : $5/$25, contexte 1M. Au-delà de 200K de sources, on route vers Sonnet/Opus."},{"front":"Piloter par les évals","back":"On gèle un jeu d'éval (affirmations attendues + sources officielles), on fait tourner le candidat dessus et on compare aux seuils (fidélité, sourçage, citations). L'éval doit tolérer de la variance — la sortie n'est jamais garantie identique bit-à-bit."},{"front":"Config de modèles centralisée","back":"Un seul ID épinglé par étape dans une config unique (jamais en dur dispersé). Une migration devient alors un simple changement de chaîne + un passage d'éval."},{"front":"Préavis de 60 jours : portée et limites","back":"Le préavis d'au moins 60 jours couvre l'API publique Anthropic ; c'est un plancher, pas une garantie. Bedrock et Vertex AI fixent leurs propres calendriers distincts."},{"front":"Tokenizer changé avec Opus 4.7","back":"Partagé par Opus 4.8 : ~1× à 1,35× de tokens en plus pour un même texte. Lors d'une migration cross-génération, re-baseliner les budgets de contexte et max_tokens via count_tokens — pas de multiplicateur en aveugle."},{"front":"Changements cassants en migration cross-génération","back":"thinking adaptatif (type: adaptive) remplace budget_tokens (400 sur Opus 4.7+), temperature/top_p/top_k renvoient 400, le prefill assistant est retiré (utiliser output_config.format). Tester sur une requête unique d'abord."}],"sources":[{"title":"Models overview — Claude API Docs (Anthropic)","url":"https://platform.claude.com/docs/en/about-claude/models/overview","type":"official-docs"},{"title":"Model deprecations — Claude API Docs (Anthropic)","url":"https://platform.claude.com/docs/en/about-claude/model-deprecations","type":"official-docs"},{"title":"What We Learned from a Year of Building with LLMs (applied-llms.org)","url":"https://applied-llms.org/","type":"practitioner"},{"title":"Building Effective Agents (Anthropic Engineering)","url":"https://www.anthropic.com/engineering/building-effective-agents","type":"official-engineering"},{"title":"Commitments on Model Deprecation and Preservation (Anthropic)","url":"https://www.anthropic.com/research/deprecation-commitments","type":"official-policy"},{"title":"Model migration guide — Claude API Docs (Anthropic)","url":"https://platform.claude.com/docs/en/about-claude/models/migration-guide","type":"official-docs"}],"html":"<blockquote>\n<p><strong>En une phrase.</strong> Démarrer fort puis descendre au plus petit modèle qui passe l&#39;éval, router chaque étape vers le bon tier (Haiku pré-traitement, Sonnet synthèse, Opus en secours), épingler des versions figées et traiter les dépréciations comme une routine — pour que TechWatch reste fiable, sourcé et reproductible sans se ruiner.</p>\n</blockquote>\n<h2>Pourquoi c&#39;est nécessaire pour TechWatch IA</h2>\n<p>Le différenciateur de TechWatch est la <em>confiance</em> : chaque affirmation d&#39;une synthèse de migration doit citer sa source. Cette barre de fiabilité n&#39;a pas le même prix selon l&#39;étape — filtrer et dédupliquer des changelogs officiels ne demande pas la même intelligence que rédiger une note de migration sourcée sans hallucination. Comme le workflow est déterministe (9 étapes) et piloté par les évals, le choix de modèle devient une décision d&#39;ingénierie mesurable : on affecte le bon modèle à chaque étape, on épingle la version pour reproduire les évals, et on planifie la migration plutôt que de présumer qu&#39;une version épinglée restera disponible pour toujours.</p>\n<h2>Le principe</h2>\n<p>Trois idées se combinent.</p>\n<p><strong>1. Démarrer fort, puis descendre.</strong> On prototype la <em>faisabilité</em> sur le modèle le plus capable (Opus 4.8), pour savoir si la tâche est atteignable du tout. Une fois la barre de qualité connue, on vise « le plus petit modèle qui fait le travail » : c&#39;est là que se gagnent la latence et le coût (applied-llms.org). « Le plus petit qui suffit » est relatif à la tâche <em>et</em> à sa difficulté — un même modèle peut suffire pour le pré-traitement et pas pour la synthèse sourcée.</p>\n<p><strong>2. Router par tâche selon la complexité.</strong> Plutôt qu&#39;un gros modèle partout, on décompose le workflow et on affecte un modèle par étape (pattern « routing » d&#39;Anthropic) : classifier l&#39;entrée et l&#39;envoyer vers une tâche spécialisée. Pour TechWatch :</p>\n<ul>\n<li><strong>Haiku 4.5</strong> ($1/$5 par MTok, contexte 200K) — pré-traitement volumineux : classification, extraction des claims candidates, déduplication des changelogs, normalisation des sources.</li>\n<li><strong>Sonnet 4.6</strong> ($3/$15 par MTok, contexte 1M) — synthèse de migration fiable et sourcée, avec citations vérifiables.</li>\n<li><strong>Opus 4.8</strong> ($5/$25 par MTok, contexte 1M) — réservé aux sections que l&#39;éval révèle insuffisantes (fidélité ou sourçage sous le seuil).</li>\n</ul>\n<p>Le pré-traitement étant le plus gros consommateur de tokens, le faire en Haiku réduit fortement le coût total. Et comme Haiku plafonne à 200K de contexte, dès que les sources dépassent ce volume, on route vers Sonnet/Opus (1M) — pertinent pour un projet long-context sans vector DB.</p>\n<p><strong>3. Piloter chaque décision par les évals.</strong> On ne choisit ni ne rétrograde un modèle « au feeling ». On gèle un jeu d&#39;éval (affirmations attendues + leurs sources officielles), on fait tourner le candidat dessus, on compare aux seuils (fidélité, sourçage vérifiable, citations correctes), et on ne descend en gamme que si la qualité tient. L&#39;éval doit tolérer de la variance : même à paramètres fixes, la sortie n&#39;est jamais garantie identique bit-à-bit.</p>\n<p>Enfin, <strong>on épingle les versions</strong>. Depuis la génération 4.6, chaque ID est un <em>snapshot figé</em> — les IDs sans date (<code>claude-sonnet-4-6</code>, <code>claude-opus-4-8</code>) sont déjà des versions immuables, pas des pointeurs « evergreen ». Pour les modèles plus anciens, on préfère l&#39;ID daté (ex. <code>claude-sonnet-4-5-20250929</code>) à l&#39;alias qui peut bouger.</p>\n<h2>Exemples concrets</h2>\n<p><strong>Pipeline React 18→19 à 3 niveaux.</strong> Haiku pré-traite (filtrer les sources officielles React/Next, dédupliquer les changelogs, extraire les claims candidates), Sonnet produit la synthèse sourcée avec citations, et un <em>gate</em> d&#39;éval déclenche un re-run sur Opus uniquement pour les sections dont le score de fidélité/sourçage passe sous le seuil.</p>\n<p><strong>Config de modèles centralisée.</strong> Un seul ID épinglé par étape, jamais en dur dispersé dans le code — une migration devient alors un changement de chaîne + un passage d&#39;éval.</p>\n<pre><code class=\"language-python\"># config/models.py — un ID figé par étape du workflow\nMODELS = {\n    &quot;pretraitement&quot;: &quot;claude-haiku-4-5&quot;,   # extraction, dédup, normalisation\n    &quot;synthese&quot;:      &quot;claude-sonnet-4-6&quot;,  # note de migration sourcée\n    &quot;fallback&quot;:      &quot;claude-opus-4-8&quot;,    # si l&#39;éval l&#39;exige\n}\n\ndef run_synthese(messages):\n    # Sonnet 4.6 : pas de budget_tokens — on utilise effort.\n    return client.messages.create(\n        model=MODELS[&quot;synthese&quot;],\n        max_tokens=16000,\n        thinking={&quot;type&quot;: &quot;adaptive&quot;},\n        output_config={&quot;effort&quot;: &quot;high&quot;},  # low | medium | high | max\n        messages=messages,\n    )\n</code></pre>\n<p><strong>Monter l&#39;effort plutôt que de monter en gamme.</strong> Sur Opus/Sonnet, <code>output_config.effort</code> (<code>low</code>/<code>medium</code>/<code>high</code>/<code>max</code>, et <code>xhigh</code> sur Opus 4.7+) ajuste la profondeur de raisonnement. Souvent, passer de <code>medium</code> à <code>high</code> suffit là où on aurait, par réflexe, changé de modèle — à tester avant de rétrograder ou d&#39;upgrader. Attention : ce levier n&#39;est pas universel — <strong>Haiku 4.5 n&#39;a ni <code>effort</code> ni thinking adaptatif</strong> (et Opus 4.8 n&#39;a pas de thinking étendu hérité), donc le levier de qualité diffère selon le tier.</p>\n<h2>Subtilités &amp; pièges à éviter</h2>\n<ul>\n<li><strong>Alias vs snapshot a changé de sémantique.</strong> Avant la 4.6, un alias sans date pouvait pointer vers un nouvel ID daté et <em>bouger</em> silencieusement. À partir de la 4.6, l&#39;ID sans date <em>est</em> le snapshot figé. Ne supposez jamais qu&#39;un ID sans date est evergreen sans vérifier la génération.</li>\n<li><strong>Épingler protège du <em>drift</em>, pas du <em>retrait</em>.</strong> Anthropic préserve les poids mais ne garantit pas la re-disponibilité : un modèle retiré renvoie une erreur. La migration reste obligatoire à terme — un plan documenté n&#39;est pas optionnel.</li>\n<li><strong>Changer de modèle en cours de session invalide le prompt cache</strong> (les caches sont scopés par modèle). Un routing qui alterne les modèles <em>au milieu d&#39;un turn</em> paie des écritures de cache à froid : routez à la <strong>frontière des étapes</strong>, pas en cours d&#39;appel.</li>\n<li><strong>Le tokenizer a changé avec Opus 4.7</strong> (partagé par Opus 4.8) : pour un même texte, ~1× à 1,35× de tokens de plus que sur les modèles antérieurs. Lors d&#39;une migration cross-génération, re-baseliner les budgets de contexte et <code>max_tokens</code> via <code>count_tokens</code> — pas de multiplicateur en aveugle.</li>\n<li><strong>Une recall plus basse après migration peut être un artefact de harnais</strong>, pas une régression : les Opus récents suivent plus littéralement une consigne du type « ne remonte que le critique ». Adaptez le prompt avant de conclure que le nouveau modèle est moins bon.</li>\n<li><strong>Le préavis de 60 jours couvre l&#39;API publique.</strong> Certains retraits historiques ont été plus courts, et les plateformes partenaires (Bedrock, Vertex AI) fixent leurs propres calendriers, distincts de l&#39;API Anthropic.</li>\n<li><strong>Piège — Opus partout « pour être sûr ».</strong> Multiplie coût et latence sans gain de fiabilité sur les étapes simples : le pré-traitement n&#39;a pas besoin d&#39;Opus.</li>\n<li><strong>Piège — rétrograder sans éval avant/après.</strong> On découvre la dégradation de fidélité/sourçage en prod, exactement ce que le différenciateur « confiance » ne peut pas se permettre.</li>\n<li><strong>Piège — coder les IDs en dur, dispersés.</strong> Chaque migration devient une chasse multi-fichiers et empêche un routing/éval propre.</li>\n<li><strong>Piège — ignorer le cycle de dépréciation.</strong> Ne pas surveiller la page <code>model-deprecations</code> ni auditer l&#39;usage Console mène à des requêtes 400 le jour du retrait — en pleine détection d&#39;une nouvelle version à synthétiser.</li>\n<li><strong>Piège — migrer le jour du retrait.</strong> Sans test préalable du remplaçant sur le jeu d&#39;éval, on hérite des changements cassants (<code>budget_tokens</code>→adaptatif, prefill retiré, params d&#39;échantillonnage en 400) au pire moment.</li>\n</ul>\n<h2>Checklist d&#39;application</h2>\n<ul>\n<li><input disabled=\"\" type=\"checkbox\"> Prototyper la faisabilité de chaque étape sur Opus 4.8 d&#39;abord, pour fixer la barre de qualité.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Centraliser un ID de modèle épinglé <strong>par étape</strong> dans une seule config (Haiku pré-traitement, Sonnet synthèse, Opus fallback).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Vérifier que les IDs en prod sont des snapshots figés (sans date pour 4.6+, datés pour les modèles antérieurs) — jamais d&#39;alias evergreen.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Geler un jeu d&#39;éval (claims attendues + sources officielles) et mesurer fidélité, sourçage vérifiable, citations correctes.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Avant toute rétrogradation de gamme, faire tourner le candidat sur le jeu d&#39;éval gelé et comparer aux seuils.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Tester chaque migration sur <strong>une requête unique</strong> d&#39;abord, inspecter <code>stop_reason</code>/<code>usage</code> et le comportement (thinking, citations), puis dérouler.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Essayer de monter <code>effort</code> (ou activer le thinking adaptatif) avant de changer de gamme.</li>\n<li><input disabled=\"\" type=\"checkbox\"> Router à la frontière des étapes, jamais en alternant les modèles au milieu d&#39;un turn (préserve le prompt cache).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Re-baseliner les tokens via <code>count_tokens</code> lors d&#39;une migration cross-génération (tokenizer Opus 4.7+).</li>\n<li><input disabled=\"\" type=\"checkbox\"> Surveiller <code>model-deprecations</code>, auditer l&#39;usage via l&#39;export CSV de la Console (par clé API + modèle), et assigner une date de retrait dès la dépréciation annoncée.</li>\n<li><input disabled=\"\" type=\"checkbox\"> (Optionnel) Lire les capacités par modèle via la Models API (<code>max_input_tokens</code>, <code>max_tokens</code>, <code>capabilities</code>) pour des gates de routing robustes aux nouvelles versions.</li>\n</ul>\n<h2>10 questions / réponses</h2>\n<p><strong>Q1. Par quel modèle commencer quand on ne sait pas si la tâche est faisable ?</strong>\nPar le plus capable (Opus 4.8). On vérifie d&#39;abord que la tâche est atteignable, ce qui fixe la barre de qualité ; ensuite seulement on cherche à descendre vers un modèle plus petit et moins cher. C&#39;est la recommandation conjointe des praticiens et de la doc Anthropic (applied-llms.org ; Models overview).</p>\n<p><strong>Q2. Pourquoi ne pas simplement tout faire en Opus « pour être tranquille » ?</strong>\nParce que ça multiplie le coût et la latence sans gain de fiabilité sur les étapes simples. Le pré-traitement (extraction, dédup) n&#39;a pas besoin d&#39;Opus ; le faire en Haiku ($1/$5 vs $5/$25 par MTok) réduit fortement le coût d&#39;un workflow volumineux. C&#39;est l&#39;anti-pattern direct de « smallest model that works » (applied-llms.org).</p>\n<p><strong>Q3. Comment décide-t-on quel modèle va sur quelle étape ?</strong>\nPar routing selon la complexité : on classe la tâche et on l&#39;envoie vers le modèle adapté — Haiku pour le pré-traitement, Sonnet pour la synthèse, Opus pour les cas durs. C&#39;est exactement le pattern « routing » d&#39;Anthropic, qui cite l&#39;exemple d&#39;envoyer les questions faciles vers Haiku et les difficiles vers un modèle plus capable (Building Effective Agents).</p>\n<p><strong>Q4. Que veut dire « épingler une version » et pourquoi est-ce différent depuis la 4.6 ?</strong>\nÉpingler = utiliser un identifiant de modèle qui ne bougera pas. Avant la 4.6, un alias sans date pointait vers un snapshot daté susceptible de changer ; à partir de la 4.6, l&#39;ID sans date (<code>claude-sonnet-4-6</code>, <code>claude-opus-4-8</code>) <em>est</em> déjà un snapshot figé. Pour les modèles antérieurs, on épingle l&#39;ID daté (ex. <code>claude-so
