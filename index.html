<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LearnPack — bibliothèque d'apprentissage</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--indigo:#4f46e5;--violet:#8b5cf6;--cyan:#06b6d4;--emerald:#10b981;--amber:#f59e0b;--rose:#f43f5e;--green:#16a34a;--red:#dc2626;
    --bg:#f5f6fb;--surface:#fff;--surface-2:#f9fafc;--border:#e4e8f1;--border-2:#d3d9e6;--ink:#11162a;--ink-2:#3b425c;--ink-3:#6b7390;
    --grad:linear-gradient(135deg,#4f46e5,#8b5cf6 55%,#06b6d4);--shadow:0 1px 2px rgba(17,22,42,.06),0 4px 16px rgba(17,22,42,.06);--r:14px}
  *{box-sizing:border-box}body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
  a{color:var(--indigo);text-decoration:none}code,.mono{font-family:'JetBrains Mono',monospace;font-size:.85em}
  h1,h2,h3{margin:0;line-height:1.2}button{font-family:inherit;cursor:pointer}
  .nav{position:sticky;top:0;z-index:50;background:rgba(11,16,32,.92);backdrop-filter:blur(10px);color:#fff}
  .nav-in{display:flex;align-items:center;gap:14px;height:54px;max-width:1180px;margin:0 auto;padding:0 22px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800}.logo .dot{width:22px;height:22px;border-radius:7px;background:var(--grad)}
  .nav .sub{color:#aeb6d4;font-size:.82rem;font-weight:600}.nav .right{margin-left:auto;display:flex;gap:8px}
  .nav .right a{color:#c7cce0;font-size:.8rem;font-weight:600;padding:6px 11px;border-radius:999px;background:rgba(255,255,255,.07)}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 70px}
  .hero{background:var(--grad);color:#fff;border-radius:20px;padding:26px 30px;margin-bottom:22px}
  .hero h1{font-size:1.7rem;font-weight:900;margin-bottom:8px}.hero p{margin:0;color:#e9eafe;max-width:72ch}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
  .card:hover{transform:translateY(-3px);border-color:var(--border-2)}
  .card .k{display:inline-block;font-size:.64rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--violet);background:#f3f0ff;border:1px solid #e5defb;border-radius:999px;padding:3px 8px;margin-bottom:8px}
  .card h3{font-size:1.02rem;font-weight:750}.card .tag{color:var(--ink-3);font-size:.84rem;margin:6px 0 10px}
  .card .meta{display:flex;gap:7px;flex-wrap:wrap;font-size:.68rem;color:var(--ink-3);font-weight:700}
  .pill{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:3px 8px}
  .pill.due{color:#b45309;background:#fef3c7;border-color:#fde68a}
  .crumb{font-size:.82rem;color:var(--ink-3);font-weight:600;margin-bottom:10px}.crumb a{cursor:pointer}
  .thead h2{font-size:1.5rem;font-weight:850}.thead .tag{color:var(--ink-2);margin-top:4px}
  .pre-req{font-size:.8rem;color:var(--ink-3);margin-top:6px}
  .tabs{display:flex;gap:18px;margin:18px 0;border-bottom:1px solid var(--border)}
  .tabs button{border:none;background:none;padding:10px 0;font-weight:700;font-size:.92rem;color:var(--ink-3);border-bottom:2px solid transparent}
  .tabs button.active{color:var(--indigo);border-bottom-color:var(--indigo)}
  .doc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 26px;box-shadow:var(--shadow);max-width:840px}
  .doc h3{font-size:1.12rem;margin:1.3em 0 .5em;color:var(--ink);border-bottom:1px solid var(--border);padding-bottom:.2em}
  .doc h3:first-child{margin-top:0}.doc p{margin:.6em 0;color:var(--ink-2)}
  .doc ul{padding-left:1.3em}.doc li{margin:.3em 0;color:var(--ink-2)}
  .doc pre{background:#0b1020;color:#e6e9f5;padding:13px 15px;border-radius:10px;overflow:auto;font-size:.82rem;margin:.8em 0}
  .doc code{background:#eef1f8;padding:.1em .4em;border-radius:5px;font-size:.85em}.doc pre code{background:none;padding:0}
  .claim{border-left:3px solid var(--emerald);background:#f0fdf4;border-radius:0 8px 8px 0;padding:8px 12px;margin:8px 0}
  .claim .q{font-size:.85rem;color:var(--ink-2);font-style:italic}.claim .src{font-size:.76rem;color:var(--ink-3)}
  .mermaid{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px;overflow:auto}
  .q{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:13px;box-shadow:var(--shadow)}
  .q .qt{font-weight:700;margin:2px 0 11px}.opt{display:flex;gap:10px;width:100%;text-align:left;border:1px solid var(--border-2);background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:7px;font-size:.92rem}
  .opt:hover:not(:disabled){border-color:var(--indigo);background:#f7f8ff}.opt .mk{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-weight:800;font-size:.78rem;background:#eef1f8;color:var(--ink-3);flex-shrink:0}
  .opt.correct{border-color:var(--green);background:#f0fdf4}.opt.correct .mk{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:#fef2f2}.opt.wrong .mk{background:var(--red);color:#fff}
  .opt.reveal{border-color:var(--green)}.opt.reveal .mk{background:var(--green);color:#fff}
  .explain{margin-top:6px;font-size:.86rem;color:var(--ink-2);background:var(--surface-2);border-left:3px solid var(--indigo);padding:8px 11px;border-radius:0 8px 8px 0}
  .lvl{display:inline-block;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;border-radius:999px;padding:2px 8px;margin-left:8px;vertical-align:middle}
  .lvl.junior{color:#047857;background:#d1fae5}.lvl.intermediaire{color:#b45309;background:#fef3c7}.lvl.senior{color:#6d28d9;background:#ede9fe}
  .lvlf{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .lvlf button{border:1px solid var(--border-2);background:#fff;border-radius:999px;padding:6px 13px;font-weight:700;font-size:.8rem;color:var(--ink-2)}
  .lvlf button.on{color:#fff;border-color:transparent;background:var(--grad)}
  .qna-grp{margin-top:10px}.qna-grp summary{font-weight:700;cursor:pointer;padding:6px 0}.qna-q{font-weight:600;margin-top:8px}.qna-a{color:var(--ink-2);margin:2px 0 8px}
  .dep{display:inline-block;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;border-radius:999px;padding:2px 7px;margin-left:6px}
  .claim.depr{border-left-color:#dc2626;background:#fef2f2}
  .depnote{font-size:.78rem;color:#b91c1c;margin-top:3px}
  .srcstatus{font-size:.62rem;font-weight:800;text-transform:uppercase;border-radius:999px;padding:2px 7px;margin-left:6px}
  .srcstatus.current{color:#047857;background:#d1fae5}.srcstatus.superseded,.srcstatus.deprecated{color:#b45309;background:#fef3c7}
  .vchip{display:inline-block;font-size:.7rem;font-weight:700;padding:1px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;border:1px solid;white-space:nowrap}
  .vchip.intro{color:#3730a3;background:#e0e7ff;border-color:#c7d2fe}.vchip.cur{color:#047857;background:#d1fae5;border-color:#a7f3d0}
  .vchip.prev{color:#92400e;background:#fef9c3;border-color:#fde68a}.vchip.dep{color:#b45309;background:#fef3c7;border-color:#fcd34d}
  .vchip.rem{color:#b91c1c;background:#fee2e2;border-color:#fecaca}.vchip.fut{color:#6b21a8;background:#f3e8ff;border-color:#e9d5ff}
  .verbanner{font-size:.82rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:9px 12px;margin:6px 0 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;line-height:1.9}
  .verbanner .lag{font-weight:700}.verbanner .lag.warn{color:#b45309}
  .freshness{font-size:.78rem;color:var(--ink-3);margin:-2px 0 12px}
  .stale{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:.85rem;font-weight:600}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar input,.toolbar select{font-family:inherit;font-size:.85rem;border:1px solid var(--border-2);border-radius:10px;padding:8px 11px;background:#fff;color:var(--ink)}
  .toolbar input.q{flex:1;min-width:200px}
  .toolbar .btn{cursor:pointer}
  .rd{font-size:.64rem;font-weight:800;color:#047857;background:#d1fae5;border:1px solid #bbf7d0;border-radius:999px;padding:3px 8px}
  .qtable{width:100%;border-collapse:collapse;font-size:.85rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
  .qtable th,.qtable td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
  .qtable th{background:var(--surface-2);font-weight:700;color:var(--ink-2);font-size:.7rem;text-transform:uppercase;letter-spacing:.03em}
  .qtable tr:last-child td{border-bottom:none}.qtable tbody tr{cursor:pointer}.qtable tbody tr:hover{background:var(--surface-2)}
  .qtable .good{color:var(--green);font-weight:700}.qtable .warn{color:#b45309;font-weight:700}
  .prereq-link{cursor:pointer;color:var(--indigo);text-decoration:underline}
  .viewintro{color:var(--ink-3);font-size:.88rem;margin:-2px 0 16px}
  .scorebar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 15px;margin-bottom:14px;box-shadow:var(--shadow)}
  .scorebar .track{flex:1;height:8px;background:#eef1f8;border-radius:999px;overflow:hidden}.scorebar .fill{height:100%;background:var(--grad);width:0}
  .srs-wrap{max-width:620px;margin:0 auto;text-align:center}
  .srs-counts{display:flex;gap:10px;justify-content:center;margin-bottom:14px;font-size:.8rem;font-weight:700}
  .srs-counts span{padding:5px 11px;border-radius:999px;border:1px solid var(--border)}
  .fc{perspective:1400px;height:240px;margin:6px 0 14px;cursor:pointer}.fc-in{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
  .fc.flip .fc-in{transform:rotateY(180deg)}.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;padding:26px;box-shadow:var(--shadow);border:1px solid var(--border)}
  .fc-front{background:#fff;font-size:1.18rem;font-weight:800}.fc-back{background:linear-gradient(160deg,#eef0ff,#fff);transform:rotateY(180deg);font-size:1rem;color:var(--ink-2);line-height:1.55}
  .rate{display:flex;gap:8px;justify-content:center}.rate button{flex:1;border:1px solid var(--border-2);border-radius:10px;padding:10px;font-weight:700;font-size:.82rem}
  .rate .again{color:var(--red)}.rate .hard{color:#b45309}.rate .good{color:var(--green)}.rate .easy{color:var(--indigo)}
  .btn{border:1px solid var(--border-2);background:var(--surface);border-radius:999px;padding:8px 14px;font-weight:700;font-size:.82rem;color:var(--ink-2)}
  .src{display:flex;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px;box-shadow:var(--shadow)}
  .src .ty{flex-shrink:0;font-size:.64rem;font-weight:800;text-transform:uppercase;color:var(--violet);background:#f3f0ff;border:1px solid #e5defb;border-radius:999px;padding:4px 8px;height:fit-content}
  .empty{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:18px;color:#9a3412}
</style>
</head>
<body>
<nav class="nav"><div class="nav-in"><div class="logo"><span class="dot"></span> LearnPack</div><span class="sub">bibliothèque d'apprentissage sourcée</span>
  <div class="right"><a id="projBtn">📁 Projets</a><a id="home">▦ Bibliothèque</a><a id="graphBtn">🕸 Parcours</a><a id="qualBtn">✓ Qualité</a></div></div></nav>
<div class="wrap" id="app"></div>

<script src="packs.bundle.js"></script>
<script src="projects.bundle.js"></script>
<script>
const PACKS = (window.LEARNPACKS || []);
const PROJECTS = (window.LEARNPROJECTS || []);
const app = document.getElementById('app');
const SRSKEY = s => 'lp_srs_' + s;
let state = { slug:null, tab:'doc', answers:{}, card:0, flip:false, dueOnly:true, qlevel:'all', query:'', fkind:'all', flevel:'all', ftag:'all' };

// --- Progression (vu/lu + meilleur score quiz), export/import ---
const PKEY='lp_progress';
function prog(){ try{return JSON.parse(localStorage.getItem(PKEY)||'{}');}catch(e){return {};} }
function saveProg(o){ localStorage.setItem(PKEY,JSON.stringify(o)); }
function markRead(slug){ const o=prog(); o[slug]=o[slug]||{}; o[slug].read=true; saveProg(o); }
function setQuizBest(slug,v){ const o=prog(); o[slug]=o[slug]||{}; if(!o[slug].quizBest||v.pct>o[slug].quizBest.pct) o[slug].quizBest=v; saveProg(o); }
function exportProgress(){ const data={kind:'learnpack-progress',progress:prog(),srs:{}}; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i); if(k.startsWith('lp_srs_')){ try{data.srs[k]=JSON.parse(localStorage.getItem(k));}catch(e){} }}
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='learnpack-progress.json'; a.click(); }
function importProgress(file){ const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.progress) saveProg({...prog(),...d.progress}); if(d.srs) for(const[k,v] of Object.entries(d.srs)) localStorage.setItem(k,JSON.stringify(v)); renderHome(); alert('Progression importée ✓'); }catch(e){ alert('Fichier invalide.'); } }; r.readAsText(file); }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// --- mini-markdown pour summary/principle/examples ---
function fmt(t){
  t = String(t||'');
  const parts = t.split(/```/);
  let out='';
  parts.forEach((seg,i)=>{
    if(i%2===1){ const nl=seg.indexOf('\n'); const body=nl>=0?seg.slice(nl+1):seg; out+='<pre><code>'+esc(body.replace(/\s+$/,''))+'</code></pre>'; return; }
    let s=esc(seg).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.split(/\n{2,}/).map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('');
    out+=s;
  });
  return out;
}
const pack = () => PACKS.find(p=>p.slug===state.slug);

// --- SRS (SM-2) ---
function srs(slug){ try{return JSON.parse(localStorage.getItem(SRSKEY(slug))||'{}');}catch(e){return {};} }
function saveSrs(slug,o){ localStorage.setItem(SRSKEY(slug),JSON.stringify(o)); }
function dueCount(p){ const st=srs(p.slug); const now=Date.now(); let n=0; for(const c of p.flashcards){ const s=st[c.id]; if(!s||new Date(s.due).getTime()<=now) n++; } return n; }
function sm2(prev,q){ // q: 0..5
  let ef=prev?prev.ef:2.5, reps=prev?prev.reps:0, interval=prev?prev.interval:0;
  if(q<3){ reps=0; interval=1; } else { reps+=1; interval = reps===1?1:reps===2?6:Math.round(interval*ef); }
  ef = ef + (0.1-(5-q)*(0.08+(5-q)*0.02)); if(ef<1.3) ef=1.3;
  return { ef:+ef.toFixed(2), reps, interval, due:new Date(Date.now()+interval*864e5).toISOString() };
}

function renderHome(){
  state.slug=null;
  if(!PACKS.length){ app.innerHTML='<div class="empty"><b>Aucun pack chargé.</b><br>Génère un pack avec <code>/learn-pack &lt;sujet&gt;</code> puis lance <code>node ../bundle.mjs</code> pour (re)construire <code>packs.bundle.js</code>.</div>'; return; }
  const P=prog();
  const searchText=p=>[p.title,p.tagline,(p.tags||[]).join(' '),(p.concepts||[]).map(c=>c.label).join(' '),(p.claims||[]).map(c=>c.statement).join(' '),(p.qna||[]).map(x=>x.q+' '+x.a).join(' ')].join(' ').toLowerCase();
  const kinds=[...new Set(PACKS.map(p=>p.kind))].sort(), levels=[...new Set(PACKS.map(p=>p.level))].sort(), tags=[...new Set(PACKS.flatMap(p=>p.tags||[]))].sort();
  const q=(state.query||'').trim().toLowerCase();
  const shown=PACKS.filter(p=>(state.fkind==='all'||p.kind===state.fkind)&&(state.flevel==='all'||p.level===state.flevel)&&(state.ftag==='all'||(p.tags||[]).includes(state.ftag))&&(!q||searchText(p).includes(q)));
  const opt=(v,sel)=>'<option value="'+esc(v)+'"'+(sel===v?' selected':'')+'>'+esc(v)+'</option>';
  const readN=PACKS.filter(p=>(P[p.slug]||{}).read).length;
  const toolbar='<div class="toolbar"><input class="q" id="q" placeholder="Rechercher… (titre, concept, affirmation)" value="'+esc(state.query||'')+'">'
    +'<select id="fkind"><option value="all">Tout type</option>'+kinds.map(k=>opt(k,state.fkind)).join('')+'</select>'
    +'<select id="flevel"><option value="all">Tout niveau</option>'+levels.map(k=>opt(k,state.flevel)).join('')+'</select>'
    +'<select id="ftag"><option value="all">Tout tag</option>'+tags.map(k=>opt(k,state.ftag)).join('')+'</select>'
    +'<button class="btn" id="exp">⬇ Export</button><button class="btn" id="impb">⬆ Import</button><input type="file" id="impf" accept="application/json" style="display:none"></div>';
  const cards=shown.map(p=>{ const due=dueCount(p), pr=P[p.slug]||{};
    return '<div class="card" data-s="'+p.slug+'"><span class="k">'+esc(p.kind)+' · '+esc(p.level)+'</span>'+(pr.read?' <span class="rd">✓ lu</span>':'')+'<h3>'+esc(p.title)+'</h3>'
      +'<div class="tag">'+esc(p.tagline)+'</div><div class="meta">'
      +'<span class="pill">'+(p.claims||[]).length+' affirmations</span><span class="pill">'+(p.quiz||[]).length+' QCM</span>'
      +(pr.quizBest?'<span class="pill ok">quiz '+pr.quizBest.pct+'%</span>':'')
      +(due?'<span class="pill due">'+due+' à réviser</span>':'<span class="pill">à jour</span>')+'</div></div>';}).join('')||'<p style="color:var(--ink-3)">Aucun pack ne correspond aux filtres.</p>';
  app.innerHTML='<div class="hero"><h1>Apprendre, vérifier, retenir</h1><p>Des dossiers d\'apprentissage au format canonique : chaque affirmation cite une source <b>vérifiée verbatim</b>. Quiz par niveau, fiches SRS, export Anki.</p></div>'
    +'<div class="freshness">'+PACKS.length+' pack(s) · '+readN+' lu(s) · '+shown.length+' affiché(s)</div>'+toolbar+'<div class="grid">'+cards+'</div>';
  const qel=document.getElementById('q'); qel.oninput=()=>{ const pos=qel.selectionStart; state.query=qel.value; renderHome(); const n=document.getElementById('q'); if(n){n.focus(); try{n.setSelectionRange(pos,pos);}catch(e){}} };
  document.getElementById('fkind').onchange=e=>{state.fkind=e.target.value;renderHome();};
  document.getElementById('flevel').onchange=e=>{state.flevel=e.target.value;renderHome();};
  document.getElementById('ftag').onchange=e=>{state.ftag=e.target.value;renderHome();};
  document.getElementById('exp').onclick=exportProgress;
  document.getElementById('impb').onclick=()=>document.getElementById('impf').click();
  document.getElementById('impf').onchange=e=>{ if(e.target.files[0]) importProgress(e.target.files[0]); };
  app.querySelectorAll('.card').forEach(el=>el.onclick=()=>open(el.dataset.s));
}
function open(slug){ markRead(slug); Object.assign(state,{slug,tab:'doc',answers:{},card:0,flip:false,qlevel:'all'}); renderPack(); window.scrollTo(0,0); }

function renderPack(){
  const p=pack();
  let body = state.tab==='doc'?renderDoc(p): state.tab==='quiz'?renderQuiz(p): state.tab==='srs'?renderSrs(p):renderSrc(p);
  const pre=(p.prerequisites||[]).length?'<div class="pre-req">Prérequis : '+p.prerequisites.map(s=>'<a class="prereq-link" data-s="'+esc(s)+'">'+esc(s)+'</a>').join(', ')+'</div>':'';
  app.innerHTML='<div class="crumb"><a id="bk">Bibliothèque</a> › '+esc(p.kind)+'</div>'
    +'<div class="thead"><h2>'+esc(p.title)+'</h2><div class="tag">'+esc(p.tagline)+'</div>'+pre+'</div>'
    +'<div class="tabs"><button data-t="doc" class="'+(state.tab==='doc'?'active':'')+'">📖 Cours</button>'
    +'<button data-t="quiz" class="'+(state.tab==='quiz'?'active':'')+'">📝 Quiz ('+(p.quiz||[]).length+')</button>'
    +'<button data-t="srs" class="'+(state.tab==='srs'?'active':'')+'">🃏 Révision ('+dueCount(p)+')</button>'
    +'<button data-t="src" class="'+(state.tab==='src'?'active':'')+'">🔗 Sources</button></div><div id="tb">'+body+'</div>';
  document.getElementById('bk').onclick=renderHome;
  app.querySelectorAll('.pre-req .prereq-link').forEach(a=>a.onclick=()=>open(a.dataset.s));
  app.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.t;state.card=0;state.flip=false;renderPack();});
  if(state.tab==='doc') initMermaid();
  if(state.tab==='quiz') wireQuiz(p);
  if(state.tab==='srs') wireSrs(p);
}

function renderDoc(p){
  const pv=p.provenance||{}; const fr=pv.lastFreshnessCheck||pv.reviewedAt||pv.generatedAt;
  let h='';
  if(pv.stale) h+='<div class="stale">⚠ Sources à re-vérifier'+((pv.stale.driftedClaims||[]).length?' — citations dérivées : '+pv.stale.driftedClaims.join(', '):'')+((pv.stale.unreachableSources||[]).length?' · injoignables : '+pv.stale.unreachableSources.join(', '):'')+'</div>';
  const rc=pv.regenCheck; const regenTxt=rc?(rc.verdict==='a-regenerer'?' · <span style="color:#b45309">⚠ '+(rc.changed||0)+' source(s) évoluée(s) → régénérer</span>':rc.verdict==='inchange'?' · sources inchangées depuis génération':rc.verdict==='baseline'?' · empreintes sources établies':''):'';
  h+='<div class="freshness">Vérifié au '+esc(fr||'?')+(pv.humanReviewed?' · relu humainement':'')+(pv.judge?' · jury '+esc(pv.judge.score)+'/100':'')+regenTxt+'</div>';
  if(p.technology){ const va=pv.versionAudit||null, lagWarn=va&&va.lag&&va.lag!=='à jour';
    h+='<div class="verbanner"><b>'+esc(p.technology.name)+'</b> — ce pack décrit <b>v'+esc(p.technology.currentVersion)+'</b>'
      +(va&&va.latestKnown?' · dernière connue <b>v'+esc(va.latestKnown)+'</b>':'')
      +(va&&va.lag?' · <span class="lag'+(lagWarn?' warn':'')+'">'+esc(va.lag)+'</span>':'')
      +(va?'<span style="flex-basis:100%;height:0"></span>'
        +'<span class="vchip cur">actuelles '+(va.current||0)+'</span>'
        +(va.preview?'<span class="vchip prev">preview '+va.preview+'</span>':'')
        +(va.future?'<span class="vchip fut">à venir '+va.future+'</span>':'')
        +(va.deprecated?'<span class="vchip dep">dépréciées '+va.deprecated+'</span>':'')
        +(va.removed?'<span class="vchip rem">retirées '+va.removed+'</span>':''):'')
      +'</div>'; }
  h+='<div class="doc">';
  h+='<h3>Synthèse</h3>'+fmt(p.summary);
  h+='<h3>Le principe</h3>'+fmt(p.principle);
  if((p.concepts||[]).length){ h+='<h3>Concepts clés</h3><ul>'+p.concepts.map(c=>'<li><strong>'+esc(c.label)+'</strong>'+(c.definition?' — '+esc(c.definition):'')+((c.prerequisites||[]).length?' <em>(après : '+c.prerequisites.map(esc).join(', ')+')</em>':'')+'</li>').join('')+'</ul>'; }
  if(p.diagram&&p.diagram.code){ h+='<h3>Diagramme</h3><div class="mermaid">'+esc(p.diagram.code)+'</div>'+(p.diagram.caption?'<p><em>'+esc(p.diagram.caption)+'</em></p>':''); }
  if((p.examples||[]).length){ h+='<h3>Exemples concrets</h3>'+p.examples.map(e=>'<p><strong>'+esc(e.title)+'</strong></p>'+fmt(e.body)).join(''); }
  if((p.pitfalls||[]).length){ h+='<h3>Subtilités & pièges</h3><ul>'+p.pitfalls.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul>'; }
  if((p.checklist||[]).length){ h+='<h3>Checklist</h3><ul>'+p.checklist.map(x=>'<li>☐ '+esc(x)+'</li>').join('')+'</ul>'; }
  if((p.claims||[]).length){ const byId=Object.fromEntries((p.sources||[]).map(s=>[s.id,s]));
    const vstatus=(pv.versionAudit&&pv.versionAudit.claims)?Object.fromEntries(pv.versionAudit.claims.map(a=>[a.id,a.status])):{};
    const STLAB={preview:['prev','preview'],deprecated:['dep','déprécié'],removed:['rem','retiré'],future:['fut','à venir']};
    const vchips=c=>{const v=c.versioning;if(!v)return '';const out=[];if(v.introducedIn)out.push('<span class="vchip intro">dès v'+esc(v.introducedIn)+'</span>');
      const st=vstatus[c.id], lab=STLAB[st];
      if(lab){let t=lab[1];if(st==='deprecated'&&v.deprecatedIn)t='déprécié v'+v.deprecatedIn;if(st==='removed'&&v.removedIn)t='retiré v'+v.removedIn;out.push('<span class="vchip '+lab[0]+'">'+esc(t)+'</span>');}
      else if(v.removedIn)out.push('<span class="vchip rem">retiré v'+esc(v.removedIn)+'</span>');else if(v.deprecatedIn)out.push('<span class="vchip dep">déprécié v'+esc(v.deprecatedIn)+'</span>');
      return out.join('');};
    h+='<h3>Affirmations sourcées</h3>'+p.claims.map(c=>{const s=byId[c.sourceId];const dep=c.deprecated===true;return '<div class="claim'+(dep?' depr':'')+'">'+esc(c.statement)+vchips(c)+(dep?' <span class="dep">déprécié</span>':'')+(dep&&c.deprecationNote?'<div class="depnote">⚠ '+esc(c.deprecationNote)+'</div>':'')+((c.versioning&&c.versioning.note)?'<div class="depnote" style="color:#3730a3">↪ '+esc(c.versioning.note)+'</div>':'')+'<div class="q">« '+esc(c.quote)+' »</div><div class="src">— '+(s?'<a href="'+esc(s.url)+'" target="_blank">'+esc(s.title)+' ↗</a>':esc(c.sourceId))+'</div></div>';}).join(''); }
  if((p.qna||[]).length){ h+='<h3>Questions / réponses par niveau</h3>';
    ['junior','intermediaire','senior'].forEach(lv=>{ const items=p.qna.filter(x=>x.level===lv); if(!items.length) return;
      h+='<details class="qna-grp" open><summary><span class="lvl '+lv+'">'+(lv==='intermediaire'?'Intermédiaire':lv[0].toUpperCase()+lv.slice(1))+'</span> &nbsp;'+items.length+' question(s)</summary>'
        +items.map(x=>'<div class="qna-q">'+esc(x.q)+'</div><div class="qna-a">'+esc(x.a)+'</div>').join('')+'</details>'; }); }
  return h+'</div>';
}
let mermaidTried=false;
function initMermaid(){
  const els=app.querySelectorAll('.mermaid'); if(!els.length) return;
  const run=()=>{ try{ window.mermaid.initialize({startOnLoad:false,theme:'neutral'}); window.mermaid.run({nodes:els}); }catch(e){} };
  if(window.mermaid){ run(); return; }
  if(mermaidTried) return; mermaidTried=true;
  const sc=document.createElement('script'); sc.src='https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
  sc.onload=run; sc.onerror=()=>{}; document.head.appendChild(sc); // hors-ligne : le code Mermaid reste affiché tel quel
}

const QLV=['junior','intermediaire','senior'], QLVL={junior:'Junior',intermediaire:'Intermédiaire',senior:'Senior'};
function shownQuiz(p){ const lv=state.qlevel||'all'; return p.quiz.map((q,qi)=>({q,qi})).filter(o=>lv==='all'||o.q.level===lv); }
function renderQuiz(p){
  const lv=state.qlevel||'all', cnt={}; QLV.forEach(k=>cnt[k]=p.quiz.filter(q=>q.level===k).length);
  const chip=(k,lab)=>'<button class="'+(lv===k?'on':'')+'" data-lv="'+k+'">'+lab+(k==='all'?' ('+p.quiz.length+')':' ('+cnt[k]+')')+'</button>';
  let h='<div class="lvlf">'+chip('all','Tous')+QLV.map(k=>chip(k,QLVL[k])).join('')+'</div>';
  const shown=shownQuiz(p);
  h+='<div class="scorebar"><b id="pct">0 / '+shown.length+'</b><div class="track"><div class="fill" id="fill"></div></div><button class="btn" id="rs">↺ Recommencer</button></div><div id="res"></div>';
  shown.forEach(({q,qi},n)=>{ const answered=qi in state.answers, chosen=state.answers[qi];
    h+='<div class="q" data-qi="'+qi+'"><div class="qt">'+(n+1)+'. '+esc(q.q)+'<span class="lvl '+q.level+'">'+QLVL[q.level]+'</span></div>';
    q.options.forEach((o,oi)=>{ let cls='opt';
      if(answered){ if(oi===q.answer) cls+=(oi===chosen?' correct':' reveal'); else if(oi===chosen) cls+=' wrong'; }
      h+='<button class="'+cls+'" data-qi="'+qi+'" data-oi="'+oi+'"'+(answered?' disabled':'')+'><span class="mk">'+String.fromCharCode(65+oi)+'</span><span>'+esc(o)+'</span></button>'; });
    h+='<div class="explain"'+(answered?'':' style="display:none"')+'>'+(answered?('<b>'+(chosen===q.answer?'✓ Correct.':'✗ Raté.')+'</b> '+esc(q.explain)):'')+'</div></div>'; });
  return h;
}
function wireQuiz(p){
  app.querySelectorAll('.lvlf button').forEach(b=>b.onclick=()=>{ state.qlevel=b.dataset.lv; renderPack(); });
  const upd=()=>{ const sh=shownQuiz(p).map(o=>o.qi); const ans=sh.filter(qi=>qi in state.answers); const good=ans.filter(qi=>state.answers[qi]===p.quiz[qi].answer).length;
    const pct=document.getElementById('pct'); if(pct) pct.textContent=good+' / '+sh.length;
    const fill=document.getElementById('fill'); if(fill) fill.style.width=Math.round(ans.length/Math.max(1,sh.length)*100)+'%';
    const r=document.getElementById('res'); if(r&&sh.length&&ans.length===sh.length) r.innerHTML='<div class="explain"><b>Terminé ('+(state.qlevel==='all'?'tous niveaux':QLVL[state.qlevel])+') : '+good+'/'+sh.length+'</b></div>';
    if(p.quiz.every((q,i)=>i in state.answers)){ const g=p.quiz.filter((q,i)=>state.answers[i]===q.answer).length; setQuizBest(p.slug,{good:g,total:p.quiz.length,pct:Math.round(g/p.quiz.length*100)}); } };
  app.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{ const qi=+b.dataset.qi,oi=+b.dataset.oi; if(qi in state.answers) return; state.answers[qi]=oi; const q=p.quiz[qi],ok=oi===q.answer;
    const qe=app.querySelector('.q[data-qi="'+qi+'"]'); qe.querySelectorAll('.opt').forEach(o=>{const i=+o.dataset.oi;o.disabled=true;if(i===q.answer)o.classList.add(i===oi?'correct':'reveal');else if(i===oi)o.classList.add('wrong');});
    const ex=qe.querySelector('.explain'); ex.style.display='block'; ex.innerHTML='<b>'+(ok?'✓ Correct.':'✗ Raté.')+'</b> '+esc(q.explain); upd(); });
  document.getElementById('rs').onclick=()=>{ shownQuiz(p).forEach(o=>delete state.answers[o.qi]); renderPack(); };
  upd();
}

function renderSrs(p){
  const st=srs(p.slug),now=Date.now();
  const due=p.flashcards.filter(c=>{const s=st[c.id];return !s||new Date(s.due).getTime()<=now;});
  const newN=p.flashcards.filter(c=>!st[c.id]).length;
  let h='<div class="srs-counts"><span class="pill due">'+due.length+' à réviser</span><span class="pill">'+newN+' nouvelles</span><span class="pill">'+p.flashcards.length+' total</span></div>';
  h+='<div style="text-align:center;margin-bottom:12px"><button class="btn" id="anki">⬇ Export Anki (TSV)</button></div>';
  if(!due.length){ return h+'<div class="empty" style="text-align:center">🎉 Rien à réviser pour l\'instant — reviens plus tard (les intervalles SM-2 augmentent à chaque bonne réponse).</div>'; }
  const c=due[Math.min(state.card,due.length-1)];
  window.__due=due;
  h+='<div class="srs-wrap"><div class="fc'+(state.flip?' flip':'')+'" id="fc"><div class="fc-in"><div class="fc-face fc-front">'+esc(c.front)+'</div><div class="fc-face fc-back">'+esc(c.back)+'</div></div></div>';
  if(!state.flip){ h+='<button class="btn" id="rev" style="width:100%">Voir la réponse</button>'; }
  else { h+='<div class="rate"><button class="again" data-q="1">Encore</button><button class="hard" data-q="3">Difficile</button><button class="good" data-q="4">Correct</button><button class="easy" data-q="5">Facile</button></div>'; }
  return h+'</div>';
}
function wireSrs(p){
  document.getElementById('anki').onclick=()=>{
    const tsv=p.flashcards.map(c=>c.front.replace(/\t/g,' ')+'\t'+c.back.replace(/\t/g,' ').replace(/\n/g,'<br>')).join('\n');
    const b=new Blob([tsv],{type:'text/tab-separated-values'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=p.slug+'-anki.txt';a.click();
  };
  const fc=document.getElementById('fc'); if(fc) fc.onclick=()=>{state.flip=!state.flip;renderPack();};
  const rev=document.getElementById('rev'); if(rev) rev.onclick=()=>{state.flip=true;renderPack();};
  app.querySelectorAll('.rate button').forEach(b=>b.onclick=()=>{
    const due=window.__due, c=due[Math.min(state.card,due.length-1)];
    const st=srs(p.slug); st[c.id]=sm2(st[c.id],+b.dataset.q); saveSrs(p.slug,st);
    state.flip=false; renderPack();
  });
}

function renderSrc(p){
  return (p.sources||[]).map(s=>{ const st=s.status&&s.status!=='current'?'<span class="srcstatus '+s.status+'">'+esc(s.status)+'</span>':(s.status==='current'?'<span class="srcstatus current">à jour</span>':''); const meta=[s.publisher,s.coversVersion,s.publishedAt].filter(Boolean).map(esc).join(' · ');
    return '<div class="src"><span class="ty">'+esc(s.type)+'</span><div><a href="'+esc(s.url)+'" target="_blank">'+esc(s.title)+' ↗</a>'+st+(meta?'<div style="font-size:.78rem;color:var(--ink-3)">'+meta+'</div>':'')+'</div></div>';}).join('')
    + (p.provenance?'<p style="font-size:.78rem;color:var(--ink-3);margin-top:14px">Généré par '+esc(p.provenance.generator)+' · relu : '+(p.provenance.humanReviewed?'oui':'non')+(p.provenance.judge?' · juge '+esc(p.provenance.judge.score)+'/100':'')+(p.provenance.lastFreshnessCheck?' · fraîcheur vérifiée le '+esc(p.provenance.lastFreshnessCheck):'')+'</p>':'');
}

function safeId(s){ return 'n_'+String(s).replace(/[^a-z0-9]/gi,'_'); }
function renderGraph(){
  state.slug=null;
  const nodes=PACKS.map(p=>safeId(p.slug)+'["'+String(p.title).replace(/"/g,"'")+'"]');
  const edges=[]; PACKS.forEach(p=>(p.prerequisites||[]).forEach(pr=>{ if(PACKS.find(x=>x.slug===pr)) edges.push(safeId(pr)+' --> '+safeId(p.slug)); }));
  const mer='graph LR\n'+nodes.join('\n')+(edges.length?'\n'+edges.join('\n'):'');
  const list=PACKS.map(p=>'<li><a class="prereq-link" data-s="'+p.slug+'">'+esc(p.title)+'</a>'+((p.prerequisites||[]).length?' <span style="color:var(--ink-3)">← requiert '+p.prerequisites.map(esc).join(', ')+'</span>':'')+'</li>').join('');
  app.innerHTML='<h2 style="margin-bottom:6px">Parcours d’apprentissage</h2><div class="viewintro">Les flèches vont du prérequis vers le pack qui en dépend ('+edges.length+' lien(s) entre '+PACKS.length+' packs).</div><div class="mermaid">'+esc(mer)+'</div><h3 style="font-size:1rem;margin:18px 0 6px">Packs &amp; prérequis</h3><ul>'+list+'</ul>';
  mermaidTried=false; initMermaid();
  app.querySelectorAll('.prereq-link').forEach(a=>a.onclick=()=>open(a.dataset.s));
}
function renderQuality(){
  state.slug=null;
  const rows=PACKS.map(p=>{ const pv=p.provenance||{}, cl=p.claims||[];
    const use={}; cl.forEach(c=>use[c.sourceId]=(use[c.sourceId]||0)+1); const max=cl.length?Math.max(...Object.values(use)):0; const divPct=cl.length?Math.round(max/cl.length*100):0;
    const dep=cl.filter(c=>c.deprecated).length; const fr=pv.freshness;
    const frTxt=fr?(((fr.drift||fr.unreachable)?'<span class="warn">dérive '+(fr.drift||0)+'</span>':'<span class="good">ok</span>')+' <small>('+(fr.checkedAt||'?')+')</small>'):'<span style="color:var(--ink-3)">non vérifié</span>';
    const va=pv.versionAudit, tech=p.technology;
    const verTxt=tech?(va?('v'+esc(tech.currentVersion)+(va.latestKnown&&va.latestKnown!==tech.currentVersion?'→v'+esc(va.latestKnown):'')+' '+((va.removed||va.deprecated)?'<span class="warn">'+[va.deprecated?va.deprecated+' dépr.':'',va.removed?va.removed+' retir.':''].filter(Boolean).join(' · ')+'</span>':'<span class="good">'+esc(va.lag||'à jour')+'</span>')):'v'+esc(tech.currentVersion)+' <small>(non audité)</small>'):'<span style="color:var(--ink-3)">—</span>';
    return '<tr data-s="'+p.slug+'"><td><b>'+esc(p.title)+'</b></td><td>'+esc(p.kind)+'</td><td>'+(pv.judge?'<span class="'+(pv.judge.score>=80?'good':'warn')+'">'+esc(pv.judge.score)+'</span>':'-')+'</td><td>'+(p.sources||[]).length+' · <span class="'+(divPct>60?'warn':'good')+'">'+divPct+'%</span></td><td>'+(dep?'<span class="warn">'+dep+' ⚠</span>':'0')+'</td><td>'+verTxt+'</td><td>'+frTxt+'</td><td>'+(pv.humanReviewed?'✓':'—')+'</td></tr>';}).join('');
  app.innerHTML='<h2 style="margin-bottom:6px">Tableau de bord qualité</h2><div class="viewintro">Score jury · diversité (part max d’une source dans les claims) · claims dépréciés · <b>versions</b> (pack vs dernière connue + spécificités retirées/dépréciées) · fraîcheur · relu humainement.</div><table class="qtable"><thead><tr><th>Pack</th><th>Type</th><th>Jury</th><th>Sources · div.</th><th>Déprécié</th><th>Versions</th><th>Fraîcheur</th><th>Relu</th></tr></thead><tbody>'+rows+'</tbody></table>';
  app.querySelectorAll('.qtable tbody tr').forEach(tr=>tr.onclick=()=>open(tr.dataset.s));
}
function renderProjects(){
  state.slug=null;
  if(!PROJECTS.length){ app.innerHTML='<div class="empty"><b>Aucun projet.</b> Ajoute <code>projects/&lt;slug&gt;.json</code> puis <code>node bundle.mjs</code>.</div>'; return; }
  const cards=PROJECTS.map(pr=>'<div class="card" data-p="'+pr.slug+'"><span class="k">projet</span><h3>'+esc(pr.title)+'</h3><div class="tag">'+esc(pr.goal)+'</div><div class="meta"><span class="pill">'+(pr.path||[]).length+' packs</span><span class="pill">'+(pr.lessons||[]).length+' leçons</span>'+(pr.status?'<span class="pill">'+esc(pr.status)+'</span>':'')+'</div></div>').join('');
  app.innerHTML='<div class="hero"><h1>Projets</h1><p>Un projet relie un <b>parcours de packs</b> à ses <b>leçons</b> (décisions / REX). Les packs restent réutilisables entre projets.</p></div><div class="grid">'+cards+'</div>';
  app.querySelectorAll('.card').forEach(el=>el.onclick=()=>openProject(el.dataset.p));
}
function openProject(slug){
  const pr=PROJECTS.find(p=>p.slug===slug); if(!pr) return renderProjects();
  const by=Object.fromEntries(PACKS.map(p=>[p.slug,p]));
  const steps=(pr.path||[]).map((st,i)=>'<li>'+(by[st.packSlug]?'<a class="prereq-link" data-s="'+st.packSlug+'">'+esc(by[st.packSlug].title)+'</a>':'<span style="color:var(--ink-3)">'+esc(st.packSlug)+' <em>(à venir)</em></span>')+(st.why?' — <span style="color:var(--ink-3)">'+esc(st.why)+'</span>':'')+'</li>').join('');
  const lessons=(pr.lessons||[]).map(l=>{ const links=(l.packs||[]).map(s=>by[s]?'<a class="prereq-link" data-s="'+s+'">'+esc(by[s].title)+'</a>':'<span style="color:var(--ink-3)">'+esc(s)+'</span>').join(', ');
    return '<div class="claim"><b>'+esc(l.title)+'</b><div style="margin:4px 0;color:var(--ink-2)">'+esc(l.body)+'</div>'+(l.decision?'<div style="font-size:.83rem;color:var(--green)">→ '+esc(l.decision)+'</div>':'')+(links?'<div class="src" style="margin-top:4px">packs : '+links+'</div>':'')+'</div>'; }).join('');
  const ext=pr.externalCurriculum?'<p><a class="doclink" href="'+esc(pr.externalCurriculum)+'">📚 Curriculum complet (révision) →</a></p>':'';
  app.innerHTML='<div class="crumb"><a id="bkp">Projets</a> › projet</div><div class="thead"><h2>'+esc(pr.title)+'</h2><div class="tag">'+esc(pr.goal)+'</div></div>'
    +'<div class="doc" style="margin-top:14px">'+fmt(pr.summary)+ext+'<h3>Parcours d’apprentissage</h3><ol>'+steps+'</ol>'+(lessons?'<h3>Leçons &amp; décisions</h3>'+lessons:'')+'</div>';
  document.getElementById('bkp').onclick=renderProjects;
  app.querySelectorAll('.prereq-link').forEach(a=>a.onclick=()=>open(a.dataset.s));
  window.scrollTo(0,0);
}
document.getElementById('home').onclick=renderHome;
document.getElementById('projBtn').onclick=renderProjects;
document.getElementById('graphBtn').onclick=renderGraph;
document.getElementById('qualBtn').onclick=renderQuality;
renderHome();
</script>
